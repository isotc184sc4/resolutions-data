- identifier: '436'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Allow SC 4 projects to enter Stage 3 ballot using HTML format
  dates:
  - start: '1999-11-15'
    kind: decision
  actions:
  - type: resolves
    message: |
      SC4 resolves to allow SC4 projects to enter their Stage 3 ballot with drafts
      documented using HTML.
    dates:
    - start: '1999-11-15'
      kind: effective
  - type: resolves
    message: |
      SC4 resolves that the project be required to provide a printable review version of
      the materials.
    dates:
    - start: '1999-11-15'
      kind: effective
  - type: resolves
    message: |
      SC4 resolves that these printable review versions and the html versions of the
      materials be excepted from conformance to the presentation requirements of the
      Supplementary Directives for ISO 10303. The provisions of Resolution 395 with
      respect to the use of guidelines development by the WG 10 STEP Modularization PWI
      remain in effect.
    dates:
    - start: '1999-11-15'
      kind: effective
  - type: instructs
    message: |
      SC4 instructs the Quality Committee and the WG 10 STEP Modularization PWI Project
      to provide advice on the use of html to present documents.
    dates:
    - start: '1999-11-15'
      kind: effective
- identifier: '437'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Split ISO 10303-27 into two parts and publish as Technical Specifications
  dates:
  - start: '1999-11-15'
    kind: decision
  actions:
  - type: resolves
    message: |
      SC4 resolves that the technical content of ISO 10303-27 shall be published as two
      separate parts and as Technical Specifications rather than as a single part as a Draft
      International Standard. Conformance Class 3 of ISO 10303-27 shall be published as
      ISO 10303-27 under the title of the current ISO 10303-27 and Conformance Class 1
      and 2 shall be published as ISO 10303-29 under the title of "Lightweight SDAI (
      insert trademark) Java Programming Language Binding".
    dates:
    - start: '1999-11-15'
      kind: effective
  - type: directs
    message: |
      SC4 directs the Secretariat to update the URL containing the titles of all ISO 10303
      parts to reflect this change.
    dates:
    - start: '1999-11-15'
      kind: effective
- identifier: '438'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Investigate impact and benefits of the new EXPRESS document
  dates:
  - start: '1999-11-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC4 requests its WGs to investigate the impact and benefits of the new Express
      document (see resolution C) and to put forward NWIs for revising parts, as
      appropriate.
    dates:
    - start: '1999-11-15'
      kind: effective
