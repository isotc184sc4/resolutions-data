      to US PRO, Chuck Stark, and his staff for their assistance and support
      * To the Central Secretariat for providing support in the person of Ms
      Sophie Clivio, and
      * To ISO/TC 184 Secretariat, Ms. Christine Hermetet-Filez, for participating in the SC4 meeting.
    dates:
    - start: '1999-11-15'
      kind: effective
