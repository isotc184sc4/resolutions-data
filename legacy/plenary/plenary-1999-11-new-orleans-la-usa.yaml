- identifier: '434'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Invite SC 1 WG 7 to jointly specify process flow requirements
  dates:
  - start: '1999-11-15'
    kind: decision
  considerations:
  - type: noting
    message: |
      SC4 notes the SC 1 requirements for the functionality's including, but not limited to
      looping, branching, conditionals and parallel execution.
    dates:
    - start: '1999-11-15'
      kind: effective
  actions:
  - type: requests
    message: |
      SC4 invites SC 1 WG 7 to work jointly with SC4 to specify these requirements.
    dates:
    - start: '1999-11-15'
      kind: effective
  - type: requests
    message: |
      SC4 requests SC 1 WG 7 to defer the DIS ballot on ISO 14649 in order to resolve
      issues related to integration of its information models with SC4 Standards.
    dates:
    - start: '1999-11-15'
      kind: effective
