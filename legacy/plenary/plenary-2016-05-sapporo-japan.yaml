- identifier: 201605-acclaim-06
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank hosts of the 71st SC 4 Plenary
  dates:
  - start: '2016-05-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC4 expresses its appreciation to Akihiko Ohtaka, Yoshihito Kikuchi, Hiroyuki Hiraoka,
      and the Manufacturing Science and Technology Center for hosting the 71st ISO/TC
      184/SC 4 Plenary in Sapporo, Japan 2016-05-22/27.

      Special acknowledgement is extended to the Hokkai-Gakuen University, the Sapporo
      Park Hotel, and their staff for their seamless and attentive support.
    dates:
    - start: '2016-05-15'
      kind: effective
