# yaml-language-server: $schema=https://raw.githubusercontent.com/metanorma/edoxen/refs/heads/main/schema/edoxen.yaml
metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Sapporo, Japan, May 22, 2016 -- May 27, 2016
  dates:
  - start: '2016-05-22'
    end: '2016-05-27'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Sapporo, Japan
resolutions:
- identifier: '922'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appoint Hiroshi Murayama as SC 4 Liaison to IEC SC 3D
  dates:
  - start: '2016-05-15'
    kind: decision
  considerations:
  - type: noting
    message: |
      Noting that IEC/TC 3 has terminated its liaison.
    dates:
    - start: '2016-05-15'
      kind: effective
  actions:
  - type: appoints
    message: |
      SC4 appoints Hiroshi Murayama for a three-year term as the SC 4 Liaison to IEC SC 3D,
      with appreciation for his offer to serve in that capacity.
    dates:
    - start: '2016-05-15'
      kind: effective
- identifier: '923'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Move ISO 8000-62 and ISO 8000-63 to Enlarged Timeframe
  dates:
  - start: '2016-05-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC4 requests its Secretariat to apply the enlarged timeframe to the ISO 8000-62 and
      ISO 8000-63 projects, with a DIS limit date of 2017-02-21.
    dates:
    - start: '2016-05-15'
      kind: effective
- identifier: '924'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approve PWI for Modelling and Simulation Information in Collaborative Systems
  dates:
  - start: '2016-05-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC4 approves a PWI to create standards for modeling and simulation information in a
      collaborative systems engineering context as defined in SC4 N3086.
    dates:
    - start: '2016-05-15'
      kind: effective
  - type: asks
    message: |
      SC4 asks member bodies to nominate experts to the project.
    dates:
    - start: '2016-05-15'
      kind: effective
- identifier: '925'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approve PWI for Manufacturing Change Management
  dates:
  - start: '2016-05-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC4 approves a PWI to create a standard for manufacturing change management as
      defined in SC4 N3087.
    dates:
    - start: '2016-05-15'
      kind: effective
  - type: asks
    message: |
      SC4 asks member bodies to nominate experts to the project.
    dates:
    - start: '2016-05-15'
      kind: effective
  - type: requests
    message: |
      SC4 requests its Secretariat to invite SC 5 to seek input from its P-members.
    dates:
    - start: '2016-05-15'
      kind: effective
- identifier: '926'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Establish 8-week ballot duration for ISO 10303-238ed2 NP
  dates:
  - start: '2016-05-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC4 requests its Secretariat to apply the 8 week ballot duration to the proposed NP for
      ISO 10303-238ed2.
    dates:
    - start: '2016-05-15'
      kind: effective
- identifier: '927'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Create Ad Hoc Group to support ISO/IEC DPPC Task Force
  dates:
  - start: '2016-05-15'
    kind: decision
  actions:
  - type: creates
    message: |
      SC4 creates an Ad Hoc group to shadow and support the ISO/IEC DPPC Task Force
      and appoints the following experts to the group:

      * Hiroshi Murayama, Leader and ISO 13584 and IEC 61360 expert
      * Wolfgang Wilkes, ISO 13584 expert and user in other standards
      * Norman Swindells, User of ISO 13584 in other standards
      * Nils Sandsmark, ISO 15926 expert and user in oil and gas facility environments
      * Nigel Shaw, ISO 10303-239 and reference data expert and user
      * Nicolas Figay, ISO 10303-242 expert
      * Peter Benson, ISO 22745 expert and user
      * Nikolaus Ondracek, ISO 13584 expert and user
      * David Leal, ISO 15926 and RDL expert
      * Paul van Exel, ISO 15926 expert
      * Hong Yan, ISO 13584-511 expert
    dates:
    - start: '2016-05-15'
      kind: effective
  - type: requests
    message: |
      SC4 requests its Secretariat to invite member bodies to nominate other experts to
      participate in the group.
    dates:
    - start: '2016-05-15'
      kind: effective
- identifier: '928'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Establish liaison with International Association of Oil and Gas Producers (IOGP)
  dates:
  - start: '2016-05-15'
    kind: decision
  considerations:
  - type: recognizing
    message: |
      Recognizing the request of the International Association of Oil and Gas Producers
      (IOGP) to become a liaison.
    dates:
    - start: '2016-05-15'
      kind: effective
  actions:
  - type: asks
    message: |
      SC4 asks its secretariat to initiate a liaison to this
      association as soon as possible.
    dates:
    - start: '2016-05-15'
      kind: effective
  - type: nominates
    message: |
      SC4 nominates Nils Sandsmark and Paul van Exel as the liaison officers from SC 4 to
      the IOGP.
    dates:
    - start: '2016-05-15'
      kind: effective
- identifier: '929'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approve new work item to create ISO 10303-210 Edition 4
  dates:
  - start: '2016-05-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC4 approves a NP to create a new edition 4 of 10303-210 with the same scope as
      10303-210 edition 3 "Electronic assembly, interconnection, and packaging design",
      using the enlarged timescale, with Tom Thurman as the project leader.
    dates:
    - start: '2016-05-15'
      kind: effective
- identifier: 201605-acclaim-01
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank Ken Virgil for service as SC 4 Secretary
  dates:
  - start: '2016-05-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC4 expresses its great appreciation to Ken Virgil for his excellent service and hard
      work as Secretary to SC 4 since 2014 and wishes him the very best in his future
      endeavours.
    dates:
    - start: '2016-05-15'
      kind: effective
- identifier: 201605-acclaim-02
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank SC 4 Liaisons and presenters
  dates:
  - start: '2016-05-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC4 expresses its appreciation to our SC 4 Liaisons and the presentations that were
      provided:

      * BuildingSMART -- Thomas Liebich
      * ISO/TC 59/SC 13 -- Thomas Liebich
      * ISO/IEC JTC 1/SC 24 -- Christophe Mouton
    dates:
    - start: '2016-05-15'
      kind: effective
- identifier: 201605-acclaim-03
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank Opening Technical Forum participants
