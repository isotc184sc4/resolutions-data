metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Baltimore, United States, October 18, 2015 -- October 23, 2015
  dates:
  - start: '2015-10-18'
    end: '2015-10-23'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Baltimore, United States
resolutions:
- identifier: '907'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approve new project leaders and editors for SC 4 projects
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC4 approves the following new project leaders and/or project editors for the
      associated SC 4 projects:

      |===
      |ISO Project # |Project Lead |Document Editor

      |15926-10 |Manoj Dharwadkar |Hiroshi Okada
      |===
    dates:
    - start: '2015-10-15'
      kind: effective
- identifier: '908'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Reappoint Howard Mason as Change Management Committee Convener
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: appoints
    message: |
      SC4 appoints Mr. Howard Mason as Convener for the Change Management
      Committee for a further three-year term, with an appreciation for his offer to serve in that
      capacity.
    dates:
    - start: '2015-10-15'
      kind: effective
- identifier: '909'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Reappoint Paul van Exel as WG 03 Convener
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: appoints
    message: |
      SC4 appoints Paul van Exel as Convener for WG 03 "Oil, Gas, Process and Power" for
      a further three year term, with appreciation for his offer to serve in that capacity.
    dates:
    - start: '2015-10-15'
      kind: effective
- identifier: '910'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Reappoint Keith Hunten as WG 21 Convener
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: appoints
    message: |
      SC4 appoints Keith Hunten as Convener for WG 21 "SMRL Validation Team" for a
      further three-year term, with appreciation for his offer to serve in that capacity.
    dates:
    - start: '2015-10-15'
      kind: effective
- identifier: '911'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Reappoint Jochen Haenisch as WG 21 Deputy Convener
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: appoints
    message: |
      SC4 appoints Jochen Haenisch as Deputy Convener for WG 21 "SMRL Validation
      Team" for a further three-year term, with appreciation for his offer to serve in that
      capacity.
    dates:
    - start: '2015-10-15'
      kind: effective
- identifier: '912'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Reappoint Nils Sandsmark as WG 22 Convener
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: appoints
    message: |
      SC4 appoints Nils Sandsmark as Convener for WG 22 "Reference Data Validation
      Team" for a further three-year term, with appreciation for his offer to serve in that
      capacity.
    dates:
    - start: '2015-10-15'
      kind: effective
- identifier: '913'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Nominate Howard Mason for an additional term as SC 4 Chair
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: nominates
    message: |
      SC4 nominates Howard Mason for an additional two year term (January 2016 -
      December 2017) as the Chair of ISO/TC 184 / SC 4 and instructs the Secretary to
      forward his nomination to ISO/TC 184 within 30 days.
    dates:
    - start: '2015-10-15'
      kind: effective
- identifier: '914'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Extend standard development track for ISO 10303-57
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC4 requests its Secretariat to change the development track of ISO 10303-57 from 36
      months to 48 months.
    dates:
    - start: '2015-10-15'
      kind: effective
- identifier: '915'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Extend standard development track for ISO 18828-2
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC4 requests its Secretariat to change the development track of ISO 18828-2 from 24
      months to 36 months.
    dates:
    - start: '2015-10-15'
      kind: effective
- identifier: '916'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Terminate SC 4 Liaison with ASAM
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC4 requests its Secretariat to terminate its liaisons with the Association for
      Standardization of Automation and Measuring Systems (ASAM).
    dates:
    - start: '2015-10-15'
      kind: effective
- identifier: '917'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Apply 2-month ballot duration to specific NP proposals
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC4 requests its Secretariat to apply the 2-month duration to the proposed NPs for:

      * ISO 10303 AP239 ed 3 PLCS
      * ISO 18828-4 KPI in production planning processes
      * ISO 8000-115 Master data: Quality identifiers
    dates:
    - start: '2015-10-15'
      kind: effective
- identifier: '918'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Solicit subject matter experts for WG 2 Parts Libraries
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC4 requests its secretariat to ask its P- and O-Members to nominate subject matter
      experts in the area of Part Libraries. The invitation should also be sent to ISO users of
      the PLIB standards.
    dates:
    - start: '2015-10-15'
      kind: effective
- identifier: '919'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Establish Working Group 15 for Digital Manufacturing
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: decides
    message: |
      SC4 decides to establish Working Group 15 "Digital manufacturing". The goal of this
      working group is to coordinate the SC 4 internal efforts in this area with other standards
      organizations and to observe and interact with ongoing and upcoming developments.
    dates:
    - start: '2015-10-15'
      kind: effective
- identifier: '920'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appoint experts to Joint Task Force for product properties database
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: appoints
    message: |
      SC4 appoints the following experts to assist in the work of the Joint Task Force
      to explore the establishment of a database for product properties and classes:

      * Wolfgang Wilkes: ISO 13584 expert and user in other standards
      * Norman Swindells: User of ISO 13584 in other standards
      * Nils Sandsmark: ISO 15926 expert and user in oil and gas facility environments
      * Nigel Shaw: ISO 10303-239 and reference data expert and user
      * Nicolas Figay: ISO 10303-242 expert
      * Peter Benson: ISO 22745 expert and user
      * Nikolaus Ondracek: ISO 13584 expert and user
      * David Leal: ISO 15926 and RDL expert
      * Paul van Exel: ISO 15926 expert
    dates:
    - start: '2015-10-15'
      kind: effective
  - type: requests
    message: |
      SC4 requests its PPC to arrange a coordination meeting for the nominees to ensure a
      consistent representation from SC 4 in this task force.
    dates:
    - start: '2015-10-15'
      kind: effective
- identifier: '921'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approve PWI for new Edition 3 of ISO 14306 JT
  dates:
  - start: '2015-10-15'
    kind: decision
  considerations:
  - type: noting
    message: |
      Noting the revised schedule for the delivery of a document for DIS ballot for edition
      2 by the end of February 2016.
    dates:
    - start: '2015-10-15'
      kind: effective
  actions:
  - type: approves
    message: |
      SC4 approves a PWI to create a new edition 3 of ISO 14306.
    dates:
    - start: '2015-10-15'
      kind: effective
  - type: asks
    message: |
      SC4 asks member bodies and other stakeholders such as the Global
      Automotive Action Group to nominate experts to the project and to solicit requirements
      to be addressed in the next edition by end March 2016.
    dates:
    - start: '2015-10-15'
      kind: effective
