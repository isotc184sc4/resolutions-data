- identifier: '487'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Adopt procedures for Externally Developed Specifications
  dates:
  - start: '2001-02-15'
    kind: decision
  actions:
  - type: resolves
    message: |
      SC 4 resolves to adopt the procedures described in ISO/TC 184/SC 4 N_Funchal 16
      "Procedures For Transposing Externally Developed Specifications Into ISO
      Deliverables" as a standing document to enable SC 4 to process Externally Developed
      Specifications, that meet certain criteria, for transposition for acceptance and
      accreditation as an International Standard (IS), Technical Specification (TS), or
      Publicly Available Specification (PAS) and instructs the secretariat to circulate the
      document for approval as a standing document.
    dates:
    - start: '2001-02-15'
      kind: effective
- identifier: '488'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Publish AP 233 contents as Publicly Available Specification
  dates:
  - start: '2001-02-15'
    kind: decision
  actions:
  - type: resolves
    message: |
      SC 4 resolves that the current contents of AP 233 be published as a Publicly Available
      Specification "Reference Model for Systems Engineering" with a new ISO number.
    dates:
    - start: '2001-02-15'
      kind: effective
  - type: requests
    message: |
      SC 4 requests ISO Geneva to issue a new number for this Publicly Available
      Specification.
    dates:
    - start: '2001-02-15'
      kind: effective
  - type: directs
    message: |
      SC 4 directs the Part 233 project team to prepare a publicly available specification for
      ballot, based upon WG 3 N908, N909, N910, N983 and this resolution.
    dates:
    - start: '2001-02-15'
      kind: effective
  - type: notes
    message: |
      SC 4 expects this PAS to be withdrawn within 3 years of publication and be replaced
      by ISO 10303-233 as initiated in Resolution H.
    dates:
    - start: '2001-02-15'
      kind: effective
- identifier: '489'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Revise Publicly Available Specification to be Application Protocol 233
  dates:
  - start: '2001-02-15'
    kind: decision
  actions:
  - type: directs
    message: |
      SC 4 directs the Part 233 project team to start the revision of the PAS defined in
      Resolution "Publicly available specification for systems engineering data
      representation", to be published as Application Protocol 233.
    dates:
    - start: '2001-02-15'
      kind: effective
- identifier: '490'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Provide guidelines for publishing SC 4 standards using HTML
  dates:
  - start: '2001-02-15'
    kind: decision
  actions:
  - type: welcomes
    message: |
      SC 4 welcomes the statement from ISO CS that SC 4 standards may now be published
      in HTML without any need for other digital formats such as PDF.
    dates:
    - start: '2001-02-15'
      kind: effective
  - type: directs
    message: |
      SC 4 therefore directs its Quality Committee to develop an initial set of guidelines for the
      use of HTML. These guidelines should be available as a draft for comment by the San Francisco
      meeting in June 2001, and should at least address the following topics:

      * version(s) of HTML to be used;
      * HTML tags to be used for the different elements of SC 4 standards;
      * validation of HTML documents;
      * naming conventions for files and directories;
      * hyperlinks within documents and between documents.
    dates:
    - start: '2001-02-15'
      kind: effective
  - type: requests
    message: |
      SC 4 also requests the Quality Committee to develop a roadmap for other issues
      regarding publication of SC 4 standards using HTML.

      These guidelines should also take into account the issues and requirements identified
      during the joint WG 3 and QC meeting on Publishing Standards using XML/HTML and
      any relevant guidelines from the W3C and elsewhere.
    dates:
    - start: '2001-02-15'
      kind: effective
  - type: instructs
    message: |
      SC 4 instructs the Quality Committee to liaise closely with Mrs. Joanna Goodwin and
      her colleagues at ISO CS to ensure that the guidelines developed for SC 4 are
      consistent with ISO's policies and production requirements.
    dates:
    - start: '2001-02-15'
      kind: effective
  - type: requests
    message: |
      SC 4 requests its P-members and projects to provide resources to the Quality
      Committee to work on this task, and encourages experts to attend or provide input to
      the QC meeting at Oklahoma State University in March 2001.
    dates:
    - start: '2001-02-15'
      kind: effective
  - type: directs
    message: |
      SC 4 directs any projects wishing to publish standards in HTML to work with the
      Quality Committee to provide requirements and to ensure that their work is consistent
      with the emerging guidelines for the use of HTML.

      The requirement for printable files defined in resolution 436 needs to be considered by
      the Quality Committee.
    dates:
    - start: '2001-02-15'
      kind: effective
  - type: encourages
    message: |
      SC 4 encourages the development of appropriate software tools to provide this capability.
    dates:
    - start: '2001-02-15'
      kind: effective
  considerations:
  - type: noting
    message: |
      SC 4 notes that use of HTML has many advantages, include the following:

      * Ease of navigation for the end user using a hyperlinked document (or set of documents).
      * Ease of preparation of documents, using automated tools to generate drafts as at present.
      * Simpler review of drafts in HTML format, leading to a better quality product, which would not need to be converted into a different form for publication.
      * Improved cross-references between documents, giving shorter documents and avoiding transcription errors from replicating the same material.
      * Improved support for modules.

      SC 4 also notes that use of HTML does introduce risks associated with publishing standards in a user-editable form. SC 4 considers that these risks are outweighed by the advantages identified above.
      In order to exploit the advantages identified above, SC 4 recognizes the need for guidelines for the use of HTML.
    dates:
    - start: '2001-02-15'
      kind: effective
