      Madeira; the Secretaria Regional do Turismo e Cultura da Madeira; Câmara Municipal
      do Funchal; Caldeira, Costa & Companhia Lda.; CiberDimensão; Cabo TV
      Madeirense; and Banco Comercial Português without whom we would not have had
      as many opportunities to see and appreciate the people and land of the Island of
      Madeira.

      SC 4 expresses its sincere appreciation to Ricardo Goncalves for his dedication,
      untiring efforts, enthusiasm, and creativity in achieving one of the most successful
      and memorable meetings in the history of the committee.
    dates:
    - start: '2001-02-15'
      kind: decision
