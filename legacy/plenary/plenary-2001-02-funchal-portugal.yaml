    message: |
      SC 4 approves the procedure for using ASN.1 identifiers described in document QC N177.
    dates:
    - start: '2001-02-15'
      kind: effective
  - type: directs
    message: |
      SC 4 directs its project teams to apply this procedure to their work immediately.
    dates:
    - start: '2001-02-15'
      kind: effective
  - type: directs
    message: |
      SC 4 also directs the Quality Committee to include this procedure in an updated
      version of the Supplementary Directives as soon as possible.
