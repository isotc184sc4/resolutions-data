- identifier: '448'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Terminate direct liaisons with inactive organisations
  dates:
  - start: '2000-02-15'
    kind: decision
  considerations:
  - type: noting
    message: |
      SC4 notes that a number of its liaisons are inactive, due to evolving requirements
      and changes in other organizations.
  - type: noting
    message: |
      SC4 notes the importance of its relation with UN/CEFACT which will be continued
      as part of participation in the MoU management group for electronic business.
  actions:
  - type: resolves
    message: |
      SC4 resolves to terminate its direct liaisons with the following organisations:

      * CAM-I
      * UN/ECE
      * ISO/IEC JTC 1 SC 24
      * ISO/IEC JTC 1/SC 14
      * ISO/IEC JTC 1/SC 21/WG 3
      * ISO/IEC JTC 1/SC 21/WG 3/CSMF
      * ISO/IEC JTC 1/SC 6
      * ISO/IEC JTC 1/SC 7
      * ISO/IEC JTC 1/SC 7/WG 11
      * ISO/IEC JTC 1/WG 4
    dates:
    - start: '2000-02-15'
      kind: effective
- identifier: '449'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Amend Organisation Handbook on Technical Specifications balloting
  dates:
  - start: '2000-02-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC4 requests its secretariat to amend the Organisation Handbook as follows:

      Amend Clause 2.3 to add reference to Technical Specifications "...... (CD) or
      Preliminary Draft Technical Specification (PDTS), (2).....
      Amend Clause 2.4 by replacing the reference to "CD" by "ballot"
      Amend Clause 2.5 by replacing all references to "CD ballot" by "ballot"

      SC4 also requests its secretariat to make any corresponding changes to the
      standardisation process summary on the SC4 web site.
    dates:
    - start: '2000-02-15'
      kind: effective
- identifier: '450'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Recommend ISO/CS publish new edition of ISO Directives and recognize Sophie Clivio
  dates:
  - start: '2000-02-15'
    kind: decision
  actions:
  - type: recognizes
    message: |
      SC4 recognizes the excellence of the support and advice of Mrs. Sophie Clivio in the
      interpretation and explanation of the ISO Directives and the many TMB decisions
      complementing the Directives.
    dates:
    - start: '2000-02-15'
      kind: effective
  - type: recommends
    message: |
      SC4 recommends the ISO/CS to publish a new edition of the ISO Directives Parts 1
      and 3 incorporating the various ISO/TMB decisions, in order to facilitate the access to
      the rules governing the Committee work.
    dates:
    - start: '2000-02-15'
      kind: effective
  - type: thanks
    message: |
      SC4 thanks the ISO/CEO for the nomination of Mrs. Sophie Clivio as Technical
      Officer for ISO/TC 184 and ISO/TC 184/SC 4.
    dates:
    - start: '2000-02-15'
      kind: effective
