- identifier: '445'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Encourage OMG to accept UML and EXPRESS interoperability
  dates:
  - start: '2000-02-15'
    kind: decision
  actions:
  - type: encourages
    message: |
      SC4 encourages OMG to accept interoperability between UML and EXPRESS
      (ISO 10303-11) as a mandatory requirement in the UML 2.0 development effort.
    dates:
    - start: '2000-02-15'
      kind: effective
  - type: directs
    message: |
      SC4 directs its WGs 10 and 11 to work closely with OMG, especially the UML 2.0 WG
      in OMG's Analysis and Design PTF, in support of this goal.
    dates:
    - start: '2000-02-15'
      kind: effective
  - type: asks
    message: |
      SC4 asks its member bodies and liaison organisations to support these efforts
      adequately in OMG through their member companies and organisations.
    dates:
    - start: '2000-02-15'
      kind: effective
