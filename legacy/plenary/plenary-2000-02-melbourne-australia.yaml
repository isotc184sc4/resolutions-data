- identifier: '454'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Support cooperation between SC 4 and Object Management Group
  dates:
  - start: '2000-02-15'
    kind: decision
  considerations:
  - type: noting
    message: |
      The SC4 Secretariat has received a communication from the Object Management
      Group (OMG) concerning mutual interest and potential cooperative activities.
  actions:
  - type: resolves
    message: |
      SC4 fully supports and looks forward to working with the OMG organization to achieve
      mutual benefits in the development, balloting, and accreditation of appropriate
      specifications which qualify as ISO deliverables.
    dates:
    - start: '2000-02-15'
      kind: effective
