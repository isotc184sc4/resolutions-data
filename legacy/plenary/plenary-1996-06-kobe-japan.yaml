metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Kobe, Japan, June 9, 1996 -- June 19, 1996
  dates:
  - start: '1996-06-09'
    end: '1996-06-19'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Kobe, Japan
resolutions:
- identifier: '257'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Reconfirm resolution 168 and exempt specific projects from ATS requirements
  dates:
  - start: '1996-06-15'
    kind: decision
  actions:
  - type: confirms
    message: |
      SC 4 reconfirms resolution #168 but approves exempting 10303-210, 10303-224,
      and 10303-225 from the associated abstract test suite requirements of SC 4
      Resolution #168 for these APs’ initial DIS registration and ballot cycle
      if before 31 July 1996:

      (a) the CD ballot comments are resolved;

      (b) the DIS draft is approved by integration, qualification, and editing; and

      (c) the issues resolution log and draft AP for DIS registration are successfully
      loaded on SOLIS, with a production-ready hard copy of both documents to the SC 4
      Secretary.

      Compliance to SC 4 Resolution #168 is expected if an AP project team is unable to
      meet (a) through (c) by 31 July 1996. The requirements of abstract test suites will
      be enforced before FDIS.
    dates:
    - start: '1996-06-15'
      kind: effective
- identifier: '258'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Process technical SEDS reports and incorporate into ISO 10303
  dates:
  - start: '1996-06-15'
    kind: decision
  considerations:
  - type: noting
    message: |
      Noting the following technical SEDS reports as found in SC 4 N 441, for
      incorporating into the affected part of ISO 10303:

      * Reports 1, 3, 4, and 6
      * 10303-42 & 10303-43: Report 5
      * 10303-42 & 10303-203: Report 8
      * 10303-11: Reports 13, 14, 16, 29, 31, and 33
    dates:
    - start: '1996-06-15'
      kind: effective
  actions:
  - type: requests
    message: |
      SC 4 requests the SC 4 Secretariat ensure these reports are made publicly available
      on SOLIS, and incorporated into technical corrigenda, amendments, or new editions
      when appropriate.
