- identifier: '278'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Require Abstract Test Suites to be advanced as Type 2 Technical Reports
  dates:
  - start: '1996-06-15'
    kind: decision
  actions:
  - type: resolves
    message: |
      The development of ATS is of the utmost importance in accelerating the availability of
      high quality commercial AP implementations. So that information and experience of
      ATS usage in practice may be gathered, SC 4 resolution #168 is superseded by
      requiring that all Abstract Test Suites be advanced as Type 2 Technical Reports.

      Before an Application Protocol can be registered as an FDIS, the corresponding ATS
      must have started its ballot as a Type 2 Technical Report.
    dates:
    - start: '1996-06-15'
      kind: effective
  - type: requests
    message: |
      The SC 4 Secretary and Chair are asked to identify the responsible projects within
      SC 4 and task them to establish the metrics for determining when the ATS Technical
      Report is adequate.
    dates:
    - start: '1996-06-15'
      kind: effective
