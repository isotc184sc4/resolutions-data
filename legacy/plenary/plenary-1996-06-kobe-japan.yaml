- identifier: '267'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Require electronic format for ballot comments and SC 4 correspondence
  dates:
  - start: '1996-06-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC 4 requires that, unless a P-member expressly requests in writing an exemption
      from the SC 4 Secretary, all ballot comments shall be provided in, at minimum, ASCII
      format along with a backup hard copy. Distribution by the SC 4 Secretariat of ballot
      comments and general SC 4 correspondence shall be by 3.5" disk, providing the
      original format, PostScript, and ASCII files for each SC 4 document.
    dates:
    - start: '1996-06-15'
      kind: effective
