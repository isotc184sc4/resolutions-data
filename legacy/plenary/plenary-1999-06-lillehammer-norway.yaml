metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Lillehammer, Norway, June 7, 1999 -- June 17, 1999
  dates:
  - start: '1999-06-07'
    end: '1999-06-17'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Lillehammer, Norway
resolutions:
- identifier: '405'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approve project leaders and editors for ISO 10303 projects
  dates:
  - start: '1999-06-15'
    kind: decision
  actions:
  - type: approves
