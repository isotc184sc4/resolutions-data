- identifier: '828'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appoint Jean Brangé as Deputy Convener for WG 13
  dates:
  - start: '2011-10-15'
    kind: decision
  actions:
  - type: appoints
    message: |
      SC 4 appoints Jean Brangé as Deputy Convener for WG 13, with
      appreciation for his offer.
    dates:
    - start: '2011-10-15'
      kind: effective
  considerations:
  - type: noting
    message: |
      SC 4 thanks Emily Grantner (Williams) and Leif Gyllström for their
      faithful service as joint Deputy Conveners for SC 4/WG 13 (Industrial
      Data Quality) since 2008 and regrets that neither is available to
      continue in these roles.
    dates:
    - start: '2011-10-15'
      kind: effective
