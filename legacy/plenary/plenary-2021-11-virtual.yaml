- identifier: '1078'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appoint Convenors and Deputy Convenors for 2022-2024 term
  dates:
  - start: '2021-11-15'
    kind: decision
  considerations:
  - type: noting
    message: |
      Noting that continuity of operations and management of work is an important
      consideration to the successful operation of advisory groups
    dates:
    - start: '2021-11-15'
      kind: effective
  actions:
  - type: appoints
    message: |
      SC 4 appoints the following Convenors and Deputy Convenors for a three-year term
      [2022-2024], with appreciation to serve in this capacity. Note the Convenor for the
      PPC is appointed to a two-year term to align with the Change Management AG.

      |===
      |WG |Role |Appointment

      |*PPC |Convenor |Kenny Swope
      |WG 3 |Convenor |Paul van Exel
      |WG 15 |Convenor |Martin Hardwick
      |WG 15 |Deputy Convenor |Olsson, Bengt
      |WG 21 |Convenor |Hunten, Keith
      |WG 21 |Deputy Convenor |Haenisch, Jochen
      |WG 22 |Convenor |Sandsmark, Nils
      |WG 22 |Deputy Convenor |Paul van Exel
      |WG 23 |Convenor |Tim King
      |===
    dates:
    - start: '2021-11-15'
      kind: effective

