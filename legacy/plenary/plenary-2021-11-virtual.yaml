- identifier: '1080'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Extend the term of Ad Hoc Group 2 on Nuclear Digital Ecosystem Specification
  dates:
  - start: '2021-11-15'
    kind: decision
  considerations:
  - type: noting
    message: |
      Noting that ISO/TC 85 is reviewing the DTR "Nuclear Digital Ecosystem Specification"
      provided by AHG 2 and that their comments and feedback need to be accommodated,
      AHG 2 requires additional time to complete the consensus processes and therefore
      requests SC 4 extend the term for AHG 2 to the 83rd SC 4 Plenary. AHG 2 plans to
      report on all developments to the PPC and at the 83rd SC 4 plenary.
    dates:
    - start: '2021-11-15'
      kind: effective
  actions:
  - type: approves
    message: |
      SC 4 extends the term of Ad Hoc Group 2 on Nuclear Digital Ecosystem Specification to
      the 83rd SC 4 Plenary.
    dates:
    - start: '2021-11-15'
      kind: effective
  - type: encourages
    message: |
      SC 4 encourages its members to join Ad Hoc Group 2 and take part to the
      continuous effort to collect needs and interoperability requirements in terms of
      specifications for a digital ecosystem for the nuclear industry.
    dates:
    - start: '2021-11-15'
      kind: effective

- identifier: '1081'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Request one-year extension for ISO 15926-4 ed3 project
  dates:
  - start: '2021-11-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC 4 requests its Committee Manager coordinate with ISO CS and move ISO/TS 15926-4 ed3
      from SDT 24 to SDT 36 allowing the project team additional time to complete the
      project by 05 Jun 2023.
    dates:
    - start: '2021-11-15'
      kind: effective

- identifier: '1082'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Recommend Committee Specific Procedure for JWG 24 database standards
  dates:
  - start: '2021-11-15'
    kind: decision
  considerations:
  - type: noting
    message: |
      Noting the action assigned by ISO/TMB through resolution 81/2017 to form an ISO/IEC
      Joint Working Group and approve in principle the exception for ISO/TC 184 and other
      interested committees to publish and maintain data in the IEC CDD database through a
      Committee Specific Procedure (CSP) approved by the TMB
    dates:
    - start: '2021-11-15'
      kind: effective
  actions:
  - type: thanks
    message: |
      SC 4 thanks the experts from both ISO and IEC in developing a CSP that meets the needs
      of both organizations toward the management of standards in database format.
    dates:
    - start: '2021-11-15'
      kind: effective
  - type: agrees
    message: |
      SC 4 concurs with the work of ISO/IEC JWG 24 in developing the proposed CSP.
    dates:
    - start: '2021-11-15'
      kind: effective
  - type: recommends
    message: |
      SC 4 recommends that ISO/TMB approve the proposed CSP.
    dates:
    - start: '2021-11-15'
      kind: effective
  - type: requests
    message: |
      SC 4 requests the SC 4 Committee Manager work with ISO/CS and deliver to the ISO/TMB
      secretariat this CSP as per the ISO/TMB resolution 81/2017 Part E.
    dates:
    - start: '2021-11-15'
      kind: effective
  - type: asks
    message: |
      Upon approval by the TMB, SC 4 invites member bodies nominate experts to the ISO VT-CDD.
    dates:
    - start: '2021-11-15'
      kind: effective

- identifier: '1083'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Request duration change to SDT 36 for ISO 10303-2
  dates:
  - start: '2021-11-15'
    kind: decision
  considerations:
  - type: noting
    message: |
      Noting the progress of the project team to complete a CD draft of ISO 10303-2 and the
      actions to address the resource, technology and data quality issues surfaced
    dates:
    - start: '2021-11-15'
      kind: effective
  actions:
  - type: requests
    message: |
      SC 4 requests its Committee Manager coordinate with ISO/CS to move ISO 10303-2 (project
      id = 81196) from SDT 24 to SDT 36 with the following dates:

      * Stage 30 -- Committee Draft Registered: 2021-12-01 (Original Target 2021-06-14)
      * Stage 40 -- DIS Registered: 2022-05-01 (Original Target 2021-10-11)
      * Stage 60 -- IS Published: 2022-10-01 (Original Target 2022-05-15)
    dates:
    - start: '2021-11-15'
      kind: effective

