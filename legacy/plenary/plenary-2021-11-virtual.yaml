- identifier: '1085'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Reallocate SMRL projects from WG 21 to WG 12
  dates:
  - start: '2021-11-15'
    kind: decision
  considerations:
  - type: noting
    message: |
      Noting the procedures laid out in the ISO/TC 184/SC 4 Handbook, standing document
      SC4N2591, and the results of a project audit conducted in 2021
    dates:
    - start: '2021-11-15'
      kind: effective
  actions:
  - type: requests
    message: |
      SC 4 requests its Committee Manager coordinate with ISO CS and reallocate the following
      projects from ISO/TC 184/SC 4/WG 21 to ISO/TC 184/SC 4/WG 12:

      * ISO/CD TS 10303-4443
      * ISO/AWI TS 10303-1847
      * ISO/AWI TS 10303-1852
      * ISO/AWI TS 10303-1853
      * ISO/CD TS 10303-4439
    dates:
    - start: '2021-11-15'
      kind: effective

- identifier: '1086'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Launch ISO 23301 ed2 and nominate project leader
  dates:
  - start: '2021-11-15'
    kind: decision
  considerations:
  - type: noting
    message: |
      Noting that ISO 23301 edition pilots in 2020-2021 have demonstrated that the AP242
      ed2 fully shattered product structure is an efficient way to manage complexity and
      diversity of geometry datasets implementations and that updates are needed to address
      certain needs for meta data, and specifications with no change in scope to edition 1
    dates:
    - start: '2021-11-15'
      kind: effective
  actions:
  - type: requests
    message: |
      SC 4 requests is Committee Manager coordinate with ISO CS and launch ISO 23301 ed2 at
      Stage 20 with SDT 18 and the following schedule dates:

      * Circulation of 1st Working Draft to experts: 2022-04-15
      * Committee Draft ballot (if any): 2022-07-30
      * DIS submission: 2022-12-01
      * Publication: 2022-12-01
    dates:
    - start: '2021-11-15'
      kind: effective
  - type: nominates
    message: |
      SC 4 nominates Jacques Heinisch as project leader with an invitation to member bodies
      to nominate experts to the project team.
    dates:
    - start: '2021-11-15'
      kind: effective

- identifier: '1087'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Retire Bugzilla and migrate to JIRA for issue management
  dates:
  - start: '2021-11-15'
    kind: decision
  considerations:
  - type: noting
    message: |
      Noting the progress made in developing an agile environment for SC 4 CR management
      and the detailed plan for cutover to the new environment
    dates:
    - start: '2021-11-15'
      kind: effective
  actions:
  - type: supports
    message: |
      SC 4 supports the recommendation of WG 12 and agrees to retire Bugzilla as the system
      of record for CR management and authorizes WG12 to start working in JIRA per the following
      schedule:

      |===
      |Action |Date

      |Stop using Bugzilla on |December 15, 2021
      |Archive Bugzilla to ISO WG12 Member Area by |December 20, 2021
      |Migrate Bugzilla projects to JIRA by |December 26, 2021
      |Start using JIRA on |January 1, 2022
      |===
    dates:
    - start: '2021-11-15'
      kind: effective
  - type: agrees
    message: |
      SC 4 concurs with the recommendation of the Living Lab to disposition the Bugzilla
      projects as follows:

      |===
      |Topic |Description |Bug Count |Proposed Action

      |10303 example files |Example files used by implementors to understand the standard. |0 |Recommend ARCHIVAL
      |10303 Recommended Practices |Includes new materials as well as old AP210 materials. |114 |Recommend ARCHIVAL
      |AP210 IS1 |ISO 10303-210:2001 |1105 |Recommend MIGRATION: TC184SC4-10303
      |Express Engine |EXPRESS based purpose built software. |83 |Recommend MIGRATION: TC184SC4-Utilities
      |ISO 10303 |all issues on ISO 10303 standards |6644 |Recommend MIGRATION: TC184SC4-10303
      |ISO 13584 |Parts library |16 |Recommend MIGRATION: TC184SC4-13584
      |ISO 14306 |Open JT |327 |Recommend MIGRATION: TC184SC4-14306
      |ISO 29002 |Exchange of characteristic data |0 |Recommend ARCHIVAL
      |SC4 Documents |SC4 Documents that are not standing documents |2 |Recommend MIGRATION: TC184SC4-StandingDocs
      |SC4 Standing documents |SC4 Standing documents |51 |Recommend MIGRATION: TC184SC4-StandingDocs
      |STEPlib environment and utilities |same |3 |Recommend MIGRATION: TC184SC4-Utilities
      |stepmod environment and utilities |stepmod environment and utilities |548 |Recommend MIGRATION: TC184SC4-Utilities
      |Technical Reports |Technical reports authored by SC4 |0 |Recommend ARCHIVAL
      |test |A dummy product used to test permissions |1 |Recommend ARCHIVAL
      |WG12_policy |Record of WG12 policy items. |5 |Recommend MIGRATION: TC184SC4-StandingDocs
      |===
    dates:
    - start: '2021-11-15'
      kind: effective
  - type: requests
    message: |
      WG 12 recommends that SC 4 PPC take the action to revise the SC 4 Handbook at its
      next revision noting the new system of record.
    dates:
    - start: '2021-11-15'
      kind: effective
  - type: thanks
    message: |
      SC 4 thanks PDES, Inc. for providing outstanding custodianship of the Bugzilla environment.
    dates:
    - start: '2021-11-15'
      kind: effective

- identifier: '1088'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Retire CVS and migrate repositories to Bitbucket GIT
  dates:
  - start: '2021-11-15'
    kind: decision
  considerations:
  - type: noting
    message: |
      Noting the progress made in developing a new repository for the SC 4 code base
      utilizing git technology and demonstrated performance by projects on the STEP
      Extended Architecture, STEP Utilities and prototyping the new SRL build processes
    dates:
    - start: '2021-11-15'
      kind: effective
  actions:
  - type: approves
    message: |
      SC 4 approves the retirement of CVS and migrate content to ISO Bitbucket per the
      schedule below:

      |===
      |Action |Date

      |Stop using CVS on |December 15, 2021
      |Archive CVS STEPMod to ISO WG12 Member Area by |December 20, 2021
      |Migrate CVS STEPMOD to Bitbucket repositories by |December 26, 2021
      |Migrate GitLab STEPLib to Bitbucket repositories by |December 26, 2021
      |Start using Bitbucket on |January 1, 2022
      |===
    dates:
    - start: '2021-11-15'
      kind: effective
  - type: asks
    message: |
      SC 4 invites member bodies to identify key users that require training and to notify the
      project team.
    dates:
    - start: '2021-11-15'
      kind: effective
  - type: acknowledges
    message: |
      SC 4 acknowledges and thanks AFNeT Services (formally Boost Conseil) for providing
      outstanding custodianship of the development environment.
    dates:
    - start: '2021-11-15'
      kind: effective

- identifier: '202111-acclaim-01'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Recognize Nigel Shaw with the ISO Excellence Award
  dates:
  - start: '2021-11-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC 4 recognizes the outstanding performance and contribution of Nigel Shaw to the
      development of ISO 10303 and to the standards community with the ISO Excellence
      award. The award recognizes a lifetime of achievement and technical excellence from
      the first edition of ISO 10303 through the development and extension of the standard
      through the full product lifecycle.
    dates:
    - start: '2021-11-15'
      kind: decision

