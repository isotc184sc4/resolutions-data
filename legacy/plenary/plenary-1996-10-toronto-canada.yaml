metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Toronto, Canada, October 6, 1996 -- October 16, 1996
  dates:
  - start: '1996-10-06'
    end: '1996-10-16'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Toronto, Canada
resolutions:
- identifier: '291'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Endorse Petrotechnical Open Software Corporation as an A-liaison
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: endorses
    message: |
      SC 4 endorses the Petrotechnical Open Software Corporation (POSC) as an A-liaison
      to ISO/TC 184/SC 4.
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '292'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Authorize temporary action for Quality Committee and amend Handbook
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: resolves
    message: |
      SC 4 authorises a temporary action to allow operation of the Quality Committee as
      outlined in ISO/TC 184/ SC 4 N483 (Rev 1) until the new pages are adopted by letter
      ballot.
    dates:
    - start: '1996-10-15'
      kind: effective
  - type: approves
    message: |
      SC 4 approves replacing the following text in the SC 4 Organization Handbook,
      Clause 5.7.3.2:

      "...Copies of Last-Day Resolution Papers must be handed to the meeting desk by
      15.00 in order to be available for pick-up by delegation leaders at 17.00 on the day
      preceding the start of the SC 4 meeting."

      with:

      "Copies of Last-Day Resolution Papers must be handed to the SC 4 Secretary or
      meeting desk by 10.30 in order to be available for pick-up by delegation leaders at
      15.30 on the day preceding the start of the SC 4 meeting. A camera-ready hard
      copy and digital ASCII file shall be provided by the originating national body or
      convener."
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '294'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approve Handbook insertion and publish standing documents
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC 4 approves inserting the following into the SC 4 Organization Handbook for
      Clause 5.9:

      5.9 Balloting Procedures

      5.9.1 International Standards and Type II Technical Reports

      Balloting procedures for developing ISO standards or Type II Technical Reports can
      be found in the ISO/IEC Directives Part 1, chapter 2. Information on how to acquire a
      copy of these procedures can be found in Appendix A.

      5.9.2 Standing Documents
    dates:
    - start: '1996-10-15'
      kind: effective
  - type: resolves
    message: |
      SC 4 methods documents from SC 4 working groups and committees will be
      published as SC 4 standing documents which will provide methods and procedures
      for SC 4 to carry out its standards development more effectively within SC 4.

      Copies of the proposed Standing Document will be circulated for ballot to P-members
      for a three month ballot. Approval of the proposed document shall be based on the
      procedures for a Committee Draft Document.

      Any comments provided with a yes vote will be considered for making improvements to
      the document, but the vote will be considered as in favor of making the document
      operative as an SC 4 Standing Document.

      Any no vote must be accompanied by specific comments.

      Changes to standing documents will be recommended by the working group or
      committee responsible. Changes will be made by providing a new version of the page
      containing the changes to the SC 4 Secretary for approval at the next SC 4 meeting.

      Each Standing Document shall contain an annex Revision History Table indicating
      the Section or page change and the date accepted by SC 4 and a list of those SC
      4 parts expressly exempt from the revision as approved. [SC 4 Resolution 271]
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '295'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Merge Parametrics project activities into ISO 14959 under WG 12
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: notes
    message: |
      SC 4 notes that work under the Parametrics project (allocated the ISO number
      14959) has identified areas which may require modifications to existing IRs, the
      preparation of a new IR or IRs, and the development of a document or documents
      under ISO 14959 covering the emerging area of General Case Parametrics.
    dates:
    - start: '1996-10-15'
      kind: effective
  - type: resolves
    message: |
      SC 4 resolves that these activities will for the present be combined within the project
      14959 which will be allocated to WG 12 with Mike Pratt as project leader. These
      arrangements will be subject to ongoing review as the structure of project deliverables
      is clarified.
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: 199610-acclaim-01
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank Roberto Greening for his work as leader of the Parametrics project
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC 4 thanks Roberto Greening for his work as leader of the Parametrics project
      during the formative period.
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '296'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Cancel projects 10303-211 and 10303-311 due to lack of activity
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: agrees
    message: |
      SC 4 agrees to cancel project # 50, 10303-211, "Application protocol: Electronics test
      diagnostics and remanufacture" and project #78, 10303-311, "Abstract test suite:
      Electronics test diagnostics and remanufacture" due to current lack of activity.
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '297'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Authorize preparatory work on Systems Engineering Data Representation
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: resolves
    message: |
      SC 4 authorizes preliminary (stage 0) work on Systems Engineering Data
      Representation and appoints Sylvain BARBEAU as project leader.
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '298'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Recommend amending SC 4 organization handbook regarding Conveners
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: recommends
    message: |
      SC 4 recommends that the SC 4 organization handbook be amended as follows: "SC
      4 Conveners and deputy conveners shall be nominated by the SC 4 P-members and
      shall serve for a maximum period of three years or for such shorter period as may be
      designated when they are elected. Successive extensions each of a maximum of
      three years may be approved by a vote of SC 4."
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '299'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Accept revised schedules for SC 4 projects
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: accepts
    message: |
      SC 4 accepts the revised schedules and justification, and reconfirms the continued
      standardization efforts for the following SC 4 projects:
      10303-1DAM, 10303-34, 10303-106, 10303-215, 10303-216, 10303-217, 10303-218,
      10303-221, 10303-222, 10303-226, 10303-227, 10303-228, 10303-230, 13584-101,
      13584-102, and 14959.
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '300'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approve Phil Kennicott as convener of WG 12
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC 4 approves Phil Kennicott as the convener of WG 12, SC 4 Common Resources.
