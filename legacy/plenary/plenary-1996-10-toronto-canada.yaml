      SC 4 thanks its Canadian hosts and US meeting sponsors: The Standards Council of
      Canada, National Research Council of Canada, and US PRO. Particular thanks go to
      Melanie Varn, Erinbeth Massie, Kristi Adams, and Chuck Stark.
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '308'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Process technical SEDS reports and incorporate into ISO 10303
  dates:
  - start: '1996-10-15'
    kind: decision
  considerations:
  - type: noting
    message: |
      Noting the following technical SEDS reports as found in SC 4 N 458, for
      incorporating into the affected part of ISO 10303:

      * 10303-203: Reports 24, 25, and 27
    dates:
    - start: '1996-10-15'
      kind: effective
  actions:
  - type: requests
    message: |
      SC 4 requests the SC 4 Secretariat ensure these reports are made publicly available
      on SOLIS (SC 4 ON-Line Information Service), and incorporated into technical
      corrigenda, amendments, or new editions when appropriate.
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '309'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: STEP ATSs shall not place additional requirements on AP implementors
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: resolves
    message: |
      STEP abstract test suites (ATSs) shall not place additional requirements on the
      implementors of application protocol (AP) parts. AP parts may however make
      normative references to an ATS and other conformance testing-related parts for
      terminology. AP parts should not invoke requirements defined in ATS parts of
      STEP.
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '310'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approve replacing SC 4 Organization Handbook clauses 6.2 and 6.3
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC 4 approves replacing clauses 6.2 and 6.3 of the SC 4 Organization Handbook with
      the text found in ISO/TC 184/SC 4 N516.
    dates:
    - start: '1996-10-15'
      kind: effective
  - type: resolves
    message: |
      SC 4 further authorizes editorial changes to other clauses of the handbook to maintain
      consistency with this new text. This resolution supersedes SC 4 Resolutions #80 and #292.
    dates:
    - start: '1996-10-15'
      kind: effective
