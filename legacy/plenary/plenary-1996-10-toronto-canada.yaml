- identifier: '301'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Authorize preparatory work on Java programming language binding
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: resolves
    message: |
      SC 4 authorizes preparatory (stage 0) work on Java programming language binding to
      the Standard Data Access Interface specification and appoints Tom Rando as project
      leader.
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '302'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Cancel Project #113 (ISO 10303-13) and redirect work
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: agrees
    message: |
      SC 4 agrees to cancel Project #113, ISO 10303-13 "Architecture and methodology
      reference manual", and to redirect this work towards an SC 4 Standing Document and
      to the Part 1 amendment project.
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '303'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Authorize preparatory work on extension of ISO 10303-21 capabilities
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: resolves
    message: |
      SC 4 authorizes preliminary (stage 0) work on the extension of capabilities of ISO
      10303- 21 and appoints Neal Laurence and David Price as joint project leaders, and
      requests a statement of scope of requirement be circulated to P-members.
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '304'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Require AP documents to optionally include informative ARM annex
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC 4 requires that an AP document may have an informative annex containing a fully
      attributed EXPRESS specification of the ARM.

      An ARM implementation may be taken as validation evidence at DIS according to
      resolution 226.
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '305'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Recognize cooperation between WG 2 and WG 10 on interoperability
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: recognises
    message: |
      SC 4 recognises this first successful step between WG 2 and WG 10 on a solution for
      the problem of interoperability between STEP (ISO 10303) and P-LIB (ISO 13584)
      within ISO/TC 184/SC 4 and encourages WG 2 and WG 10 to complete this work.
      SC 4 encourages all STEP AP developers to study the feasibility of describing their library
      and dictionary data using the P-LIB standards.
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '306'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Authorize preliminary project on Design and Configuration of Manufacturing Systems
  dates:
  - start: '1996-10-15'
    kind: decision
  actions:
  - type: resolves
    message: |
      SC 4 authorizes a preliminary stage 0 project on "Design and Configuration of
      Manufacturing Systems" and appoints Torsten Kjellberg as project leader.
    dates:
    - start: '1996-10-15'
      kind: effective
- identifier: '307'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank Canadian hosts and US meeting sponsors
