metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Busan, Korea, October 27, 2008 -- November 7, 2008
  dates:
  - start: '2008-10-27'
    end: '2008-11-07'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Busan, Korea
resolutions:
- identifier: '755'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approve project leaders and editors for SC 4 projects
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC 4 approves the following new project leaders or project editors for the associated SC 4 projects:

      |===
      |Project |Leader |Editor

      |ISO 10303-241 Module 1388-1395 |Tatsuo Terai; Seong-Sig Kim |Tatsuo Terai; Kyungik An
      |ISO 15926-7 |Peter Paul Pruijn |Onno Paap, Johan Wilhelm Kluewer
      |ISO 15926-8 |Peter Paul Pruijn |Onno Paap, Martin Georg Skjæveland
      |ISO 15926-9 |Peter Paul Pruijn |Onno Paap, Julian Bourne
      |ISO 15926-10 |Peter Paul Pruijn |Onno Paap
      |===
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '756'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appoint liaison representatives to ISO/TC 154
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: appoints
    message: |
      SC 4 appoints Mr. Peter Benson, Dr. Wolfgang Wilkes and Dr. Ricardo Goncalves as its liaison officers to ISO/TC 154.
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: thanks
    message: |
      SC 4 thanks Mr. Peter Benson and Dr. Ricardo Goncalves for their offers to act as liaisons from SC 4 to ISO/TC 154.
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '757'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Register Usage Guide for ISO 10303-214 as TS and circulate for ballot
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: decides
    message: |
      ISO/TC 184/SC 4 decides to register the project “Usage Guide for ISO 10303-214 for gear units” as a separate ISO project, to be published as a TS. The project team is requested to work with WG 3, WG 12, and the Quality Committee on the development of a common format for usage guidance.
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: requests
    message: |
      SC 4 requests its Secretariat to circulate the amended document for a confirmatory ballot.

      This resolution cancelled by Resolution 781.
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '758'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Manage ISO 10303 application modules under part 1000 and adopt N2402
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: resolves
    message: |
      SC 4 resolves to manage the ISO 10303 application modules in the 400 and 1000 series using the ISO Procedures for the Management of standards as databases.
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: requests
    message: |
      SC 4 requests its Secretariat to submit the operating procedures described in SC 4 N2401 for a one-month committee internal Yes/No ballot. Any negative votes must be accompanied by comments.
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: requests
    message: |
      SC 4 requests its Secretariat to:

      * Forward to ISO for publication an initial version of ISO/TS 10303-1000 consisting of all ISO 10303 application modules that have already been published or are ready for publication, with references to resource parts and AICs.
      * Invite ISO to withdraw ISO 10303 parts 401 to 4xx and 1001 through 1xxx, marking each as having been replaced by part 1000, once Part 1000 is published.
      * Propose that ISO modify its catalogue search function so that a search for any ISO 10303 part in the range 401 to 499 or 1001 to 1999 will return a message referring the user to part 1000.
      * Propose to ISO that the publication strategy for ISO 10303 should offer a range of products, including:
      ** part 1000 as defined;
      ** individual APs and either the 1000 part or just the referenced application modules;
      ** CD with all ISO 10303 parts
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: decides
    message: |
      SC 4 decides that no new ISO 10303 application modules or new editions of existing ISO 10303 application modules will be submitted for publication as separate parts, once Part 1000 is published.
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: adopts
    message: |
      SC 4 adopts the plan of action in SC 4 N2402.
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '759'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Cancel project ISO 10303-229 due to lack of resources
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC 4 requests its Secretary to inform ISO CS of the cancellation of the project.
    dates:
    - start: '2008-11-15'
      kind: effective
  considerations:
  - type: noting
    message: |
      Having received no offer of resources to complete remaining work on ISO 10303-229.
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '760'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Direct Visualization ad hoc group to complete format assessment
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: directs
    message: |
      In acknowledgement of this effort, SC 4 directs the 3D Visualization ad hoc group to complete the assessment of the candidates and provide the summary report no later than 2009-03-31.
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: directs
    message: |
      SC 4 directs the Chair and secretariat to initiate the PAS ballots for any candidates which pass the SC 4 Harvesting qualification process immediately after the delivery of the committee report.
    dates:
    - start: '2008-11-15'
      kind: effective
  considerations:
  - type: noting
    message: |
      SC 4 notes that the 3D Visualization ad hoc group has made significant progress at this meeting in moving forward the harvesting process for visualization formats.
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '761'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appoint SC 4 delegates to ISO 22274 project
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: appoints
    message: |
      For the improvement of communication and active participation in the project ISO 22274, ”Systems to Manage Terminology, Knowledge and Content -- Internationalization and Concepts -- Related Aspects of Classification Systems” SC 4 appoints the following experts as delegates to the ISO 22274 project: Gerry Radack, Wolfgang Wilkes, Junfeng Zhan, and Guy Pierra. [ISO/TC 37 has circulated ISO 22274 as an NWIP within ISO TC37/SC3 for ballot.]
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '762'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Extend submission dates for ISO 10303-52, 53, and 110
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC 4 requests its Secretariat to inform ISO that the target dates for the submission of 10303 parts -52, -53 and -110 for DIS ballot are extended to 2009-01-30, and that these parts should not be automatically cancelled as a recovery plan is in place.
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '763'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Submit ISO 10303 parts as minor revisions
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: directs
    message: |
      SC 4 directs WG 12 to prepare FDIS documents for ISO 10303-47, 503, 504, 506, 517, 518, 519, 521, and 523 and submit them to ISO for processing as minor revisions.

      This amendment has been superseded by Resolution 779.
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '764'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Create Ad Hoc Group for Gellish-RDF
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: creates
    message: |
      SC 4 creates an Ad Hoc Group for Gellish-RDF with project leader Paul van Exel and editor Leo van Ruijven. The group is requested to clarify the position of the proposed standard with respect to SC 4 and W3C standards, and seek alignment where appropriate.
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: directs
    message: |
      SC 4 directs the group to develop any necessary NWI proposals for review by the Change Management Team at the next SC 4 meeting, in May 2009.
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '765'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Direct WG 13 to draft ISO 8000 scope and plan
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: directs
    message: |
      SC 4 directs WG 13 to deliver a brief (1-3 page) draft scope statement and phased delivery plan for ISO 8000 as a whole, and a definition of other standardization requirements both inside and outside SC 4 for consideration by SC 4 at its next meeting (2009-05).
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: requests
    message: |
      SC 4 requests its Secretariat to circulate the original content of this resolution, resolution #676 and #733, and SC 4 N 2271, WG 13 N 0107, and SC 4 N 2292 to member bodies with a request for comments by year end in order to provide further guidance to WG 13.
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '766'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Submit procedures for standards as databases for ballot
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC 4 requests its Secretariat to submit the operating procedures described in SC 4 N2407 for a two-month committee internal ballot. Any negative votes must be accompanied by comments.
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: requests
    message: |
      SC 4 requests the ad hoc group to complete the detailed operational processes.
    dates:
    - start: '2008-11-15'
      kind: effective
