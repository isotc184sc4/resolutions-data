- identifier: 200811-acclaim-03
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank Opening Plenary presenter Dr. Gerry Radack
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC 4 thanks our SC 4 short report presenters at the Opening Plenary:

      * ISO TC 37: Dr. Gerry Radack

      We appreciate your representation to and for ISO TC 184/SC 4.
    dates:
    - start: '2008-11-15'
