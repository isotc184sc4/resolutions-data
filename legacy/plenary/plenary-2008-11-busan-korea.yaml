- identifier: 200811-acclaim-04
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank Korean hosts and sponsors of the 56th Plenary
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: appreciation
    message: |
      SC 4 expresses its appreciation to KATS -- Korean Agency for Technology and Standards, Korea STEP Center, ECIF, Korea Database Promotion Center, PartDB, Busan Convention & Visitors Bureau, Korea Tourism Organization, and The Plan for their hosting and support of the 56th ISO TC 184/SC 4 Plenary meetings at the Paradise Hotel, Busan, Korea. We especially commend Prof. Inhan Kim -- Kyung Hee University and Mr. Kyungik An -- Korea STEP Center for an excellent venue and outstanding service to the SC 4 community. A special acknowledgement is extended to Mr. Sejin Kim and Mr. Yongdeuk Kim, KATS.

      Special acknowledgement is extended to the Paradise Hotel, Busan and its staff for their seamless and attentive support.
    dates:
    - start: '2008-11-15'
      kind: effective
