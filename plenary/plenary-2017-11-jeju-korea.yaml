- identifier: 201711-acclaim-03
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank KATS and other organizers for hosting the Plenary
  dates:
  - start: '2017-11-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC 4 expresses its appreciation to Korean Agency for Technology and Standards
      (KATS) for hosting the 74th ISO/TC 184/SC 4 Plenary in Jeju, Korea 2017-11-05/10 SC
      4 also expresses thanks to the Korea STEP Center (KSTEP), KAIST, NIA and all other
      meeting organizers for their planning that ensured a successful meeting. Special
      acknowledgement is extended to the Jeju Booyoung Hotel and Resort and its staff for
      their seamless and attentive support throughout the week.
