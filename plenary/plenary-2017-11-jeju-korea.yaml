      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2017-11-15'
      kind: effective
  - type: resolves
    message: 'SC4 also thanks the Korean hosts for preparing a gift and cake to mark the occasion for

      Howard and his wife.

      ACCLAMATION'
    dates:
    - start: '2017-11-15'
      kind: effective
  - type: appreciation
