metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Jeju, Korea, November 5, 2017 -- November 10, 2017
  dates:
  - start: '2017-11-05'
    end: '2017-11-10'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Jeju, Korea
resolutions:
- identifier: '956'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approve Project Leaders and Project Editors for SC 4 Projects
  dates:
  - start: '2017-11-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC 4 approves the following Project Leaders and Project Editors for the associated Projects:

      |===
      |Project |Working Group |Project Leader/Editor

      |8000-3 |WG13 |Aminata Mbengue (PL)
