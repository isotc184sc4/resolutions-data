- identifier: 201711-acclaim-06
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank Howard Mason for 17 years of service as SC 4 Chair
  dates:
  - start: '2017-11-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC 4 expresses its sincere appreciation to Howard Mason for 17 years of dedicated
      service as Chair of SC 4 with his extensive technical knowledge of Industrial Data
      standards, ISO Procedures and for his outstanding leadership of SC 4.
    dates:
    - start: '2017-11-15'
      kind: effective