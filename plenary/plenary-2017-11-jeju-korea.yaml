- identifier: '959'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appoint Liaison Officer to ISO/TC 154
  dates:
  - start: '2017-11-15'
    kind: decision
  actions:
  - type: appoints
    message: |
      SC 4 appoints Torbjorn Holm as Liaison Officer to ISO/TC 154 “Processes, data
      elements and documents in commerce, industry and administration” for a three year
      term with specific interest in the Value Stream Management project, with appreciation
      for his offer to serve in that capacity.

      Note: Peter Benson and Hiroshi Murayama are currently nominated as Liaison Officers
      and continue in that capacity.
    dates:
    - start: '2017-11-15'
      kind: effective
