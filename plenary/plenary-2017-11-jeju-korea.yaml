      their seamless and attentive support throughout the week.

      ACCLAMATION'
    dates:
    - start: '2017-11-15'
      kind: effective
  - type: appreciation
    message: 'SC4 expresses its appreciation to the group of individuals who prepared a tribute to

      Howard Mason for presentation during the social event banquet.  This group consisted

      of:  Sunho Kim, Allison Barnard Feeney, Nigel Shaw, Keith Hunten, Torbjorn Holm, Tom

      Thurman, Peter Benson, Matthew West, Akihiko Ohtaka, John Dunford and Tim King'
    dates:
