    kind: decision
  actions:
  - type: resolves
    message: Review of Impact of Express Edition 2
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes the review of the new Edition of Part 11 (WG 11N179) undertaken by WG

      11 members at the Fukuoka meeting, and requests WG 11 to circulate WG 11N179


      to the full membership of the Working Group and to the Implementors for further

      review'
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: requests
    message: SC 4 requests its Secretariat to circulate WG 11N179 to P-members for information in
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: resolves
    message: considering their responses to the DIS ballot on ISO 10303-11 Edition 2
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs WG 11 to prepare a proposal for the implementation of the necessary

      changes to the 10303-2x series parts and 10303-14, in consultation with affected

      Working Groups, for consideration at the February 2002 SC 4 meeting.  This should

      include estimates of timescales and resource requirements.'
    dates:
    - start: '2001-10-15'
      kind: effective
