- identifier: '520'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Resolution from Integrated Manufacturing Task Force
  dates:
  - start: '2001-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Resolution from Integrated Manufacturing Task Force
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: asks
    message: 'SC 4 asks its secretariat to circulate the report of the Task Force on Integrated

      Manufacturing (N1214-N1216) to P-members, O-members, and Liaisons for

      comments and proposals for further requirements for manufacturing tasks.

      Responses should be received by the Secretariat not later than 2002-01-15.

      The Final Report of Task Force on Integrated Manufacturing should contain specific

      recommendations for any new work required in SC 4 or other Committees.'
    dates:
    - start: '2001-10-15'
      kind: effective
- identifier: '521'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Review of Impact of Express Edition 2
  dates:
