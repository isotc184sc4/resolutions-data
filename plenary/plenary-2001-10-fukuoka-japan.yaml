      value: |
        SC 4 creates an ad hoc group to assess the proposal from the IAI to transpose the
        IFC2x platform into a Publicly Available Specification (PAS).
  - type: requests
    date_effective:
      date: '2001-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 invites WG 3, WG 10, WG 11, WG 12, PPC and the Quality Committee (QC)
