    number: '510'
  kind: resolution
  status: decided
  dates:
  - date: '2001-10-15'
    type: adoption
  title:
  - spelling: eng
    value: Amend Organization Handbook for Project Planning Requirements
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '2001-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 amends clause 2.3 of the Organization Handbook to define the NWI
        requirements for an accompanying work plan as follows:

        "The NWI shall contain a work plan identifying target dates for the following events, noting the suggested elapsed times from NWI approval:

        |===
        |ISO Stage |Milestone |Normal time from NWI

        |20.20 |First working draft available on SOLIS |+12 months
        |30.20 |CD/TR/TS ballot initiated by SC 4 Secretariat |+18 months
        |40.00 |DIS document accepted for ballot by ISO |+28 months
        |50.00 |FDIS ballot registered for formal approval (if FDIS required) |+36 months
        |60.00 |Final text accepted for publication by ISO |+40 months
        |===

        The originator of the NWI shall nominate a Project Leader."
