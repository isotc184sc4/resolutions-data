- identifier: '515'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: AP Module Referencing
  dates:
  - start: '2001-10-15'
    kind: decision
  actions:
  - type: resolves
    message: AP Module Referencing
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs WG 10, in cooperation with WG 3, JWG 9, WG 11, WG 12, and the

      Implementors Forum, to  assess the feasibility of allowing Application Modules to

      accurately and unambiguously reference content from IS Application Protocols rather

      than re-working the AP content, to identify and resolve any issues arising from this

      process, and to identify the changes required to the following documents:

       Guidelines for the contents of Application Modules

       Application Module development points within AP development process

       Guidelines for the contents of APs that use Application Modules

      The work should address issues related to configuration management and the context,

      constraints, and rules associated with reference elements'
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: investigates
    message: 'SC 4 invites its member bodies to nominate appropriate resources to WG 10 to

      accomplish the task. WG 10 is invited to report on this issue at the February 2002

      meeting.'
    dates:
    - start: '2001-10-15'
      kind: effective
- identifier: '516'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Publication of SC 4 Standards in HTML
  dates:
  - start: '2001-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Publication of SC 4 Standards in HTML
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 cancels Resolution 436 and establishes the following policy with regard to

      publication of standards in HTML'
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves to allow SC 4 projects to enter any stage ballot with drafts documented

      using HTML. It is the responsibility of the Project Leader to ensure that any

      documents entering Stage 4 or higher are in a form acceptable to the ISO Central

      Secretariat. The provisions of Resolution 395 with respect to the use of guideline

      development by the WG 10 STEP Modularization PWI remain in effect'
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: instructs
    message: 'SC 4 instructs the Quality Committee to develop guidelines for the use of HTML for

      publication of documents, with reference to guidance provided by ISO CS and the


      ITSIG "Guide for the use of IT in the development and delivery of standards".'
    dates:
    - start: '2001-10-15'
      kind: effective
- identifier: '517'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Harmonization of ISO 10303-219 and ISO 22093 (DMIS)
  dates:
  - start: '2001-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Harmonization of ISO 10303-219 and ISO 22093 (DMIS)
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 respectfully urges its members to coordinate their national experts on ISO

      10303- 219, ISO 10303-238, and other relevant STEP APs and ISO 22093 in order to

      avoid inconsistencies between these ISO/TC 184 standards.'
    dates:
    - start: '2001-10-15'
      kind: effective
- identifier: '518'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Conformance testing of XML implementations
  dates:
  - start: '2001-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Conformance testing of XML implementations

      Following the completion of ISO 10303-28 edition 1, SC 4 asks WG 11 to establish the

      requirements for conformance testing of XML implementations of STEP conforming to

      ISO 10303-28 editions 1 and 2.

      WG 11 is requested to prepare an NWI proposal and national bodies are invited to

      nominate appropriate resources.'
    dates:
    - start: '2001-10-15'
      kind: effective
