- identifier: '510'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Project Planning Requirements
  dates:
  - start: '2001-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Project Planning Requirements
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: sends
    message: 'SC 4 amends clause 2.3 of the Organization Handbook to define the NWI

      requirements

      for an accompanying work plan as follows:

      "The NWI shall contain a work plan identifying target dates for the following events,'
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: resolves
    message: 'noting the suggested elapsed times from NWI approval:

      ISO Stage

      Milestone

      Normal time from NWI

      20.20

      First working draft available on SOLIS

      +12 months

      30.20

      CD/TR/TS ballot initiated by SC 4 Secretariat

      +18 months


      40.00

      DIS document accepted for ballot by ISO

      +28 months

      50.00

      FDIS ballot registered for formal approval (if

      FDIS required)

      +36 months

      60.00

      Final text accepted for publication by ISO

      +40 months

      The originator of the NWI shall nominate a Project Leader."'
    dates:
    - start: '2001-10-15'
      kind: effective
- identifier: '511'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Harvesting of IAI IFC2x
  dates:
  - start: '2001-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Harvesting of IAI IFC2x
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: creates
    message: 'SC 4 creates an ad hoc group to assess the proposal from the IAI to transpose the

      IFC2x platform into a Publicly Available Specification (PAS)'
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2001-10-15'
      kind: effective
  - type: investigates
    message: 'SC 4 invites WG 3, WG 10, WG 11, WG 12, PPC and the Quality Committee (QC)

      to nominate representatives by 2001-10-30. The ad hoc group is requested to

      assess the specification and explanatory report (N1211), negotiate with IAI on any

      issues, and make a recommendation to SC 4 by 2002-01-15 on how to process

      the proposal.'
    dates:
    - start: '2001-10-15'
      kind: effective
