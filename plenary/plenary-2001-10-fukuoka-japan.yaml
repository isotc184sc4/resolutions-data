- identifier: 522-acclamation-1
  subject: ISO/TC 184/SC 4 "Industrial data"
  dates:
  - start: '2001-10-15'
    kind: decision
  actions:
  - type: thanks
    message: 'SC 4 expresses its deep appreciation to the Electronic Commerce Promotion Council

      of Japan (ECOM) and the staff of the Grand Hyatt Fukuoka for their efforts in

      organizing this meeting, arranging the facilities, excellent food, and social events.  SC

      4 also

      expresses its appreciation for their hospitality and outstanding support before, during,

      and after the meeting.

      SC 4 addresses a special recognition to the staff and associates of ECOM, Mr.

      Hotsuma Miyakawa, Director of ECOM, Ms. Tomoko Fukugawa, Chief,

      International Policy Planning and Research Division, Kyushu Bureau of the Ministry

      of Economy, Trade and Industry (METI); Mr. Takashi Inouye, Mr. Yoshitaka

      Terakado, Ms. Chie Kouchi, Mr. Masahiko Chida, and Ms. Hiroko Tawara for their

      hospitality and outstanding support both before and during the ISO/TC 184/SC 4

      meeting.'
    dates:
    - start: '2001-10-15'
      kind: decision
- identifier: 522-acclamation-2
  subject: ISO/TC 184/SC 4 "Industrial data"
  dates:
  - start: '2001-10-15'
    kind: decision
  actions:
  - type: thanks
    message: 'SC 4 expresses its deep appreciation to Mr. Julian Fowler for his untiring efforts as

      Deputy Coordinator of the Quality Committee. It is with great regret that SC 4 accepts

      his resignation and his announcement of reduced contributions to the SC 4 world.

      Julian has been a major pillar to the organization since its earliest days, and his

      contributions in developing consensus and convergence has always been valued. His

      willingness to take on unpopular, but essential tasks, has been exemplary, and the

      challenge of finding a replacement will not be trivial.


      SC 4 wishes him well in his new role!'
    dates:
    - start: '2001-10-15'
      kind: decision
- identifier: 522-acclamation-3
  subject: ISO/TC 184/SC 4 "Industrial data"
  dates:
  - start: '2001-10-15'
    kind: decision
  actions:
  - type: thanks
    message: 'SC 4 expresses its deep appreciation to Mr. Christophe Viel for his efforts as WG 11

      Convenor, his many project and technical contributions, and wishes him all the best for

      his future. His innovative and creative leadership was greatly appreciated'
    dates:
    - start: '2001-10-15'
      kind: decision
- identifier: 522-acclamation-4
  subject: ISO/TC 184/SC 4 "Industrial data"
  dates:
  - start: '2001-10-15'
    kind: decision
  actions:
  - type: thanks
    message: 'SC 4 expresses its sincere thanks to Chris Kreiler for his untiring efforts and excellent

      performance as acting Secretary before and during the meeting, in the absence of the

      regular secretariat.

      SC 4 also thanks Ms Allison Barnard-Feeney for her support of the Secretariat from

      NIST both before and during the meeting.

      SC 4 sends its good wishes to Teresa Brittingham for a rapid recovery.'
    dates:
    - start: '2001-10-15'
      kind: decision
