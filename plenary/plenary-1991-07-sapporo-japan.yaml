    type: adoption
  title:
  - spelling: eng
    value: Thank conveners, project leaders, and technical experts for STEP version
      one
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: thanks
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 wishes to thank the conveners, project leaders and the many technical experts
        who have given extraordinarily of themselves during the past years in our common
        effort to develop STEP version one.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '78'
  kind: resolution
  status: decided
  dates:
  - date: '1991-07-15'
    type: adoption
  title:
  - spelling: eng
    value: Direct all working groups to use STEP methodology and tools
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: directs
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 directs all SC 4 working groups to use the methodology and tools developed for
        STEP, unless proven not suitable.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '79'
  kind: resolution
  status: decided
  dates:
  - date: '1991-07-15'
    type: adoption
  title:
  - spelling: eng
    value: Instruct PMAG to plan integration and testing resources for projects
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: instructs
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 instructs PMAG to plan the application of adequate resources for integration,
        qualification, data interpretation and development of conformance testing material
        through the lifecycle of each project, as part of the project approval process.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '80'
  kind: resolution
  status: decided
  dates:
  - date: '1991-07-15'
    type: adoption
  title:
  - spelling: eng
    value: Request P-members to designate representatives for STEP integration and
      testing
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        In order to facilitate the STEP development process, SC 4 asks each P Member that is
        involved in the development of STEP application protocols and/or resource models to
        designate at least one representative to receive training in and to participate actively in
        the following:

        * integration
        * qualification
        * editing
        * interpretation
        * conformance testing procedures
  - type: encourages
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 encourages externally funded programmes and projects to provide and/or
        sponsor these representatives.
  - type: requests
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests its Secretariat to invite P Members to
        nominate representatives to WG 4 to participate in the qualification and integration of
        resource models and application protocols.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '82'
  kind: resolution
  status: decided
  dates:
  - date: '1991-07-15'
    type: adoption
  title:
  - spelling: eng
    value: Request PMAG to complete procedures for integration and testing
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests PMAG to ensure the completion of an integrated set of methods and
        procedures for integration, qualification, data interpretation and development of
        abstract test suites, together with associated documentation and training materials, as
        soon as possible.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '83'
  kind: resolution
  status: decided
  dates:
  - date: '1991-07-15'
    type: adoption
  title:
  - spelling: eng
    value: Invite P-members to nominate representatives to WG 5 for ISO 10303 methods
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests its Secretariat to invite P Members to nominate representatives to WG
        5 to participate in the continued development of ISO 10303 methods.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '84'
  kind: resolution
  status: decided
  dates:
  - date: '1991-07-15'
    type: adoption
  title:
  - spelling: eng
    value: Approve SC 4 formal procedures for STEP development and documentation
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: approves
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 approves the principle of setting up formal procedures within its organisation.
        SC 4 welcomes its Chairman's proposals for the following procedures:

        1. SC 4 procedures for the approval of STEP
        2. responsibilities of a WG convener
        3. responsibilities of a project leader
        4. SC 4 documentation approval levels
        5. STEP part titles
  - type: directs
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 directs SPAG to review these proposed documents and to analyse their
        consistency with respect to the SC 4 methodology before SC 4 approves them.
  - type: directs
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 directs PMAG to assess the adequacy of the procedures against their
        operational requirements.

        Meanwhile, and in order to fulfil the ongoing work, SC 4 decides to use these new
        documents to approve the STEP parts, whilst SPAG solicits comments regarding their
        adequacy.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '85'
  kind: resolution
  status: decided
  dates:
  - date: '1991-07-15'
    type: adoption
  title:
  - spelling: eng
    value: Establish WG 8 for Industrial Manufacturing Management Data
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: establishes
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        Following the assignment of the accepted new work item on Industrial Manufacturing
        Management Data (N60), ISO/TC 184/SC 4 establishes a new working group (WG
        8) with the following title and scope:

        Title: Industrial Manufacturing Management Data

        Scope:
        Method and development to standardise data
        which express information exchanged inside industrial
        manufacturing plants, except for product definition data
  - type: accepts
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 accepts the offer of the member body of France to undertake the convenership
        of this WG.
  - type: appoints
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 appoints Mr. Albert Colin as convener of WG 8.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '86'
  kind: resolution
  status: decided
  dates:
  - date: '1991-07-15'
    type: adoption
  title:
  - spelling: eng
    value: Assign three projects to the Industrial Manufacturing Management Data work
      item
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: allocates
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        Following the creation of a WG 8, SC 4 recommends that the following three projects
        be part of the new work item on Industrial Manufacturing Management Data:

        * To develop an international standard dealing with model, form and attributes of
          data exchanged between an industrial manufacturing company and its
          environment of manufacturing management activities.
        * To develop an international standard dealing with model, form and attributes of
          data able to reside in an industrial manufacturing company's resources
          database.
        * To develop an international standard dealing with model, form and attributes of
          data controlling and monitoring the flow of materials within an industrial
          manufacturing company.
  - type: requests
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 charges the WG 8 convener to recommend, to the SC 4 secretariat, candidates
        for project leaders.
  - type: encourages
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 encourages as many experts as needed to participate in
        these projects. Names shall be forwarded to the SC 4 secretariat by 1st September
        1991.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '87'
  kind: resolution
  status: decided
  dates:
  - date: '1991-07-15'
    type: adoption
  title:
  - spelling: eng
    value: Establish JWG 9 with IEC/TC 3 for electrical and electronic applications
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: establishes
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 welcomes the proposal from IEC/TC 3 to work jointly on the topic of electrical
        and electronic product data standards and establishes a joint working group (JWG 9)
        with the following title and scope:

        Title: IEC/TC 3 - ISO/TC 184/SC 4 joint working group for electrical and
        electronic applications of ISO 10303.

        Scope:
        Develop resource models and application protocols
        using STEP methodologies taking into account documented efforts
        such as EDIF, IGES, SET and VNS.
  - type: allocates
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 offers the convenership of JWG 9 to IEC. The current activities of the ISO/TC
        184/SC 4/WG 3 electrical project will be transferred to JWG 9.

        Care must be taken to ensure that the work can continuously proceed without losing
        the results achieved so far.
  - type: accepts
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 accepts as a new work item proposal the work on STEP Data Access Interface
        described in SC 4 N71.
- identifier:
