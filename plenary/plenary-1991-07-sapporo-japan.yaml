      kind: effective
- identifier: '98'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: its Secretariat to establish an Editing Committee for ISO 10303 in
  dates:
  - start: '1991-07-15'
    kind: decision
  actions:
  - type: directs
    message: 'SC 4 directs its Secretariat to establish an Editing Committee for ISO 10303 in

      accordance with the ISO Directives.  In addition to assistance in the preparation of

      texts, consistent between themselves and with the ISO directives, the Editing

      Committee will provide review for technical coherence across texts.

      The membership of the Editing Committee will comprise a chairman and all project

      leaders or their representatives responsible for text preparation.  Each SC 4 P

      Member may nominate additional members.  Other members may be co-opted by the

      Chairman in order to achieve committee objectives.

      This resolution supersedes SC 4 Resolution #76'
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs its Secretariat to appoint Mr. Nigel Shaw as chairman of the Editing

      Committee for ISO 10303.'
    dates:
    - start: '1991-07-15'
      kind: effective
- identifier: '99'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: It is SC 4 policy that the review period for first Committee Drafts of STEP P...
  dates:
  - start: '1991-07-15'
    kind: decision
  actions:
  - type: resolves
    message: 'It is SC 4 policy that the review period for first Committee Drafts of STEP Parts should

      be not less than four months.'
    dates:
    - start: '1991-07-15'
      kind: effective
- identifier: '100'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: thank the Japan member body and NICOGRAPH for their hospitality
