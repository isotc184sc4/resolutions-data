- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '98'
  kind: resolution
  status: decided
  dates:
  - date: '1991-07-15'
    type: adoption
  title:
  - spelling: eng
    value: Establish Editing Committee for ISO 10303 and appoint chairman
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: establishes
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 directs its Secretariat to establish an Editing Committee for ISO 10303 in
        accordance with the ISO Directives. In addition to assistance in the preparation of
        texts, consistent between themselves and with the ISO directives, the Editing
        Committee will provide review for technical coherence across texts.

        The membership of the Editing Committee will comprise a chairman and all project
        leaders or their representatives responsible for text preparation. Each SC 4 P
        Member may nominate additional members. Other members may be co-opted by the
        Chairman in order to achieve committee objectives.

        This resolution supersedes SC 4 Resolution #76.
  - type: appoints
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 directs its Secretariat to appoint Mr. Nigel Shaw as chairman of the Editing
        Committee for ISO 10303.
