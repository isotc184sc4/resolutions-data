metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Sapporo, Japan, July 1991
  dates:
  - start: '1991-07-15'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Sapporo, Japan
resolutions:
- identifier: '77'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: thank the conveners, project leaders and the many technical experts
  dates:
  - start: '1991-07-15'
    kind: decision
  actions:
  - type: resolves
    message: 'SC 4 wishes to thank the conveners, project leaders and the many technical experts

      who have given extraordinarily of themselves during the past years in our common

      effort to develop STEP version one.'
    dates:
    - start: '1991-07-15'
      kind: effective
- identifier: '78'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: all SC 4 working groups to use the methodology and tools developed for
  dates:
  - start: '1991-07-15'
    kind: decision
  actions:
  - type: directs
    message: 'SC 4 directs all SC 4 working groups to use the methodology and tools developed for

      STEP, unless proven not suitable.'
    dates:
    - start: '1991-07-15'
      kind: effective
- identifier: '79'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: PMAG to plan the application of adequate resources for integration,
  dates:
  - start: '1991-07-15'
    kind: decision
  actions:
  - type: instructs
    message: 'SC 4 instructs PMAG to plan the application of adequate resources for integration,

      qualification, data interpretation and development of conformance testing material

      through the lifecycle of each project, as part of the project approval process.'
    dates:
    - start: '1991-07-15'
      kind: effective
- identifier: '80'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: In order to facilitate the STEP development process, SC 4 asks each P Member ...
  dates:
  - start: '1991-07-15'
    kind: decision
  actions:
  - type: resolves
    message: 'In order to facilitate the STEP development process, SC 4 asks each P Member that is


      involved in the development of STEP application protocols and/or resource models to

      designate at least one representative to receive training in and to participate actively in

      the following:

      - integration

      - qualification

      - editing

      - interpretation

      - conformance testing procedures'
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: encourages
    message: 'SC 4 encourages externally funded programmes and projects to provide and/or

      sponsor these representatives'
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to invite P Members to

      nominate representatives to WG 4 to participate in the qualification and integration of

      resource models and application protocols.'
    dates:
    - start: '1991-07-15'
      kind: effective
- identifier: '82'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: PMAG to ensure the completion of an integrated set of methods and
  dates:
  - start: '1991-07-15'
    kind: decision
  actions:
  - type: requests
    message: 'SC 4 requests PMAG to ensure the completion of an integrated set of methods and

      procedures for integration, qualification, data interpretation and development of

      abstract test suites, together with associated documentation and training materials, as

      soon as possible.'
    dates:
    - start: '1991-07-15'
      kind: effective
- identifier: '83'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: its Secretariat to invite P Members to nominate representatives to WG
  dates:
  - start: '1991-07-15'
    kind: decision
  actions:
  - type: requests
    message: 'SC 4 requests its Secretariat to invite P Members to nominate representatives to WG

      5 to participate in the continued development of ISO 10303 methods.'
    dates:
    - start: '1991-07-15'
      kind: effective
- identifier: '84'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: the principle of setting up formal procedures within its organisation
  dates:
  - start: '1991-07-15'
    kind: decision
  actions:
  - type: approves
    message: 'SC 4 approves the principle of setting up formal procedures within its organisation SC

      4 welcomes its Chairman''s proposals for the following procedures:

      1'
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: resolves
    message: 'SC 4 procedures for the approval of STEP

      2. responsibilities of a WG convener

      3. responsibilities of a project leader

      4'
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: resolves
    message: 'SC 4 documentation approval levels

      5. STEP part titles'
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs SPAG to review these proposed documents and to analyse their

      consistency with respect to the SC 4 methodology before SC 4 approves them'
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs PMAG to assess the adequacy of the procedures against their

      operational requirements.

      Meanwhile, and in order to fulfil the ongoing work, SC 4 decides to use these new

      documents to approve the STEP parts, whilst SPAG solicits comments regarding their

      adequacy.'
    dates:
    - start: '1991-07-15'
      kind: effective
- identifier: '85'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Following the assignment of the accepted new work item on Industrial Manufact...
  dates:
  - start: '1991-07-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Following the assignment of the accepted new work item on Industrial Manufacturing

      Management Data (N60), ISO/TC 184/SC 4 establishes a new working group (WG

      8) with the following title and scope:

      Title:  Industrial Manufacturing Management Data

      Scope:

      Method and development to standardise data

      which express information exchanged inside industrial

      manufacturing plants, except for product definition data'
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: accepts
    message: 'SC 4 accepts the offer of the member body of France to undertake the convenership

      of this WG'
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: appoints
    message: SC 4 appoints Mr. Albert Colin as convener of WG 8.
    dates:
    - start: '1991-07-15'
      kind: effective
- identifier: '86'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Following the creation of a WG 8, SC 4 recommends that the following three pr...
  dates:
  - start: '1991-07-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Following the creation of a WG 8, SC 4 recommends that the following three projects

      be

      part of the new work item on Industrial Manufacturing Management Data.

      To develop an international standard dealing with model, form and attributes of

      data exchanged between an industrial manufacturing company and its

      environment of manufacturing management activities.

      To develop an international standard dealing with model, form and attributes of

      data able to reside in an industrial manufacturing company''s resources

      database.

      To develop an international standard dealing with model, form and attributes of

      data controlling and monitoring the flow of materials within an industrial

      manufacturing company'
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: chairs
    message: 'SC 4 charges the WG 8 convener to recommend, to the SC 4 secretariat, candidates


      for project leaders'
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: encourages
    message: 'SC 4 encourages as many experts as needed to participate in

      these projects.  Names shall be forwarded to the SC 4 secretariat by 1st September

      1991.'
    dates:
    - start: '1991-07-15'
      kind: effective
- identifier: '87'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: the proposal from IEC/TC 3 to work jointly on the topic of electrical
  dates:
  - start: '1991-07-15'
    kind: decision
  actions:
  - type: welcomes
    message: 'SC 4 welcomes the proposal from IEC/TC 3 to work jointly on the topic of electrical

      and electronic product data standards and establishes a joint working group (JWG 9)

      with the following title and scope:

      Title:  IEC/TC 3 - ISO/TC 184/SC 4 joint working group for electrical and

      electronic applications of ISO 10303.

      Scope:

      Develop resource models and application protocols

      using STEP methodologies taking into account documented efforts

      such as EDIF, IGES, SET and VNS'
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: resolves
    message: 'SC 4 offers the convenership of JWG 9 to IEC. The current activities of the ISO/TC

      184/SC 4/WG 3 electrical project will be transferred to JWG 9.

      Care must be taken to ensure that the work can continuously proceed without losing

      the results achieved so far'
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '1991-07-15'
      kind: effective
  - type: accepts
    message: 'SC 4 accepts as a new work item proposal the work on STEP Data Access Interface

      described in SC 4 N71.'
    dates:
    - start: '1991-07-15'
      kind: effective
- identifier: '89'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: the terms of reference for the SPAG (SC 4 resolution 48) as
  dates:
  - start: '1991-07-15'
    kind: decision
  actions:
  - type: notifies
    message: 'SC 4 modifies the terms of reference for the SPAG (SC 4 resolution 48) as

      follows: replace:

      "acting as a liaison with relevant bodies"

      with:

      "acting as a strategic liaison with the relevant bodies and

      coordinating other liaisons at the working group

      level"'
    dates:
    - start: '1991-07-15'
      kind: effective
- identifier: '90'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: The Strategic Planning Advisory Group is given the additional responsibility ...
  dates:
  - start: '1991-07-15'
    kind: decision
  actions:
  - type: resolves
    message: 'The Strategic Planning Advisory Group is given the additional responsibility for:


      Reviewing any new work item proposal to be presented to SC 4.

      Examining how each new work item proposal will fit within the SC 4 strategic

      objectives and other standards work.'
    dates:
    - start: '1991-07-15'
      kind: effective
- identifier: '91'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: the SPAG review existing materials with the intent to select or create
  dates:
  - start: '1991-07-15'
    kind: decision
  actions:
  - type: asks
    message: 'SC 4 asks that the SPAG review existing materials with the intent to select or create

      an enterprise taxonomy. The deliverable from this task would provide an approach for SC 4 to use, as a tool, to account for and to manage the development of standards

      within the enterprise-data domain so that overlaps and gaps in SC 4 standard

      coverage are identified.'
- identifier: '92'
