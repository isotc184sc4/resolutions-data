- identifier: '97'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: all P Members to assess their national requirements for future editions of
  dates:
  - start: '1991-07-15'
    kind: decision
  actions:
  - type: asks
    message: 'SC 4 asks all P Members to assess their national requirements for future editions of


      ISO 10303. An initial list is requested by 1 Oct 91 to be sent to SPAG.'
    dates:
