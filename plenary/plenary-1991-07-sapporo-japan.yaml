- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '90'
  kind: resolution
  status: decided
  dates:
  - date: '1991-07-15'
    type: adoption
  title:
  - spelling: eng
    value: Assign additional responsibilities to the Strategic Planning Advisory Group
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: allocates
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        The Strategic Planning Advisory Group is given the additional responsibility for:

        * Reviewing any new work item proposal to be presented to SC 4.
        * Examining how each new work item proposal will fit within the SC 4 strategic
          objectives and other standards work.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '91'
  kind: resolution
  status: decided
  dates:
  - date: '1991-07-15'
    type: adoption
  title:
  - spelling: eng
    value: Request SPAG to select or create an enterprise taxonomy
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '1991-07-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 asks that the SPAG review existing materials with the intent to select or create
        an enterprise taxonomy. The deliverable from this task would provide an approach for SC 4 to use, as a tool, to account for and to manage the development of standards
        within the enterprise-data domain so that overlaps and gaps in SC 4 standard
        coverage are identified.
