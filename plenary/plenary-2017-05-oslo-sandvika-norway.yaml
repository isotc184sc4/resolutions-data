    title: Create ISO 15926-9 PWI for Facade Implementation
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: approves
      date_effective:
        date: '2017-05-15'
        type: effective
      message: |
        SC 4 approves a PWI to create the NWI for a new part ISO 15926-9 within WG 3, to
        identify methods for the exchange and integration of information between companies
        cooperating in the plant engineering supply chain through implementation of “facades”,
        for delivery at the Jeju meeting.
    - type: appoints
      date_effective:
        date: '2017-05-15'
        type: effective
      message: |
        SC 4 appoints Peter Paul Pruijn as Project Leader and invites member bodies to
        nominate experts to the project.
