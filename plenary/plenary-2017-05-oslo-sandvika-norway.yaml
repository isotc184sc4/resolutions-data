- identifier: '948'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approval of Minor Revision to ISO/TS 15926-4
  dates:
  - start: '2017-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Approval of Minor Revision to ISO/TS 15926-4
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests WG 3 to prepare a new edition of ISO/TS 15926-4 with corrected URL

      links and incorporating Amendment 1'
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to submit the resulting document to ISO CS for FDIS ballot

      under the minor revision procedure.'
    dates:
    - start: '2017-05-15'
      kind: effective
- identifier: '949'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Closure of PWI Project ISO 14306 Edition 3
  dates:
  - start: '2017-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Closure of PWI Project ISO 14306 Edition 3
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: resolves
    message: SC 4 closes the PWI project on ISO 14306 Edition 3
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to circulate the resulting draft NP to WG12 for a four week

      final review. When completed, SC4 requests its Secretariat to circulate to National

      Bodies for ballot with an 8 week period.'
    dates:
    - start: '2017-05-15'
      kind: effective
- identifier: '950'
  subject: ISO/TC 184/SC 4 "Industrial data"
