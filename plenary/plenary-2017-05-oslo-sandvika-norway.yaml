- identifier: '954'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Review of DPPC Task Force Report
  dates:
  - start: '2017-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Review of DPPC Task Force Report
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: notes
    message: SC 4 notes and welcomes the report of the ISO/IEC DPPC Task Force
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: recognizes
    message: 'SC 4 recognizes many potential use cases for consuming the content of the proposed

      future DPPC across multiple industry sectors, which will require various digital forms for

      extracting the content, including but not limited, to tables of values, OWL and CAD

      models'
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: considers
    message: 'SC 4 considers that it is vitally important to provide tools to facilitate the conversion of

      all product characteristics in current standards into digital form for incorporation into the

      proposed DPPC'
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes the clear requirement to link the product properties to its existing product

      definition models, including shape representation, functionality and engineering

      properties'
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: resolves
    message: 'SC 4 offers to support the further development of the requirements for the future DPPC

      as well as the proposed JWG to maintain the DPPC.'
    dates:
    - start: '2017-05-15'
      kind: effective
- identifier: '955'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appointment of WG 13 Deputy Convenor
  dates:
  - start: '2017-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Appointment of WG 13 Deputy Convenor
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: appoints
    message: 'SC 4 appoints Anne Dourgnon as Convener for the WG 13 “Industrial Data Quality” for

      a three year term, with appreciation for this offer to serve in that capacity and thanks to

      Jean BRANGE’ for his service.

      ACCLAMATION'
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to our SC 4 Liaisons and the presentations that were

      provided:

       ISO/IEC JTC1/SC 24 – Christophe Mouton

       ISO/TC 171/SC 2 – Kenny Swope

       ISO/TC 307 – Jean Brange

      ACCLAMATION'
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to the following individuals and organizations for their

