    kind: decision
  actions:
  - type: resolves
    message: Reappointment of WG 11 Convenor
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: appoints
    message: 'SC 4 appoints David Loffredo as Convener for the WG 11 “Implementation Methods

      and Conformance Methods” for a further three year term, with appreciation for this offer

      to serve in that capacity.'
