    - start: '2017-05-15'
      kind: effective
- identifier: '951'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Creation of ISO 15926-9 PWI for Facade Implementation
  dates:
  - start: '2017-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Creation of ISO 15926-9 PWI for Facade Implementation
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves a PWI to create the NWI for a new part ISO 15926-9 within WG 3, to

      identify methods for the exchange and integration of information between companies

      cooperating in the plant engineering supply chain through implementation of “facades”,


      for delivery at the Jeju meeting'
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: appoints
    message: 'SC 4 appoints Peter Paul Pruijn as Project Leader and invites member bodies to

      nominate experts to the project.'
    dates:
    - start: '2017-05-15'
      kind: effective
- identifier: '952'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Creation of preliminary work item for schematics
  dates:
  - start: '2017-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Creation of preliminary work item for schematics
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves the creation of a PWI to define an approach to schematics that will be

      applied across ISO TC 184/SC 4 for delivery at the spring 2018 meeting and invites

      member bodies to nominate experts to the project.'
    dates:
    - start: '2017-05-15'
      kind: effective
- identifier: '953'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Creation of PWI for Isogeometric Analysis and concise representation of analy...
  dates:
  - start: '2017-05-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Creation of PWI for Isogeometric Analysis and concise representation of analysis

      results and test data'
    dates:
    - start: '2017-05-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves the creation of a PWI for Isogeometric Analysis and concise

      representation of analysis results and test data with delivery at the spring 2018 meeting

      and invites member bodies to nominate experts to the project.'
    dates:
    - start: '2017-05-15'
