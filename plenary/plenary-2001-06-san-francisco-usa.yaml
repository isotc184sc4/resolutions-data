    title: Develop Test Case Guidelines for implementable standards
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2001-06-15'
        type: effective
      message: |
        In accordance with Resolution 469, SC 4 requests all Project Leaders to (1) submit a
        summary of the industrial demand for test cases in their implementable standards and
        technical specifications projects and (2) indicate the status, technical approach, and any
        issues on the development of test cases for their implementable standards and
        technical specifications projects. These should be sent to the Secretariat by 2001-09-10
        in order to support the further development of the Test Case Guidelines (QC n-206).
