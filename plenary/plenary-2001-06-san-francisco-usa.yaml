    message: 'SC 4 expresses its appreciation to US Pro and the staff of the Cathedral Hill Hotel for

      their efforts in organizing this meeting, arranging the facilities, excellent food, and

      social events.  SC 4 also expresses its appreciation for their hospitality and

      outstanding support before, during, and after the meeting.

      We address a special recognition to Chuck Stark (US Pro), Stacy Watts (ATI), Sarah

      Hartline (ATI), and Martha Graham (NIST) for their hospitality and outstanding support

      both before and during the ISO/TC 184/SC 4 meeting.'
