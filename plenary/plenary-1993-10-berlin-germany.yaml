metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Berlin, Germany, October 4, 1993 – October 14, 1993
  dates:
  - start: '1993-10-04'
    end: '1993-10-14'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Berlin, Germany
resolutions:
- identifier: '168'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: For each STEP Application Protocol an Abstract Test Suite shall be developed to
  dates:
  - start: '1993-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'For each STEP Application Protocol an Abstract Test Suite shall be developed to

      document the guidelines for testing implementations for conformance to the

      Application Protocol. Before an Application Protocol can be registered as a DIS, the

      corresponding Abstract Test Suite must at least have started its CD ballot.'
    dates:
    - start: '1993-10-15'
      kind: effective
- identifier: '169'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: New projects shall be established to develop Abstract Test Suites for each ap...
  dates:
  - start: '1993-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'New projects shall be established to develop Abstract Test Suites for each approved

      STEP Application protocol. PMAG shall name a project leader for each project and

      shall create a project schedule by January 1994.'
    dates:
    - start: '1993-10-15'
      kind: effective
- identifier: '170'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: documents may be circulated to gather comments from all
  dates:
  - start: '1993-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'SC 4 resolves that documents may be circulated to gather comments from all

      member countries using the CD procedure, but the procedure for approving a

      document at the

      CD level requires a formal ballot. This supersedes resolution #73 from Gothenburg of

      ISO/TC 184/SC 4 N63 dated 10 June 1990.'
    dates:
    - start: '1993-10-15'
      kind: effective
