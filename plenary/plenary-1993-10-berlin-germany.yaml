- identifier: '182'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: in principle that all Parts of ISO 10303 shall be published as joint
  dates:
  - start: '1993-10-15'
    kind: decision
  actions:
  - type: accepts
    message: 'SC 4 accepts in principle that all Parts of ISO 10303 shall be published as joint

      ISO/IEC standards, and directs its Secretariat to work with the ISO Central

      Secretariat and the SC 4 Editing Committee to confirm that this may take place

      without delay of more than two months in their publication as International Standards.'
    dates:
    - start: '1993-10-15'
      kind: effective
