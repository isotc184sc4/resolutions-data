metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Berlin, Germany, October
    4, 1993 -- October 14, 1993
  date: '1993-10-04'
  source: ISO/TC 184/SC 4 Secretariat
decisions:
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '168'
  kind: resolution
  status: decided
  dates:
  - date: '1993-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Require Abstract Test Suites for each STEP Application Protocol
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: resolves
      date_effective:
        date: '1993-10-15'
        type: effective
      message: |
        For each STEP Application Protocol an Abstract Test Suite shall be developed to
        document the guidelines for testing implementations for conformance to the
        Application Protocol. Before an Application Protocol can be registered as a DIS, the
        corresponding Abstract Test Suite must at least have started its CD ballot.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '169'
  kind: resolution
  status: decided
  dates:
  - date: '1993-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Establish new projects to develop Abstract Test Suites for APs
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: resolves
      date_effective:
        date: '1993-10-15'
        type: effective
      message: |
        New projects shall be established to develop Abstract Test Suites for each approved
        STEP Application protocol. PMAG shall name a project leader for each project and
        shall create a project schedule by January 1994.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '170'
  kind: resolution
  status: decided
  dates:
  - date: '1993-10-15'
    type: adoption
  localizations:
