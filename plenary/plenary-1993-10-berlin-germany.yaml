- identifier: '186'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: the creation of an ad hoc group at the SC 4 level to address how to
  dates:
  - start: '1993-10-15'
    kind: decision
  actions:
  - type: endorses
    message: 'SC 4 endorses the creation of an ad hoc group at the SC 4 level to address how to

      proceed with parametric capabilities for all SC 4 areas of scope'
    dates:
    - start: '1993-10-15'
      kind: effective
  - type: endorses
    message: 'SC 4 endorses P.

      Boutinaud and H. Scheder as co-chairs of this group. The ad hoc group is requested

      to provide its recommendations to the next meeting of SC 4.'
    dates:
    - start: '1993-10-15'
      kind: effective
