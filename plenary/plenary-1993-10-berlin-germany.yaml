    script: Latn
    title: Require formal ballot for CD level approval
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: resolves
      date_effective:
        date: '1993-10-15'
        type: effective
      message: |
        SC 4 resolves that documents may be circulated to gather comments from all
        member countries using the CD procedure, but the procedure for approving a
        document at the CD level requires a formal ballot. This supersedes resolution
        #73 from Gothenburg of ISO/TC 184/SC 4 N63 dated 10 June 1990.
