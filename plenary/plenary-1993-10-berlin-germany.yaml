- identifier: '177'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: the principle of separate publication of ISO 10303-22 language
  dates:
  - start: '1993-10-15'
    kind: decision
  actions:
  - type: approves
    message: 'SC 4 approves the principle of separate publication of ISO 10303-22 language

      bindings, such as late FORTRAN, late C and early C++, and directs PMAG to

      allocate part numbers as required, on the advice of the Editing Committee.'
    dates:
    - start: '1993-10-15'
      kind: effective
