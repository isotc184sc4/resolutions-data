- identifier: '192'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: PMAG to ensure that, at that point in time when PMAG is required to vote
  dates:
  - start: '1993-10-15'
    kind: decision
  actions:
  - type: directs
    message: 'SC 4 directs PMAG to ensure that, at that point in time when PMAG is required to vote

      on any Part promotion which is CD or DIS promotion, the information about sign-offs

      having occurred earlier is available to the PMAG national representatives in an explicit

      form. This information shall indicate:

      1.

      The person having signed off.

      2.

      The committee for which the person has signed off.

      3.

      The identifying N number of the document having been actually signed.

      4.

      The issue date of that document version.


      5.

      The date of signature'
    dates:
    - start: '1993-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '1993-10-15'
      kind: effective
  - type: asks
    message: 'SC 4 asks PMAG to answer the following questions regarding AICs:

      1.

      What is the role of AICs in STEP?

      2.

      Who are the users of AICs?

      3.

      Is there a requirement for AICs to become standards?

      4.

      If (3) is answered positively: what are the expected criteria for them to be

      approved or disapproved by national member bodies?

      5.

      Is planning of AICs required as part of an AP Planning Project?'
    dates:
    - start: '1993-10-15'
      kind: effective
