- identifier: '524'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: CD Ballot Period for Second and Subsequent Editions
  dates:
  - start: '2002-03-15'
    kind: decision
  actions:
  - type: resolves
    message: CD Ballot Period for Second and Subsequent Editions
    dates:
    - start: '2002-03-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs the PPC to modify the SC 4 Handbook and the appropriate guidelines to

      permit a three-month ballot cycle for the CD and TS ballots of SC 4 standards.  A

      longer ballot period may be requested by any P-member, the Convenor or the project

      leader.'
    dates:
    - start: '2002-03-15'
      kind: effective
