- identifier: 529-acclamation-1
  subject: ISO/TC 184/SC 4 "Industrial data"
  dates:
  - start: '2002-03-15'
    kind: decision
  actions:
  - type: thanks
    message: 'SC 4 expresses its deep appreciation to US Pro and the staff of the Wyndham Myrtle

      Beach Resort for their efforts in organizing this meeting, arranging the facilities,

      excellent food, computer facilities and social events.  SC 4 also expresses its

      appreciation for their hospitality and outstanding support before, during, and after the

      meeting.

      SC 4 addresses a special recognition to Chuck Stark, Sarah Hartline Martha Graham

      of NIST for their hospitality, outstanding support, and patience both before and during

      the ISO/TC 184/SC 4 meeting.'
    dates:
    - start: '2001-10-15'
      kind: decision
- identifier: 529-acclamation-2
  subject: ISO/TC 184/SC 4 "Industrial data"
  dates:
  - start: '2002-03-15'
    kind: decision
  actions:
  - type: thanks
    message: 'SC 4 expresses its deep appreciation to Mr. Peter Müller, Chairman ISO/TC 184/SC

      1, for his participation.

      Appreciation to our SC 4 Liaison Presenters

      SC 4 expresses a special thank you to our the SC 4 Liaison Plenary presenters Peter

      Müller, Francois Grobler, Norman Andersen, Phil Spiby, Bill Anderson, Matthew West,

      and Jochen Hænisch for their insightful and comprehensive presentations.'
    dates:
    - start: '2001-10-15'
      kind: decision
