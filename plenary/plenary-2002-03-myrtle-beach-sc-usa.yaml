- identifier: 529-acclamation-4
  subject: ISO/TC 184/SC 4 "Industrial data"
  dates:
  - start: '2002-03-15'
    kind: decision
  actions:
  - type: thanks
    message: 'SC 4 wishes to congratulate Tim Turner (WG 3/T23 - Shipbuilding) and Christy Haas

      on their wedding last November.  SC 4 is delighted to have provided the opportunity

      for the happy couple to meet and grow their love during the period that Christy was

      working with US PRO and providing support to SC 4 and associated meetings.  SC 4

      wishes Tim and Christy a long and blossoming marriage as they make their home in

      Charleston, SC. (picture in Annex A of Myrtle Beach SC 4 Minutes)'
    dates:
    - start: '2001-10-15'
      kind: decision
