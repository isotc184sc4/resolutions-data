- identifier: '528'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO/TC 10/SC 1 Request for Clarification in ISO 3098
  dates:
  - start: '2002-03-15'
    kind: decision
  actions:
  - type: resolves
    message: 'ISO/TC 10/SC 1 Request for Clarification in ISO 3098


      ISO/TC 184/SC 4 requests that the ISO/TC 10/SC 1 Liaison representative present

      the ISO 3098 clarifications identified in ISO/TC 184/SC 4/WG 12 N1016 for

      consideration at the next ISO/TC 10/SC 1 meeting.'
    dates:
    - start: '2002-03-15'
      kind: effective
