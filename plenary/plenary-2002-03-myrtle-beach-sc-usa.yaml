  actions:
  - type: directs
    date_effective:
      date: '2002-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 directs the PPC to modify the SC 4 Handbook and the appropriate guidelines to
        permit a three-month ballot cycle for the CD and TS ballots of SC 4 standards. A
