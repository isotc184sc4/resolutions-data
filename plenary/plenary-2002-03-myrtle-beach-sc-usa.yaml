- identifier: '526'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Ballot Comment Resolution for Technical Specifications
  dates:
  - start: '2002-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Ballot Comment Resolution for Technical Specifications
    dates:
    - start: '2002-03-15'
      kind: effective
  - type: agrees
    message: 'SC 4 agrees that the following procedure shall be applied to the resolution of

      comments submitted against successful Technical Specification ballots.

      1) Resolution of comments shall be agreed with the originators, where possible.

      2) The revised document incorporating the agreed comment resolutions shall be

      circulated within the development team and to the commentors for internal review to

      ensure agreement before signoff by the Convenor.

      3) If the Convenor, in conjunction with the Project Leader, considers that the revised

      document contains significant change, other than corrections to the use of English,

      the document shall be passed to the Secretariat for a confirmatory four-week ballot.

      This procedure is effective immediately, and SC 4 requests the Change Management

      Committee to prepare an advance resolution for the June 2002 meeting to make the

      necessary changes to the SC 4 Handbook.'
    dates:
    - start: '2002-03-15'
      kind: effective
- identifier: '527'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Integrated Manufacturing Task Force
  dates:
  - start: '2002-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Integrated Manufacturing Task Force
    dates:
    - start: '2002-03-15'
      kind: effective
  - type: accepts
    message: 'SC 4 accepts the Report of the Integrated Manufacturing Task Force (IMTF) including

      all the correlating documents presented, and requests its Secretariat to circulate the

      final results to P-members'
    dates:
    - start: '2002-03-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2002-03-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2002-03-15'
      kind: effective
  - type: investigates
    message: 'SC 4 invites the submission of appropriate PWI and NWI to address the requirements

      identified in the report.'
    dates:
    - start: '2002-03-15'
      kind: effective
  - type: thanks
    message: 'SC 4 thanks the IMTF and its Chairman, Professor Takeshi Kishinami, for all their

      efforts in presenting such a detailed overview, and disbands the Integrated

