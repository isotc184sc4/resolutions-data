    actions:
    - type: thanks
      date_effective:
        date: '2018-05-15'
        type: effective
      message: |
        SC 4 expresses its appreciation to Beijing Research Institute of Automation for Machinery Industry (RIAMB), China Association for Mechatronics Technology and Application (CAMETA), and the Standardization Administration of China (SAC) for hosting the 75th ISO/TC 184/SC 4 Plenary in Beijing, China during 2018-05-21/25.

