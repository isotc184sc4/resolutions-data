    script: Latn
    title: Apply 8-week ballot duration to ANSI QIF harvesting NP
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2018-05-15'
        type: effective
      message: 'SC 4 requests its Chair to convene a group representing WG 12, WG
        15, and WG 16 to review the explanatory report on QIF harvesting submitted
        to Change Management and recommend whether to proceed to an NP ballot. This
        review is expected to take four weeks and will be reported out at the next
        available PPC meeting.

        '
    - type: requests
      date_effective:
        date: '2018-05-15'
        type: effective
      message: 'SC 4 requests its Secretariat to apply the 8 week ballot duration
        to any resulting NP for harvesting the ANSI QIF standard.

        '
