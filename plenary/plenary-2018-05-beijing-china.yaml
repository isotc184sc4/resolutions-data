    title: Request digital twin manufacturing examples
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: asks
      date_effective:
        date: '2018-05-15'
        type: effective
      message: 'SC4 invites its member countries, liaisons and other interested parties
        (i.e. OPC and MTConnect) to submit digital twin manufacturing examples, standards,
        technologies and use cases to the Convenor of WG15 (hardwick@steptools.com)
        by 2018-08-27 for consideration by WG15 at its special meeting in September.

        '
