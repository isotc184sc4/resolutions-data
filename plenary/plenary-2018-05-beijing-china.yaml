    title: Submit ISO 8000-110 ed2 for DIS Ballot
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2018-05-15'
        type: effective
      message: 'Noting that the recent ISO 8000-110 ed2 development has resulted in
        minor editorial changes with no change of scope.

        '
    actions:
    - type: requests
      date_effective:
        date: '2018-05-15'
        type: effective
      message: 'SC 4 requests ISO CS to register the project as SDT 18 and its Secretariat
        to submit the document straight for DIS ballot. Target date for submission:
        2019-02-28, Target date for publication: 2019-08-31, Project Leader: Peter
        Eales, Convenor: Tim King, WG13.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '976'
  kind: resolution
  status: decided
  dates:
  - date: '2018-05-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Approve development of ISO/DIS 29002 edition 2
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: approves
      date_effective:
        date: '2018-05-15'
        type: effective
      message: 'SC4 approves development of ISO/DIS 29002. The document will consolidate
        all existing parts into a single document but will not expand the current
        scope of ISO 29002. The DIS will be submitted for ballot by a target date
        of 2019-02-28 and the IS for publication by a target date of 2019-08-31.

        '
    - type: requests
      date_effective:
        date: '2018-05-15'
        type: effective
      message: 'SC 4 requests its Secretariat to initiate a call for experts and appoints
        Peter Eales (GBR) as the project leader.

        '
