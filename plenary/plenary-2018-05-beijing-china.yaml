- identifier: '975'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Submit ISO 8000-110 ed2 for DIS Ballot
  dates:
  - start: '2018-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Submit ISO 8000-110 ed2 for DIS Ballot
    dates:
    - start: '2018-05-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes that the recent ISO 8000-110 ed2 development has resulted in minor

      editorial changes with no change of scope and therefore requests ISO CS to register

      the project as SDT 18 and its Secretariat to submit the document straight for DIS ballot.

      Target date for submission: 2019-02-28

      Target date for publication: 2019-08-31

      Project Leader: Peter Eales

      Convenor: Tim King, WG13'
    dates:
    - start: '2018-05-15'
      kind: effective
- identifier: '976'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Development of Edition 2 of ISO 29002
  dates:
  - start: '2018-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Development of Edition 2 of ISO 29002
    dates:
    - start: '2018-05-15'
      kind: effective
  - type: approves
    message: 'SC4 approves development of ISO/DIS 29002. The document will consolidate all

      existing parts into a single document but will not expand the current scope of ISO

      29002.  The DIS will be submitted for ballot by a target date of 2019-02-28 and the IS

      for publication by a target date of 2019-08-31'
    dates:
    - start: '2018-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to initiate a

      call for experts and appoints Peter Eales (GBR) as the project leader.'
    dates:
    - start: '2018-05-15'
      kind: effective
