- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '984'
  kind: resolution
  status: decided
  dates:
  - date: '2018-05-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Call for experts to JWG 24 and hold first meeting
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2018-05-15'
        type: effective
      message: 'SC 4 requests its TPM to coordinate with other ISO TPMs to identify
        all TCs/SCs that may have interest in submission of their standards for inclusion
        in the IEC CDD, including TC 29, TC 59/SC13, TC131, and TC 172 and to invite
        the nomination of experts to JWG 24 by 2018-07-13.

        '
    - type: recommends
      date_effective:
        date: '2018-05-15'
        type: effective
      message: 'SC 4 also recommends the Convener of JWG 24 to hold its first JWG
        meeting at an appropriate date and location, either through face to face and/or
        teleconference, considering the nationalities and availability of the nominated
        experts from the call for experts mentioned above, and report the result to
        the SC 4 Chicago meeting to be held November 4-9, 2018.

        '
- identifier:
