- identifier: '971'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Establish Ballot Duration of the New Work Item Proposal for Harvesting ANSI QIF
  dates:
  - start: '2018-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Establish Ballot Duration of the New Work Item Proposal for Harvesting ANSI QIF
    dates:
    - start: '2018-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Chair to convene a group representing WG 12, WG 15, and WG 16 to

      review the explanatory report on QIF harvesting submitted to Change Management and

      recommend whether to proceed to an NP ballot. This review is expected to take four

      weeks and will be reported out at the next available PPC meeting'
    dates:
    - start: '2018-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2018-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to apply the 8 week ballot duration to any resulting NP for

      harvesting the ANSI QIF standard.'
    dates:
    - start: '2018-05-15'
      kind: effective
