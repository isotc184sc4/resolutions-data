- identifier: '984'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Additional Call for Experts and First JWG 24 Meeting
  dates:
  - start: '2018-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Additional Call for Experts and First JWG 24 Meeting
    dates:
    - start: '2018-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its TPM to coordinate with other ISO TPMs to identify all TCs/SCs that

      may have interest in submission of their standards for inclusion in the IEC CDD,

      including TC 29, TC 59/SC13, TC131, and TC 172 and to invite the nomination of

      experts to JWG 24 by 2018-07-13'
    dates:
    - start: '2018-05-15'
      kind: effective
  - type: resolves
    message: 'SC 4 also recommends the Convener of JWG 24 to

      hold its first JWG meeting at an appropriate date and location, either through face to

      face and/or teleconference, considering the nationalities and availability of the

      nominated experts from the call for experts mentioned above, and report the result to'
    dates:
    - start: '2018-05-15'
      kind: effective
  - type: resolves
    message: the SC 4 Chicago meeting to be held November 4-9, 2018.
    dates:
    - start: '2018-05-15'
      kind: effective
- identifier: '985'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Request for digital twin manufacturing examples
  dates:
  - start: '2018-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Request for digital twin manufacturing examples
    dates:
    - start: '2018-05-15'
      kind: effective
  - type: investigates
    message: 'SC4 invites its member countries, liaisons and other interested parties (i.e. OPC and

      MTConnect) to submit digital twin manufacturing examples, standards, technologies

      and use cases to the Convenor of WG15 (hardwick@steptools.com) by 2018-08-27 for

      consideration by WG15 at its special meeting in September.

      ACCLAMATION (Beijing – May 2018)'
    dates:
    - start: '2018-05-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to our SC 4 Liaisons and the presentations that were

      provided:

       ISO/TC 171/SC 2 – Written Report Submitted

       ISO/TC 37/SC3 – Written Report Submitted

       ISO/TC 59/SC13 – Written Report Submitted


       ISO/TC 251 – Written Report Submitted

       ISO/IEC JTC 1/SC24 – Christophe Mouton

      ACCLAMATION (Beijing – May 2018)'
    dates:
    - start: '2018-05-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to the following individuals and organizations for their

      participation in the 75th ISO/TC 184/SC 4 Open Technical Forum in Beijing, China

      2018-05-21:

       Overview: Soonhung Han

       WG 3: Paul van Exel / David Leal

       WG 12: Jean Brange

       WG 13: Tim King / Peter Eales

       WG 15: Martin Hardwick

      ACCLAMATION (Beijing – May 2018)'
    dates:
    - start: '2018-05-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to Beijing Research Institute of Automation for

      Machinery Industry (RIAMB), China Association for Mechatronics Technology and

      Application (CAMETA), and the Standardization Administration of China (SAC) for

      hosting the 75th ISO/TC 184/SC 4 Plenary in Beijing, China during 2018-05-21/25.

      Special acknowledgement is extended to the Jiuhua Resort & Convention Center and

      its staff for their seamless and attentive support throughout the week.'
    dates:
    - start: '2018-05-15'
      kind: effective
