  - language_code: eng
    script: Latn
    title: Endorse Richard R. Wandmacher as SC 4 Chairman
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: endorses
      date_effective:
        date: '1995-10-15'
        type: effective
      message: |
        SC 4 endorses the Secretariat's nomination of Richard R. Wandmacher to fill
        the position as Chairman of SC 4 for a term of six years and requests the
        Secretariat to forward the nomination to AFNOR for approval by ISO/TC 184.
- identifier:
