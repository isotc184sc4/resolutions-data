    title: Adopt Technical Corrigendum to ISO 10303-21
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: adopts
      date_effective:
        date: '1995-10-15'
        type: effective
      message: |
        SC 4 adopts the Technical Corrigendum to ISO 10303-21 dated 7 September 1995
        and directs the SC 4 Secretariat to forward the document to ISO Geneva.
