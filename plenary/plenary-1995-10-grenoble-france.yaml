  kind: resolution
  status: decided
  dates:
  - date: '1995-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Require AIC drafts to incorporate agreed technical changes
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '1995-10-15'
        type: effective
      message: |
        SC 4 requests its Secretariat to ensure that if any AIC drafts are
        recommended for promotion to DIS under current ballot (N315-N332, Parts
        501-518) the parts will incorporate agreed changes in response to technical
        comments received with the ballot prior to DIS balloting.
