- identifier: '564'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Cancellation of ISO/TC 184/SC 4 Resolution 462
  dates:
  - start: '2003-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Cancellation of ISO/TC 184/SC 4 Resolution 462
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: resolves
    message: 'SC 4 cancels its Resolution 462 that established a STEP Modules Harmonization Team

      and urges its Working Groups 3, 8, 9 and 12 along with the active module development

      projects to cooperate in module harmonization'
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests the conveners of WG 3, 8, 9, and 12 to report on module

      harmonization activities to plenary meetings of SC 4 and its Working Groups'
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: resolves
    message: 'SC 4 also urges its Working Groups 3, 8, 9 and 12 to complete and update the


      guidelines documents for module creation.

      In particular, SC 4 requests that guidance on module harmonization be added to the

      Module Development Guidelines, and that consideration be given to the use of ISO

      18876 in this context.'
    dates:
    - start: '2003-03-15'
      kind: effective
- identifier: '565'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Exte n sion of T a sk Fo rce f o r “Ind u stria l Data on t he W eb ”
  dates:
  - start: '2003-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Exte n sion of T a sk Fo rce f o r “Ind u stria l Data on t he W eb ”
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs the ad hoc group for Industrial Data on the Web (IDW) to report regularly

      to SC 4 plenaries concerning the impact of established and emerging Web

      technologies on the work of SC 4.  These technologies include web services, such as

      WSDL, UDDI and LDAP.

      IDW will be a mechanism by which web-related technologies developed by individual'
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: resolves
    message: 'SC 4 WGs are shared.

      IDW will deliver SC 4 resolutions, tutorials, N docs and technology demonstrations'
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: resolves
    message: 'SC 4 urges the ad hoc group to recommend liaisons with W3C committees, and to

      coordinate their activities with the Education and Outreach Committee'
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: appoints
    message: 'SC 4 appoints Jim U''Ren as the leader of this ad hoc group, and David Leal as the

      deputy.

      IDW will deliver a report to the last SC 4 meeting in 2004 with a recommendation as to

      the continuation of the ad hoc group.'
    dates:
    - start: '2003-03-15'
      kind: effective
- identifier: '566'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Establishment of Liaison with SASIG
  dates:
  - start: '2003-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Establishment of Liaison with SASIG
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: resolves
    message: 'SC 4 proposes the establishment of a Category A liaison with the Strategic Automotive

      product data Standards Industry Group (SASIG) and nominates Oscar Rocha as its

      liaison officer for the next two years.

      It is requested that the SC 4 secretary confirm this liaison with the ISO Central

      Secretariat.

      SASIG is similarly invited to select a liaison officer from their organization to ISO/TC

      184/SC 4'
    dates:
    - start: '2003-03-15'
      kind: effective
- identifier: '567'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Minor Revision of ISO 10303-210:2001
  dates:
  - start: '2003-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Minor Revision of ISO 10303-210:2001
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves the creation of a new edition of ISO 10303-210 as a minor revision to

      correct errors in EXPRESS, Mapping Tables, Application Object definitions, and

      orthography'
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to submit the completed document to ISO CS for

      FDIS ballot as a Minor Revision when available'
    dates:
    - start: '2003-03-15'
      kind: effective
