- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '561'
  urn: urn:iso:tc184:sc4:resolution:561
  kind: resolution
  status: decided
  dates:
  - date: '2003-03-15'
    type: adoption
  title:
  - spelling: eng
    value: Evaluate reduction of meetings frequency
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: asks
    date_effective:
      date: '2003-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 reviews the necessity of 3 meetings per year and asks its member bodies
        whether they support the current situation. If the member bodies agree to reduce the
        number of meetings to two meetings a year, then this shall be installed as soon as
        possible. The existing schedule and invitations from some countries need to be
        considered because they have already done some preparatory work.
