- identifier: '561'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Meetings Frequency
  dates:
  - start: '2003-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Meetings Frequency
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: resolves
    message: 'SC 4 reviews the necessity of 3 meetings per year and asks its member bodies

      whether they support the current situation. If the member bodies agree to reduce the

      number of meetings to two meetings a year, then this shall be installed as soon as

      possible. The existing schedule and invitations from some countries need to be

      considered because they have already done some preparatory work'
    dates:
    - start: '2003-03-15'
      kind: effective
