- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '569'
  urn: urn:iso:tc184:sc4:resolution:569
  kind: resolution
  status: decided
  dates:
  - date: '2003-03-15'
    type: adoption
  title:
  - spelling: eng
    value: Solicit input for Education and Outreach Rapporteur
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: asks
    date_effective:
      date: '2003-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 invites its experts, member bodies and liaisons to provide input to the Education
        and Outreach Rapporteur about the major problems of perception that have been
        identified and the needs and opportunities for outreach, education, and promotional
        activities.

        Responses are requested by 2003-05-15 to allow a summary report to be made
        available at the Stuttgart meeting.
  considerations:
  - type: recognizing
    date_effective:
      date: '2003-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        Recognizing that SC 4 seeks to effectively spread and enhance the perception of SC 4 standards in
        industrial, academic and research communities.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '570'
  urn: urn:iso:tc184:sc4:resolution:570
  kind: resolution
  status: decided
  dates:
  - date: '2003-03-15'
    type: adoption
  title:
  - spelling: eng
    value: Request public availability of SC 4 standards
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2003-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests its Secretariat to request approval from the ISO Council to make the
        following documents publicly available, free of charge, on the World Wide Web:

        * ISO 10303 (STEP)
        * ISO 13584 (PLIB)
        * ISO 15926 (Process Plant)
        * ISO 18876 (IIDEAS)

        The rationale to be included with this request is contained in document SC 4N1456.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '571'
  urn: urn:iso:tc184:sc4:resolution:571
  kind: resolution
  status: decided
  dates:
  - date: '2003-03-15'
    type: adoption
  title:
  - spelling: eng
    value: Endorse proposal to VAMAS for testing of material standards
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: endorses
    date_effective:
      date: '2003-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 endorses the proposal N1457 to VAMAS for the comparison and validation of
        the different standards for the representation and the exchange of data for Life Cycle
        Assessment (LCA), as part of the liaison between ISO/TC 184/SC 4 and VAMAS.
  - type: recognizes
    date_effective:
      date: '2003-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 recognizes the key role that the national research centers, represented in
        VAMAS, could play in the exploitation and validation of the International and industry
        Standards identified in the proposal.
  - type: requests
    date_effective:
      date: '2003-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests its secretariat to forward the proposal to VAMAS, and to invite material
        domain experts to contribute to the further development of these SC 4 standards.
