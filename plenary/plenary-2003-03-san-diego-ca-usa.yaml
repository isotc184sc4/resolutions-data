- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '564'
  urn: urn:iso:tc184:sc4:resolution:564
  kind: resolution
  status: decided
  dates:
  - date: '2003-03-15'
    type: adoption
  title:
  - spelling: eng
    value: Cancel Resolution 462 and integrate module harmonization
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: decides
    date_effective:
      date: '2003-03-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 cancels its Resolution 462 that established a STEP Modules Harmonization
        Team.

        '
  - type: encourages
    date_effective:
      date: '2003-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 urges its Working Groups 3, 8, 9 and 12 along with the active module development
        projects to cooperate in module harmonization.
  - type: requests
    date_effective:
      date: '2003-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests the conveners of WG 3, 8, 9, and 12 to report on module
        harmonization activities to plenary meetings of SC 4 and its Working Groups.
  - type: requests
    date_effective:
      date: '2003-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 also urges its Working Groups 3, 8, 9 and 12 to complete and update the
        guidelines documents for module creation.

        In particular, SC 4 requests that guidance on module harmonization be added to the
        Module Development Guidelines, and that consideration be given to the use of ISO
        18876 in this context.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '565'
  urn: urn:iso:tc184:sc4:resolution:565
  kind: resolution
  status: decided
  dates:
  - date: '2003-03-15'
    type: adoption
  title:
  - spelling: eng
    value: Extend Task Force for Industrial Data on the Web
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: directs
    date_effective:
      date: '2003-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 directs the ad hoc group for Industrial Data on the Web (IDW) to report regularly
        to SC 4 plenaries concerning the impact of established and emerging Web
        technologies on the work of SC 4. These technologies include web services, such as
        WSDL, UDDI and LDAP.

        IDW will be a mechanism by which web-related technologies developed by individual
        SC 4 WGs are shared.

        IDW will deliver SC 4 resolutions, tutorials, N docs and technology demonstrations.
  - type: encourages
    date_effective:
      date: '2003-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 urges the ad hoc group to recommend liaisons with W3C committees, and to
        coordinate their activities with the Education and Outreach Committee.
  - type: appoints
    date_effective:
      date: '2003-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 appoints Jim U'Ren as the leader of this ad hoc group, and David Leal as the
        deputy.

        IDW will deliver a report to the last SC 4 meeting in 2004 with a recommendation as to
        the continuation of the ad hoc group.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '566'
  urn: urn:iso:tc184:sc4:resolution:566
  kind: resolution
  status: decided
  dates:
  - date: '2003-03-15'
    type: adoption
  title:
  - spelling: eng
    value: Establish Category A liaison with SASIG
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: recommends
    date_effective:
      date: '2003-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 proposes the establishment of a Category A liaison with the Strategic Automotive
        product data Standards Industry Group (SASIG) and nominates Oscar Rocha as its
        liaison officer for the next two years.

        It is requested that the SC 4 secretary confirm this liaison with the ISO Central
        Secretariat.
  - type: asks
    date_effective:
      date: '2003-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SASIG is similarly invited to select a liaison officer from their organization to ISO/TC
        184/SC 4.
