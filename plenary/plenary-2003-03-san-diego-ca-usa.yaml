- identifier: '569'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Requirements for Education and Outreach
  dates:
  - start: '2003-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Requirements for Education and Outreach
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: resolves
    message: 'SC 4 seeks to effectively spread and enhance the perception of SC 4 standards in

      industrial, academic and research communities'
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: investigates
    message: 'SC 4 invites its experts, member bodies and liaisons to provide input to the Education

      and Outreach Rapporteur about the major problems of perception that have been

      identified and the needs and opportunities for outreach, education, and promotional

      activities.

      Responses are requested by 2003-05-15 to allow a summary report to be made

      available at the Stuttgart meeting.'
    dates:
    - start: '2003-03-15'
      kind: effective
- identifier: '570'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Public Availability of SC 4 Standards and Specifications
  dates:
  - start: '2003-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Public Availability of SC 4 Standards and Specifications
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to request approval from the ISO Council to make the

      following documents publicly available, free of charge, on the World Wide Web:

      • ISO 10303 (STEP)

      • ISO 13584 (PLIB)

      • ISO 15926 (Process Plant)

      • ISO 18876 (IIDEAS)

      The rationale to be included with this request is contained in document SC 4N1456.'
    dates:
    - start: '2003-03-15'
      kind: effective
- identifier: '571'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Proposal to VAMAS for the Testing of Material Standards
  dates:
  - start: '2003-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Proposal to VAMAS for the Testing of Material Standards
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: endorses
    message: 'SC 4 endorses the proposal N1457 to VAMAS for the comparison and validation of

      the different standards for the representation and the exchange of data for Life Cycle

      Assessment (LCA), as part of the liaison between ISO/TC 184/SC 4 and VAMAS'
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: recognizes
    message: 'SC 4 recognizes the key role that the national research centers, represented in

      VAMAS, could play in the exploitation and validation of the International and industry

      Standards identified in the proposal'
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2003-03-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its secretariat to forward the proposal to VAMAS, and to invite material

      domain experts to contribute to the further development of these SC 4 standards.'
    dates:
    - start: '2003-03-15'
      kind: effective
