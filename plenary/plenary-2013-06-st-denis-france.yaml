# yaml-language-server: $schema=https://raw.githubusercontent.com/metanorma/edoxen/refs/heads/main/schema/edoxen.yaml
metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Saint-Denis, France, June 3, 2013 -- June 8, 2013
  dates:
  - start: '2013-06-03'
    end: '2013-06-08'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Saint-Denis, France
resolutions:
- identifier: '852'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appoint Dr Gerald Radack as Coordinator, Quality Committee
  dates:
  - start: '2013-06-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC 4 approves Dr Gerald Radack as Coordinator, Quality Committee for a
      period of three years, and thanks him for his willingness to serve in
      this capacity.
    dates:
    - start: '2013-06-15'
      kind: effective
- identifier: '853'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Cancel ISO 8000-050 and remove from SC 4 work programme
  dates:
  - start: '2013-06-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC 4 approves removal of ISO 8000-050 from the list of standards in the
      SC 4 work programme.
    dates:
    - start: '2013-06-15'
      kind: effective
  - type: requests
    message: |
      SC 4 requests its Secretariat to update the SC 4 database and inform
      ISO CS of this change to the work programme.
    dates:
    - start: '2013-06-15'
      kind: effective
- identifier: '854'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Launch ISO 10303-210 edition 3 as new project on accelerated timescale
  dates:
  - start: '2013-06-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC 4 approves an NP to create a new edition 3 of ISO 10303-210 with the
      same scope as ISO 10303-210 ed2, using the accelerated timescale, with
      Thomas Thurman as the project leader.
    dates:
    - start: '2013-06-15'
      kind: effective
  - type: instructs
    message: |
      SC 4 instructs that the project should proceed direct to DIS ballot.
    dates:
    - start: '2013-06-15'
      kind: effective
- identifier: '855'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Harvest OMG SysML 1.3 and UPDM 2.1 under SC4 harvesting procedures
  dates:
  - start: '2013-06-15'
    kind: decision
  actions:
  - type: welcomes
    message: |
      SC 4 welcomes the proposed submission from OMG of SysML 1.3 for
      harvesting as NWI/CD and UPDM 2.1 for harvesting as DIS under the SC4
      harvesting procedures.
    dates:
    - start: '2013-06-15'
      kind: effective
- identifier: '856'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appoint Standards Norway as administrative lead for JWG with ISO/TC 59/SC 13
  dates:
  - start: '2013-06-15'
    kind: decision
  actions:
  - type: agrees
    message: |
      SC 4 agrees that Standards Norway should take the administrative lead
      for the Joint Working Group, on the understanding that the first task of
      the JWG will be to create the operational procedures for the support of
      ISO 16739, for approval by the next plenary meetings of SC 4 and SC 13.
    dates:
    - start: '2013-06-15'
      kind: effective
  considerations:
  - type: noting
    message: |
      France proposes Bernard Ferries.
    dates:
    - start: '2013-06-15'
      kind: effective
- identifier: '857'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Place ISO 8000 parts 8, 9, 10, 20, 30, 40 on ISO extended timescale
  dates:
  - start: '2013-06-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC 4 requests its Secretariat to inform ISO CS of the requirement to
      place ISO 8000-8, 9, 10, 20, 30, 40 on the ISO extended timescale.
    dates:
    - start: '2013-06-15'
      kind: effective
  considerations:
  - type: noting
    message: |
      SC 4 notes that the revised dates for delivery are within the SC 4
      planned timescales.
    dates:
    - start: '2013-06-15'
      kind: effective
- identifier: 201306-acclaim-01
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank Peter Benson for his service as Coordinator, Quality Committee
  dates:
  - start: '2013-06-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC 4 expresses its special recognition and thanks to Peter Benson for
      his exceptional dedication and service for the past three years in the
      position of Coordinator, Quality Committee.
    dates:
    - start: '2013-06-15'
      kind: effective
- identifier: 201306-acclaim-02
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank Change Management Plenary presenters from OMG and ISO 8000
  dates:
  - start: '2013-06-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC 4 expresses its appreciation to those who presented at the Change
      Management Plenary:

      * ISO 8000 part 62 -- Ismael Caballero and Sunho Kim
      * SysML -- Andreas Korff, OMG
      * UPDM -- Andreas Korff, OMG
    dates:
    - start: '2013-06-15'
      kind: effective
- identifier: 201306-acclaim-03
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank AFNOR, Isabelle Rimbert, and team for hosting the Saint-Denis plenary
  dates:
  - start: '2013-06-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC 4 expresses its appreciation to Isabelle Rimbert, Stephane Mouliere,
      Ines Magnan and Martine Degardin for their hosting and support of the
      65th ISO TC 184/SC 4 Plenary meetings at AFNOR in St Denis, France. SC 4
      especially commends AFNOR and Jean Brange for an excellent venue and
      outstanding service to the SC 4 community. A special acknowledgement is
      extended to Christophe Mouton and to Bruno Schultz, for their support
      during the week. Special acknowledgement is extended to AFNOR and its
      staff for their seamless and attentive support.
    dates:
    - start: '2013-06-15'
      kind: effective
