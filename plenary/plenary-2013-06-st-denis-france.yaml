  kind: resolution
  status: decided
  dates:
  - date: '2013-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Appoint Dr Gerald Radack as Coordinator, Quality Committee
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: approves
      date_effective:
        date: '2013-06-15'
        type: effective
      message: |
        SC 4 approves Dr Gerald Radack as Coordinator, Quality Committee for a
        period of three years, and thanks him for his willingness to serve in
        this capacity.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '853'
  kind: resolution
  status: decided
  dates:
  - date: '2013-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Cancel ISO 8000-050 and remove from SC 4 work programme
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: approves
      date_effective:
        date: '2013-06-15'
        type: effective
      message: |
        SC 4 approves removal of ISO 8000-050 from the list of standards in the
        SC 4 work programme.
    - type: requests
      date_effective:
        date: '2013-06-15'
        type: effective
      message: |
        SC 4 requests its Secretariat to update the SC 4 database and inform
        ISO CS of this change to the work programme.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '854'
  kind: resolution
  status: decided
  dates:
  - date: '2013-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Launch ISO 10303-210 edition 3 as new project on accelerated timescale
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: approves
      date_effective:
        date: '2013-06-15'
        type: effective
      message: |
        SC 4 approves an NP to create a new edition 3 of ISO 10303-210 with the
        same scope as ISO 10303-210 ed2, using the accelerated timescale, with
        Thomas Thurman as the project leader.
    - type: instructs
      date_effective:
        date: '2013-06-15'
        type: effective
      message: 'SC 4 instructs that the project should proceed direct to DIS ballot.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '855'
  kind: resolution
  status: decided
  dates:
  - date: '2013-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Harvest OMG SysML 1.3 and UPDM 2.1 under SC4 harvesting procedures
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: welcomes
      date_effective:
        date: '2013-06-15'
        type: effective
      message: |
        SC 4 welcomes the proposed submission from OMG of SysML 1.3 for
        harvesting as NWI/CD and UPDM 2.1 for harvesting as DIS under the SC4
        harvesting procedures.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '856'
  kind: resolution
  status: decided
  dates:
  - date: '2013-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Appoint Standards Norway as administrative lead for JWG with ISO/TC 59/SC
      13
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2013-06-15'
        type: effective
      message: 'France proposes Bernard Ferries.

        '
    actions:
    - type: agrees
      date_effective:
        date: '2013-06-15'
        type: effective
      message: |
        SC 4 agrees that Standards Norway should take the administrative lead
        for the Joint Working Group, on the understanding that the first task of
        the JWG will be to create the operational procedures for the support of
        ISO 16739, for approval by the next plenary meetings of SC 4 and SC 13.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '857'
  kind: resolution
  status: decided
  dates:
  - date: '2013-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Place ISO 8000 parts 8, 9, 10, 20, 30, 40 on ISO extended timescale
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2013-06-15'
        type: effective
      message: |
        SC 4 notes that the revised dates for delivery are within the SC 4
        planned timescales.
    actions:
    - type: requests
      date_effective:
        date: '2013-06-15'
        type: effective
      message: |
        SC 4 requests its Secretariat to inform ISO CS of the requirement to
        place ISO 8000-8, 9, 10, 20, 30, 40 on the ISO extended timescale.
