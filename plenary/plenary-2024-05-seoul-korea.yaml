- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1139'
  kind: resolution
  status: decided
  dates:
  - date: '2024-05-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Restructure ISO 18136 as a multi-part standard
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2024-05-15'
        type: effective
      message: 'Noting that WG 3 and the ISO/CD 18136 project team foresee the development
        of new capabilities of the ISO 18136 standard to meet further nuclear industry
        requirements,

        '
    actions:
    - type: accepts
      date_effective:
        date: '2024-05-15'
        type: effective
      message: |
        SC 4 accepts the recommendation of WG 3 and requests its Committee Manager
        coordinate with ISO/CS and designate project id 85184 as ISO/CD 18136-1 and
        recognize ISO 18136 as a multi-part standard and update the title as: Automation
        systems and integration -- Nuclear digital ecosystem -- Part 1: Overview and
        framework noting no change in scope to the project or its schedule.
