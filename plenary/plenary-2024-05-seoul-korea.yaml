- identifier: '1139'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Move ISO 18136 to a multi-part standard.
  dates:
  - start: '2024-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Move ISO 18136 to a multi-part standard
    dates:
    - start: '2024-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2024-05-15'
      kind: effective
  - type: resolves
    message: 'Noting that WG 3 and the ISO/CD 18136 project team foresee the development of new

      capabilities of the ISO 18136 standard to meet further nuclear industry requirements,'
    dates:
    - start: '2024-05-15'
      kind: effective
  - type: accepts
    message: 'SC 4 accepts the recommendation of WG 3 and requests it’s Committee Manager

      coordinate with ISO/CS and designate project id 85184 as ISO/CD 18136-1 and

      recognize ISO 18136 as a multi-part standard and update the title as: Automation

      systems and integration — Nuclear digital ecosystem — Part 1: Overview and

      framework noting no change in scope to the project or its schedule.'
    dates:
    - start: '2024-05-15'
      kind: effective
