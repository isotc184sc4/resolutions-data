- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1141'
  kind: resolution
  status: decided
  dates:
  - date: '2024-05-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Launch PWI for technical report on product data visualization
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2024-05-15'
        type: effective
      message: 'Noting the proposal from JWG 16 for creating a technical report supporting
        future developments in the scope of visualization for industrial data and
        especially industrial visualization requirements

        '
    actions:
    - type: requests
      date_effective:
        date: '2024-05-15'
        type: effective
      message: 'SC 4 requests its Committee Manager to coordinate with ISO/CS to initiate
        the development of a technical report with the title "Automation systems and
        integration -- Industrial data -- Industrial requirements for product data
        visualization and perspectives".

        '
    - type: appoints
      date_effective:
        date: '2024-05-15'
        type: effective
      message: |
        SC 4 appoints Christophe MOUTON and Atsuto SOMA as project leaders, Soonhung HAN as editor, and requests SDT 18 with the following target dates:

        * Circulation of 1st Draft Technical Report to experts: for the Fall 2024 SC 4 plenary
        * Draft Technical Report ballot: beginning 2025
        * Publication: Fall 2025

        And allocates the project to JWG 16.
    - type: requests
      date_effective:
        date: '2024-05-15'
        type: effective
      message: 'SC 4 requests its Committee Manager to activate the OSD once the PWI
        is initiated.

        '
