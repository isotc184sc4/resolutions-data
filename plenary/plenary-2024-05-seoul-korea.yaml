- identifier: '1141'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Start a PWI for a TR on Industrial requirements for product data visualizatio...
  dates:
  - start: '2024-05-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Start a PWI for a TR on Industrial requirements for product data visualization and

      perspectives'
    dates:
    - start: '2024-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2024-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Committee Manager to coordinate with

      ISO/CS to initiate the development of a technical report with the title “Automation

      systems and integration — Industrial data — Industrial requirements for product data

      visualization and perspectives”'
    dates:
    - start: '2024-05-15'
      kind: effective
  - type: appoints
    message: 'SC4 appoints Christophe MOUTON and Atsuto SOMA

      as project leaders, Soonhung HAN as editor, and requests SDT 18 with the following

      target dates:

      • Circulation of 1st Draft Technical Report to experts: for the Fall 2024 SC 4 plenary

      • Draft Technical Report ballot: beginning 2025

      • Publication: Fall 2025

      And allocates the project to JWG 16'
    dates:
    - start: '2024-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Committee Manager to activate the OSD once the PWI is initiated.


