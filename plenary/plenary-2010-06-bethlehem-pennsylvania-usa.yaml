- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '802'
  kind: resolution
  status: decided
  dates:
  - date: '2010-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Re-appoint SC 4 Officers for an additional three-year term
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: thanks
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 expresses its special recognition and thanks for the exceptional
        dedication and service for the past three years of these Officers.

        '
    - type: appoints
      date_effective:
        date: '2010-06-15'
        type: effective
      message: |
        SC 4 re-appoints these Officers to serve for an additional three year term:

        * Policy and Planning Committee (PPC) Chair: Torbjorn Holm
        * Quality Committee Chair: Peter Benson
        * Quality Committee Deputy Chair: Dr. Junfeng Zhan
        * WG 03 Convener: Dr. Gerald Radack
        * WG 02 Convener: Nikolaus Ondracek
        * WG 12 Deputy Convener: Jochen Haenisch
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '803'
  kind: resolution
  status: decided
  dates:
  - date: '2010-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Appoint liaison from and to IAIDQ
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: welcomes
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 welcomes Christian Walenta as liaison from the International
        Association for Information and Data Quality (IAIDQ) for SC 4.

        '
    - type: nominates
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 nominates Peter Benson as its liaison to IAIDQ.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '804'
  kind: resolution
  status: decided
  dates:
  - date: '2010-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Withdraw ISO 8000-102 upon publication of ISO 8000-2
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: directs
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 directs the Secretariat to withdraw ISO 8000-102 “Master data:
        Exchange of Characteristic Data: Vocabulary”, upon publication of ISO 8000-2
        “Data Quality - Vocabulary”.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '805'
  kind: resolution
  status: decided
  dates:
  - date: '2010-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Advance ISO 8000-1 to IS ballot and develop taxonomy of industrial data
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: instructs
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 instructs its Secretariat to submit the revised version of ISO
        8000-1 “Data Quality - Overview, principles and general requirements”, excluding
        the taxonomy, to ISO/CS for TS publication by 2010-09-15.

        '
    - type: approves
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 approves the submission of ISO/TS 8000-1 for ballot as an International
        Standard.

        '
    - type: directs
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 directs the project team to provide the Secretariat with a draft
        for DIS balloting as soon as possible, and directs the Secretariat to submit
        this part to ISO/CS for DIS ballot.

        '
    - type: directs
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 directs WG 13 to develop a taxonomy of industrial data to include
        contents that correspond to the scope of SC 4 and resolves that this taxonomy
        forms the contents of ISO 8000-3, with the title "Data quality -- Taxonomy
        of industrial data" and to include a reference to the new Part 3 in the published
        TS for Part 1.

        '
    - type: requests
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 requests its Secretariat to inform all other Sub-Committees of
        TC 184 that WG 13 is developing taxonomy of industrial data, inviting those
        Sub-Committees to nominate experts who are willing to contribute to the development
        and review of the taxonomy.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '806'
  kind: resolution
  status: decided
  dates:
  - date: '2010-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Manage ISO 8000 vocabulary as a database
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: resolves
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 resolves to manage the ISO 8000 vocabulary using the ISO Annex
        ST procedures for the management of standards as databases, as customized
        in the SC 4 standing document “Procedure for the maintenance of ISO/TC 184/SC
        4 vocabulary”, once ISO 8000-2 is approved for publication.

        '
    - type: requests
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 requests the ISO 8000-2 “Data quality -- Vocabulary” project
        to nominate a member to the maintenance team.

        '
    - type: requests
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 requests its Secretariat to invite P-members, Category A liaisons,
        internal liaisons, and the WG 13 convener to nominate additional experts,
        as needed under the agreed procedure.

        '
    - type: requests
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 requests its Secretariat to invite all P-members, Category A
        liaisons and internal liaisons to appoint one member each to the validation
        team.

        '
    - type: requests
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 requests its Secretariat to establish a Configuration Management
        Repository for the ISO 8000 vocabulary.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '807'
  kind: resolution
  status: decided
  dates:
  - date: '2010-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Appoint delegates to TC 184 ad hoc group on mechatronics
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: appoints
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 appoints Jean Brangé, Mike Zink, Tom Thurman, Peter Benson, and
        Gerry Radack as delegates to the TC 184 ad hoc group on mechatronics to ensure
        that effective use is made of existing SC 4 standards, and to assist in the
        identification of any specific new requirements.

        '
    - type: instructs
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 instructs its Secretariat to seek additional nominees from other
        P-members.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '808'
  kind: resolution
  status: decided
  dates:
  - date: '2010-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Nominate WG 8 convener to Energy Efficiency Task Force
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'ISO/TC 184/SC 4 requests its Secretariat to nominate the convener
        of its JWG 8, Anne-Francoise Cutting-Decelle as the point of contact for the
        proposed ISO Strategic Advisory Group on Energy (SAG-E) Workshop and also
        to SC 5 /WG 10.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '809'
  kind: resolution
  status: decided
  dates:
  - date: '2010-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Circulate call for participation in Oil and Gas Asset Management PWI
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'Noting the launch of the TC 184 PWI on “Oil and gas asset management
        and operations and maintenance operations”.

        '
    actions:
    - type: requests
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 requests its Secretariat to circulate an immediate call to member
        bodies for participation in the PWI.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '810'
  kind: resolution
  status: decided
  dates:
  - date: '2010-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Add modular APs to STEP Module and Resource Library (SMRL)
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: approves
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 approves the management of all ISO 10303 modular APs under the
        Annex ST procedure as part of the STEP Module and Resource Library. Snapshot
        builds of the APs shall be held in a separate directory. In order to ensure
        consistency, SC 4 approves the transfer of 400-series AP modules from the
        main Library directory to the appropriate snapshot directories.

        '
    - type: instructs
      date_effective:
        date: '2010-06-15'
        type: effective
      message: 'SC 4 instructs the SC 4 secretariat to update the SC 4 standing document
        “Procedures for the Maintenance of the STEP Module and Resource Library”.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: 201006-acclaim-01
