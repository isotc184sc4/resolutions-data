metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Bethlehem, United States, June 6, 2010 -- June 11, 2010
  dates:
  - start: '2010-06-06'
    end: '2010-06-11'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Bethlehem, United States
resolutions:
- identifier: '801'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approve project leaders and editors for SC 4 projects
  dates:
  - start: '2010-06-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC 4 approves the following changes to project leaders and project editors for the associated SC 4 projects:

      |===
      |Project |Leader |Editor

      |ISO 10303-0026 |Keith Hunten |Marco Delgado
      |ISO 10303-0203e2 |Simon Frechette |
      |ISO 13584-0035 |N. Ondracek removed |
      |ISO 15926-0007 |Johan Wilhelm Klüwer |Onno Paap, Hans Teijgeler
      |ISO 15926-0008 | |Onno Paap, Hans Teijgeler
      |ISO 15926-0009 |Rahul Patil |Onno Paap, Hans Teijgeler
      |ISO 15926-0010 |Rahul Patil |Onno Paap, Hans Teijgeler
      |===
    dates:
    - start: '2010-06-15'
      kind: effective
- identifier: '802'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Re-appoint SC 4 Officers for an additional three-year term
  dates:
  - start: '2010-06-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC 4 expresses its special recognition and thanks for the exceptional dedication and service for the past three years of these Officers.
    dates:
    - start: '2010-06-15'
      kind: effective
  - type: appoints
    message: |
      SC 4 re-appoints these Officers to serve for an additional three year term:

      * Policy and Planning Committee (PPC) Chair: Torbjorn Holm
      * Quality Committee Chair: Peter Benson
      * Quality Committee Deputy Chair: Dr. Junfeng Zhan
      * WG 03 Convener: Dr. Gerald Radack
      * WG 02 Convener: Nikolaus Ondracek
      * WG 12 Deputy Convener: Jochen Haenisch
    dates:
    - start: '2010-06-15'
      kind: effective
- identifier: '803'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appoint liaison from and to IAIDQ
  dates:
  - start: '2010-06-15'
    kind: decision
  actions:
  - type: welcomes
    message: |
      SC 4 welcomes Christian Walenta as liaison from the International Association for Information and Data Quality (IAIDQ) for SC 4.
    dates:
    - start: '2010-06-15'
      kind: effective
  - type: nominates
    message: |
      SC 4 nominates Peter Benson as its liaison to IAIDQ.
    dates:
    - start: '2010-06-15'
      kind: effective
- identifier: '804'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Withdraw ISO 8000-102 upon publication of ISO 8000-2
  dates:
  - start: '2010-06-15'
    kind: decision
  actions:
  - type: directs
    message: |
      SC 4 directs the Secretariat to withdraw ISO 8000-102 “Master data: Exchange of Characteristic Data: Vocabulary”, upon publication of ISO 8000-2 “Data Quality - Vocabulary”.
    dates:
    - start: '2010-06-15'
      kind: effective
- identifier: '805'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Advance ISO 8000-1 to IS ballot and develop taxonomy of industrial data
  dates:
  - start: '2010-06-15'
    kind: decision
  actions:
  - type: instructs
    message: |
      SC 4 instructs its Secretariat to submit the revised version of ISO 8000-1 “Data Quality - Overview, principles and general requirements”, excluding the taxonomy, to ISO/CS for TS publication by 2010-09-15.
    dates:
    - start: '2010-06-15'
      kind: effective
  - type: approves
    message: |
      SC 4 approves the submission of ISO/TS 8000-1 for ballot as an International Standard.
    dates:
    - start: '2010-06-15'
      kind: effective
  - type: directs
    message: |
      SC 4 directs the project team to provide the Secretariat with a draft for DIS balloting as soon as possible, and directs the Secretariat to submit this part to ISO/CS for DIS ballot.
    dates:
    - start: '2010-06-15'
      kind: effective
  - type: directs
    message: |
      SC 4 directs WG 13 to develop a taxonomy of industrial data to include contents that correspond to the scope of SC 4 and resolves that this taxonomy forms the contents of ISO 8000-3, with the title "Data quality -- Taxonomy of industrial data" and to include a reference to the new Part 3 in the published TS for Part 1.
    dates:
    - start: '2010-06-15'
      kind: effective
  - type: requests
    message: |
      SC 4 requests its Secretariat to inform all other Sub-Committees of TC 184 that WG 13 is developing taxonomy of industrial data, inviting those Sub-Committees to nominate experts who are willing to contribute to the development and review of the taxonomy.
    dates:
    - start: '2010-06-15'
      kind: effective
- identifier: '806'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Manage ISO 8000 vocabulary as a database
  dates:
  - start: '2010-06-15'
    kind: decision
  actions:
  - type: resolves
    message: |
      SC 4 resolves to manage the ISO 8000 vocabulary using the ISO Annex ST procedures for the management of standards as databases, as customized in the SC 4 standing document “Procedure for the maintenance of ISO/TC 184/SC 4 vocabulary”, once ISO 8000-2 is approved for publication.
    dates:
    - start: '2010-06-15'
      kind: effective
  - type: requests
    message: |
      SC 4 requests the ISO 8000-2 “Data quality -- Vocabulary” project to nominate a member to the maintenance team.
    dates:
    - start: '2010-06-15'
      kind: effective
  - type: requests
    message: |
      SC 4 requests its Secretariat to invite P-members, Category A liaisons, internal liaisons, and the WG 13 convener to nominate additional experts, as needed under the agreed procedure.
    dates:
    - start: '2010-06-15'
      kind: effective
  - type: requests
    message: |
      SC 4 requests its Secretariat to invite all P-members, Category A liaisons and internal liaisons to appoint one member each to the validation team.
    dates:
    - start: '2010-06-15'
      kind: effective
  - type: requests
    message: |
      SC 4 requests its Secretariat to establish a Configuration Management Repository for the ISO 8000 vocabulary.
    dates:
    - start: '2010-06-15'
      kind: effective
- identifier: '807'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appoint delegates to TC 184 ad hoc group on mechatronics
  dates:
  - start: '2010-06-15'
    kind: decision
  actions:
  - type: appoints
    message: |
      SC 4 appoints Jean Brangé, Mike Zink, Tom Thurman, Peter Benson, and Gerry Radack as delegates to the TC 184 ad hoc group on mechatronics to ensure that effective use is made of existing SC 4 standards, and to assist in the identification of any specific new requirements.
    dates:
    - start: '2010-06-15'
      kind: effective
  - type: instructs
    message: |
      SC 4 instructs its Secretariat to seek additional nominees from other P-members.
    dates:
    - start: '2010-06-15'
      kind: effective
- identifier: '808'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Nominate WG 8 convener to Energy Efficiency Task Force
  dates:
  - start: '2010-06-15'
    kind: decision
  actions:
  - type: requests
    message: |
      ISO/TC 184/SC 4 requests its Secretariat to nominate the convener of its JWG 8, Anne-Francoise Cutting-Decelle as the point of contact for the proposed ISO Strategic Advisory Group on Energy (SAG-E) Workshop and also to SC 5 /WG 10.
    dates:
    - start: '2010-06-15'
      kind: effective
- identifier: '809'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Circulate call for participation in Oil and Gas Asset Management PWI
  dates:
  - start: '2010-06-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC 4 requests its Secretariat to circulate an immediate call to member bodies for participation in the PWI.
    dates:
    - start: '2010-06-15'
      kind: effective
  considerations:
  - type: noting
    message: |
      Noting the launch of the TC 184 PWI on “Oil and gas asset management and operations and maintenance operations”.
    dates:
    - start: '2010-06-15'
      kind: effective
- identifier: '810'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Add modular APs to STEP Module and Resource Library (SMRL)
  dates:
  - start: '2010-06-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC 4 approves the management of all ISO 10303 modular APs under the Annex ST procedure as part of the STEP Module and Resource Library. Snapshot builds of the APs shall be held in a separate directory. In order to ensure consistency, SC 4 approves the transfer of 400-series AP modules from the main Library directory to the appropriate snapshot directories.
    dates:
    - start: '2010-06-15'
      kind: effective
  - type: instructs
    message: |
      SC 4 instructs the SC 4 secretariat to update the SC 4 standing document “Procedures for the Maintenance of the STEP Module and Resource Library”.
    dates:
    - start: '2010-06-15'
      kind: effective
- identifier: 201006-acclaim-01
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank Open Technical Forum presenters
  dates:
  - start: '2010-06-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC 4 offers thanks to those external projects who presented their material at the Open Technical Forum:

      * "NWI for PDQ-S extension and quality guarantee process by the use of PDQ-S" -- Akihiko Ohtaka
      * "A Validation Technology for 3D CAD Data" -- Atsuto Soma
      * "Master Data Ontology Manager" - Peter Benson
      * "Data quality in UK Defence" -- Tim King
    dates:
    - start: '2010-06-15'
      kind: effective
- identifier: 201006-acclaim-02
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appreciate SC 4 Liaisons and presenters
  dates:
  - start: '2010-06-15'
    kind: decision
  actions:
  - type: appreciation
    message: |
      SC 4 expresses its appreciation to our SC 4 Liaisons and those projects who presented at the Liaison Plenary:

      * "Liaison Issues" -- Howard Mason
      * "ECCMA Update" -- Peter Benson
      * "CEN ELSSI-EMD" Workshop -- David Leal
      * "buildingSMART" - Thomas Liebich
      * "VAMAS" - Anna Moreno

      We appreciate your representation to and for ISO TC 184/SC 4.
    dates:
    - start: '2010-06-15'
      kind: effective
- identifier: 201006-acclaim-03
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Recognize and thank Ron Kolakowski for Secretariat support
  dates:
  - start: '2010-06-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC 4 recognizes and thanks Ron Kolakowski for his years of hard work and the excellence of his support to the community while serving as an administrator in the SC 4 Secretariat. We wish him well in his new career opportunities.
    dates:
    - start: '2010-06-15'
      kind: effective
- identifier: 201006-acclaim-04
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank ECCMA for hosting the 59th Plenary
  dates:
  - start: '2010-06-15'
    kind: decision
  actions:
  - type: appreciation
    message: |
      SC 4 expresses its appreciation to Mr. Peter Benson ECCMA, and his team for their hosting and support of the 59th ISO TC 184/SC 4 Plenary meetings at the Hotel Bethlehem in Bethlehem, Pennsylvania. We especially commend Mr. Peter Benson, Executive Director, and Ms. Melissa Scheib, Events Manager, of ECCMA for an excellent venue and outstanding service to the SC 4 community. A special acknowledgement is extended to Ms. Melissa Scheib, and to Ms. Krysten Wolf, outstanding hostesses for the week.

      Special acknowledgement is extended to the Hotel Bethlehem and its staff for their seamless and attentive support, excellent cooperation, service and food presentation, all of which was instrumental in ensuring the effectiveness of the meeting.
    dates:
    - start: '2010-06-15'
      kind: effective
