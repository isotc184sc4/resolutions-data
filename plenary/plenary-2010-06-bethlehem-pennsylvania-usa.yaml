    script: Latn
    title: Thank ECCMA for hosting the 59th Plenary
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: appreciation
      date_effective:
        date: '2010-06-15'
        type: effective
      message: |
        SC 4 expresses its appreciation to Mr. Peter Benson ECCMA, and his team for their hosting and support of the 59th ISO TC 184/SC 4 Plenary meetings at the Hotel Bethlehem in Bethlehem, Pennsylvania. We especially commend Mr. Peter Benson, Executive Director, and Ms. Melissa Scheib, Events Manager, of ECCMA for an excellent venue and outstanding service to the SC 4 community. A special acknowledgement is extended to Ms. Melissa Scheib, and to Ms. Krysten Wolf, outstanding hostesses for the week.

        Special acknowledgement is extended to the Hotel Bethlehem and its staff for their seamless and attentive support, excellent cooperation, service and food presentation, all of which was instrumental in ensuring the effectiveness of the meeting.
