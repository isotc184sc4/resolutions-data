- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '737'
  urn: urn:iso:tc184:sc4:resolution:737
  kind: resolution
  status: decided
  dates:
  - date: '2008-03-15'
    type: adoption
  title:
  - spelling: eng
    value: Establish schedule and ballot process for AP 203 ed2
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: agrees
    date_effective:
      date: '2008-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC4 agrees to the following dates for AP 203:

        * 2008-03-21: target date for start of CD-TS ballot of AP 203 modules
        * 2008-03-31: target date for submission of AP 203 ed 2 to ISO for DIS ballot
        * 2008-05-23: requested date for national bodies to submit copies of their ballot comments on the AP 203 modules to the AP 203 project leader
        * 2008-06-06: closing date for CD-TS ballot of AP 203 modules
        * 2008-06-08 to 13: AP 203 module ballot comment resolution at SC4 Sun City meeting
        * 2009-02-28: target date for stage 50 of AP 203 ed2
  - type: agrees
    date_effective:
      date: '2008-03-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC4 agrees that minor EXPRESS errors in AP 203 modules can be addressed
        through ballot comments.

        '
  - type: requests
    date_effective:
      date: '2008-03-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC4 requests that technical comments on the AP 203 modules should be
        submitted through the AP 203 module CD-TS ballot and not through the AP 203
        DIS ballot.

        '
  - type: requests
    date_effective:
      date: '2008-03-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC4 requests its secretariat to update the ISO database with these target
        dates in accordance with TMB Resolution 56/2007.

        '
  considerations:
  - type: noting
    date_effective:
      date: '2008-03-15'
      type: effective
    message:
    - spelling: eng
      value: 'Noting that ISO/NP 10303-203 has passed the limit date for its DIS ballot

        '
