- identifier: '736'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Reappointment of WG 11 Convener
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Reappointment of WG 11 Convener
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: appreciates
    message: 'SC 4 appreciates and accepts the offer of David Loffredo to serve as Convener of WG

      11'
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: approves
