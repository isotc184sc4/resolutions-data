  - type: thanks
    message: 'Thank you to our SC 4 short report presenters at the opening plenary. We appreciate


      your representation to and for ISO/TC 184/SC 4.

      OMG

      David Price

      PDES, Inc

      Jack Harris

      We also offer thanks to those external projects who presented their material at the

      Open Technical Forum.

      “Results of the S-TEN project to map STEP data models onto RDF/OWL”  Lothar

      Klein “Beyond data models”

      David Leal

      “Binary, OMG EXPRESS, Ruby, OWL/RDF, DEXLib templets”

      David

      Price “Toward Data Quality Guarantee Data Exchange and Share” Akihiko Ohtaka

