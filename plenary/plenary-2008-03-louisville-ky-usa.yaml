- identifier: '737'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Schedule for AP 203
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Schedule for AP 203
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: notes
    message: SC 4 notes that ISO/NP 10303-203 has passed the limit date for its DIS ballot
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: agrees
    message: 'SC 4

      agrees to the following dates:

      2008-03-21: target date for start of CD-TS ballot of AP 203 modules

      2008-03-31: target date for submission of AP 203 ed 2 to ISO for DIS ballot

      2008-05-23: requested date for national bodies to submit copies of their

      ballot

      comments on the AP 203 modules to the AP 203 project

      leader 2008-06-06: closing date for CD-TS ballot of AP 203

      modules

      2008-06-08 to 13: AP 203 module ballot comment resolution at SC 4 Sun City

      meeting

      2009-02-28: target date for stage 50 of AP 203 ed2'
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: agrees
    message: 'SC 4 agrees that minor EXPRESS errors in AP 203 modules can be addressed

      through ballot comments'
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests that technical comments on the AP 203 modules should be submitted

      through the AP 203 module CD-TS ballot and not through the AP 203 DIS ballot'
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its secretariat to update the ISO database with these target dates in

      accordance with TMB Resolution 56/2007.'
    dates:
    - start: '2008-03-15'
      kind: effective
- identifier: '738'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Liaison to MIMOSA
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Liaison to MIMOSA
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: decides
    message: SC 4 decides to create a Category A liaison to the MIMOSA organization
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: requests
    message: 'SC 4

      requests its secretariat to initiate the necessary actions. Subject to confirmation of

      the liaison by ISO, SC 4 welcomes the offer of Nils Sandsmark to act as the liaison

      officer from SC 4 to MIMOSA'
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: appoints
    message: 'SC 4 appoints Nils Sandsmark as liaison officer.

      The secretariat is requested to invite MIMOSA to nominate a liaison officer from

      MIMOSA to SC 4'
    dates:
    - start: '2008-03-15'
      kind: effective
