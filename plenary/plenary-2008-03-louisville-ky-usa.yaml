- identifier: '740'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Cre a tio n of a T a sk Fo rce t o d e scrib e requ ire m e nts f o r “Cro ss...
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Cre a tio n of a T a sk Fo rce t o d e scrib e requ ire m e nts f o r “Cro ss -AP-Im p lem en ta tio n s”
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: decides
    message: 'SC 4 decides to establish an ad hoc Task Force to investigate how several modular

      and non-modular APs can be used in a single implementation. Members of the Task

      Force will be: Lothar Klein (Chair), Gerry Radack (WG 3), Keith Hunten (WG 12), Burt

      Gischner (PPC), and AP developers. Gerry Radack is requested to ask for members

      by a circular letter within WG 3.

      A report shall be made available by 2008-09-15. A verbal report is expected during

      the meeting in November 2008.'
    dates:
    - start: '2008-03-15'
      kind: effective
- identifier: '741'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Advancement of ISO 22745 Initial Set of Parts
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Advancement of ISO 22745 Initial Set of Parts
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves the submission of ISO/TS 22745 parts 1, 2, 11, 13 and 20 for ballot

      as International Standards'
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs the project team to provide the Secretariat


      with drafts for DIS balloting as soon as possible, and directs the Secretariat to

      submit these parts to ISO for DIS ballot.'
    dates:
    - start: '2008-03-15'
      kind: effective
