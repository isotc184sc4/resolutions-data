- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '740'
  urn: urn:iso:tc184:sc4:resolution:740
  kind: resolution
  status: decided
  dates:
  - date: '2008-03-15'
    type: adoption
  title:
  - spelling: eng
    value: Create Task Force for Cross-AP-Implementations requirements
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: creates
    date_effective:
      date: '2008-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC4 decides to establish an ad hoc Task Force to investigate how several modular and non-modular APs can be used in a single implementation. Members of the Task Force will be: Lothar Klein (Chair), Gerry Radack (WG 3), Keith Hunten (WG 12), Burt Gischner (PPC), and AP developers. Gerry Radack is requested to ask for members by a circular letter within WG 3.

        A report shall be made available by 2008-09-15. A verbal report is expected during the meeting in November 2008.
