metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Louisville, KY, USA, March 2008
  dates:
  - start: '2008-03-15'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Louisville, KY, USA
resolutions:
- identifier: '736'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Reappoint David Loffredo as WG 11 Convener
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: appoints
    message: |
      SC4 appreciates and accepts the offer of David Loffredo to serve as Convener of WG 11 and approves the nomination of David Loffredo to serve for an additional three year term.
    dates:
    - start: '2008-03-15'
      kind: effective
- identifier: '737'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Establish schedule and ballot process for AP 203 ed2
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: agrees
    message: |
      SC4 agrees to the following dates for AP 203:
      * 2008-03-21: target date for start of CD-TS ballot of AP 203 modules
      * 2008-03-31: target date for submission of AP 203 ed 2 to ISO for DIS ballot
      * 2008-05-23: requested date for national bodies to submit copies of their ballot comments on the AP 203 modules to the AP 203 project leader
      * 2008-06-06: closing date for CD-TS ballot of AP 203 modules
      * 2008-06-08 to 13: AP 203 module ballot comment resolution at SC4 Sun City meeting
      * 2009-02-28: target date for stage 50 of AP 203 ed2
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: agrees
    message: |
      SC4 agrees that minor EXPRESS errors in AP 203 modules can be addressed through ballot comments.
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: requests
    message: |
      SC4 requests that technical comments on the AP 203 modules should be submitted through the AP 203 module CD-TS ballot and not through the AP 203 DIS ballot.
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: requests
    message: |
      SC4 requests its secretariat to update the ISO database with these target dates in accordance with TMB Resolution 56/2007.
    dates:
    - start: '2008-03-15'
      kind: effective
  considerations:
  - type: noting
    message: |
      Noting that ISO/NP 10303-203 has passed the limit date for its DIS ballot
    dates:
    - start: '2008-03-15'
      kind: effective
- identifier: '738'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Establish Category A liaison with MIMOSA and appoint Nils Sandsmark
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: resolves
    message: |
      SC4 decides to create a Category A liaison to the MIMOSA organization.
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: requests
    message: |
      SC4 requests its secretariat to initiate the necessary actions.
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: appoints
    message: |
      Subject to confirmation of the liaison by ISO, SC4 welcomes the offer of Nils Sandsmark to act as the liaison officer from SC4 to MIMOSA and appoints Nils Sandsmark as liaison officer.
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: requests
    message: |
      The secretariat is requested to invite MIMOSA to nominate a liaison officer from MIMOSA to SC4.
    dates:
    - start: '2008-03-15'
      kind: effective
- identifier: '739'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appoint Howard Mason as liaison officer to OASIS
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: appoints
    message: |
      SC4 welcomes the offer of Howard Mason to act as liaison officer to OASIS and appoints Howard Mason as liaison officer to OASIS.
    dates:
    - start: '2008-03-15'
      kind: effective
- identifier: '740'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Create Task Force for Cross-AP-Implementations requirements
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: creates
    message: |
      SC4 decides to establish an ad hoc Task Force to investigate how several modular and non-modular APs can be used in a single implementation. Members of the Task Force will be: Lothar Klein (Chair), Gerry Radack (WG 3), Keith Hunten (WG 12), Burt Gischner (PPC), and AP developers. Gerry Radack is requested to ask for members by a circular letter within WG 3.

      A report shall be made available by 2008-09-15. A verbal report is expected during the meeting in November 2008.
    dates:
    - start: '2008-03-15'
      kind: effective
- identifier: '741'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Submit ISO 22745 initial set of parts for DIS ballot
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC4 approves the submission of ISO/TS 22745 parts 1, 2, 11, 13 and 20 for ballot as International Standards.
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: directs
    message: |
      SC4 directs the project team to provide the Secretariat with drafts for DIS balloting as soon as possible, and directs the Secretariat to submit these parts to ISO for DIS ballot.
    dates:
    - start: '2008-03-15'
      kind: effective
- identifier: '742'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Ballot SC 4 N2265 URI standing document
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC4 requests its Secretariat to submit SC4 N2265 "URI defined by an SC4 standard" with changes agreed at the Louisville meeting for ballot as a standing document.
    dates:
    - start: '2008-03-15'
      kind: effective
- identifier: '743'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Extend ISO/TC 118 liaison to SC 1 and welcome Gerd Koziel
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: welcomes
    message: |
      Further to Resolution 725, SC4 welcomes Gerd Koziel as liaison officer from ISO/TC 118 to ISO/TC 184/SC 4, and extends the liaison to include ISO/TC 118/SC 1.
    dates:
    - start: '2008-03-15'
      kind: effective
- identifier: '744'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appoint Dr. King Yee as liaison officer to ISO/TC 171 and SC 2
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: appoints
    message: |
      SC4 appoints Dr King Yee as the liaison officer to ISO/TC 171 and SC 2.
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: thanks
    message: |
      SC4 thanks Dr King Yee for his offer to act as the liaison officer to ISO/TC 171 "Document management applications" and its SC 2 "Application issues".
    dates:
    - start: '2008-03-15'
      kind: effective
- identifier: '745'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appoint Bengt Olsson as liaison officer to ISO/TC 29/WG 34
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: appoints
    message: |
      SC4 welcomes the offer of Bengt Olsson to act as liaison officer to ISO/TC 29/WG 34 and appoints Bengt Olsson as liaison officer to ISO/TC 29/WG 34.
    dates:
    - start: '2008-03-15'
      kind: effective
  - type: thanks
    message: |
      SC4 records its sincere thanks to Norman Swindells for his efforts and achievements in acting as liaison officer.
    dates:
    - start: '2008-03-15'
      kind: effective
- identifier: 200803-acclaim-01
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank SC 4 short report and Open Technical Forum presenters
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC4 expresses its thanks to our SC4 short report presenters at the opening plenary for their representation to and for ISO/TC 184/SC 4:

      * OMG (David Price)
      * PDES, Inc. (Jack Harris)

      SC4 also offers thanks to those external projects who presented their material at the Open Technical Forum:

      * "Results of the S-TEN project to map STEP data models onto RDF/OWL" (Lothar Klein)
      * "Beyond data models" (David Leal)
      * "Binary, OMG EXPRESS, Ruby, OWL/RDF, DEXLib templets" (David Price)
      * "Toward Data Quality Guarantee Data Exchange and Share" (Akihiko Ohtaka)
      * "History-based parametrics interface between CAD & CAE" (Ilhwan Song)
    dates:
    - start: '2008-03-15'
      kind: decision
- identifier: 200803-acclaim-02
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank SC 4 Liaisons and Liaison Plenary presenters
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC4 expresses its appreciation to our SC4 Liaisons and those projects who presented at the Liaison Plenary:

      * NATO AC/135 -- "Building Bridges" (Steve Arnett)
      * "ISO 8000-110 Certification Program" (Peter Benson)
      * "Implementation of ISO 15926" (Nils Sandsmark)
      * "OMG Activities" (David Price)
    dates:
    - start: '2008-03-15'
      kind: decision
- identifier: 200803-acclaim-03
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank ECCMA and Marriott Downtown for hosting the meeting
  dates:
  - start: '2008-03-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC4 expresses its appreciation to ECCMA -- The Electronic Commerce Code Management Association for its hosting of the 54th ISO/TC 184/SC 4 Plenary Meeting at the Marriott Downtown, Louisville, Kentucky. Mr. Peter Benson, Executive Director, Mr. Dan King, Chief Operating Officer; and Ms Melissa Scheib, Marketing and Events Manager for an excellent venue and outstanding service to the SC4 community.

      Special acknowledgement is extended to the Marriott Downtown, Louisville and its staff for their seamless support.
    dates:
    - start: '2008-03-15'
      kind: decision
