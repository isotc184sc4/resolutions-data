      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to the following individuals for organizing the 77th

      ISO/TC 184/SC 4 Plenary in Toulouse, France during 2010-05-13/17:

      * Alain Costes, Isabelle Rimbert, Stéphane Moulière, Caroline de Condé, Martine

      Degardin, Melissa Jean, and Roxana Turcanu -- AFNOR Normalisation

      * Christophe Mouton -- Chair of French Mirror Committee to ISO/TC 184, SC 4 and

      SC 5

      Special acknowledgement is extended to Hotel Mercure Toulouse Centre Compans and

      its staff for their seamless and attentive support throughout the week.


      ACCLAMATION'
    dates:
    - start: '2019-05-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses its sincere thanks to the following organizations for their support and

      sponsorship of the meeting and weekly events:

      * EDF

      * Dassault Systèmes

      * Région Occitanie / Pyrénées-Méditerranée

      ACCLAMATION'
    dates:
    - start: '2019-05-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses its thanks to Airbus for the excellent Airbus A380 assembly line tour

      and dinner afterwards.

      ACCLAMATION'
    dates:
    - start: '2019-05-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its sincere appreciation to Howard Mason for 35 years of dedicated

      service and consummate leadership of ISO/TC 184/SC 4. During this time, Howard

      spent 17 years as Chairman of SC 4, leading numerous accomplishments and

      innovations in industrial data standardization. This included the 2007 ISO Lawrence D.

      Eicher Award recognizing unmatched excellence in standards development'
    dates:
    - start: '2019-05-15'
      kind: effective
  - type: resolves
    message: 'SC 4

      wishes all the best to Howard in his next journey and future endeavours.'
    dates:
    - start: '2019-05-15'
      kind: effective
