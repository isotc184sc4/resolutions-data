      ACKNOWLEDGEMENTS and APPRECIATIONS

      ACCLAMATION'
    dates:
    - start: '2019-05-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to our SC 4 Liaisons and the presentations that were

      provided:

      * JTC 1/SC 24 and Web3D Consortium, Christophe Mouton

      * TC 37/SC 3, Written Report

      * TC 59/SC 13, Written Report

      * TC 59/SC 13/JWG 12, Written Report

      * TC 171/SC 2, Written Report

      * TC 172/SC 1, Written Report


      ACCLAMATION'
    dates:
    - start: '2019-05-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to the following individuals and organizations for their

      participation in the Open Technical Forum:

       

      * Brief of JETI (JTC 1 Emerging Technology and Innovation) TTR (technology

      trend report) on Digital Twin - Sangkeun YOO (KATS/ETRI)

      * Towards Construction of Innovative Digital Validation Environment - Masatomo

      INUI, Prof. Ibaraki Univ

      * Digital Twin for Smart Facility: Variables for Integrated Asset Management -

      Youngsoo Jung

      * Digital Thread / Digital Twin concepts in France - Jean Brange

      * Digital Twin for Manufacturing framework - Martin Hardwick

      * Visualization elements of digital twins -- Soonhung Han

      * Digital Transformation at AIA -- Howard Mason

      ACCLAMATION'
