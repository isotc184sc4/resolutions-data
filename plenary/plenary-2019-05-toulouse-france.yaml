- identifier: '1012'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Convert ISO/PAS 17506 (COLLADA) to IS
  dates:
  - start: '2019-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Convert ISO/PAS 17506 (COLLADA) to IS
    dates:
    - start: '2019-05-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves to convert the ISO/PAS 17506 to an IS with no

      change in scope with target dates: DIS 2020-06-01, IS 2021-06-01'
    dates:
    - start: '2019-05-15'
      kind: effective
  - type: assigns
    message: 'SC 4 assigns the

      work to JWG 16 and requests ISO CS to preserve the project and prevent cancellation

      while JWG 16 confirms the project leader and the Committee Manager reports the

      leader to ISO CS. The organization originally responsible for the format is invited to

      collaborate with the development project to formulate the development strategy

      including how to cope with new versions of the standard.'
    dates:
    - start: '2019-05-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting the document as a fundamental technology of AutomationML (IEC 62714 in

      IEC/TC 65/SC 65E)'
    dates:
    - start: '2019-05-15'
      kind: effective
