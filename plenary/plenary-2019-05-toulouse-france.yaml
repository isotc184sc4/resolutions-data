- identifier:
  - prefix: ISO/TC 184/SC 4
    number: 201905-acclaim-08
  kind: resolution
  status: decided
  dates:
  - date: '2019-05-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Thank Howard Mason for 35 years of service
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: thanks
      date_effective:
        date: '2019-05-15'
        type: effective
      message: |
        SC 4 expresses its sincere appreciation to Howard Mason for 35 years of dedicated service and consummate leadership of ISO/TC 184/SC 4. During this time, Howard spent 17 years as Chairman of SC 4, leading numerous accomplishments and innovations in industrial data standardization. This included the 2007 ISO Lawrence D. Eicher Award recognizing unmatched excellence in standards development.

        SC 4 wishes all the best to Howard in his next journey and future endeavours.
