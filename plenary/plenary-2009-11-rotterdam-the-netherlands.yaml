- identifier: '791'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: 'SC4 Organization Handbook Update: Clause 6.4, Education and Outreach Rapporteur'
  dates:
  - start: '2009-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'SC4 Organization Handbook Update: Clause 6.4, Education and Outreach Rapporteur

      Change SC4 Organization Handbook Clause 6.4 to read:

      6.4 SC4 Implementation Forum advisory group

      6.4.1 Tasks'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: 'The SC 4 Implementation Forum advisory group performs the following tasks

      and activities:

      

      Gathering feed back from implementers;

      

      Gathering success stories;

      

      Promoting business benefits;

      

      Promoting awareness of capabilities;

      

      Facilitating implementations;

      o Testing models and Testing procedures;

      

      Seeking resources for sustainment;

      

      Providing education and outreach.


      It incorporates the activities of the former Committee for Education and

      Outreach, which has been disbanded.

      6.4.2 embership

      The P-members, O-Members and A-liaisons of SC 4 nominate the members of the SC 4 Implementation Forum advisory group'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: 'The SC 4 secretariat

      maintains a list of members of the SC 4 Implementation Forum (names and

      addresses, organization affiliation, fax, phone and e-mail).'
    dates:
    - start: '2009-11-15'
      kind: effective
- identifier: '792'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: 'Handbook Update: New SEDS Process'
  dates:
  - start: '2009-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'SC 4 Organization Handbook Update: New SEDS Process. Multiple Clauses'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to update the SC 4 Organization Handbook (SC4 N2411)

      to reflect the changes specified in document SC4 N2520, Changes to SC 4 Handbook

      for New SEDS Process (2009-11-12) (attached).

      Attached documents: SC4 N 2520 “Changes to SC 4 Handbook for New SEDS

      Process” by Dr. Gerry Radack.'
    dates:
    - start: '2009-11-15'
      kind: effective
- identifier: '793'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO 8000-2
  dates:
  - start: '2009-11-15'
    kind: decision
  actions:
  - type: resolves
    message: ISO 8000-2
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: decides
    message: 'SC 4 decides to create ISO 8000-2 as a vocabulary part for the entire ISO 8000

      series, through the merger of vocabulary from parts 1 “Overview” and 102 “Master

      data: Exchange of characteristic data: Vocabulary”'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests WG 13 to provide the Secretariat with a draft for FDIS balloting, and

      directs the Secretariat to submit this part to ISO/CS for FDIS ballot as soon as the

      document is available'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: decides
    message: 'SC 4 decides that the normative version of all vocabulary used by the ISO 8000 series

      shall be in part 2, and replicated where the terms are used in individual parts.'
    dates:
    - start: '2009-11-15'
      kind: effective
- identifier: '794'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Advancement of ISO 8000 Parts
