  actions:
  - type: resolves
    message: Advancement of ISO 8000 Parts
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves the submission of ISO/TS 8000 parts 100 “Overview”, 120


      “Provenance”, 130 “Accuracy”, and 140 “Completeness” for ballot as

      International Standards'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs the project teams to provide the Secretariat with drafts for DIS balloting

      as soon as possible, and directs the Secretariat to submit these parts to ISO/CS for

      DIS ballot.'
    dates:
    - start: '2009-11-15'
      kind: effective
- identifier: '795'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO 29002 Vocabulary Part
  dates:
  - start: '2009-11-15'
    kind: decision
  actions:
  - type: resolves
    message: ISO 29002 Vocabulary Part
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: decides
    message: 'SC 4 decides to create 29002-2 as a vocabulary part for the entire 29002 series

      through merger of vocabulary from the TS versions of ISO 29002 parts 4, 5, 6, 10, 20,

      and 31'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs the project team to provide the Secretariat with a draft for DIS balloting as

      soon as possible, and directs the Secretariat to submit this part to ISO/CS for DIS

      ballot'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: decides
    message: 'SC 4 decides that the normative version of all vocabulary used by the ISO 29002

      series shall be in part 2, and replicated where the terms are used in individual parts.'
    dates:
    - start: '2009-11-15'
      kind: effective
- identifier: '796'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Extension of target date of ISO10303-26
  dates:
  - start: '2009-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Extension of target date of ISO10303-26
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to inform ISO/CS that the target date for the submission

      of ISO TS 10303-26 “Implementation methods: Binary representation of EXPRESS-

      driven data” for publication is extended to 2010-06-30, and that this part should not

      be automatically cancelled as a recovery plan is in place'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: SC 4 will review progress on this part during its next meeting in May 2010.
    dates:
    - start: '2009-11-15'
      kind: effective
- identifier: '797'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: IS O/ NP 2 0 14 0 “En viro n m en ta l a nd en e rgy e ff icie n cy e va lua ...
  dates:
  - start: '2009-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'IS O/ NP 2 0 14 0 “En viro n m en ta l a nd en e rgy e ff icie n cy e va lua tio n meth o d fo r

      m a nuf a ctu rin g syste ms” with in ISO/TC 184/SC 5'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes the ISO/NP 20140 “Environmental and energy efficiency evaluation

      method for manufacturing systems” within ISO/TC 184/SC 5. Based on its work items,

      ISO/TC 184/SC 4-SC 5/JWG 8 is interested to participate in that project.

      Therefore SC 4 decides to offer its participation to SC 5 via JWG 8 after the NP is

      accepted.'
