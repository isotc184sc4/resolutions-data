- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '800'
  kind: resolution
  status: decided
  dates:
  - date: '2009-11-15'
    type: adoption
  title:
  - spelling: eng
    value: Manage ISO 15926 Reference Data Library as a database
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '2009-11-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 resolves to manage the ISO 15926 Reference Data Library (RDL) using
        the ISO Annex ST procedures for the management of standards as databases,
        as customized in the SC 4 standing document “Procedure for the maintenance
        of ISO/TC 184/SC 4 reference data”.

        '
  - type: requests
    date_effective:
      date: '2009-11-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 requests the WG 3/T 25 ISO 15926 part 3 and 4 projects to nominate
        one member each to the maintenance team.

        '
  - type: requests
    date_effective:
      date: '2009-11-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 requests its Secretariat to invite P-members, Category A liaisons,
        internal liaisons, and the WG 3 convener to nominate additional experts, as
        needed under the agreed procedure.

        '
  - type: requests
    date_effective:
      date: '2009-11-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 requests its Secretariat to invite all P-members, Category A liaisons
        and internal liaisons to appoint one member each to the validation team.

        '
  - type: requests
    date_effective:
      date: '2009-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests its Secretariat to:

        * Forward to ISO for publication an initial version of the RDL consisting of all ISO 15926 reference data that have already been published formally or have been successfully balloted as ready for publication (ISO/TS 15926-3, -4 and am1).
        * Request that ISO publish the RDL on standards.iso.org under the same access conditions as the existing electronic inserts on the SC 4 site.
        * Ask ISO to add references in the ISO Catalogue entries for ISO 15926 parts 3 and 4 referring to the RDL.
  - type: approves
    date_effective:
      date: '2009-11-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 approves a minor revision to create new editions of ISO 15926 parts
        3 and 4 that point to the reference data online, rather than including the
        reference data as electronic attachments.

        '
