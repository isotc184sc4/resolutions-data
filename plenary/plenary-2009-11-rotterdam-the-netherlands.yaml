  - start: '2009-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Re-Appointment of Deputy Convenor of Working Group 2
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves Guy Pierra to serve as Deputy Convenor of its Working Group 2 for

      an additional period of three years'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses its special recognition and thanks for his exceptional dedication and

      service for the past three years in the position of Deputy Convenor.'
    dates:
    - start: '2009-11-15'
      kind: effective
