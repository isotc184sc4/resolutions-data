- identifier: '798'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Extension of ISO 10303-1000 to cover integrated resources
  dates:
  - start: '2009-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Extension of ISO 10303-1000 to cover integrated resources
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves the inclusion of all ISO 10303 integrated resources, including

      application interpreted constructs, and of ISO 13584-20 “Logical model of

      expressions” into the STEP Modules Library'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: instructs
    message: 'SC 4 instructs the SC 4 secretariat to update the SC4 standing document “Procedures

      for the maintenance of ISO/TS 10303-1000” correspondingly and to add that changes

      to ISO 10303 integrated resources and ISO 13584-20 shall pass a WG 12 integration

      review before a STEP Module Library change request process is initiated.'
    dates:
    - start: '2009-11-15'
      kind: effective
- identifier: '799'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ACKNOWLEDGEMENTS and APPRECIATIONS
  dates:
  - start: '2009-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'ACKNOWLEDGEMENTS and APPRECIATIONS

      ACCLAMATION

      We offer thanks to those external projects who presented their material at the Open

      Technical Forum.

      “Data requirements from the Korean nuclear and shipbuilding industries” – Soonhung

      Han

      ACCLAMATION

      Appreciation to our SC 4 Liaisons and those projects who presented at the Liaison

      Plenary.

      “Mou/MG”

      Howard Mason

      “ISO TC 37”

      Gerry Radack and Christian Galinski

      “ISO/IEC JTC 1/SC 32”

      Gerry Radack

      “ISO TC 213”

      Vijay Srinivasan

      “CEN WS/ELSSI-EMD”

      David Leal

      “FIATECH activities on ISO 15926”

      Robin

      Benjamins “OMG Activities Report”

      David Price

      We appreciate your representation to and for ISO TC 184/SC 4.


      ACCLAMATION'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to the Implementation Forum organizers, Paul van

      Exel and Anna Moreno, for their efforts in organizing the excellent event, speakers

      and venue.

      ACCLAMATION'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to Paul van Exel, Stichting USPI-NL, and his team for

      their hosting and support of the 58th ISO TC 184/SC 4 Plenary meetings at the

      Erasmus University Conference Center in Rotterdam, Netherlands. We especially

      commend Mr Paul van Exel for an excellent venue and outstanding service to the SC

      4 community.  A special acknowledgement is extended to Ms. Suzanne Eijkemans,

      logistics coordination, Elsevier Congressen and to Antoinette Schipper, Elsevier

      Congressen,

      hostess for the week.

      Special acknowledgement is extended to the Erasmus University Conference Center

      and its staff for their seamless and attentive support.'
    dates:
    - start: '2009-11-15'
      kind: effective
- identifier: '800'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Managing the ISO 15926 Reference Data Library as a database
  dates:
  - start: '2009-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Managing the ISO 15926 Reference Data Library as a database
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves to manage the ISO 15926 Reference Data Library (RDL) using the ISO

      Annex ST procedures for the management of standards as databases, as customized

      in the SC 4 standing document “Procedure for the maintenance of ISO/TC 184/SC 4

      reference data”'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests the WG 3/T 25 ISO 15926 part 3 and 4 projects to nominate one

      member each to the maintenance team'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to invite P-

      members, Category A liaisons, internal liaisons, and the WG 3 convener to nominate

      additional experts, as needed under the agreed procedure'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to invite all P-members, Category A liaisons and internal

      liaisons to appoint one member each to the validation team'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to:

       Forward to ISO for publication an initial version of the RDL consisting of all

      ISO 15926 reference data that have already been published formally or have

      been successfully balloted as ready for publication (ISO/TS 15926-3, -4 and

      am1).


       Request that ISO publish the RDL on standards.iso.org under the same

      access conditions as the existing electronic inserts on the SC 4 site.

       Ask ISO to add references in the ISO Catalogue entries for ISO 15926 parts

      3 and 4 referring to the RDL'
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves a minor revision to create new editions of ISO 15926 parts 3 and 4 that

      point to the reference data online, rather than including the reference data as

      electronic attachments.'
    dates:
    - start: '2009-11-15'
      kind: effective
