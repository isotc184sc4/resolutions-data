    kind: decision
  actions:
  - type: appreciation
    message: |
      SC 4 expresses its appreciation to our SC 4 Liaisons and those projects who presented at the Liaison Plenary:

      * MoU/MG: Howard Mason
      * ISO/TC 37: Gerry Radack and Christian Galinski
      * ISO/IEC JTC 1/SC 32: Gerry Radack
      * ISO/TC 213: Vijay Srinivasan
      * CEN WS/ELSSI-EMD: David Leal
      * FIATECH activities on ISO 15926: Robin Benjamins
