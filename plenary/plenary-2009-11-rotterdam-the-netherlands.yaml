- identifier: 200911-acclaim-03
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank Implementation Forum organizers
  dates:
  - start: '2009-11-15'
    kind: decision
  actions:
  - type: appreciation
    message: |
      SC 4 expresses its appreciation to the Implementation Forum organizers, Paul van Exel and Anna Moreno, for their efforts in organizing the excellent event, speakers and venue.
    dates:
    - start: '2009-11-15'
      kind: effective
- identifier: 200911-acclaim-04
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank hosts and organizers of the 58th Plenary
  dates:
  - start: '2009-11-15'
    kind: decision
  actions:
  - type: appreciation
    message: |
      SC 4 expresses its appreciation to Paul van Exel, Stichting USPI-NL, and his team for their hosting and support of the 58th ISO TC 184/SC 4 Plenary meetings at the Erasmus University Conference Center in Rotterdam, Netherlands. We especially commend Mr Paul van Exel for an excellent venue and outstanding service to the SC 4 community. A special acknowledgement is extended to Ms. Suzanne Eijkemans, logistics coordination, Elsevier Congressen and to Antoinette Schipper, Elsevier Congressen, hostess for the week.

      Special acknowledgement is extended to the Erasmus University Conference Center and its staff for their seamless and attentive support.
    dates:
    - start: '2009-11-15'
      kind: effective
