    type: adoption
  title:
  - spelling: eng
    value: Create ISO 8000-2 as vocabulary part for ISO 8000 series
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: decides
    date_effective:
      date: '2009-11-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 decides to create ISO 8000-2 as a vocabulary part for the entire
        ISO 8000 series, through the merger of vocabulary from parts 1 “Overview”
        and 102 “Master data: Exchange of characteristic data: Vocabulary”.

        '
  - type: requests
    date_effective:
      date: '2009-11-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 requests WG 13 to provide the Secretariat with a draft for FDIS
        balloting, and directs the Secretariat to submit this part to ISO/CS for FDIS
        ballot as soon as the document is available.

        '
  - type: decides
    date_effective:
      date: '2009-11-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 decides that the normative version of all vocabulary used by the
        ISO 8000 series shall be in part 2, and replicated where the terms are used
        in individual parts.

        '
