metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Rotterdam, Netherlands, November 8, 2009 – November 13, 2009
  dates:
  - start: '2009-11-08'
    end: '2009-11-13'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Rotterdam, Netherlands
resolutions:
- identifier: '787'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Reappointment of SC 4 Chair
  dates:
  - start: '2009-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Reappointment of SC 4 Chair
    dates:
    - start: '2009-11-15'
      kind: effective
  - type: endorses
    message: 'SC4 endorses the nomination by the United States of Howard Mason for an additional

      three year term as the Chair of ISO TC 184 /SC 4 and instructs the Secretary to

      forward his nomination to ISO TC 184 within 30 days.'
    dates:
    - start: '2009-11-15'
      kind: effective
- identifier: '788'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Re-Appointment of Deputy Convenor of Working Group 2
