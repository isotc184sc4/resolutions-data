- identifier: '552'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: International promotion of Parts Library fasteners data dictionary
  dates:
  - start: '2002-11-15'
    kind: decision
  actions:
  - type: resolves
    message: International promotion of Parts Library fasteners data dictionary
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests national member bodies to promote the achievements to date by CNIS

      and the proposed project for development of “Mechanical systems and components for

      general use – Reference dictionary for fasteners” as part 511 of ISO 13584. In

      particular, SC 4 recommends national member bodies to establish links with the

      corresponding national technical committees involved with fastener technologies and

      standards to promote the work and seek to attract potential ballot reviewers for the

      expected ISO 13584-511'
    dates:
    - start: '2002-11-15'
      kind: effective
- identifier: '553'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Deletion of part 21, 33, and 45 of MANDATE
  dates:
  - start: '2002-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Deletion of part 21, 33, and 45 of MANDATE
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 cancels ISO 15531-21, ISO 15531-33 and ISO 15531-45, and removes ISO

      15531-21 from the MANDATE P1 project, ISO 15531-33 from the P2 project and ISO

      15531-45 from the P3 project. Nevertheless the potential provision to BSR of specific


      manufacturing BSU’s for data exchange is kept in the JWG 8 program of work and will

      become a new work item if needed after clarification of evolution of the BSR project.'
    dates:
    - start: '2002-11-15'
      kind: effective
- identifier: '554'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: on ISO/IEC 62264
  dates:
  - start: '2002-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'SC 4 position on ISO/IEC 62264

      ISO/TC 184/SC 4 notices some overlaps and inconsistencies between ISO/IEC 62264

      and some of its existing developed standards or work in progress. Although some

      normative references have been added in part 1 in the framework of ballot comment

      resolution, SC 4 is concerned that insufficient consideration of the SC 4 approach,

      work and constructs have been made in ISO/IEC 62264-2 which is currently under

      ballot through a fast-track procedure.

      This especially concerns the objects product, material, equipment, resource,

      personnel, product segment, personnel segment, capability segment in ISO/IEC

      62264-2 versus product, resource, capability, event, time as they are defined in

      STEP, MANDATE and other SC 4 standards. In addition, some of the objects as they

      are defined in ISO/IEC 62264-2 are not independent one from the other and contains

      their relationship to the other. Time is not managed independently and appears in

      each object. That is also incompatible with the SC 4 approach.

      Since ISO/TC 184 standards and ISO/IEC 62264 address strongly related and

      overlapping area of work, this situation may lead to conflict, difficulties and to the

      unnecessary duplication of work'
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: asks
    message: 'SC 4 asks its member bodies to take appropriate

      actions to ensure that these comments will be taken into account in their answer to the

      ballot, from the ISO side as well as from the IEC side'
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 also asks ISO/TC 184 to clarify as far as possible the situation with IEC/TC 65

      and to improve the collaboration already set up by the SC 5/JWG 15 to include SC 4

      participation to that working group.

      Moreover SC 4 asks ISO/TC 184 to take appropriate actions to ensure that ISO and

      IEC committees with scopes that may overlap or relate to its own subcommittees are

      aware of the standards already published and the work in progress in ISO/TC 184.'
    dates:
    - start: '2002-11-15'
      kind: effective
