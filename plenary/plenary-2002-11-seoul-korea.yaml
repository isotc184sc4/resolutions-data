  actions:
  - type: requests
    date_effective:
      date: '2002-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests national member bodies to promote the achievements to date by CNIS
        and the proposed project for development of “Mechanical systems and components for
        general use -- Reference dictionary for fasteners” as part 511 of ISO 13584. In
