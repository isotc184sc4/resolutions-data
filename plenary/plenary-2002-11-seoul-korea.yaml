    value: Cooperate with OAGI
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: welcomes
    date_effective:
      date: '2002-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 welcomes the request for a formal membership of the Open Applications Group.
        Inc. (OAG) to ISO IEC ITU UN/ECE MoU. Based on the library described in OAGIS
        8.0 SC 4 sees a complementary activity to its own STEP development. Therefore SC
        4 invites the OAG to give a presentation at the next meeting on OAGs work. After the
        presentation SC 4 shall consider inviting OAG to nominate an official Liaison Officer,
        and initiation of the SC 4 Harvesting Procedure for OAGIS 8.0.
  - type: asks
    date_effective:
      date: '2002-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 invites National Member Bodies to recommend other similar groups that
        should be invited to present their work programs to SC 4 and to be considered
        for liaison.
