- identifier: '548'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Cooperation with OAGI
  dates:
  - start: '2002-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Cooperation with OAGI
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: welcomes
    message: 'SC 4 welcomes the request for a formal membership of the Open Applications Group.

      Inc. (OAG) to ISO IEC ITU UN/ECE MoU. Based on the library described in OAGIS

      8.0 SC 4 sees a complementary activity to its own STEP development. Therefore SC

      4 invites the OAG to give a presentation at the next meeting on OAGs work. After the

      presentation SC 4 shall consider inviting OAG to nominate an official Liaison Officer,

      and initiation of the SC 4 Harvesting Procedure for OAGIS 8.0'
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: investigates
    message: 'SC 4 invites National Member Bodies to recommend other similar groups that

      should be invited to present their work programs to SC 4 and to be considered

      for liaison.'
    dates:
    - start: '2002-11-15'
      kind: effective
- identifier: '549'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Part Marking Standard
  dates:
  - start: '2002-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Part Marking Standard

      In anticipation of a request from ISO/TC 20 to take over the task of expanding the part

      marking standard to cover other industry sectors, SC 4 directs its Secretariat to

      respond positively to such a request'
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests the ad hoc group established by

      Resolution

      #512 to assess the specification and to prepare an appropriate NWI proposal and

      circulate it to SC 4 and the ISO/IEC/ITU/CEFACT MoU/MG.'
    dates:
    - start: '2002-11-15'
      kind: effective
