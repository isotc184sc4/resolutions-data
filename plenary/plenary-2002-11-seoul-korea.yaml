- identifier: 558-acclamation-1
  subject: ISO/TC 184/SC 4 "Industrial data"
  dates:
  - start: '2002-11-15'
    kind: decision
  actions:
  - type: thanks
    message: 'SC 4 expresses its deep appreciation to KATS (Korean Agency for Technology and


      Standards) and KSTEP (Korea STEP Center) and the staff of Seoul COEX Center for

      their efforts in organizing this meeting, arranging the facilities, excellent food, social

      events, and excellent accompanying events. SC 4 also expresses its appreciation for

      their hospitality and outstanding support before, during, and after the meeting.

      SC 4 expresses its deep appreciation and thanks for the warm welcome by Mr. Dong-

      Chul Kim, Administrator of KATS; and to the ISO/TC 184/SC 4 Meeting Organizing

      Committee:  Mr. Jong-Hee Hong, Director General, Department of Manufacturing

      Technology and Standards, Korean Agency for Technology and Standards Ministry of

      Commerce, Industry and Energy; Mr. Se-Jin Kim, Director of Automation and

      Components Division, Chief Organizer of ISO/TC 184/ SC 4 Seoul meeting, Korean

      Agency for Technology and Standards (KATS); Dr. Soonhung Han, Chairman of

      KSTEP.

      SC 4 addresses a special recognition to Ju Hyun Yi (CES), Eunsook Kim (KATS),

      Youchon Oh (KATS), Byeong Huee Lee (KATS), Su Jeong Baek (KSTEP), Du Hwan

      Mun (KSTEP) and Sang Uk Cheon (KSTEP) for their hospitality, outstanding

      support, and patience both before and during the ISO/TC 184/SC 4 meeting.

      SC 4 also expresses its sincere appreciation and thanks for the following ISO/TC

      184/SC 4 meeting sponsors:  Jaebon Choi and Byungwhui Lee, Automation and

      Components Division in KATS; Dr. Yongdae Kim, Korea Ocean Research &

      Development Institute (KORDI); Professor Inhan Kim, Laboratory for Information

      Technology in Architecture (ITalab); Mr. Seongsig Kim, Senior Researcher, Korea

      Institute of Construction Technology (KICT); Professor Hyunchan Lee, Hongik

      University Department of I.I.E. CAD/PAM Laboratory, and Mr. Kukhwan Lee,

      Integrated Forum on Electronic Commerce.'
    dates:
    - start: '2002-11-15'
      kind: decision
