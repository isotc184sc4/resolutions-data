- identifier: '557'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Publication of Modular APs
  dates:
  - start: '2002-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Publication of Modular APs
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes the significant progress made in the definition of the structure and content

      of modular APs, which shall be published as an AP with a complementary AP

      module'
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: request
    message: 'SC 4 requires all projects developing modular APs and Application Modules to use

      the XSL development environment in the STEP Repository.  Deviations from this

      requirement shall be approved by the appropriate Convenors and the Quality

      Committee'
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its secretariat to register new AP modules as 10303 parts in the 400

      series. The AP module number for an AP 2xy shall be 4xy'
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 permits modular APs to be submitted directly to DIS ballot following successful

      completion of the TS ballots for their component modules'
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its secretariat to negotiate with ISO for the publication of standard

      products comprising APs and all their supporting modules'
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2002-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its member bodies and the affected projects to nominate resources to an

      ad hoc team to develop revised AP Guidelines and Supplementary Directives'
    dates:
    - start: '2002-11-15'
      kind: effective
