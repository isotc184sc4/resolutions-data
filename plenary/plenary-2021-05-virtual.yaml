    message: ISO 8000-2 Vocabulary for the ISO 8000 series Living Lab
    dates:
    - start: '2021-05-15'
      kind: effective
  - type: resolves
    message: 'Recalling the original proposal for a Living Lab on managing vocabulary using


      standards in a database format and the final report delivered by WG 13, SC 4:

       Thanks WG 13/23 and all participants that contributed to the innovation,

       Accepts the final report,

       Endorses the recommendations noted to ISO/TMB,

       Requests ISO/CS continue to support the existing process for ISO 8000-2, and

       Concludes this Living Lab.'
    dates:
    - start: '2021-05-15'
      kind: effective
