      capacity, appoints Allison Barnard Feeney

      Peter Benson

      Keith Hunten

      Alan Johnston

      David Odendahl

      Thomas Thurman

      Jean Brange

      Mikael Hedlind

      Bengt Olsson

      Max Ungerer


      Hiroshi Murayama

      Hyunjeong Lee

      Nils Sandsmark

      to the group and invites National Bodies and Liaisons to nominate experts.'
    dates:
    - start: '2021-05-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting the technical discussions among experts from WG 3, WG 12, WG 15 and others

      on the opportunity to align concepts on the use of UUID in industrial data'
