- identifier: '1074'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Update the SC 4 Handbook to incorporate standing documents
  dates:
  - start: '2021-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Update the SC 4 Handbook to incorporate standing documents
    dates:
    - start: '2021-05-15'
      kind: effective
  - type: requests
    message: 'SC4 requests the Committee Manager launch an eight week CIB

      to modify the SC4 Handbook to account for the following changes in approved standing

      documents.

       Deprecate SC4 N2412 “Supplementary directives — Rules for the structure and

      drafting of SC 4 standards for industrial data”

       Add SC 4 N3567 “SC 4 Supplementary directives — Rules for the structure and

      drafting of SC 4 standards for industrial data”

       Deprecate SC4 N3422 “STEP extended architecture high-level description”

       Add SC4 N3501 “STEP extended architecture high-level description”

       Deprecate SC4 N3433 “STEP extended architecture high-level requirements”

       Add SC4 N3502 “STEP extended architecture high-level requirements”

       Deprecate SC4 N3424 “STEP extended architecture detailed STEPlib

      specifications”

       Add SC4 N3503 “STEP extended architecture detailed STEPlib specifications”

       Deprecate SC4 N3425 “STEP extended architecture publication design”

       Add SC4 N3504 “STEP extended architecture publication design”

      Note: The Handbook has not been updated to account for recent deviations to ISO

      Operations as a result of COVID-19. Subsequent to TMB and ISO guidance,

      procedures for managing ISO TCs and SCs are covered by continuing resolutions from

      the TMB and supersede guidance provided by this Handbook on specific points

      covered.'
    dates:
    - start: '2021-05-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting the procedures for ISO/TC 184/SC 4 and recent approvals of SC4 relative to

      standing documents'
    dates:
    - start: '2021-05-15'
      kind: effective
- identifier: '1075'
  subject: ISO/TC 184/SC 4 "Industrial data"
