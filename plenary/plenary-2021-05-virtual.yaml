- identifier: '1070'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Conduct a review of ISO/TC 184/SC 4 N1167 “SC4 Industrial Data Framework”
  dates:
  - start: '2021-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Conduct a review of ISO/TC 184/SC 4 N1167 “SC4 Industrial Data Framework”
    dates:
    - start: '2021-05-15'
      kind: effective
  - type: resolves
    message: 'Noting that SC4N1167 “Industrial Data Framework” is out of date, but contains

      fundamental principles of the approach to standardizing industrial data, ISO/TC 184/SC

      4 requests its CM to initiate a Committee Internal Ballot (CIB) similar to an ISO/SR

      inviting member bodies to note their support for the document continuing as a standing

      document and comment on the document’s contents.'
    dates:
    - start: '2021-05-15'
      kind: effective
