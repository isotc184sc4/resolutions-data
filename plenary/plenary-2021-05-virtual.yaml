    kind: decision
  actions:
  - type: resolves
    message: Schedule Change for ISO/TS 23301
    dates:
    - start: '2021-05-15'
      kind: effective
  - type: requests
    message: 'SC4 requests the ISO TMB grant a nine-month extension to the schedule of ISO/AWI TS

      23301 (project 75189) allowing the project team additional time to complete CD/TS by

      2021-12-09 through necessary coordination using virtual working arrangements dictated

      by restrictions in meeting due to COVID-19.  The project team has completed the

      necessary documents and plans to release a CD/TS ballot on 2021-05-25 with a

      publication targeted for October 2021.'
