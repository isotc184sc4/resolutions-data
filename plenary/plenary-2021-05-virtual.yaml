- identifier: '1073'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Establish an Ad Hoc Group on UUID management for industrial data
  dates:
  - start: '2021-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Establish an Ad Hoc Group on UUID management for industrial data
    dates:
    - start: '2021-05-15'
      kind: effective
  - type: establishes
    message: 'SC 4 establishes an Ad Hoc Group “UUID management for industrial data” with the following

      terms of reference:

       Define the opportunity space for UUID in context of SC 4 standards,

       Identify use cases for UUID in industrial data,

       Provide recommendations to SC 4 on the scope and applicability of UUIDs to SC

      4 standards,

       Provide a report to SC 4 upon completion'
    dates:
    - start: '2021-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2021-05-15'
      kind: effective
