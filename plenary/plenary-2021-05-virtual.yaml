    dates:
    - start: '2021-05-15'
      kind: effective
- identifier: '1068'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Create an Advisory Group on Core Terminology for industrial data
  dates:
  - start: '2021-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Create an Advisory Group on Core Terminology for industrial data
    dates:
    - start: '2021-05-15'
      kind: effective
  - type: resolves
    message: 'Noting the report from Ad Hoc Group 1 “Core industrial data set of terms” (AhG01/N34),

      ISO/TC 184/SC 4:

       Accepts the recommendations identified in the report,

       Thanks the Ad Hoc Group members for their work,

       Requests ISO/TC 184/SC 4 circulate AhG01/N34 “Core terminology for industrial

      data” in a CIB for an ISO Technical Report,

       Launches an advisory group entitled “Core terminology for industrial data” to:

      o Interpret/map the core terminology to the different Top Level Ontologies

      (TLOs),

      o Align with relevant activities outside ISO/TC 184/SC 4,

      o Extend the content of the “Core terminology for industrial data” to a higher

      degree of specialization,

      o Recommend interfaces to ontologies and reference data,

      o Develop examples to be used for pilots with the different TLOs,

      o Complete the presentation intended for domain engineers and business

      decision makers,

       Nominates Nils Sandsmark as convener of the advisory group, and

       Retains existing members and invites member bodies to nominate additional

      experts to the advisory group.'
    dates:
    - start: '2021-05-15'
      kind: effective
