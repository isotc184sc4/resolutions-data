- identifier: '919'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Creation of a new Working Group on "Digital manufacturing”
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Creation of a new Working Group on "Digital manufacturing”
    dates:
    - start: '2015-10-15'
      kind: effective
  - type: decides
    message: 'SC 4 decides to establish Working Group 15 "Digital manufacturing". The goal of this

      working group is to coordinate the SC 4 internal efforts in this area with other standards

      organizations and to observe and interact with ongoing and upcoming developments.'
    dates:
    - start: '2015-10-15'
      kind: effective
- identifier: '920'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Joint Task Force to explore the establishment of a database for product prope...
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Joint Task Force to explore the establishment of a database for product properties and

      classes'
    dates:
    - start: '2015-10-15'
      kind: effective
  - type: appoints
    message: 'SC 4 appoints the following experts to assist in the work of the Joint Task Force:

      * Wolfgang Wilkes

      ISO 13584 expert and user in other standards

      * Norman Swindells User of ISO 13584 in other standards

      * Nils Sandsmark

      ISO 15926 expert and user in oil and gas facility

      environments

      * Nigel Shaw

      ISO 10303-239 and reference data expert and user

      * Nicolas Figay

      ISO 10303-242 expert

      * Peter Benson

      ISO 22745 expert and user

      * Nikolaus Ondracek ISO 13584 expert and user

      * David Leal

      ISO 15926 and RDL expert

      * Paul van Exel

      ISO 15926 expert'
    dates:
    - start: '2015-10-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its PPC to arrange a coordination meeting for the nominees to ensure a

      consistent representation from SC 4 in this task force.'
    dates:
    - start: '2015-10-15'
      kind: effective
- identifier: '921'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Create PWI for new Edition 3 of ISO 14306 JT
  dates:
  - start: '2015-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Create PWI for new Edition 3 of ISO 14306 JT
    dates:
    - start: '2015-10-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes the revised schedule for the delivery of a document for DIS ballot for edition


      2 by the end of February 2016 and approves a PWI to create a new edition 3 of ISO

      14306'
    dates:
    - start: '2015-10-15'
      kind: effective
  - type: investigates
    message: 'SC 4 invites member bodies and other stakeholders such as the Global

      Automotive Action Group to nominate experts to the project and to solicit requirements

      to be addressed in the next edition by end March 2016.

