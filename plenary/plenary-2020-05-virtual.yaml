- identifier: '1045'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Define and publish a reference model for SC4 that builds upon the work of IDI...
  dates:
  - start: '2020-05-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Define and publish a reference model for SC4 that builds upon the work of IDIOM,

      STEP extended architecture and the on-going activities on ontologies.

      In order to define and publish an SC4 reference model, SC 4 creates a Task Force titled

      “SC 4 Reference Model for Industrial Data” with the following term of reference:


      1. Build upon the work of IDIOM, STEP extended architecture and the on-going

      activities on ontologies, such as ISO 15926, ISO 13584, ISO 22745, ISO 29002

      and others,

      2. Coordinate with other affected groups in SC4 on plan elements;

      3. Provide periodic status reports to SC 4/PPC;

      4. Deliver a reference model using model based computer interpretable

      technologies ;

      5. Publish human readable guide (technical report) to the use of the reference

      model.

      The task force is requested to liaise with the "Core terms" work being carried out by

      AHG 01 and with the work on an ontology for geometry and topology being carried out

      by WG 12/T 1'
    dates:
    - start: '2020-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2020-05-15'
      kind: effective
  - type: nominates
    message: 'SC 4 nominates Jean Brangé and David Leal to lead the Task Force and appoints the

      following experts to the Task Force:

       Nils Sandsmark

       Tor Arne Irgens

       Allison Barnard Feeney

       Paul van Exel

       Mario Tucci

       Ben Urick

       Ronald Tse

       Tom Thurman

       Yves Keraron

      In addition, SC4 requests nominations from member bodies and relevant liaisons to

      participate in the Task Force.'
    dates:
    - start: '2020-05-15'
      kind: effective
