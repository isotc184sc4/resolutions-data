- identifier: '1047'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: The objective of the resolution is to deliver ISO 15926-4ed
  dates:
  - start: '2020-05-15'
    kind: decision
  actions:
  - type: resolves
    message: 'The objective of the resolution is to deliver ISO 15926-4ed.3 building on the experience

      as gathered in the POSC Caesar Association (PCA) data base with improvements on

      the following points:

      Consistent naming and definitions

      1. Reference to other RDIs in text definition

      2. Reference to source

      3. Improve specialization and classification according results of the Top-

      Class structure task force.

      4. Rules for use of entity types inanimate_physical_object and

      functional_object

      The ISO 15926-4 ed.3 document will reflect the changes made and will be in line with

      the electronic inserts update of ISO 15926-4e2. It will contain a time plan in line with the

      incremental steps that will be taken'
    dates:
    - start: '2020-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2020-05-15'
      kind: effective
  - type: instructs
    message: 'SC4 instructs its Committee Manager to launch edition 3 using the SDT

      24 track and names Onno Paap as Project Leader and allocates the work to WG 3 with

      the following terms of reference.

      -

      Update ISO 15926-4 ed.3 as presented to the Change Board during the 79th

      Plenary of SC4 on 05 May 2020

      -

      Update the electronic inserts to ISO/NP 15926-4 ed.3 per SC4N2591,

      SC4N2984, and SC4N2986 standing documents,

      -

      Request national bodies to nominate their representatives and deputies to the

      Validation Team (VT) as noted in SC4N2541, and

      -

      To keep a register of the VT members for the practice of sending out notifications

      to vote and other administrative items.'
    dates:
    - start: '2020-05-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting that new updates to ISO 15926-4 is needed and there is no change in scope to

      the standard'
    dates:
    - start: '2020-05-15'
      kind: effective
