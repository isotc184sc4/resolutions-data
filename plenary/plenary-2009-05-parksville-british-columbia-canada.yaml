metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Parksville, Canada, May 17, 2009 -- May 22, 2009
  dates:
  - start: '2009-05-17'
    end: '2009-05-22'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Parksville, Canada
resolutions:
- identifier: '768'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO/PC 246 Liaison
  dates:
  - start: '2009-05-15'
    kind: decision
  actions:
  - type: resolves
    message: 'ISO/PC 246 Liaison

      Establishment of an Internal Liaison with ISO/PC 246 Anti-counterfeiting tools'
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: accepts
    message: 'SC 4 accepts the request from ISO/PC 246 Anti-counterfeiting tools to establish an

      internal liaison and appoints Robert Kidwell as the liaison officer from SC 4 to ISO/PC

      246'
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: welcomes
    message: SC 4 welcomes Rainer Glatz as liaison officer from ISO/PC 246 to SC 4.
    dates:
    - start: '2009-05-15'
      kind: effective
- identifier: '769'
  subject: ISO/TC 184/SC 4 "Industrial data"
