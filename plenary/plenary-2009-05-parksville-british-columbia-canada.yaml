  - language_code: eng
    script: Latn
    title: Publish Usage Guide for ISO 10303-214 as ISO 10303-5001
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: decides
      date_effective:
        date: '2009-05-15'
        type: effective
      message: 'ISO/TC 184/SC 4 decides to publish the “Usage Guide for ISO 10303-214
        for gear units” as ISO 10303-5001. The format of the document shall be edited
        to align with an AP. New conformance classes shall not be introduced.

        '
    - type: requests
      date_effective:
        date: '2009-05-15'
        type: effective
      message: |
        SC 4 requests its Secretariat to circulate the amended document for a confirmatory ballot.

        All members of ISO TC 184/SC 4 are encouraged to promote the development of usage guides, such as for the 5000-series of ISO 10303.

        This resolution cancels resolution 757 from Busan, South Korea - November 2008.
