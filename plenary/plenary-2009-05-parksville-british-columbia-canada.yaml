- identifier: '771'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Recognition of Dr. King Yee
  dates:
  - start: '2009-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Recognition of Dr. King Yee
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes with regret the retirement of Dr. King Yee from the significant positions he

      has held over many years within SC 4, offers its thanks for his outstanding support and

      wishes him health and happiness in his well-earned retirement.'
    dates:
    - start: '2009-05-15'
      kind: effective
- identifier: '772'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Convener of JWG 8
