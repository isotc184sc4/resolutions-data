    message: Re-Appointment of Convenor of Working Group 12
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves Keith Hunten to serve as Convenor of its Working Group 12 for an

      additional period of three years'
