  - start: '2009-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Convener of JWG 8
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: appoints
    message: 'SC 4 appoints Anne-Françoise Cutting-Decelle as convener of JWG 8 for a three-

      year term.'
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: thanks
    message: 'SC 4 thanks Jean-Jacques Michel for his outstanding effort as convener of JWG 8 since

      1996'
    dates:
    - start: '2009-05-15'
      kind: effective
- identifier: '773'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Duration of CD ballot
  dates:
  - start: '2009-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Duration of CD ballot
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves that any CD ballots that are not combined with NP ballots shall be

      2 months, unless an extension to 3 months is requested prior to the ballot by any

      P- member, or at the discretion of the SC 4 Chairman.'
    dates:
    - start: '2009-05-15'
      kind: effective
- identifier: '774'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Report of 3D Visualization ad hoc Group
  dates:
  - start: '2009-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Report of 3D Visualization ad hoc Group
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: accepts
    message: 'SC 4 accepts the report SC4 N 2465 of the 3D visualization ad hoc group, SC 4

      thanks the group for its effort, and disbands the group.'
    dates:
    - start: '2009-05-15'
      kind: effective
- identifier: '775'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Initiation of Harvesting for 3D Visualization Specifications
  dates:
  - start: '2009-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Initiation of Harvesting for 3D Visualization Specifications
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to request the bodies responsible for each of the

      candidate 3D visualization formats identified in SC4 N2465 that have successfully

      passed the assessment process and are not already subject to standardization

      elsewhere, to provide the complete specification, the harvesting proposal form and

      any necessary supporting material to the Secretariat'
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to initiate the ballots on receipt of the necessary material,

      and to include a copy of SC4 N2465 in the ballot package for information.'
    dates:
    - start: '2009-05-15'
      kind: effective
- identifier: '776'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: HTML Version of ISO/TS 10303-1005
  dates:
  - start: '2009-05-15'
    kind: decision
  actions:
  - type: resolves
    message: HTML Version of ISO/TS 10303-1005
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves a minor revision of ISO/TS 10303-1005, comprising reformatting in

      HTML conforming to current guidelines, with the current EXPRESS'
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests

      the Secretariat to notify ISO CS that the revised document should be published within

      the first edition of ISO/TS 10303-1000.'
    dates:
    - start: '2009-05-15'
      kind: effective
- identifier: '777'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Extension of initiation of CD ballot of ISO 10303-241
  dates:
  - start: '2009-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Extension of initiation of CD ballot of ISO 10303-241
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to inform ISO CS that SC 4 has decided to extend the

      initiation of the CD ballot for ISO 10303-241 until end of 2009'
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: resolves
    message: 'SC4 will review this

      decision during its next meeting in November.'
    dates:
    - start: '2009-05-15'
      kind: effective
- identifier: '778'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Extension of DIS for ISO 10303-61
  dates:
  - start: '2009-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Extension of DIS for ISO 10303-61
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to inform ISO/CS that the target date for the submission

      of 10303-61 for DIS ballot is extended to 2009-07-23, and that this part should not be

      automatically cancelled as a recovery plan is in place.'
    dates:
    - start: '2009-05-15'
      kind: effective
- identifier: '779'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Minor Revision of Part 10303-47 (Amendment to Resolution 763)
  dates:
  - start: '2009-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Minor Revision of Part 10303-47 (Amendment to Resolution 763)
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs WG12 to prepare FDIS documents for ISO 10303-47, 503, 504, 506, 517,

      518, 519, 520, 521, and 523 and submit them to ISO for processing as minor

      revisions. Resolution 763 is superseded.'
    dates:
    - start: '2009-05-15'
      kind: effective
- identifier: '780'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Advancement of ISO 22745/29002 Parts
  dates:
  - start: '2009-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Advancement of ISO 22745/29002 Parts
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves the submission of ISO/TS 22745 parts 10, 14, 30, 35 and 40 and

      ISO/TS 29002 parts 4, 5, 6, 10, 20 and 31 for ballot as International Standards'
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: directs
    message: 'SC 4

      directs the project teams to provide the Secretariat with drafts for DIS balloting as soon

      as possible, and directs the Secretariat to submit these parts to ISO/CS for DIS ballot.'
    dates:
    - start: '2009-05-15'
      kind: effective
- identifier: '781'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Registration Number for Work Item on Gears
  dates:
  - start: '2009-05-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Registration Number for Work Item on Gears

      ISO/TC 184/SC 4 decides to publish the “Usage Guide for ISO 10303-214 for gear

      units” as ISO 10303-5001. The format of the document shall be edited to align with an

      AP. New conformance classes shall not be introduced'
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: requests
    message: 'SC4 requests its Secretariat to circulate the amended document for a confirmatory

      ballot.

      All members of ISO TC184/SC4 are encouraged to promote the development of usage

      guides, such as for the 5000-series of ISO 10303.


      This resolution cancels resolution 757 from Busan, South Korea - November 2008.'
    dates:
    - start: '2009-05-15'
      kind: effective
- identifier: '782'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Change Title of Standard ISO/DIS 13584 Part 32
  dates:
  - start: '2009-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Change Title of Standard ISO/DIS 13584 Part 32
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves the new title “Automation systems and integration — Parts library —

      Part 32: Implementation resources: OntoML: Product Ontology Markup Language“,

      advises SC4 secretariat to perform this change and requests WG2 to prepare the

      document for IS publication.'
    dates:
    - start: '2009-05-15'
      kind: effective
