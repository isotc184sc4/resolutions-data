- identifier: '784'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Cre a tio n of th e Ad visory G rou p “SC 4 Im p le me n tatio n Fo rum ”
  dates:
  - start: '2009-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Cre a tio n of th e Ad visory G rou p “SC 4 Im p le me n tatio n Fo rum ”
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: decides
    message: 'SC4 decides to create the Advisory Group “SC 4 Implementation Forum”, which will

      also incorporate the tasks and members of the existing Committee for Education and

      Outreach, which is now disbanded. The group has the following tasks:

      * Gather feed back from implementers

      * Gather success stories

      * Promote business benefits

      * Promote awareness of capabilities

      * Facilitate implementations

      o Test model/Testing procedure

      * Seek resources for sustainment

      * Provide education and outreach'
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its secretariat to invite participation from its member bodies and liaisons

      to undertake this work. Member bodies are invited to ensure the participation of STEP

      Centres and other supporting organizations

      Paul van Exel is nominated as leader of this group


      Anna Moreno is nominated as Co-deputy leader of this group

      Burton Gischner is nominated as Co-deputy leader of this group

      The Advisory Group is invited to present its work program to the November 2009 SC 4

      Plenary meeting in November.'
    dates:
    - start: '2009-05-15'
      kind: effective
- identifier: '785'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Cre a tio n of a PW I on “Fut u re S C 4 A rchite cture”
  dates:
  - start: '2009-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Cre a tio n of a PW I on “Fut u re S C 4 A rchite cture”
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves a PWI on “Future SC 4 Architecture” to:

      * Explore the range of options for exploiting new technologies to support

      interoperability between SC4 standards, and the work of other

      committees, operating across a range of platforms

      * Recommend an overall architecture for future use by SC 4 standards

      * Define migration paths for existing SC 4 capabilities

      * Identify specific licensing, commercial or other administrative barriers

      * Illustrate and validate any conclusions against a representative example'
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: investigates
    message: SC 4 invites all of its member bodies and WGs to contribute to the work of the PWI
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: appoints
    message: 'SC 4 appoints David Leal and David Price as joint leaders for the PWI and invites

      them to report back no later than the November 2009 meeting.'
    dates:
    - start: '2009-05-15'
      kind: effective
- identifier: '786'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ACKNOWLEDGEMENTS and APPRECIATIONS
  dates:
  - start: '2009-05-15'
    kind: decision
  actions:
  - type: resolves
    message: 'ACKNOWLEDGEMENTS and APPRECIATIONS

      ACCLAMATION:

      We offer thanks to Dr. Gerry Radack, Leo van Ruijven, Rob Bodington, Howard

      Mason, and David Price who presented their material at the Open Technical Forum.

      ACCLAMATION:

      Appreciation to our SC 4 Liaisons and those projects who presented at the Liaison

      Plenary.

      * PDES, Inc -- George Sebes

      * NATO AC/135 -- Steve Arnett

      * ISO/TC 154 -- Ricardo Goncalves

      * FSIG -- Ricardo Goncalves

      * VAMAS -- Anna Moreno


      * OASIS PLCS -- Rob Bodington

      * BuildingSMART -- Thomas Liebich

      * European project ORCHID WS -- Paul van  Exel

      * Work of the NAFEMS Simulation Data Management WG -- Randy Cigel

      * IEC liaisons -- Hiroshi Murayama

      * OMG -- David Price

      * ECCMA -- Peter Benson

      We appreciate your representation to and for ISO TC 184/SC 4.

      ACCLAMATION:'
    dates:
    - start: '2009-05-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to ECCMA -- Electronic Commerce Code

      Management Association for hosting and support of the 57th ISO TC 184/SC 4

      Plenary meetings at the Tigh-Na-Mara Conference Centre in Parksville, British

      Columbia, Canada. We especially commend Mr. Peter Benson, Executive Director,

      and Ms Melissa Scheib, Events Manager, and Ms Brittany Marmo, Administrative

      Assistant of ECCMA for an excellent venue and outstanding service to the SC 4

      community.

      Special acknowledgement is extended to the Tigh-Na-Mara Hotel and Conference

      Centre, Parksville and its staff for their excellent cooperation, service and food

      presentation, which was instrumental in ensuring the effectiveness of the meeting.'
    dates:
    - start: '2009-05-15'
      kind: effective
