metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Gothenburg, Sweden,
    June 25, 1990 -- July 5, 1990
  date: '1990-06-25'
  source: ISO/TC 184/SC 4 Secretariat
decisions:
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '60'
  kind: resolution
  status: decided
  dates:
  - date: '1990-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Instruct SPAG to resolve EIA petition to IEC
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: instructs
      date_effective:
        date: '1990-06-15'
        type: effective
      message: |
        SC 4 charges the Strategic Planning Advisory Group with carrying out the intent of SC
        4 Resolution 44 (Electrical Harmonization), particularly working toward a resolution of
        the developing situation with regard to the EIA petition to IEC (dated April 12, 1990).
        (USA)
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '61'
  kind: resolution
  status: decided
  dates:
  - date: '1990-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Ask electrical project leader to develop electrical schematic APs
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: asks
      date_effective:
        date: '1990-06-15'
        type: effective
      message: |
        SC 4 asks its electrical project leader to develop one or more electrical schematic
        application protocols based upon documented efforts such as the German VNS, the
        French SET electrical, the IEC/TC 3, and the U.S. IGES and EDIF electrical projects.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '62'
  kind: resolution
  status: decided
  dates:
  - date: '1990-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Adopt recommendation for STEP Version 1.0 Application Protocols
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: adopts
      date_effective:
        date: '1990-06-15'
        type: effective
      message: "SC 4 adopts the following recommendation of the ad hoc Application
        Protocols group:\n\nFollowing the WG 1 decision that STEP Version 1.0 must
        include at least one\ndraughting related AP, the SC 4 ad hoc group on APs
        recommends that STEP\nVersion 1.0 should include the proposed AP #3,\n\"Exchange
        of 2D geometrically explicit CAD drawings with explicit annotation.\"\n\nProposed
        AP #3 is the top priority for STEP Version 1.0. The proposed APs #4, 5, 6
        &\n18 should be reviewed by the end of October 1990 to assess their adequacy.
        These\nAPs could be included in STEP Version 1.0 if they do not require extensive
        SC 4\nresources for completion. None of these APs shall be allowed to delay
        the delivery of\nSTEP Version 1.0.\n\nNB.: PMAG must assign the responsibility
        for assessing the adequacy of the proposed\nAPs to the new WG, \"Qualification
        & Integration.\"\n\n* AP #4 Exchange of CAD drawings with reference to 3D
        geometry model and with explicit annotation\n* AP #5 Exchange of configuration
        controlled 3D product definition data \n* AP #6 Exchange of sculptured surface
        models\n* AP #18 Exchange of boundary representation models\n"
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '63'
  kind: resolution
  status: decided
  dates:
  - date: '1990-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Assign AP project leaders for APs 3, 5, and 18
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: adopts
      date_effective:
        date: '1990-06-15'
        type: effective
      message: |
        SC 4 adopts the following recommendation of the ad hoc Application Protocols group:

        In order to ensure the timely delivery of APs, a project leader must be assigned for
        each of the APs listed in Resolution # 62. The project leaders will report directly to
        the PMAG.
    - type: appoints
      date_effective:
        date: '1990-06-15'
        type: effective
      message: 'SC 4 appoints Bruno Schilli as project leader for AP #3.

        '
    - type: appoints
      date_effective:
        date: '1990-06-15'
        type: effective
      message: 'SC 4 appoints Steve Ryan as project leader for AP #5.

        '
    - type: appoints
      date_effective:
        date: '1990-06-15'
        type: effective
      message: |
        SC 4 appoints Ray Goult as project leader for AP #18.

        The PMAG will appoint project leaders for APs #4 and #6 as soon as possible, to be confirmed by SC 4.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '64'
  kind: resolution
  status: decided
  dates:
  - date: '1990-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Define guidelines for AP development outside SC 4
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: recognizing
      date_effective:
        date: '1990-06-15'
        type: effective
      message: |
        As well as the need for normative APs, SC 4 recognizes that there exists an industrial
        requirement for additional APs to be defined outside the SC 4 organization at the
        industry, national, or regional level.
    actions:
    - type: requests
      date_effective:
        date: '1990-06-15'
        type: effective
      message: |
        SC 4 requests the PMAG to define requirements
        for guidelines to permit the development of APs both inside and outside SC 4.
        Provision should also be made for the registration of APs with SC 4 to ensure the
        consistency of related standards.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '65'
  kind: resolution
  status: decided
  dates:
  - date: '1990-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Adopt reorganization structure and disband WG 1
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: adopts
      date_effective:
        date: '1990-06-15'
        type: effective
      message: |
        SC 4 adopts the reorganization structure as proposed by the ad hoc reorganization
        group in Reston. The current WG 1 is to be disbanded, effective at the end of the
        Gothenburg meeting, and its current work is to be allocated to the following new
        working groups:

        * WG 3 Product Modeling
        * WG 4 Qualification & Integration
        * WG 5 STEP Development Methods
        * WG 6 Conformance Testing Procedures
        * WG 7 Implementation Specifications
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: 199006-acclaim-01
  kind: resolution
  status: decided
  dates:
  - date: '1990-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Thank Jerry Weiss for his leadership of WG 1
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: thanks
      date_effective:
        date: '1990-06-15'
        type: effective
      message: |
        SC 4 thanks the WG 1 convener, Mr Jerry Weiss, for his pioneering leadership and
        personal dedication to the STEP development over the last six years, and looks
        forward to his continuing support as Project Management Advisory Group convener in
