- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '72'
  kind: resolution
  status: decided
  dates:
  - date: '1990-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Require CDs circulated within SC 4 to be circulated for ballot
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: considering
      date_effective:
        date: '1990-06-15'
        type: effective
      message: |
        Whereas the new ISO/IEC procedures in 2.4.1 allow the circulation of documents for
        comment or for voting by P members on their approval as Committee Drafts (CDs),
    actions:
    - type: resolves
      date_effective:
        date: '1990-06-15'
        type: effective
      message: 'CDs circulated within SC 4 shall only be circulated for ballot.

        '
