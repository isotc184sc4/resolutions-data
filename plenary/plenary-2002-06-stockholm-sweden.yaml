- identifier: '535'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Support of ISO/TC 184 Business Strategy and Development task force
  dates:
  - start: '2002-06-15'
    kind: decision
  actions:
  - type: resolves
    message: Support of ISO/TC 184 Business Strategy and Development task force
    dates:
    - start: '2002-06-15'
      kind: effective
  - type: resolves
    message: SC 4 strongly supports the objectives of the task force created by ISO/TC 184/AG
    dates:
    - start: '2002-06-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2002-06-15'
      kind: effective
  - type: resolves
    message: 'SC 4 member bodies and liaisons are encouraged to provide their views relative to the

      scope of the ISO/TC 184 Business Strategy and Development task force, especially in

      terms of:

      -

      relevance of the current SC 4 work items to their industrial needs,

      -

      fields of industrial data not yet covered,

      -

      priorities and available expertise'
    dates:
    - start: '2002-06-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2002-06-15'
      kind: effective
  - type: resolves
    message: 'SC 4 strongly objects to any subdivision of SC 4 without an adequate business case

      subject to approval by the member bodies.

      Input should be forwarded to SC 4 Chair and Secretariat, no later than end of

      September 2002.'
    dates:
    - start: '2002-06-15'
      kind: effective
