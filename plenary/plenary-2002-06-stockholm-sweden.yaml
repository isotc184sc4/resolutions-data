  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '2002-06-15'
      type: effective
    message:
    - spelling: eng
      value: |
        It is resolved that the ISO funding mechanism for the delivery of standards produced
