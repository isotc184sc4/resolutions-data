- identifier: '541'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Improving accessibility to SC 4 Standards
  dates:
  - start: '2002-06-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Improving accessibility to SC 4 Standards

      It is resolved that the ISO funding mechanism for the delivery of standards produced

      by SC 4 should be revised to be consistent with the ISO funding mechanisms for the

      delivery of other standards that are freely available to the general public.

      This resolution shall be forwarded to the ISO Central Secretariat for review and

      consideration by the Commercial Policies Steering Group.'
    dates:
    - start: '2002-06-15'
      kind: effective
