  actions:
  - type: thanks
    message: 'SC 4 expresses its deep appreciation to Eurostep, the Swedish Institute of Standards

      and the staff of Skogshem & Wijk for their efforts in organizing this meeting, arranging

      the facilities, excellent food, and social events, and excellent accompanying events.

      SC 4 also expresses its appreciation for their hospitality and outstanding support

      before, during, and after the meeting.

      SC 4 addresses a special recognition to Helena Lindström, Magnus Nerman, Håkan


      Kården, Gunilla Sivard, Lars Flink, and Jalle Magnusson for their hospitality,

      outstanding support, and patience both before and during the ISO/TC 184/SC 4

      meeting.'
