- identifier: '531'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: 'ISO/TC 184/SC 4 Resolution Paper for SC 4 Committee Meeting ISO/TC 184/SC 4: A-'
  dates:
  - start: '2002-06-15'
    kind: decision
  actions:
  - type: resolves
    message: 'ISO/TC 184/SC 4 Resolution Paper for SC 4 Committee Meeting ISO/TC 184/SC 4: A-

      liaison with ASAM'
    dates:
    - start: '2002-06-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves a Category A liaison with the Association for Standardisation of

      Automation and Measuring Systems (ASAM), accepts and welcomes Dr. Helmut

      HELPENSTEIN as the liaison officer between SC 4 and ASAM for two years, and

      requests that the SC 4 secretary confirms this liaison with the ISO Central Secretariat.'
