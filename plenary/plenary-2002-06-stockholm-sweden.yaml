      kind: effective
- identifier: '532'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: 'the title and scope of AP239 shall be changed to read as follows:'
  dates:
  - start: '2002-06-15'
    kind: decision
  actions:
  - type: agrees
    message: 'SC 4 agrees that the title and scope of AP239 shall be changed to read as follows:

      Title: Application Protocol:  Product life cycle support

      Scope: This part of ISO 10303 will provide extension to the capabilities

      of AP203 and AP214 (and hence the PDM Schema/Modules) to address

      the

      requirements for Configuration Change Management over the full product life.

      This part of ISO 10303 will address the information requirements needed to

      define and deliver life cycle support to complex assets. This includes

      specification of

      o the identification and composition of a product design from a

      support viewpoint (as an extension of the PDM Modules);

      o the definition of documents and their applicability to products and

      support activities (as an extension of the PDM Modules);

      o the identification and composition of realized products;

      o configuration change management activities, over the complete

      life cycle;


      o the properties, states and behaviour of products for life cycle

      support;

      o activities required to sustain product function;

      o the resources needed to perform such activities;

      o the planning and scheduling such activities;

      o the capture of feedback on the performance of such activities,

      including the resources used;

      o the capture of feedback on the usage and condition of a realized

      product;

      o the definition of the support environment in terms of people,

      organizations, skills, experience and facilities;

      o the definition of classes of product, activities, states, people,

      organizations and resources.'
    dates:
    - start: '2002-06-15'
      kind: effective
