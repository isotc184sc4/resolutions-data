- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '581'
  urn: urn:iso:tc184:sc4:resolution:581
  kind: resolution
  status: decided
  dates:
  - date: '2003-06-15'
    type: adoption
  title:
  - spelling: eng
    value: Endorse cancellation of the Xi'an meeting
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: endorses
    date_effective:
      date: '2003-06-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 endorses the decision of the Chair and Secretariat to cancel the
        Xi''an meeting scheduled for October 2003, due to natural events beyond the
        control of the organisers, and instructs its secretariat to offer October
        2005 as an alternative date.

        '
  - type: notes
    date_effective:
      date: '2003-06-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 offers its best wishes for good health to the Chinese delegation,
        and its apologies for any inconvenience caused.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '582'
  urn: urn:iso:tc184:sc4:resolution:582
  kind: resolution
  status: decided
  dates:
  - date: '2003-06-15'
    type: adoption
  title:
  - spelling: eng
    value: Create ad hoc group to assess ASAM ODS 5.0 PAS proposal
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: creates
    date_effective:
      date: '2003-06-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 creates an ad hoc group led by Len Slovensky to assess the proposal
        from ASAM to transpose the ODS 5.0 specification into a Publicly Available
        Specification (PAS).

        '
  - type: requests
    date_effective:
      date: '2003-06-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 invites WG 3, WG 11, WG 12, PPC and the Quality Committee (QC)
        to nominate representatives by 2003-08-31. The ad hoc group is requested to
        assess the specification and explanatory report (N1508), negotiate with ASAM
        on any issues, and make a recommendation to SC 4 by 2003-09-30 on how to process
        the proposal.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '583'
  urn: urn:iso:tc184:sc4:resolution:583
  kind: resolution
  status: decided
  dates:
  - date: '2003-06-15'
    type: adoption
  title:
  - spelling: eng
    value: Register STEP MIME-types with IANA Registration Authority
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2003-06-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 requests its Secretariat to register STEP Part 21 MIME-types with
        the Internet IANA Registration Authority as .stp, and .step.for files according
        to ISO 10303 Application protocols and .p21 for general use including those
        according to ISO 10303, ISO 13584 and ISO 15926.

        '
  - type: requests
    date_effective:
      date: '2003-06-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 requests its Secretariat to register STEP Express MIME-types with
        the Internet IANA Registration Authority as .exp, and .expr. Additionally,
        WG 11 is requested to amend Parts 11 and 21 to recommend the use of these
        extensions in all STEP applications.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '584'
  urn: urn:iso:tc184:sc4:resolution:584
  kind: resolution
  status: decided
  dates:
  - date: '2003-06-15'
    type: adoption
  title:
  - spelling: eng
    value: Support German initiative for ISO/IEC Guide on parts library definitions
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: endorses
    date_effective:
      date: '2003-06-15'
      type: effective
    message:
    - spelling: eng
      value: 'ISO/TC 184/SC 4 strongly supports the German initiative to create an
        ISO/IEC Guide for the common use of parts library definitions to encourage
        all IEC and ISO committees dealing with the standardization of products to
        use the description and definitions of IEC 61360 and ISO 13584 for the development
        of product libraries.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '585'
  urn: urn:iso:tc184:sc4:resolution:585
  kind: resolution
  status: decided
  dates:
  - date: '2003-06-15'
    type: adoption
  title:
  - spelling: eng
    value: Encourage ISO/TC 37 to coordinate with WG 2 on multilingual classification
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: encourages
    date_effective:
      date: '2003-06-15'
      type: effective
    message:
    - spelling: eng
      value: 'To avoid duplication or contradictory work, SC 4 wishes to encourage
        ISO/TC 37 to inform ISO/TC 184/SC 4/WG 2 about the actual status on "Basic
        principles of multilingual classification for electronic commerce" and related
        activities.

        '
  - type: encourages
    date_effective:
      date: '2003-06-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 strongly encourages ISO/TC 37 to consider adoption of the SC 4
        standards as a basis for their ongoing activities in related fields. Based
        on that response, ISO/TC 184/SC 4 may wish to establish a liaison with the
        committee within ISO/TC 37 working on that work item. Required actions following
        approval of this resolution: To submit this resolution directly to ISO/TC
        37 secretariat with a request to provide information about their results and
        plans and to contact ISO/TC 184/SC 4/WG 2 with the goal to establish a liaison
        to identify overlapping or contradicting work (Secretariat).

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: 200306-acclaim-04
  urn: urn:iso:tc184:sc4:resolution:200306-acclaim-04
  kind: resolution
  status: decided
  dates:
  - date: '2003-06-15'
    type: adoption
  title:
  - spelling: eng
    value: Thank Professor Kimura for his contributions to SC 4
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: thanks
    date_effective:
      date: '2003-06-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 would like to thank Professor Kimura for his significant contributions
        and support to the SC 4 community since its inception in 1984. His untiring
        efforts and excellent performance as Head of the Japan National Committee
        in supporting the work of the SC 4 sets the high water-mark for the SC 4 community.

        '
  - type: notes
    date_effective:
      date: '2003-06-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 looks forward to continued cooperation with the new leader of the
        Japan National Committee Mr. Ohtaka.

        '
