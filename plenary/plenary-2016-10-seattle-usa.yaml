- identifier: '938'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appointment of SC 4 Liaison to ISO/TC 307
  dates:
  - start: '2016-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Appointment of SC 4 Liaison to ISO/TC 307
    dates:
    - start: '2016-10-15'
      kind: effective
  - type: appoints
    message: 'SC 4 appoints Jean Brange for a three-year term as the SC 4 Liaison to ISO/TC 307

      Blockchain and electronic distributed ledger technologies, with appreciation for his offer

      to serve in that capacity.  The principal objective is to explore the potential applicability

      of the technology to distributed industrial data.'
