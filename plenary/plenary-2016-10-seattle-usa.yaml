    - start: '2016-10-15'
      kind: effective
- identifier: '939'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: IEC TC 65 Work to Adopt RAMI 4.0
  dates:
  - start: '2016-10-15'
    kind: decision
  actions:
  - type: resolves
    message: IEC TC 65 Work to Adopt RAMI 4.0
    dates:
    - start: '2016-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses concern over the IEC TC 65 work to adopt RAMI 4.0 as a PAS with

      undue haste contrary to the recommendation of the SAG-SM and the ISO TMB

      resolution 104/2016'
    dates:
    - start: '2016-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 strongly supports the TMB proposal for a joint activity as

      already decided by TC 184 and invites the TMB to resolve this matter with the IEC

      SMB.

      ACCLAMATION'
    dates:
    - start: '2016-10-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to our SC 4 Liaisons and the presentations that were

      provided:

       ISO/IEC JTC1/SC31 – Dan Kimball

       ISO/IEC JTC 1/SC 24 – Christophe Mouton

      ACCLAMATION'
    dates:
    - start: '2016-10-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to the following individuals and organizations for their

      participation in the 72nd ISO/TC 184/SC 4 Open Technical Forum in Seattle, WA USA

      2016-10-03:

       Norman Swindells - Consolidation of property data for the life cycle of a

      composite product

       Sune Horkeby - Product Behaviour; Standards as a Framework for Life Cycle

      Management

      ACCLAMATION'
    dates:
    - start: '2016-10-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to the following individuals and organizations for their

      participation in the 72nd ISO/TC 184/SC 4 Industry Day in Seattle, WA, 2016-10-05:

       Dan Carnahan, CT 184 Consulting

       Alan Johnston, MIMOSA

       Ray Topping, Fiatech

       Martin Hardwick, STEP Tools

       Cliff Whitehead, ODVA/Rockwell Automation


      ACCLAMATION'
    dates:
    - start: '2016-10-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to Peter Benson, Brandi Fisher, and the rest of

      ECCMA’s staff for hosting the 72nd ISO/TC 184/SC 4 Plenary in Seattle, Washington

      2016-10-02/07. Special acknowledgement is extended to the Hilton Garden Inn Seattle

      North/Everett and its staff for their seamless and attentive support throughout the week.

      ACCLAMATION'
    dates:
    - start: '2016-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses its sincere thanks to Kenny Swope and our Boeing hosts for the

