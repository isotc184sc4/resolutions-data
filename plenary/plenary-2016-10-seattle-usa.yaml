- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '939'
  urn: urn:iso:tc184:sc4:resolution:939
  kind: resolution
  status: decided
  dates:
  - date: '2016-10-15'
    type: adoption
  title:
  - spelling: eng
    value: Express concern over IEC TC 65 adoption of RAMI 4.0
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: notes
    date_effective:
      date: '2016-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 expresses concern over the IEC TC 65 work to adopt RAMI 4.0 as a PAS with
        undue haste contrary to the recommendation of the SAG-SM and the ISO TMB
        resolution 104/2016
  - type: supports
    date_effective:
      date: '2016-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 strongly supports the TMB proposal for a joint activity as
        already decided by TC 184 and invites the TMB to resolve this matter with the IEC
        SMB.
