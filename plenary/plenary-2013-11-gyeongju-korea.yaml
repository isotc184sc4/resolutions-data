- identifier: '861'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO/TC 184/SC 4 – ISO/TC 59/SC 13 JWG 12
  dates:
  - start: '2013-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'ISO/TC 184/SC 4 – ISO/TC 59/SC 13 JWG 12

      Resolution:

      ISO/TC 184/SC 4 agrees to the request of ISO/TC 59/SC 13 to transfer the Standard

      ISO 16739 to the administration of SC 13'
    dates:
    - start: '2013-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2013-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its secretary to arrange any necessary transfer of the standard to the

      SC 13 work program'
    dates:
    - start: '2013-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2013-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests SC 13 to ensure that SC 4 Secretariat is informed of all ballot actions in

      order to circulate the documents to the members of SC 4'
    dates:
    - start: '2013-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2013-11-15'
      kind: effective
  - type: encourages
    message: SC 4 encourages SC 13 to work with SC 4 on other data-related standards
    dates:
    - start: '2013-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2013-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 is prepared to nominate representatives to the proposed JWG 12 maintenance

      and validation teams'
    dates:
    - start: '2013-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2013-11-15'
      kind: effective
  - type: welcomes
    message: 'SC 4 welcomes the proposal of SC 13 to alternate co-located JWG 12 meetings

      between the two parent committees'
    dates:
    - start: '2013-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2013-11-15'
      kind: effective
  - type: encourages
    message: 'SC 4 encourages its members to nominate appropriate additional technical experts

      to participate in the work of JWG 12.

      NOTE:

      The necessary HTML-documentation Guidelines requested by JWG 12 are publicly

      available on the SC 4 eCommittees site.'
    dates:
    - start: '2013-11-15'
      kind: effective
- identifier: '862'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Unified Architecture Framework (UAF)
  dates:
  - start: '2013-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Unified Architecture Framework (UAF)

      Resolution: SC 4 notes the proposal from the US to offer the Unified Architecture

      Framework (UAF) for standardization in ISO/TC 184/SC 4, possibly in collaboration

      with other Standard Development Bodies (SDOs)  such as OMG, OASIS, JTC1, and

      INCOSE, , and invites the US member body to submit a Preliminary Work Item (PWI)

      for consideration.

      NOTE: The PWI should clearly demonstrate the relationship between SysML. UPDM

      and UAF'
    dates:
    - start: '2013-11-15'
      kind: effective
- identifier: '863'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO/PAS 18828
  dates:
  - start: '2013-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'ISO/PAS 18828

      Resolution: SC 4 establishes an ad hoc group with the task to improve the ISO/PAS

      18828 document for submission at the next meeting of SC 4 on 2014-05-04/09.'
