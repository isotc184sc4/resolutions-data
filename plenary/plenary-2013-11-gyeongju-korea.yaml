  - spelling: eng
    value: Transfer ISO 16739 to ISO/TC 59/SC 13 administration
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: agrees
    date_effective:
      date: '2013-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        ISO/TC 184/SC 4 agrees to the request of ISO/TC 59/SC 13 to transfer the Standard
        ISO 16739 to the administration of SC 13.
  - type: requests
    date_effective:
      date: '2013-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests its secretary to arrange any necessary transfer of the standard to the
        SC 13 work program.
  - type: requests
    date_effective:
      date: '2013-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests SC 13 to ensure that SC 4 Secretariat is informed of all ballot actions in
        order to circulate the documents to the members of SC 4.
  - type: encourages
    date_effective:
      date: '2013-11-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 encourages SC 13 to work with SC 4 on other data-related standards.

