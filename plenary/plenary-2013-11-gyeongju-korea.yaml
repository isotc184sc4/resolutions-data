- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '862'
  kind: resolution
  status: decided
  dates:
  - date: '2013-11-15'
    type: adoption
  title:
  - spelling: eng
    value: Request submission of a PWI for the Unified Architecture Framework (UAF)
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: asks
    date_effective:
      date: '2013-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 invites the US member body to submit a Preliminary Work Item (PWI)
        for consideration.

        NOTE: The PWI should clearly demonstrate the relationship between SysML, UPDM
        and UAF.
  considerations:
  - type: noting
    date_effective:
      date: '2013-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 notes the proposal from the US to offer the Unified Architecture
        Framework (UAF) for standardization in ISO/TC 184/SC 4, possibly in collaboration
        with other Standard Development Bodies (SDOs) such as OMG, OASIS, JTC1, and INCOSE.
