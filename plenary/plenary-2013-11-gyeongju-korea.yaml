- identifier: '864'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appreciation for Service of Dr Burton
  dates:
  - start: '2013-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Appreciation for Service of Dr Burton

      Gischner

      Resolution: SC 4 expresses its special recognition and thanks to Dr Burton

      Gischner for his exceptional dedication and outstanding service for many years in the

      international standardization community'
    dates:
    - start: '2013-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 especially thanks Dr Gischner for his

      long standing service as the U.S. Head of Delegation.

      ACKNOWLEDGEMENTS and APPRECIATIONS

      ACCLAMATION

      Appreciation to our SC 4 Liaisons and those projects who presented at the Opening

      Technical Plenary:

      TC59 / SC13 / JWG12 Liaison Report - Thomas Liebich, buildingSMART International


      OASIS PLCS Liaison Report - Howard Mason, Co-chair, PLCS TC

      ACCLAMATION

      Appreciation to those who presented at the Open Technical Forum:

      Jean Brange, BOOST - “BoostAeroSpace – Competitiveness and Innovation for the

      European Aerospace & Defence Industry”

      Jochen Haenisch, JOTNE – “CLOUDFLOW: Computational Cloud Services And

      Workflows For Agile Engineering”

      David Leal- “Industrial Data on the Web - Dereferencing”

      Howard Mason, AIA – “Industrial Data in the Cloud: A US Aerospace and Defense

      Perspective”

      ACCLAMATION'
    dates:
    - start: '2013-11-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to Prof Soonhung Han for his organization of the

      Industry Day, and to the speakers for attending and presenting on matters of interest

      to the SC 4 community.

      ACCLAMATION'
    dates:
    - start: '2013-11-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to Prof Soonhung Han, the Korean Agency for

      Technology and Standards (KATS), Korea STEP Center (KSTEP), and Korea

      Advanced Institute of Science and Technology (KAIST) for their hosting and support of

      the 66th ISO TC 184/SC 4 Plenary meetings at Hotel Hyundai in Gyeongju, Korea.

      We especially commend them for an excellent venue and outstanding service to the SC 4 community. A special acknowledgement is extended to Seung-joo Nam,

      Kyudong Kim

      and Jihye Kang for their outstanding support during the week.  Special

      acknowledgement is extended to the KATS and its staff for their seamless and

      attentive support.'
