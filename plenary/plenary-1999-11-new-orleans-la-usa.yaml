- identifier: '437'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Proposal to split ISO 10303-27 into two parts and publish as Technical Specif...
  dates:
  - start: '1999-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Proposal to split ISO 10303-27 into two parts and publish as Technical Specification
    dates:
    - start: '1999-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves that the technical content of ISO 10303-27 shall be published as two

      separate parts and as Technical Specifications rather than as a single part as a Draft

      International Standard. Conformance Class 3 of ISO 10303-27 shall be published as

      ISO 10303-27 under the title of the current ISO 10303-27 and Conformance Class 1

      and 2 shall be published as ISO 10303-29 under the title of "Lightweight SDAI (

      insert trademark) Java Programming Language Binding"'
    dates:
    - start: '1999-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '1999-11-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs the Secretariat to update the URL containing the titles of all ISO 10303

      parts to reflect this change.'
    dates:
    - start: '1999-11-15'
      kind: effective
