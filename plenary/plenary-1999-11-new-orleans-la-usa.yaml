  - type: resolves
    message: 'SC 4 resolves to allow SC 4 projects to enter their Stage 3 ballot with drafts

      documented using HTML'
    dates:
    - start: '1999-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves that the project be required to provide a

      printable review version of the materials'
