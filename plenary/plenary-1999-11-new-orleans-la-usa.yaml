- identifier: '428'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Balloting of Technical Specifications
  dates:
  - start: '1999-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Balloting of Technical Specifications
    dates:
    - start: '1999-11-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves the following amendments to the Organization Handbook (changes in

      italics):

      Clause 2.1:

      Amend the current text:  30 Committee Stage: Consensus is achieved on a Committee

      Draft (CD) or preliminary Draft Technical Specification (PDTS);

      Insert: Technical Specifications pass directly from the Committee Stage to the

      Publication Stage

      Clause 2.5:

      Amend the current text:

      The Committee Stage begins with the circulation for formal ballot of the CD or TS

      document by the SC 4 Secretariat'
    dates:
    - start: '1999-11-15'
      kind: effective
  - type: resolves
    message: 'The SC 4 Secretariat shall not begin the

      Committee Stage until an electronic form is available for review by SC 4. A four-

      month voting period, which may be extended to six months, is used for the first ballot.

      After each ballot, the Project team and Editor prepare a revised document that

      resolves the ballot comments received. A technical and editorial review of the revised

      document is conducted within the Project'
    dates:
    - start: '1999-11-15'
      kind: effective
  - type: resolves
    message: 'The SC 4 Quality Manual provides

      procedures and guidelines for preparation of the document and for review of its

      content. The Project Leader and the Working Group Convener review and approve

      the document using the checklists provided by the Quality Committee before the next


      stage of balloting starts.

      For a TS, the Chairman and Secretariat, in conjunction with the Project Leader,

      assess the nature of any comments and decide whether to either

      (a) submit the revised document to ISO for publication as a TS, and prepare a report

      for SC 4 how all the comments have been addressed, or

      (b) resubmit the document for a further CD ballot.

      Clauses 6.2.4, 7.6, 8.2: Add TS to CD in the list of documents'
    dates:
    - start: '1999-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '1999-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 further requests its secretariat to make the corresponding changes to the SC 4

      web pages.'
