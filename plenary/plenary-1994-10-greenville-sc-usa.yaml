    number: '223'
  kind: resolution
  status: decided
  dates:
  - date: '1994-10-15'
    type: adoption
  title:
  - spelling: eng
    value: Distribute status report on SC 4 projects prior to each meeting
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: directs
    date_effective:
      date: '1994-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        The SC 4 Secretariat shall distribute, at least six weeks prior to each SC 4 meeting, a
        report on the status of SC 4 projects. This report shall have the following attributes:

        A summary sheet showing summary status of each project. This will include a short
        description; significant changes to a project; and, if a project is not progressing, an
        indication of the problems and/or barriers to progress.

        Detailed project descriptions about the above problem projects. This will include
        participants' lists, and project status in ballot process.

        The NIPDE Electronic Library project information on STEP parts and APs will be
        reviewed by P members to ascertain if its information content is proper to contain the
        information needed.
