- identifier: '215'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: its Secretariat to add to its program of work a project titled "Revision to the
  dates:
  - start: '1994-10-15'
    kind: decision
  actions:
  - type: directs
    message: 'SC 4 directs its Secretariat to add to its program of work a project titled "Revision to the

      EXPRESS Language Reference Manual ISO 10303-11". Further, SC 4 confirms Dr.

      Phil Spiby as Project Leader.  PMAG notes that this project was approved by PMAG

      at the Atlanta meeting.

      In order to gain broad awareness and participation in this project, SC 4 directs the

      Project Leader to prepare a formal scope statement for the project (similar to the one

      on the New Work Item form) and a full list of requirements for the revision, to be

      delivered to the Secretariat by January 1995 for circulation to all SC 4 Members and

      organizations in liaison with SC 4.'
    dates:
    - start: '1994-10-15'
      kind: effective
- identifier: '216'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO/TC 184/SC 4 recognizes the need to promote the introduction of STEP into
  dates:
  - start: '1994-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'ISO/TC 184/SC 4 recognizes the need to promote the introduction of STEP into

      industry by providing an organizational framework that supports:

      an information exchange platform for implementors of STEP regarding

      clarification of questions arising during implementation

      evaluation of proposed solutions to problems taking into account the STEP

      standard user needs and implementation practicality

      endorsement of a selected solution which is to be used in the implementation'
    dates:
    - start: '1994-10-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests all member bodies to investigate possible remedies to this need. The

      workshop concept established in the OSI-MMS environment for this purpose shall be

      taken into account. Member bodies are expected to provide a written position paper

      to the SC 4 Chairman by February 15, 1995, and the collection of positions will be

      distributed to SC 4 members by the Secretariat.'
    dates:
    - start: '1994-10-15'
      kind: effective
- identifier: '217'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: a new working group to resolve the technical direction and related
  dates:
  - start: '1994-10-15'
    kind: decision
  actions:
  - type: establishes
    message: 'SC 4 establishes a new working group to resolve the technical direction and related


      technical issues of SC 4 so that the results are consistent with the SC 4 vision and

      acceptable to SC 4 as a whole.

      The objective is to define and maintain a consistent set of architectures for the

      standards within SC 4.

      The principal deliverable of the working group is a standard or set of standards that

      document the architectures and the corresponding framework for methods.

      Membership in this working group shall be limited.  National bodies are asked to

      nominate members to the WG based on the desire to limit membership, the ability to

      carry out these terms of reference, and the need to include representatives from all

      areas of work within SC 4.  It is also considered important that the members of the

      WG shall also be members of other working groups.

      The terms of reference for the group are to:

      provide technical leadership across the standards under SC 4;

      collect, evaluate and respond to issues raised against the architectures and the

      corresponding methods;

      review, at intervals not exceeding three years, the suitability of the architecture

      against current progress and future requirements;

      identify and implement necessary changes and enhancements to the

      architectures.

      Consideration shall be given to:

      other appropriate standards architecture;

      existing work in the global research and development community;

      prior work within SC 4;

      requirements for input from all existing work groups'
    dates:
    - start: '1994-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '1994-10-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests P Members to recommend experts and their candidate for Convener

      of this new WG by 24 November.  In making their recommendations, P Members are


      also encouraged to provide suggestions for membership from other nations.'
    dates:
    - start: '1994-10-15'
      kind: effective
