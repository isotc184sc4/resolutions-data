        * MOU/MG Report -- Howard Mason
        * X3D -- Soonhung Han
        * The Oil and Gas Interoperability (OGI) Project -- David Leal
        * Liaison Issues -- Howard Mason

        We appreciate your representation to and for ISO/TC 184/SC 4.
