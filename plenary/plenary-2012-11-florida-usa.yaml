- identifier: '851'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Reappointment of SC 4 Chair
  dates:
  - start: '2012-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Reappointment of SC 4 Chair

      Resolution: SC4 endorses the nomination by the Secretariat of Howard Mason for an


      additional three year term as the Chair of ISO/TC 184 /SC 4 and instructs the

      Secretary to forward his nomination to ISO TC 184 within 30 days.

      ACKNOWLEDGEMENTS and APPRECIATIONS

      ACCLAMATION

      We offer thanks to Dr Tim King for leading the Forum on “Explaining the Business

      Benefits of SC 4 Standards “ and to the SC 4 experts who contributed to a successful

      session.

      ACCLAMATION

      Appreciation to our SC 4 Liaisons and those projects who presented at the Liaison

      Plenary

      •

      MOU/MG Report – Howard Mason

      •

      X3D - Soonhung Han

      •

      The Oil and Gas Interoperability (OGI) Project - David Leal

      •

      Liaison Issues – Howard Mason

      We appreciate your representation to and for ISO/TC 184/SC 4.

      ACCLAMATION'
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to Melissa Hildebrand and Krysten Wolf for their hosting

      and support of the 64th ISO/TC 184/SC 4 Plenary meetings at the Embassy Suites Hotel

      in Miami, Florida.

      Special acknowledgement is extended to the Miami Embassy Suites Hotel and its staff

      for their seamless and attentive support.'
    dates:
    - start: '2012-11-15'
      kind: effective
