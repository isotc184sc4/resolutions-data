- identifier: '842'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Revision of the scope of SC 4/WG 12
  dates:
  - start: '2012-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Revision of the scope of SC 4/WG 12

      Resolution: SC 4 revises the title and scope of WG 12 to:

      Title: STEP Product Modeling and Resources

      Scope:

       Develop and maintain ISO 10303 (STEP) application protocols (APs)

       Develop and maintain the information models in the STEP Module and

      Resource Library (SMRL) to support the APs, together with other common

      resources for SC 4

       Develop and maintain guidance for the use of STEP APs

       Develop and maintain standards for 3D visualization of product models

       Establish liaison with other standards activities working on information

      models useful as common resources for SC 4'
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 transfers the following teams and their work from WG 3 to WG 12:

       T1 Shape RepresentationT4 Materials

       T8 Product Life Cycle

       T9 Engineering Analysis

       T10 Electrical/Electronics

       T19 Mechanical Products

       T22 Building and Construction

       T24 Manufacturing

      Existing WG 12 teams such as Parametrics remain unchanged'
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests WG 12 to utilize WG 21 to execute the tasks necessary to maintain the

      SMRL'
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests WG 12 to utilize WG 22 to execute the tasks necessary to maintain

      reference data'
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: investigates
    message: 'SC 4 invites member bodies to nominate additional experts for the new scope of WG


      12.

      Attached documents: ISO/TC 184/SC 4 Reorganizations'
    dates:
    - start: '2012-11-15'
      kind: effective
