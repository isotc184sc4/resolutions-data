- identifier: '844'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Revision of the scope of SC 4/WG 2
  dates:
  - start: '2012-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Revision of the scope of SC 4/WG 2

      Resolution: SC 4 revises the title and scope of WG 2 to:

      Title: Product characteristics and libraries

      Scope:

       Develop and maintain International Standards for defining and

      exchanging product characteristics, based on open dictionaries

       Develop and maintain International Standards for defining and

      exchanging product libraries based on product characteristics

       Develop guidance for the implementation and use of the standards


       Establish liaisons with other standards groups that require services for

      the representation of product libraries and characteristics

      The scope excludes reference data libraries'
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 transfers work on ISO 22745 and 29002 to WG 2, and invites WG 2 to consider

      the establishment of teams focused on each standard'
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: investigates
    message: 'SC 4 invites member bodies to nominate additional experts for the new scope of WG 2.

      Attached documents:  ISO/TC 184/SC 4 Reorganizations'
    dates:
    - start: '2012-11-15'
      kind: effective
