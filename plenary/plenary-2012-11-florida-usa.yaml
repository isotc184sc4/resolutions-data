- identifier: '849'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Transfer of ISO 16739 from ISO/TC 184/SC 4 work
  dates:
  - start: '2012-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Transfer of ISO 16739 from ISO/TC 184/SC 4 work

      programme to ISO/TC 59/SC 13 work programme

      Resolution: SC 4 notes TC 59 Resolution 327 and requests participation in the

      development of the document to be created by TC 59 to facilitate the collaboration

      between SC 4, TC 59/SC 13 and buildingSMART, in order to establish the necessary

      operational procedures'
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: asks
    message: 'SC 4 asks its PPC, WG 11 and WG 12 to consider the appointment of some of its

      members as participants of the development activity'
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: agrees
    message: 'SC 4 agrees to establish a Joint Working Group with ISO/TC 59/SC 13 for the

      maintenance of ISO 16739 and development of related standards, with appropriate

      liaison with buildingSMART'
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2012-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests a report from the joint working group at the Paris meeting.


      Attached documents:  See below extract from resolutions of TC 59 meeting

      TC 59 Resolution 327 (Tokyo 12)

      TC59 supports all the resolutions and recommendations made by different SCs of

      TC 59 during the plenary week, 14-19 October 2012 in Tokyo. In particular, TC 59

      acknowledges:

      SC13:

      Resolution 146 (Tokyo 6) Transfer of responsibility for ISO 16739 from ISO/TC

      184/SC 4 to ISO/TC 59/SC 13

      SC 13 welcomes the transfer of responsibility for ISO 16739 from ISO/TC 184/SC 4

      should the ISO/TC 184/SC 4 resolve this at their next Plenary meeting in Miami in

      November 2012. SC 13 is positive to the idea of establishing a JWG between

      ISO/TC 184/SC 4/WG 12 and SC 13.

      Resolution 147 (Tokyo 7) Development of formal document on SC 13 and

      buildingSMART International collaboration

      SC 13 asks the SC 13 secretariat to develop a formal document to facilitate the

      collaboration between SC 13 and buildingSMART International by describing the ways

      in which documents and information are exchanged between the two and provide

      some guidelines as to how meetings can be arranged. This document should also

      address the relation to ISO/TC 184.

      TC 59 requests that the collaboration document follows the requirements of the ISO

      Directives and requests that once finished, the document should be applicable also at

      the TC level.'
    dates:
    - start: '2012-11-15'
      kind: effective
