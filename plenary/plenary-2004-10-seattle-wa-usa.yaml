- identifier: '622'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Progress on Modular APs
  dates:
  - start: '2004-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Progress on Modular APs
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests ISO to consider the progress of individual modules when

      deciding whether it is appropriate to cancel an AP Project for lack of progress.

      In particular, ballot submission of a substantive set of the new implementation and

      foundation modules that are included within the scope of an AP (as defined in its

      NWI), should also be considered as a change in the status for the overall AP

      document, and should therefore preclude its cancellation for lack of progress'
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to ask ISO to apply this approach to the development of

      AP233 as a test case, noting the substantive progress on an initial set of modules, and

      the threat of cancellation of the AP project in January 2005.'
    dates:
    - start: '2004-10-15'
      kind: effective
- identifier: '623'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Retention of ISO TS 10303-28 ed1 in the ISO Catalogue of Available ISO Standa...
  dates:
  - start: '2004-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Retention of ISO TS 10303-28 ed1 in the ISO Catalogue of Available ISO Standards
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests the ISO Central Secretariat to retain the listing of ISO TS 10303-28

      edition 1 in the ISO catalogue of available International Standards, after the

      publication of the ISO TS 10303-28 edition 2 "Implementation methods: XML

      representations of EXPRESS schemas and data, using XML schemas".

      Note: Action 124 to notify ISO CS of name change in the database.'
    dates:
    - start: '2004-10-15'
      kind: effective
- identifier: '624'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appointment of a New SC 4 Education and Outreach Rapporteur
  dates:
  - start: '2004-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Appointment of a New SC 4 Education and Outreach Rapporteur
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: appoints
    message: 'SC 4 appoints Mr. Darren Meister as the new SC 4 Education and Outreach

      Rapporteur to act as the focal point for SC 4 outreach, education, and promotional

      activities.  These activities should be closely linked to International Industry STEP

      Centers (ISC) related marketing and promotional activities.'
    dates:
    - start: '2004-10-15'
      kind: effective
  considerations:
  - type: recognizing
    message: 'Recognizing the continuing need to make industry, the public, the research

      community, and other stakeholders knowledgeable of SC 4 standards and SC 4

      activities'
    dates:
    - start: '2004-10-15'
      kind: effective
- identifier: '625'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: PWI for Lifecycle support of AEC facilities
  dates:
  - start: '2004-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'PWI for Lifecycle support of AEC facilities

      The goal of this PWI is to create a NWI for a model for lifecycle support of AEC

      facilities. The following tasks will be performed:

      * Detailed in scope, out of scope analysis of the information requirements of

      AEC facilities including information requirement for facility management.

      * Review of capability of existing SC 4 standards to cover lifecycle aspects such

      as facility management. Describe to which extent they cover the information

      requirements of AEC facilities

      * Describe gaps and necessary adaptations

      * Explore feasibility and best approach to combine existing standards. The

      different approaches of developing a modular AP or a conventional approach

      will be assessed'
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs WG 3 to create the NWI within 6 months forward it to SC 4 for review and


      approval, and appoints Inhan Kim and Wolfgang Haas as co project leaders

      Attached documents: Description of the PWI, ISO/TC 184/SC 4/WG 3 N1505, change

      management project review questionnaire, ISO/TC 184/SC 4/WG 3 N1506.'
    dates:
    - start: '2004-10-15'
      kind: effective
- identifier: '626'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Harvesting of SASIG - PDQ 2.0
  dates:
  - start: '2004-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Harvesting of SASIG - PDQ 2.0
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: creates
    message: 'SC 4 creates an ad hoc group led by Oscar Rocha to assess the proposal from

      SASIG to transpose the PDQ 2.0 guidelines into a Publicly Available Specification

      (PAS)'
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: investigates
    message: 'SC 4 invites WG 3, WG 11, WG 12, PPC and the Quality Committee (QC) to

      nominate representatives by 2004-11-30. The ad hoc group is requested to assess

      the specification and explanatory report (SC 4 N1792), negotiate with SASIG on any

      issues, and make a recommendation to SC 4 by 2005-01-31 on how to process the

      proposal.'
    dates:
    - start: '2004-10-15'
      kind: effective
