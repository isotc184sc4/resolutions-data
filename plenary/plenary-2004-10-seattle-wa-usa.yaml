- identifier: '630'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appreciation to Chuck Stark
  dates:
  - start: '2004-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Appreciation to Chuck Stark
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its utmost appreciation to Chuck Stark for his many years of

      dedication organizing all SC 4 meetings held in North America for the last 14 years.

      Chuck has provided an extremely high level of support and hospitality to make these

      meetings successful'
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: resolves
    message: SC 4 wishes Chuck every success in his future endeavours.
    dates:
    - start: '2004-10-15'
      kind: effective
- identifier: '631'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appreciation to Tony Fry
  dates:
  - start: '2004-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Appreciation to Tony Fry
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses its sincere thanks to Tony Fry for his long-standing, dedicated efforts

      and excellent performance in the leadership of WG 3/T23, and wishes him all the best

      for his future. In particular, it would like to commend him for his efforts leading to the

      adoption of four Shipbuilding Application Protocols as ISO Standards and for his

      leadership in organizing the ISO/TC 184/SC 4 meeting in Bath, U.K.'
    dates:
    - start: '2004-10-15'
      kind: effective
- identifier: '632'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Acknowledgements and Appreciations
  dates:
  - start: '2004-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Acknowledgements and Appreciations

      ACCLAMATION:'
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to Ricardo Goncalves for his dedication, untiring


      efforts, enthusiasm, and creativity as the leader for the SC 4 Education and Outreach

      Initiative. Ricardo will be remembered for his willingness to take on unpopular, but

      essential tasks and his valuable assistance to all. The challenge of finding his

      replacement will not be trivial'
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 wishes him well in his future endeavors, and looks forward to his continued

      contribution to the work of SC 4.

      APPRECIATION:'
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 wishes to give its unanimous thanks to US PRO, its Members and the staff of the

      Seattle Renaissance Hotel for their efforts in organizing this meeting, arranging the

      facilities, excellent food, and excellent social events.

      APPRECIATION:'
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: recommends
    message: 'SC 4 commends Chuck Stark for the outstanding arrangements that contributed to the

      successful completion of SC 4 business'
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: recognizes
    message: 'SC 4 recognizes the unique talents and demanding requirements necessary to

      support the SC 4 meeting workload. A special recognition to Ms Sarah Hartline and

      Ms Karri McGough for their superior administrative support, outstanding hospitality,

      and patience before and during the ISO/TC 184/SC 4 meeting.'
    dates:
    - start: '2004-10-15'
      kind: effective
