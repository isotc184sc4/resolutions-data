  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: creates
    date_effective:
      date: '2004-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 creates an ad hoc group led by Oscar Rocha to assess the proposal from
        SASIG to transpose the PDQ 2.0 guidelines into a Publicly Available Specification
        (PAS).
  - type: requests
    date_effective:
      date: '2004-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 invites WG 3, WG 11, WG 12, PPC and the Quality Committee (QC) to
        nominate representatives by 2004-11-30. The ad hoc group is requested to assess
        the specification and explanatory report (SC 4 N1792), negotiate with SASIG on any
        issues, and make a recommendation to SC 4 by 2005-01-31 on how to process the
        proposal.
