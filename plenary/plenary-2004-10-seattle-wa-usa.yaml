- identifier: '628'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Liaison statement to IEC SC 65B to ensure the rapid development of dictionaries
  dates:
  - start: '2004-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Liaison statement to IEC SC 65B to ensure the rapid development of dictionaries

      compliant to ISO 13584 / IEC61360 in the area of measuring instruments'
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: decides
    message: 'SC 4 decides to split the scope of the registered dictionary defined by ISO 13584 Part

      501 (ISO id 39753) into two parts, covering (a) laboratory and environment measuring

      instruments and (b) industrial process measuring instruments'
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs WG 2 to stop the work on item (b) and directs its Secretariat to offer the

      work on this item to IEC SC 65B for potential publication either as a joint ISO/IEC

      standard or as an IEC standard'
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs WG 2 to continue the work on item (a), and authorizes a new delivery

      date for the DIS ballot of 2004-11-30'
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: investigates
    message: 'SC 4 invites IEC experts to contribute to the work on item (a) in WG 2, both during

      the further development of the standard and during the operation of the registration


      authority'
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: encourages
    message: 'SC 4 encourages WG 2 experts who are also members of IEC to

      participate in the work of IEC SC 65B on item (b)'
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2004-10-15'
      kind: effective
  - type: instructs
    message: 'SC 4 instructs WG 2 to take into account forthcoming results of ISO/IEC JWG 1

      concerning the maintenance of dictionaries during the preparation of the next

      versions of the ISO 13584-501 standard.'
    dates:
    - start: '2004-10-15'
      kind: effective
