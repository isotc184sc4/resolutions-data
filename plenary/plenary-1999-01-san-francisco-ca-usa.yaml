- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '394'
  kind: resolution
  status: decided
  dates:
  - date: '1999-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Allow nominated STEP projects to adopt modular approach
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: following
      date_effective:
        date: '1999-01-15'
        type: effective
      message: 'Further to Resolution 374.

        '
    actions:
    - type: resolves
      date_effective:
        date: '1999-01-15'
        type: effective
      message: |
        SC 4 resolves to allow nominated STEP projects to adopt the modular approach as defined in the following deliverables of the WG 10 STEP Modularization PWI:

        1. WG 10 N221 Guidelines for the content of application modules Revision 0.6
        2. WG 10 N222 Guidelines for the content of application protocols using application modules Revision 0.6
        3. WG 10 N219 Industrial Framework Model Version 0.95
        4. WG 10 N223 Application Module Development Points within the Application Protocol Development Process Draft 0.1
        5. WG 10 N246 The Proposed Approach to STEP Modularization (Slide Presentation)
        6. WG 10 N247 WG 10 STEP Modularization PWI Proposal for Standardization of Modules and Extensions Draft 0.3 (Slide Presentation)
        7. WG 10 N226 WG 10 STEP Modularization PWI Proposal for Standardization of Modules and Extensions Draft 0.1 (White Paper)
        8. WG 10 N227 WG 10 STEP Modularization Requirements Specification Revision 0.1
        9. WG 10 N228 STEP Modularization PWI Issue Log
        10. WG 10 N229 The STEP Modules Catalogue Demo
    - type: resolves
      date_effective:
        date: '1999-01-15'
        type: effective
      message: 'SC 4 resolves that the results of the nominated projects may be published
        as PASs or TSs.

        '
    - type: nominates
      date_effective:
        date: '1999-01-15'
        type: effective
      message: 'SC 4 nominates the Engineering Analysis Core Model and the PDES Inc
        modular extension projects to endeavor to develop their deliverables using
        the above process.

        '
    - type: directs
      date_effective:
        date: '1999-01-15'
        type: effective
      message: 'SC 4 directs the WG 10 STEP Modularization PWI to support these projects
        and continue the development of the required guidelines and processes until
        SC 4 approves the documents and the supporting SC 4 organizations are in place.

        '
    - type: requests
      date_effective:
        date: '1999-01-15'
        type: effective
      message: |
        SC 4 requests that its members, liaisons and other organizations provide additional resources to support this effort in the following areas:

        11. finalizing requirements;
        12. resolving the remaining technical and organizational issues;
        13. reviewing and commenting on guideline documents;
        14. using the modular approach and providing feedback to WG 10;
        15. Addressing the use of ITAs, PASs and TSs within SC 4.
    - type: requests
      date_effective:
        date: '1999-01-15'
        type: effective
      message: 'SC 4 requests WG 10 to report on progress on the pilot projects to
        the next SC 4 meeting.

        '
