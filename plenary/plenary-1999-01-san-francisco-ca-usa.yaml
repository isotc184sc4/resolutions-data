- identifier: '398'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: the nomination of a point of contact within the ISO CS, to work with
  dates:
  - start: '1999-01-15'
    kind: decision
  actions:
  - type: welcomes
    message: 'SC 4 welcomes the nomination of a point of contact within the ISO CS, to work with

      the current IEC Technical Officer, noting that ISO/TC 184 is the only ISO Technical

      Committee with such an arrangement'
    dates:
    - start: '1999-01-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '1999-01-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes the increasing importance of coordination with other ISO Technical

      Committees and Subcommittees, particularly in the context of the Memorandum of

      Understanding between ISO, IEC, UN/CEFACT and the participating International

      User Groups, and also seeks to fully exploit the new ISO deliverables and electronic

      publication methods.

      Accordingly, SC 4 requests ISO/TC 184 and the ISO CS to take the necessary steps


      to provide ISO/TC 184 with a Technical Officer from the ISO staff.'
    dates:
    - start: '1999-01-15'
      kind: effective
