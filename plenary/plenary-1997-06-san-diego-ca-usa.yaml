- identifier: '334'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: WG 12 to produce consensus-built documents of revisions to 10303-
  dates:
  - start: '1997-06-15'
    kind: decision
  actions:
  - type: requests
    message: 'SC 4 requests WG 12 to produce consensus-built documents of revisions to 10303-

      41, 43, and 44 to be completed and into Quality Committee for qualification no later

      than 1997-08-15. Quality Committee is to give the review and signoff of these parts

      its highest priority. P-members are actively encouraged to provide technical experts

      to both WG 12 and Quality Committee to meet these goals.

      In the case that WG 12 does not reach consensus by the end of the [revisions

      development] workshop (1997-07-25), the SC 4 Chair will decide by 1997-07-31

      which documents are sent to Qualification by 1997-08-15. The Change Management

      Team is requested to provide a clear business framework for guiding the technical

      debate prior to the workshop (1997-07-21).'
    dates:
    - start: '1997-06-15'
      kind: effective
