  dates:
  - start: '1997-06-15'
    kind: decision
  actions:
  - type: creates
    message: 'SC 4 creates an ad hoc group "Shared Enterprise Data" to:

       Review the developments in other standards organisations related to data

      modelling and standardisation of enterprise information

       Establish an SC 4 position with respect to these activities that can be presented

      to other standards bodies and to the proposed coordinating group.

