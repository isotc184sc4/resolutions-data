- identifier: 481-acclamation-1
  subject: ISO/TC 184/SC 4 "Industrial data"
  dates:
  - start: '2000-10-15'
    kind: decision
  actions:
  - type: thanks
    message: 'SC 4 expresses its appreciation to its meeting host, US PRO, for the excellent meeting

      facilities, good food, as well as the wonderful Social Event on Tuesday evening. SC 4

      also expresses its appreciation for their hospitality and outstanding support both

      before and during the meeting.

      SC 4 commends Chuck Stark for the outstanding arrangements that contributed to the

      successful completion of SC 4 business.

      A special recognition to Stacy Watts, Jill Vaning, and Linda Beck for their hospitality,

      patience and outstanding support and all around good humor during crises both

      before, during, and after the ISO/TC 184/SC 4 meeting.'
    dates:
    - start: '2000-10-15'
      kind: decision
- identifier: 481-acclamation-2
  subject: ISO/TC 184/SC 4 "Industrial data"
  dates:
  - start: '2000-10-15'
    kind: decision
  actions:
  - type: thanks
    message: 'SC 4 expresses its appreciation to Sophie Clivio for taking time from her busy

      schedule to participate in our meeting and for her valuable guidance and support for

      SC 4 work.'
    dates:
    - start: '2000-10-15'
      kind: decision
- identifier: 481-acclamation-3
  subject: ISO/TC 184/SC 4 "Industrial data"
  dates:
  - start: '2000-10-15'
    kind: decision
  actions:
  - type: thanks
    message: 'SC 4 expresses its appreciation to Larry McKee for many years of outstanding

      leadership, and his many contributions to the development of SC 4 standards. Larry

      will be remembered for his patience and his valuable assistance to all.  Last but not


      least Larry will be remembered for his special “personal” humor and he will be

      missed.'
    dates:
    - start: '2000-10-15'
      kind: decision
- identifier: 481-acclamation-4
  subject: ISO/TC 184/SC 4 "Industrial data"
  dates:
  - start: '2000-10-15'
    kind: decision
  actions:
  - type: thanks
    message: 'SC 4 expresses its appreciation to those who participated for their outstanding

      contributions and professionalism this week to the work of ISO/TC 184/SC 4.'
    dates:
    - start: '2000-10-15'
      kind: decision
