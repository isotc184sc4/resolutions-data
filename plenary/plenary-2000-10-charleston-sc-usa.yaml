metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Charleston, United States, October 12, 2000 – October 20, 2000
  dates:
  - start: '2000-10-12'
    end: '2000-10-20'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Charleston, United States
resolutions:
- identifier: '475'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Permission to Include Photographs in SC 4 Documents
  dates:
  - start: '2000-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Permission to Include Photographs in SC 4 Documents
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves that photographs may be included in SC 4 normative documents when

      such photographs will enhance the understandability and use of those documents, in

      accordance with ISO directives'
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs the Quality Committee to exclude any restriction in the Supplementary

      Directives on the inclusion of photographs.'
    dates:
    - start: '2000-10-15'
      kind: effective
- identifier: '476'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Rep lacem en t fo r Cha ir of Im p leme n to r’s Fo rum
  dates:
  - start: '2000-10-15'
    kind: decision
