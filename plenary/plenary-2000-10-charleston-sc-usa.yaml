- identifier: '477'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Integrated Manufacturing Task Force
  dates:
  - start: '2000-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Integrated Manufacturing Task Force
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: creates
    message: 'SC 4 creates a task force on Integrated Manufacturing for mechanical components,

      with the following objectives:

      - Define the scope of Integrated Manufacturing

      - Create an Integrated AAM covering the whole scope of Integrated Manufacturing

      for mechanical components, taking into account the overlapping requirements of

      other sectors

      - Evaluate the current SC 4 and other relevant normative documents in relation to

      the Integrated AAM, and to identify the overlaps and the missing links

      - Create requirements for enhancing current SC 4 and other relevant

      normative documents- Survey the evidence of industrial needs for this effort

      The results of the technical evaluation will be submitted to SC 4 at the next meeting,

      and the survey on industrial needs at the following meeting'
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: appoints
    message: SC 4 appoints Pr. Takeshi Kishinami as leader of the task force
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: directs
    message: SC 4 directs its secretariat to circulate to P-members and A-liaisons a call for experts.
    dates:
    - start: '2000-10-15'
      kind: effective
- identifier: '478'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: New ISO Number for Express Edition 3
  dates:
  - start: '2000-10-15'
    kind: decision
  actions:
  - type: resolves
    message: New ISO Number for Express Edition 3
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests ISO Central Secretariat to provide a new standard number for SC 4

      project #32952'
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves that SC 4 project #32952 be removed as a part of ISO 10303 and

      published as a draft technical specification part under the new standard number'
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs WG 11 and Express team to continue efforts to deliver this in a timely

      fashion and to take into account any requirements for dynamic capabilities arising from

      SC 5'
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests WG 11 to identify a new name for the standard, emphasizing its

      derivation from EXPRESS.'
    dates:
    - start: '2000-10-15'
      kind: effective
- identifier: '479'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: UML-EXPRESS Cooperation
  dates:
  - start: '2000-10-15'
    kind: decision
  actions:
  - type: resolves
    message: UML-EXPRESS Cooperation
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves that WG 11 create a team of people lead by Bernd Wenzel and

      including, but not limited to, the following individuals:

      Dave Price

      Phil Spiby'
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs this team to work with the UML 2.0 submission teams to achieve the

      harmonization of EXPRESS and UML and act as a liaison with ISO/IEC JTC 1/SC 7'
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: requests
    message: SC 4 requests SC 4 secretariat to send a call for experts for the team.
    dates:
    - start: '2000-10-15'
      kind: effective
- identifier: '480'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Cancellation of Inactive ATS Projects
  dates:
  - start: '2000-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Cancellation of Inactive ATS Projects
    dates:
    - start: '2000-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 cancels the following inactive Abstract Test Suite Parts of ISO 10303, and

      instructs its Secretariat to remove them from the work programme, in the absence of

      any firm development commitment by 20 February 2001:

      301, 309, 310, 313, 315, 316, 317, 321, 322, 323, 326, 327, 334, 335'
    dates:
    - start: '2000-10-15'
      kind: effective
