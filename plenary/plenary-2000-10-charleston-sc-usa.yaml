  - date: '2000-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Allow photographs in SC 4 normative documents
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: resolves
      date_effective:
        date: '2000-10-15'
        type: effective
      message: |
        SC 4 resolves that photographs may be included in SC 4 normative documents when
        such photographs will enhance the understandability and use of those documents, in
        accordance with ISO directives.
    - type: directs
      date_effective:
        date: '2000-10-15'
        type: effective
      message: |
        SC 4 directs the Quality Committee to exclude any restriction in the Supplementary
        Directives on the inclusion of photographs.
- identifier:
  - prefix: ISO/TC 184/SC 4
