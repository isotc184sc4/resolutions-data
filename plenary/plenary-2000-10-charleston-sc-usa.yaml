    title: Cancel inactive Abstract Test Suite Parts of ISO 10303
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: resolves
      date_effective:
        date: '2000-10-15'
        type: effective
      message: |
        SC 4 cancels the following inactive Abstract Test Suite Parts of ISO 10303, and
        instructs its Secretariat to remove them from the work programme, in the absence of
        any firm development commitment by 20 February 2001:

        301, 309, 310, 313, 315, 316, 317, 321, 322, 323, 326, 327, 334, 335
