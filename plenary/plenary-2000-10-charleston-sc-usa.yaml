  - language_code: eng
    script: Latn
    title: Endorse Martin Hardwick as Chair of Industrial Data Implementor's Forum
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: endorses
      date_effective:
        date: '2000-10-15'
        type: effective
      message: |
        SC 4 endorses the nomination of Martin Hardwick as Chair of the Industrial Data
        Implementor's Forum to serve for a period of three years.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '477'
  kind: resolution
  status: decided
  dates:
  - date: '2000-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Create task force on Integrated Manufacturing for mechanical components
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: creates
      date_effective:
        date: '2000-10-15'
        type: effective
      message: |
        SC 4 creates a task force on Integrated Manufacturing for mechanical components,
        with the following objectives:

        * Define the scope of Integrated Manufacturing
        * Create an Integrated AAM covering the whole scope of Integrated Manufacturing
          for mechanical components, taking into account the overlapping requirements of
          other sectors
        * Evaluate the current SC 4 and other relevant normative documents in relation to
          the Integrated AAM, and to identify the overlaps and the missing links
        * Create requirements for enhancing current SC 4 and other relevant
          normative documents - Survey the evidence of industrial needs for this effort

        The results of the technical evaluation will be submitted to SC 4 at the next meeting,
        and the survey on industrial needs at the following meeting.
    - type: appoints
      date_effective:
        date: '2000-10-15'
        type: effective
      message: 'SC 4 appoints Pr. Takeshi Kishinami as leader of the task force.

        '
    - type: directs
      date_effective:
        date: '2000-10-15'
        type: effective
      message: 'SC 4 directs its secretariat to circulate to P-members and A-liaisons
        a call for experts.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '478'
  kind: resolution
  status: decided
  dates:
  - date: '2000-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Request new ISO number for EXPRESS Edition 3
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2000-10-15'
        type: effective
      message: |
        SC 4 requests ISO Central Secretariat to provide a new standard number for SC 4
        project #32952.
    - type: resolves
      date_effective:
        date: '2000-10-15'
        type: effective
      message: |
        SC 4 resolves that SC 4 project #32952 be removed as a part of ISO 10303 and
        published as a draft technical specification part under the new standard number.
    - type: directs
      date_effective:
        date: '2000-10-15'
        type: effective
      message: |
        SC 4 directs WG 11 and Express team to continue efforts to deliver this in a timely
        fashion and to take into account any requirements for dynamic capabilities arising from
        SC 5.
    - type: requests
      date_effective:
        date: '2000-10-15'
        type: effective
      message: |
        SC 4 requests WG 11 to identify a new name for the standard, emphasizing its
        derivation from EXPRESS.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '479'
  kind: resolution
  status: decided
  dates:
  - date: '2000-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Create team for UML-EXPRESS cooperation and harmonization
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: resolves
      date_effective:
        date: '2000-10-15'
        type: effective
      message: |
        SC 4 resolves that WG 11 create a team of people lead by Bernd Wenzel and
        including, but not limited to, the following individuals:

        * Dave Price
        * Phil Spiby
    - type: directs
      date_effective:
        date: '2000-10-15'
        type: effective
      message: |
        SC 4 directs this team to work with the UML 2.0 submission teams to achieve the
        harmonization of EXPRESS and UML and act as a liaison with ISO/IEC JTC 1/SC 7.
    - type: requests
      date_effective:
        date: '2000-10-15'
        type: effective
      message: 'SC 4 requests SC 4 secretariat to send a call for experts for the
        team.

        '
- identifier:
