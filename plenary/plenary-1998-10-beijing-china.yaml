- identifier: '385'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Further to Resolution 376, SC 4 requests its Secretariat to distribute the at...
  dates:
  - start: '1998-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Further to Resolution 376, SC 4 requests its Secretariat to distribute the attached

      outline capability definition for the April 2003 release of SC 4 standards (SC 4 N776)

      to P and O-members and liaisons, with an invitation to provide written comments by

      the end of 1998, and further to nominate experts for an ad hoc meeting to refine the

      definition, to be held during the January 1999 meeting of SC 4.'
    dates:
    - start: '1998-10-15'
      kind: effective
- identifier: '386'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO/TC 184/SC 4 is pleased to see that ISO/TC 211 is ready to harmonize its g...
  dates:
  - start: '1998-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'ISO/TC 184/SC 4 is pleased to see that ISO/TC 211 is ready to harmonize its geometry

      representation with the one published in ISO 10303-42 and ISO 10303-43, as indicated


      by ISO/TC 211 Resolution 78.

      ISO/TC 184/SC 4 instructs its secretariat to announce a meeting on collaborative use

      of geometry between ISO 10303-42/43 and ISO 15046-7/11, to be held 1999-02-

      01/05 in the USA.

      ISO/TC 184/SC 4 encourages all its working groups and projects and requests

      especially the Shape Representation project in its WG 12 and the Building and

      Construction Team in its WG 3 to participate in this meeting.'
    dates:
    - start: '1998-10-15'
      kind: effective
- identifier: '387'
