- identifier: '383'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: the approval of the NWI "Ship Operational Logs, Records, and
  dates:
  - start: '1998-10-15'
    kind: decision
  actions:
  - type: notes
    message: 'SC 4 notes the approval of the NWI "Ship Operational Logs, Records, and

      Messages" as ISO 10303-234'
    dates:
    - start: '1998-10-15'
      kind: effective
  - type: recognizes
    message: 'SC 4 recognizes that the information requirements

      are derived in part from the scope of ISO/TC 8/SC 10, Ships and Marine

      Technology/Computer Applications. SC 4, therefore, approves the creation of a joint

      working group (JWG) between ISO/TC 8/SC 10 and ISO/TC 184/SC 4.

      The scope of the JWG shall be the development of Application Protocol ISO 10303-

      234 including documentation that supports the usage of this AP.

      In order to ensure a development in accordance with the STEP procedures for

      Application Protocols and harmonisation with the current ship APs the joint working

      group shall be placed as JWG 14, "Ship Operational Logs", under ISO/TC 184/SC 4. To

      draw maximum benefit from the expertise of ISO/TC 8/SC 10, SC 4 encourages the

      active participation of ISO/TC 8/SC 10 experts in the JWG. The JWG shall collaborate

      closely with ISO/TC 184/SC 4/WG 3/T23 Ships, ISO/TC 8/WG 6, Maritime Navigation

      and Radio Communication Equipment and Systems / Digital Interfaces for

      Navigational Equipment within a Ship, and IEC/TC 18, Electrical Installations of

      Ships and of mobile and fixed Offshore Units.'
    dates:
    - start: '1998-10-15'
      kind: effective
- identifier: '384'
