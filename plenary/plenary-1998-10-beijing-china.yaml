- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '385'
  kind: resolution
  status: decided
  dates:
  - date: '1998-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Distribute capability definition for 2003 release and request comments
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: following
      date_effective:
        date: '1998-10-15'
        type: effective
      message: 'Further to Resolution 376.

        '
    actions:
    - type: requests
      date_effective:
        date: '1998-10-15'
        type: effective
      message: 'SC 4 requests its Secretariat to distribute the attached outline capability
        definition for the April 2003 release of SC 4 standards (SC 4 N776) to P and
        O-members and liaisons, with an invitation to provide written comments by
        the end of 1998, and further to nominate experts for an ad hoc meeting to
        refine the definition, to be held during the January 1999 meeting of SC 4.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '386'
  kind: resolution
  status: decided
  dates:
  - date: '1998-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Announce meeting on collaborative use of geometry with ISO/TC 211
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '1998-10-15'
        type: effective
      message: 'Noting that ISO/TC 184/SC 4 is pleased to see that ISO/TC 211 is ready
        to harmonize its geometry representation with the one published in ISO 10303-42
        and ISO 10303-43, as indicated by ISO/TC 211 Resolution 78.

        '
    actions:
    - type: instructs
      date_effective:
        date: '1998-10-15'
        type: effective
      message: 'ISO/TC 184/SC 4 instructs its secretariat to announce a meeting on
        collaborative use of geometry between ISO 10303-42/43 and ISO 15046-7/11,
        to be held 1999-02-01/05 in the USA.

        '
    - type: encourages
      date_effective:
        date: '1998-10-15'
        type: effective
      message: 'ISO/TC 184/SC 4 encourages all its working groups and projects and
        requests especially the Shape Representation project in its WG 12 and the
        Building and Construction Team in its WG 3 to participate in this meeting.

        '
