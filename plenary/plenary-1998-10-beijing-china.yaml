- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '380'
  kind: resolution
  status: decided
  dates:
  - date: '1998-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Request ability to maintain previous editions of SC 4 standard parts
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: agrees
      date_effective:
        date: '1998-10-15'
        type: effective
      message: 'SC 4 agrees that the ability to maintain a previous edition of a part
        when a new edition is published may be useful in managing the evolution of
        SC 4 Standards.

        '
    - type: agrees
      date_effective:
        date: '1998-10-15'
        type: effective
      message: 'SC 4 further agrees that the decision to exercise this ability should
        be made on a part-by-part basis.

        '
    - type: requests
      date_effective:
        date: '1998-10-15'
        type: effective
      message: 'SC 4 requests its Secretariat to request a waiver from ISO Central
        Secretariat which would enable the ability to retain up to two editions of
        a part, to inquire as to what guidelines should apply, and to present an appropriate
        procedure for ratification at the next SC 4 meeting.

        '
