- identifier: '380'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: the ability to maintain a previous edition of a part when a new
  dates:
  - start: '1998-10-15'
    kind: decision
  actions:
  - type: agrees
    message: 'SC 4 agrees that the ability to maintain a previous edition of a part when a new

      edition is published may be useful in managing the evolution of SC 4 Standards'
    dates:
    - start: '1998-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '1998-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 further agrees that the decision to exercise this ability should be made on a

      part- by-part basis'
    dates:
    - start: '1998-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '1998-10-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to request a waiver from ISO Central Secretariat which

      would enable the ability to retain up to two editions of a part, to inquire as to what

      guidelines should apply, and to present an appropriate procedure for ratification at

      the next SC 4 meeting'
    dates:
    - start: '1998-10-15'
      kind: effective
