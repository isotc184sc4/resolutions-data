---
metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Rotterdam, Netherlands,
    January 25, 1988 -- February 4, 1988
  date: '1988-01-25'
  source: ISO/TC 184/SC 4 Secretariat
decisions:
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '13'
  kind: resolution
  status: decided
  dates:
  - date: '1988-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Approve the agenda for the Rotterdam meeting
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: approves
      date_effective:
        date: '1988-01-15'
        type: effective
      message: 'To approve the agenda for the Rotterdam meeting as amended.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '14'
  kind: resolution
  status: decided
  dates:
  - date: '1988-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Agree to meet at least annually to monitor STEP progress
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: agrees
      date_effective:
        date: '1988-01-15'
        type: effective
      message: |
        SC 4 agrees to meet at intervals of not more than one year, to allow national
        standards organizations and ISO management to formally monitor progress in STEP
        development.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '15'
  kind: resolution
  status: decided
  dates:
  - date: '1988-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Define organization and method of operation by April 1988
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: resolves
      date_effective:
        date: '1988-01-15'
        type: effective
      message: |
        SC 4 will define, by April 1988, an efficient organization and method of operation, based
        on working groups and an agreed project plan, which will report to SC 4 every quarter
        to clearly demonstrate progress against that plan.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '16'
  kind: resolution
  status: decided
  dates:
  - date: '1988-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Define and endorse STEP workplan by April 1988
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: resolves
      date_effective:
        date: '1988-01-15'
        type: effective
      message: |
        SC 4 will define and endorse, by 1 April 1988, a realistic workplan for STEP
        development, showing major milestones and taking into account existing material,
        available man hours, contributors qualifications and ISO procedures and to have this
        available to SC 4 members.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '17'
  kind: resolution
  status: decided
  dates:
  - date: '1988-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Reaffirm technical objectives of the STEP project
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: confirms
      date_effective:
        date: '1988-01-15'
        type: effective
      message: |
        SC 4 reaffirms the technical objectives of the STEP project as stated in resolutions 2
        and 9 (of SC 4). The STEP standard and its implementation shall feature:

        * wider scope than existing national standards
        * improved performance over existing standards
        * structured application-oriented sets of entities and topical models
        * unambiguous definitions
        * modular structure
        * upward compatibility between versions
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '18'
  kind: resolution
  status: decided
  dates:
  - date: '1988-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Circulate WG 1 reference documents for comment
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '1988-01-15'
        type: effective
      message: |
        SC 4 asks its secretariat to circulate for comments to the national bodies the following
        reference documents of WG 1 prepared at the January 1988 meeting:

        * Document 0.0 - Project Plan
        * Document 0.1 - Preliminary Design
        * Document 0.2 - Work Plan Status
        * Document 9.0 - Requirements for STEP

        These documents will be distributed before the end of February and comments should
        be received within two months.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '19'
  kind: resolution
  status: decided
  dates:
  - date: '1988-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Circulate initial parts of STEP Version 1.0 for comment
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '1988-01-15'
        type: effective
      message: "SC 4 asks its secretariat to circulate for comments of the national
        bodies the following\nparts of STEP Version 1.0 as a minimum set:\n\n* Document
        4.1.1 - EXPRESS\n* Document 4.2.1 - Physical File Format \n* Document 4.2.2
        - Mapping\n* Document 4.1.2.1 - Geometry and Topology\n\nThese documents will
        be distributed after the next meeting of WG 1 in March 1988 to\nserve as a
        basis for a draft proposal. Comments should be received within two\nmonths.
        After this period, these documents should be forwarded to the Central\nSecretariat
        for registration as a DP and for ballot by SC 4 at their next meeting. Other\ndocuments
        considered by WG 1 to be ready for review may be distributed at the\nsame
        time.\n"
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '20'
  kind: resolution
  status: decided
  dates:
  - date: '1988-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Direct WG 1 to produce software implementation framework
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: directs
      date_effective:
        date: '1988-01-15'
        type: effective
      message: |
        SC 4 directs WG 1 to produce a framework for software implementation, including
        implementation subsets, such as in VDAIS and application subsets, together with
        testing and validation procedures in parallel with each component of the standard
        submitted for approval.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '21'
  kind: resolution
  status: decided
  dates:
  - date: '1988-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Provide data migration methods from existing national standards
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: agrees
      date_effective:
        date: '1988-01-15'
        type: effective
      message: |
        SC 4 agrees that implementation of the STEP standard shall provide a method for
        migrating data from existing national standards such as IGES, SET and VDA-FS to
        the new standard, and directs WG 1 to establish the guidelines for the necessary
        tools and procedures to receive this data.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '22'
  kind: resolution
  status: decided
  dates:
  - date: '1988-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Welcome contribution of PDES cooperative to STEP
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: welcomes
      date_effective:
        date: '1988-01-15'
        type: effective
      message: |
        SC 4 wishes to formally recognize and welcome the potential contribution that can be
        made by the proposed PDES cooperative in accelerating the development and
        implementation of STEP.
    - type: notes
      date_effective:
        date: '1988-01-15'
        type: effective
      message: |
        SC 4 considers that it is essential to establish a working relationship with the
        cooperative when it is launched, similar to that which has already been achieved
        with the ESPRIT CAD*I, French SET and German VDA projects.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: 198801-acclaim-01
  kind: resolution
  status: decided
  dates:
  - date: '1988-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Thank and nominate Bradford M. Smith for second term
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: thanks
      date_effective:
        date: '1988-01-15'
        type: effective
      message: |
        SC 4 thanks Mr. Bradford M. Smith for his work as chairman of SC 4 and proposes to
        nominate Mr. Smith for a second three-year term.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '24'
  kind: resolution
  status: decided
  dates:
  - date: '1988-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Direct WG 1 to complete Presentation and Drafting documents
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: directs
      date_effective:
        date: '1988-01-15'
        type: effective
      message: |
        SC 4 directs WG 1 to concentrate its effort to complete Presentation and Drafting
        documents (according to the ISO drafting standards) so it will be available to be
        included in the Draft Proposal of STEP Version 1 for adoption at the SC 4 meeting
        scheduled for 2 December 1988 in Tokyo.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '25'
  kind: resolution
  status: decided
  dates:
  - date: '1988-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Confirm STEP standard will be defined using EXPRESS language
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: confirms
      date_effective:
        date: '1988-01-15'
        type: effective
      message: 'SC 4 confirms that the STEP standard will be defined using the EXPRESS
        language.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '26'
  kind: resolution
  status: decided
  dates:
  - date: '1988-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Direct WG 1 to maintain Open/Resolved Issues list
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: directs
      date_effective:
        date: '1988-01-15'
        type: effective
      message: |
        SC 4 directs WG 1 to maintain a list of "Open/Resolved Issues", distributed prior to
        each WG 1 meeting, as a basis of preparation and subsequent discussion by the
        experts.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '27'
  kind: resolution
  status: decided
  dates:
  - date: '1988-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Recommend ISO assist in coordinating related standards work
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '1988-01-15'
        type: effective
      message: |
        As standards developments must be based on technical excellence and use of the
        limited world wide expertise available,
    actions:
    - type: recommends
      date_effective:
        date: '1988-01-15'
        type: effective
      message: |
        SC 4 recommends that ISO assist in obtaining
        cooperation and coordination within related standards work such as in the
        electrical/electronic area with EDIF, STEP and VHDL.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '28'
  kind: resolution
  status: decided
  dates:
  - date: '1988-01-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Accept offer of liaison with SC 24
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: accepts
      date_effective:
        date: '1988-01-15'
        type: effective
      message: 'SC 4 wishes to accept the offer of a liaison with SC 24.

        '
