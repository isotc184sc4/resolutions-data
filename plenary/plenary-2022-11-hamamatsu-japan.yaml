- identifier: '1104'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Target Dates change to ISO/TS 23301 ed2
  dates:
  - start: '2022-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Target Dates change to ISO/TS 23301 ed2
    dates:
    - start: '2022-11-15'
      kind: effective
  - type: requests
    message: 'SC4 requests

      its Committee Manager modify the target date for

      Stage 20.20 (Working Draft study initiated) to 2022-11-05.

      Stage 30.00 (Committee draft registered to 2023-03-05

      Stage 60.60 (International Standard published) to 2023-09-01'
    dates:
    - start: '2022-11-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting the progress of the project team that is developing ISO/TS 23301 edition 2 and

      the balance to go in delivering the project as scheduled on 2022-12-01'
    dates:
    - start: '2022-11-15'
      kind: effective
- identifier: '1105'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Moving ISO 14306 to a multipart standard
  dates:
  - start: '2022-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Moving ISO 14306 to a multipart standard
    dates:
    - start: '2022-11-15'
      kind: effective
  - type: accepts
    message: 'SC 4 accepts the recommendation of JWG 16 and requests it’s

      Committee Manager coordinate with ISO/CS and designate project id. 85802 as

      ISO/PWI 14306-3 and recognize ISO 14306 as a multi-part standard.'
    dates:
    - start: '2022-11-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting the work conducted by JWG 16 and the ISO/PWI 14306 (project id. 85802)

      project team resolving industry requirements to address new capabilities in the ISO

      14306 standard'
    dates:
    - start: '2022-11-15'
      kind: effective
- identifier: '1106'
