  kind: resolution
  status: decided
  dates:
  - date: '2022-11-15'
    type: adoption
  title:
  - spelling: eng
    value: Cancel the ISO 15926-14 DTR project
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2022-11-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 will request ISO CS to cancel the ISO 15926-14 DTR project.

        '
  - type: instructs
    date_effective:
      date: '2022-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 instructs WG 3 to do a study with the top SC 4 experts on ISO 15926 and OWL and
        the project experts on the position of the proposed part in ISO 15925 and to examine
        whether ISO 15926-12 could have been used for reasoning on data sets with the same
        results. The study results should be reported in the PPC meeting of Jan 2023.
  considerations:
  - type: noting
    date_effective:
      date: '2022-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        Noting the ISO 15926-14 DTR (project id. 75949) no longer is considered useful in the
        light of the new developments on ISO 15926-14
  - type: noting
    date_effective:
      date: '2022-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        Noting the desire to start a NP for an ISO 15926-14 (IS) and the current lack of full
        consensus on the NP in WG3
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1109'
  urn: urn:iso:tc184:sc4:resolution:1109
  kind: resolution
  status: decided
  dates:
  - date: '2022-11-15'
    type: adoption
  title:
  - spelling: eng
    value: Adjust the standards development track of ISO 10303 modules
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '2022-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 resolves to adjust the standards development track of the following ISO
        10303 modules to SDT 36:

        * ISO/AWI TS 10303-1848 (ed.1- id.81490), "Annotated 3d model data quality criteria"
        * ISO/AWI TS 10303-1849 (ed.1- id.81491), "Annotated 3d model data quality inspection result"
        * ISO/AWI TS 10303-1850 (ed.1- id.81492), "Triangulated shape data quality"
        * ISO/AWI TS 10303-1851 (ed.1- id.81493), "PMI data quality"
        * ISO/AWI TS 10303-1852 (ed.1- id.82033), "Retention period"
        * ISO/AWI TS 10303-1853 (ed.1- id.82522), "Datum and datum systems"

        The modules will be published according to the following schedules:

        * ISO 10303-1852 in SMRL v10, publication on 2023-05-31
        * ISO 10303-1848, 1849, 1850, 1851 and 1853 in SMRL v11 publication on 2023-10-15
  considerations:
  - type: noting
    date_effective:
      date: '2022-11-15'
      type: effective
    message:
    - spelling: eng
      value: 'Noting the development work of SMRL v9 and the forecast for SMRL v10
        and SMRL v11

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1110'
  urn: urn:iso:tc184:sc4:resolution:1110
  kind: resolution
  status: decided
  dates:
  - date: '2022-11-15'
    type: adoption
  title:
  - spelling: eng
    value: Initiate a Committee Internal Ballot for ISO 8000-3
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '2022-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 resolves to initiate a CIB that asks the following questions to the members of SC 4:

        1) Do you approve adding a preliminary work item "ISO/PWI 8000-3, Data quality --
           Part 3: Information and data management system: Requirements" with Peter Eales
           as the project leader to the work programme of WG 13 as per the contents of
           ISO/TC 184/SC 4/WG 13/N0982? (responses: yes | no | abstain + allow comments via dialog box)
        2) Please provide the name, affiliation and contact details of any of your experts who
           wish to work on this project. (allow comments via dialog box)
        3) Please provide the name and type of any organizations that are based in your
           country and have expressed an interest in the benefits of this proposed MSS. (allow
           comments via dialog box)
  - type: instructs
    date_effective:
      date: '2022-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 instructs WG 13 to present the proposal for review by the SC 4 Change
        Management Advisory Group before the CIB is initiated by the SC 4 Committee Manager.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1111'
  urn: urn:iso:tc184:sc4:resolution:1111
  kind: resolution
  status: decided
  dates:
  - date: '2022-11-15'
    type: adoption
  title:
  - spelling: eng
    value: Initiate project to develop ISO 29002
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '2022-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 resolves to initiate a project to develop ISO 29002 (Industrial automation systems
        and integration -- Exchange of characteristic data). This project has no change in
        scope from the project 78517. The project is to begin at Stage 40 and use the SDT18
        development track, with the target dates: circulation of the enquiry draft on 2023-04-30;
        publication of the International Standard on 2024-04-30.
  - type: appoints
    date_effective:
      date: '2022-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 appoints Peter Eales as project leader and invites its P-members and A-liaisons
        to nominate experts to participate in the project.
