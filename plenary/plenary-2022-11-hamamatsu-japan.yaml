- identifier: '1107'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Creation of WG 25 with the title “ISO CDD Validation Team”
  dates:
  - start: '2022-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Creation of WG 25 with the title “ISO CDD Validation Team”
    dates:
    - start: '2022-11-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves the creation of the WG 25 with the title “ISO CDD Validation Team”

      under the structure of ISO/TC 184/SC 4 and nominates Gernot ROSSI as convenor for

      a 3-year term (until the end of 2025) and Hiroshi MURAYAMA as deputy convenor for a

      3-year term (until the end of 2025). ISO/TC 184/SC 4 Committee Manager is asked to

      take the necessary steps for the establishment of the WG 25 and requests national

      bodies appoint the validation team members to WG 25 through the ISO global directory.'
    dates:
    - start: '2022-11-15'
      kind: effective
- identifier: '1108'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Cancellation of ISO 15926-14 DTR
  dates:
  - start: '2022-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Cancellation of ISO 15926-14 DTR
    dates:
    - start: '2022-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 will request ISO CS to cancel the

      ISO 15926-14 DTR project'
    dates:
    - start: '2022-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2022-11-15'
      kind: effective
  - type: instructs
    message: 'SC 4 instructs WG 3 to do a study with the top SC 4

      experts on ISO 15926 and OWL and the project experts on the position of the proposed

      part in ISO 15925 and to examine whether ISO 15926-12 could have been used for

      reasoning on data sets with the same results. The study results should be reported in

      the PPC meeting of Jan 2023.'
    dates:
    - start: '2022-11-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting the ISO 15926-14 DTR (project id. 75949) no longer is considered useful in the

      light of the new developments on ISO 15926-14'
    dates:
    - start: '2022-11-15'
      kind: effective
  - type: noting
    message: 'Noting the desire to start a NP for an ISO 15926-14 (IS) and the current lack of full

      consensus on the NP in WG3'
    dates:
    - start: '2022-11-15'
      kind: effective
- identifier: '1109'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Change to project duration of ISO/TS 10303-1848/1849/1850/1851/1852/1853
  dates:
  - start: '2022-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Change to project duration of ISO/TS 10303-1848/1849/1850/1851/1852/1853
    dates:
    - start: '2022-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves to adjust the standards development track of the following ISO

      10303 modules to SDT 36:

       ISO/AWI TS 10303-1848 (ed.1- id.81490), “Annotated 3d model data quality

      criteria”

       ISO/AWI TS 10303-1849 (ed.1- id.81491), “Annotated 3d model data quality

      inspection result”

       ISO/AWI TS 10303-1850 (ed.1- id.81492), “Triangulated shape data quality”

       ISO/AWI TS 10303-1851 (ed.1- id.81493), “PMI data quality”

       ISO/AWI TS 10303-1852 (ed.1- id.82033), “Retention period”


       ISO/AWI TS 10303-1853 (ed.1- id.82522), “Datum and datum systems”

      The modules will be published according to the following schedules:

       ISO 10303-1852 in SMRL v10, publication on 2023-05-31;

      ISO 10303-1848, 1849, 1850, 1851 and 1853 in SMRL v11 publication on 2023-10-15.'
    dates:
    - start: '2022-11-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting the development work of SMRL v9 and the forecast for SMRL v10 and SMRL

      v11'
    dates:
    - start: '2022-11-15'
      kind: effective
- identifier: '1110'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Conduct of a CIB for ISO 8000-3
  dates:
  - start: '2022-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Conduct of a CIB for ISO 8000-3
    dates:
    - start: '2022-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves to initiate a CIB that asks the following questions to the members of SC

      4.

      1) Do you approve adding a preliminary work item “ISO/PWI 8000-3, Data quality –

      Part 3: Information and data management system: Requirements” with Peter Eales

      as the project leader to the work programme of WG 13 as per the contents of

      ISO/TC 184/SC 4/WG 13/N0982? (responses: yes | no | abstain + allow comments

      via dialog box)

      2) Please provide the name, affiliation and contact details of any of your experts who

      wish to work on this project. (allow comments via dialog box)

      3) Please provide the name and type of any organizations that are based in your

      country and have expressed an interest in the benefits of this proposed MSS. (allow

      comments via dialog box)'
    dates:
    - start: '2022-11-15'
      kind: effective
  - type: instructs
    message: 'SC 4 instructs WG 13 to present the proposal for review by the SC 4 Change

      Management Advisory Group before the CIB is initiated by the SC 4 Committee

      Manager.'
    dates:
    - start: '2022-11-15'
      kind: effective
- identifier: '1111'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO 29002
  dates:
  - start: '2022-11-15'
    kind: decision
  actions:
  - type: resolves
    message: ISO 29002
    dates:
    - start: '2022-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves to initiate a project to develop ISO 29002 (Industrial automation systems

      and integration — Exchange of characteristic data). This project has no change in

      scope from the project 78517.

      The project is to begin at Stage 40 and use the SDT18 development track, with the

      target dates: circulation of the enquiry draft on 2023-04-30; publication of the

      International Standard on 2024-04-30'
    dates:
    - start: '2022-11-15'
      kind: effective
  - type: appoints
    message: 'SC 4 appoints Peter Eales as project leader and

      invites its P-members and A-liaisons to nominate experts to participate in the project.'
    dates:
    - start: '2022-11-15'
      kind: effective
