- identifier: '1129'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Launch DTR ballot of ISO TR 24464 ed2
  dates:
  - start: '2023-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Launch DTR ballot of ISO TR 24464 ed2
    dates:
    - start: '2023-10-15'
      kind: effective
  - type: resolves
    message: 'Noting that

      • A revision to ISO/TR 24464 ed1 started in 2021-11 and was reviewed at the change

      management meeting,

      • A working group consultation was held in 2021-11, and

      • A CIB was launched in 2022-10,'
    dates:
    - start: '2023-10-15'
      kind: effective
  - type: appreciates
    message: 'SC 4 appreciates the recommendation of ISO/TC 184/AG 0 and requests its Committee

      Manager coordinate with ISO/CS and launch a DTR ballot of Visualization elements of

      digital twin - Visualization fidelity as edition 2.'
    dates:
    - start: '2023-10-15'
      kind: effective
- identifier: '1130'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Revise the title of ISO/DIS 3151-2
  dates:
  - start: '2023-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Revise the title of ISO/DIS 3151-2
    dates:
    - start: '2023-10-15'
      kind: effective
  - type: requests
    message: 'SC4 requests its

      Committee Manager coordinate with ISO/CS to change the title of project 84702 to be

      Visualization elements of PLM-MES interface - 3D error feedback in heavy industry and


      proceed with the DIS ballot.'
    dates:
    - start: '2023-10-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting that resolution of comments for ISO/CD 3151-2 has revised the title to be:

      Visualization elements of PLM-MES interface - 3D error feedback in heavy industry, and

      the project id (84702), project portal states the title as: Visualization elements of PLM-

      MES interface — Part 2: 3D error feedback in the plant industry'
    dates:
    - start: '2023-10-15'
      kind: effective
- identifier: '1131'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Restart ISO/DTR 23164 as ISO/DTS 23164
  dates:
  - start: '2023-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Restart ISO/DTR 23164 as ISO/DTS 23164
    dates:
    - start: '2023-10-15'
      kind: effective
  - type: resolves
    message: 'Noting the report from ISO/TC 184/SC 4/AG 3, the recommendation of the ISO Editor

      and the consensus of the PPC ISO/TC 184/SC 4, SC 4:

       Requests its Committee Manager to coordinate with ISO/CS to proceed with

      balloting ISO/CD TR 23164 ed1 (project id. 87378),

       Requests its Committee Manager to launch ISO/NP 23164 – Automation

      systems and integration – Core terminology for industrial data as a TS with an

      eight-week ballot duration at stage 40.00,

       Nominates David Leal as project leader, and

       Invites member bodies to nominate additional experts to this project.'
    dates:
    - start: '2023-10-15'
      kind: effective
- identifier: '1132'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Restart SMRL modules in support of SMRL V11
  dates:
  - start: '2023-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Restart SMRL modules in support of SMRL V11
    dates:
    - start: '2023-10-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes the

      pending limit date for this set of projects and appreciates the actions taken to address

      the integration issues. Further, SC 4 requests its Committee Manager coordinate with

      ISO/CS to restart ISO/AWI TS 1848 (project id = 81490), 1849 (project id = 81491),

      1850 (project id = 81492), 1851(project id = 81493) and 1853 (project id = 82522) on

      track with SDT 18 at stage 10.99 with the following target dates:

      Stage 30 – CD registered: 2023-12-15

      Stage 50 – Final text received: 2024-3-15

      Stage 60 – IS published: 2024-6-15

      And nominates Hiroyuki Hiraoka as project leader for -1848, -1849, -1850, and -1851,

      and nominates Tom Thurman as project leader for -1853.'
    dates:
    - start: '2023-10-15'
      kind: effective
  considerations:
  - type: recalling
    message: 'Recalling the creation of ISO/AWI TS 10303-1848, -1849, -1850, -1851, and -1853 as

      required modules of the ISO 10303 SMRL subject to the special procedures for

      managing standards in a database format, and noting the progress of the project team

      to complete a CD quality ISO TS 1848, 1849, 1850, 1851, and 1853'
    dates:
    - start: '2023-10-15'
      kind: effective
- identifier: '1133'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Launch an Amendment to ISO 17506 ed2
  dates:
  - start: '2023-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Launch an Amendment to ISO 17506 ed2
    dates:
    - start: '2023-10-15'
      kind: effective
  - type: requests
    message: 'SC4 requests its Committee

      Manager to coordinate with ISO/CS to amend ISO 17506:2022 with the following

      schedule:

      • DIS (40.00): 2024-02-28

      • Publication (60.00): 2024-04-30,

      And nominates Hwanyong Lee, hwan@ajou.ac.kr as project leader.'
    dates:
    - start: '2023-10-15'
      kind: effective
  considerations:
  - type: noting
    message: Noting the recommendation of ISO/TC 184/SC 4/AG 0
    dates:
    - start: '2023-10-15'
      kind: effective
- identifier: '1134'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Launch ISO/DTR 8000-320
  dates:
  - start: '2023-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Launch ISO/DTR 8000-320
    dates:
    - start: '2023-10-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Committee Manager to coordinate with ISO/CS to initiate the

      development of ISO/TR 8000-320 with the title “Data quality – Part 320: AI training data

      quality for smart manufacturing” with Giljo Kim (KOR) as project leader and the target

      dates:

       circulation of draft technical report by 2023-12-31,

       publication of the technical report on 2024-06-30.'
    dates:
    - start: '2023-10-15'
      kind: effective
- identifier: '1135'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Launch ISO 8000-115 – Minor revision
  dates:
  - start: '2023-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Launch ISO 8000-115 – Minor revision
    dates:
    - start: '2023-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves to initiate the development of a minor revision of ISO 8000-115 (Master

      data: Exchange of quality identifiers: Syntactic, semantic and resolution requirements)

      with Hayley Thompson (USA) as project leader and the target dates:

       submission of revised document by 2023-12-31,

       publication of the minor revision by 2024-06-30'
    dates:
    - start: '2023-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2023-10-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Committee Manager to prepare and submit to ISO/CS the necessary

      ISO Form 8B for this minor revision.

      Acclamations and Acknowledgements'
    dates:
    - start: '2023-10-15'
      kind: effective
