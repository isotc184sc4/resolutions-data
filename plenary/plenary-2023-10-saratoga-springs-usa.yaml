    value: Restart ISO/DTR 23164 as Technical Specification ISO/DTS 23164
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2023-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests its Committee Manager to coordinate with ISO/CS to proceed with
        balloting ISO/CD TR 23164 ed1 (project id. 87378),

        * Requests its Committee Manager to launch ISO/NP 23164 -- Automation systems and integration -- Core terminology for industrial data as a TS with an eight-week ballot duration at stage 40.00,
        * Nominates David Leal as project leader, and
        * Invites member bodies to nominate additional experts to this project.
  considerations:
  - type: noting
    date_effective:
      date: '2023-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'Noting the report from ISO/TC 184/SC 4/AG 3, the recommendation of the
        ISO Editor and the consensus of the PPC ISO/TC 184/SC 4

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1132'
  urn: urn:iso:tc184:sc4:resolution:1132
  kind: resolution
  status: decided
  dates:
  - date: '2023-10-15'
    type: adoption
  title:
  - spelling: eng
    value: Restart SMRL modules ISO/TS 1848, 1849, 1850, 1851, and 1853
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2023-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 notes the pending limit date for this set of projects and appreciates the actions taken to address
        the integration issues. Further, SC 4 requests its Committee Manager coordinate with
        ISO/CS to restart ISO/AWI TS 1848 (project id = 81490), 1849 (project id = 81491),
        1850 (project id = 81492), 1851 (project id = 81493) and 1853 (project id = 82522) on
        track with SDT 18 at stage 10.99 with the following target dates:

        * Stage 30 -- CD registered: 2023-12-15
        * Stage 50 -- Final text received: 2024-3-15
        * Stage 60 -- IS published: 2024-6-15

        And nominates Hiroyuki Hiraoka as project leader for -1848, -1849, -1850, and -1851,
        and nominates Tom Thurman as project leader for -1853.
  considerations:
  - type: recalling
    date_effective:
      date: '2023-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        Recalling the creation of ISO/AWI TS 10303-1848, -1849, -1850, -1851, and -1853 as
        required modules of the ISO 10303 SMRL subject to the special procedures for
        managing standards in a database format, and noting the progress of the project team
        to complete a CD quality ISO TS 1848, 1849, 1850, 1851, and 1853
