    message: |
      We offer thanks to those external projects who presented their material at the Open
      Technical Forum:
      
      * "Visualization for the web for 3D CAD massive Datasets" -- Dr. Johannes Behr
      * "Industrial Data and the Circular Economy" -- Dr. Norman Swindells
      * "Configuration Services for Global Production Networks" -- Prof. Bob Young
      * "Equivalence Validation" -- Mr. Akihiko Ohtaka
    dates:
    - start: '2014-11-15'
      kind: effective
- identifier: '201411-acclaim-02'
  subject: ISO/TC 184/SC 4 "Industrial data"
