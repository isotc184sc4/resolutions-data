- identifier: '885'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Establish Duration of New Work Item Proposals
  dates:
  - start: '2014-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Establish Duration of New Work Item Proposals
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to apply the 2-month duration to NPs for:

       18828-3 Information Flows within Production Systems Engineering;

       15926-6e2 Scope and Representation for Additional Reference Data –

      OWL Extension;

       15926-10 Conformance Testing;

       15926: Initial Reference Data for the Maritime Industry;

       15926 Integrated Lifecycle Asset Planning.'
    dates:
    - start: '2014-11-15'
      kind: effective
