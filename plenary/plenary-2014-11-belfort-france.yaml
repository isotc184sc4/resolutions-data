- identifier: '201411-acclaim-03'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank AFNOR and University de Technologie de Belfort-Montbeliard for hosting
  dates:
  - start: '2014-11-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC 4 expresses its appreciation to AFNOR -- Association Française de Normalisation
      and the University de Technologie de Belfort-Montbeliard for their hosting and support
      of the 68th ISO TC 184/SC 4 Plenary meetings at the University de Technologie de
      Belfort-Montbeliard, Belfort France.
      
      We especially commend Ms. Ghislaine Magnan and Mr. Christophe Mouton for an excellent
      venue and outstanding service to the SC 4 community.
    dates:
    - start: '2014-11-15'
      kind: effective
- identifier: '201411-acclaim-04'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank AFNOR for organizing Industry Day
  dates:
  - start: '2014-11-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC 4 expresses its appreciation to AFNOR for their organization of the Industry
      Day, and to the speakers and panel members for attending and presenting on
      matters of interest to the SC 4 community.
    dates:
    - start: '2014-11-15'
      kind: effective
- identifier: '201411-acclaim-05'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank Groupe Elephant for support of the meetings
  dates:
  - start: '2014-11-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC 4 expresses its appreciation to Groupe Elephant for their excellent support of
      the 68th ISO TC 184/SC 4 Plenary meetings. Mr. David Ramos and Mr. Bruno
      Christmann and their staff are to be commended for their exceptional support and
      service to organization of the meetings.
    dates:
    - start: '2014-11-15'
      kind: effective
