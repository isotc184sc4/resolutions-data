- identifier: '889'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Future scope of ISO/TC 59/SC 13/JWG 12
  dates:
  - start: '2014-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Future scope of ISO/TC 59/SC 13/JWG 12
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes the recommendations made by ISO/TC 59/SC 13/JWG 12 at their third

      meeting and the related resolutions 159 and 160 approved by ISO/TC 59/SC 13 at

      their plenary meeting in Toronto'
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: welcomes
    message: 'SC 4 welcomes the progress made to date by JWG 12 and their intention to turn ISO

      16739 into a useful and widely adopted set of building information management


      standards'
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: encourages
    message: 'SC 4 encourages all members of JWG 12 to strive to maintain and where necessary

      even improve the interoperability of ISO 16739 and ISO 10303. Especially in light of

      the envisaged development of model view definitions for ISO 16739 SC 4 requests

      JWG 12 to leverage the experiences of SC 4 in producing and maintaining their

      application protocols over the last two decades'
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: asks
    message: 'SC 4 asks JWG 12 to report on their efforts to agree on a harmonized methodology for

      the presentation and implementation of ISO 16739 and ISO 10303 at the next SC 4

      plenary meeting in Vico Equense in April 2015.'
    dates:
    - start: '2014-11-15'
      kind: effective
- identifier: '890'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Retirement of Secretariat
  dates:
  - start: '2014-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Retirement of Secretariat
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its great appreciation to Jerry Smith for his excellent service as

      Secretary to SC 4 since 1999, and wishes him a long and happy retirement'
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: recommends
    message: 'SC 4

      commends his efforts to secure resources to support the original SC 4 website, and for

      the operation of the committee'
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 also thanks DISA, Mr. Dennis Devera and Ms.

      Bich Ngoc Nguyen for their support.'
    dates:
    - start: '2014-11-15'
      kind: effective
- identifier: '891'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO 14306 e2
  dates:
  - start: '2014-11-15'
    kind: decision
  actions:
  - type: resolves
    message: ISO 14306 e2
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to apply the extended timeframe to the ISO 14306e2

      project, with a DIS limit date of 2015-12-15.

      ACKNOWLEDGEMENTS and APPRECIATIONS

      ACCLAMATION

      We offer thanks to those external projects who presented their material at the Open

      Technical Forum.

      “Visualization for the web for 3D CAD massive Datasets”

      Dr. Johannes

      Behr “Industrial Data and the Circular Economy”

      Dr. Norman

      Swindells

      “Configuration Services for Global Production Networks”

      Prof BobYoung


      “Equivalence Validation”

      Mr. Akihiko

      Ohtaka

      ACCLAMATION

      We offer thanks to our liaison members who presented their material at the Liaison

      Plenary

      “ISO/TC 176/SC 2”

      Dr. Timothy King

      “ISO/TC 59/SC 13/JWG 12 Buildings

      Mr.

      Jochen Haenisch

      and civil engineering works”

      “Industry Views on ISO 15926”

      Mr. Anders

      Thostrup

      “Liaison Issues”

      Mr. Howard Mason

      ACCLAMATION'
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to AFNOR – Association Française de Normalisation

      and the University De Technologie De Belfort-Montbeliard for their hosting and support

      of the 68th ISO TC 184/SC 4 Plenary meetings at the University De Technologie De

      Belfort-Montbeliard, Belfort France. We especially commend Ms Ghislaine Magnan

      and

      Mr. Christophe Mouton for an excellent venue and outstanding service to the SC 4

      community.

      ACCLAMATION'
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to AFNOR for their organization of the Industry

      Day, and to the speakers and panel members for attending and presenting on

      matters of interest to the SC 4 community.

      ACCLAMATION'
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to Groupe Elephant for their excellent support of

      the 68th ISO TC 184/SC 4 Plenary meetings. Mr. David Ramos and Mr. Bruno

      Christmann and their staff are to be commended for their exceptional support and

      service to organization of the meetings.'
    dates:
    - start: '2014-11-15'
      kind: effective
