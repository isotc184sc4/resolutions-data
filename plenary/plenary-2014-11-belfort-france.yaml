- identifier: '888'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Publish ISO 8000 Part 8 as International Standard
  dates:
  - start: '2014-11-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC 4 requests its secretary to submit the amended part to ISO CS for publication
      as IS omitting the FDIS ballot.
    dates:
    - start: '2014-11-15'
      kind: effective
  considerations:
  - type: noting
    message: |
      SC 4 notes the results of the DIS ballot on ISO 8000 "Information and data quality --
      Part 8: Concepts and measuring".
    dates:
    - start: '2014-11-15'
      kind: effective
- identifier: '889'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Support future scope and interoperability efforts of JWG 12
  dates:
  - start: '2014-11-15'
    kind: decision
  actions:
  - type: welcomes
    message: |
      SC 4 welcomes the progress made to date by JWG 12 and their intention to turn ISO
      16739 into a useful and widely adopted set of building information management
      standards.
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: encourages
    message: |
      SC 4 encourages all members of JWG 12 to strive to maintain and where necessary
      even improve the interoperability of ISO 16739 and ISO 10303.
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: requests
    message: |
      Especially in light of the envisaged development of model view definitions for ISO
      16739, SC 4 requests JWG 12 to leverage the experiences of SC 4 in producing and
      maintaining their application protocols over the last two decades.
    dates:
    - start: '2014-11-15'
      kind: effective
  - type: asks
    message: |
      SC 4 asks JWG 12 to report on their efforts to agree on a harmonized methodology for
      the presentation and implementation of ISO 16739 and ISO 10303 at the next SC 4
      plenary meeting in Vico Equense in April 2015.
    dates:
    - start: '2014-11-15'
      kind: effective
  considerations:
  - type: noting
    message: |
      SC 4 notes the recommendations made by ISO/TC 59/SC 13/JWG 12 at their third
      meeting and the related resolutions 159 and 160 approved by ISO/TC 59/SC 13 at
      their plenary meeting in Toronto.
    dates:
    - start: '2014-11-15'
      kind: effective
- identifier: '890'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank Jerry Smith for his service as SC 4 Secretary
  dates:
  - start: '2014-11-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC 4 expresses its great appreciation to Jerry Smith for his excellent service as
      Secretary to SC 4 since 1999, and wishes him a long and happy retirement.
      
      SC 4 commends his efforts to secure resources to support the original SC 4 website,
      and for the operation of the committee.
      
      SC 4 also thanks DISA, Mr. Dennis Devera and Ms. Bich Ngoc Nguyen for their support.
    dates:
    - start: '2014-11-15'
      kind: effective
- identifier: '891'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Apply extended timeframe to ISO 14306 ed2 project
  dates:
  - start: '2014-11-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC 4 requests its Secretariat to apply the extended timeframe to the ISO 14306e2
      project, with a DIS limit date of 2015-12-15.
    dates:
    - start: '2014-11-15'
      kind: effective
- identifier: '201411-acclaim-01'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank external projects presenting at Open Technical Forum
