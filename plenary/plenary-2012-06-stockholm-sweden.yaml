  kind: resolution
  status: decided
  dates:
  - date: '2012-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Request TC 184 to avoid duplication with ISO/TC 261
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2012-06-15'
        type: effective
      message: |
        Noting that the proposed work programme of ISO/TC 261 includes elements
        related to manufacturing information which already fall within the scope
        of ISO/TC 184 such as product modeling, NC programing and Robotic
        programming.
    actions:
    - type: requests
      date_effective:
        date: '2012-06-15'
        type: effective
      message: |
        SC 4 requests the TC 184 to take all necessary steps to avoid any
        duplication or inconsistency of deliverables.
