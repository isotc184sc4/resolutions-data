    - start: '2012-06-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes that the proposed work programme of ISO/TC 261 includes elements

      related to industrial data which already fall within the scope of ISO/TC 184/SC 4 such

      as product and manufacturing information'
