    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2012-06-15'
        type: effective
      message: |
        Noting the result of the ISO/DIS 14306 ballot, and the results of the
        ballot resolution workshop SC4N2780.
    actions:
    - type: requests
      date_effective:
        date: '2012-06-15'
        type: effective
      message: |
        SC 4 requests WG 12 to develop a revised version of the specification
        incorporating the agreed changes from SC4N2780.
    - type: requests
      date_effective:
        date: '2012-06-15'
        type: effective
      message: |
        SC 4 requests its Secretariat to submit the revised version of the
        specification to ISO CS for FDIS ballot.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '839'
  kind: resolution
  status: decided
  dates:
  - date: '2012-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Develop New Work Item Proposal for ISO 14306 second edition
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2012-06-15'
        type: effective
      message: |
        Noting the result of the ISO/DIS 14306 ballot, and the results of the
        ballot resolution workshop SC4N2780.
    actions:
    - type: requests
      date_effective:
        date: '2012-06-15'
        type: effective
      message: |
        SC 4 requests WG 12 to develop a New Work Item Proposal for a new edition
        of ISO 14306 including but not limited to replacing XT Brep and JT Brep
        with STEP curve, surface and Brep entity definitions and extending the
        scope to include external references to support semantic PMI for
        assemblies and other requirements from AP 242.
