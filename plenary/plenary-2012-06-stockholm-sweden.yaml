      •

      IEC SC3D - Hiroshi Murayama

      •

      buildingSMART - Thomas Liebich

      •

      ISO/TS 14033 on Quantitative Environmental Information - Raul Carlson,


      TC 207/SC5

      •

      USPI-NL - Maintenance Knowledge Management (MKM) project in

      the Netherlands -- Paul van Excel

      •

      CFIHOS (Capital Facilities Information Hand Over Specification) -- Paul van

      Exel We appreciate your representation to and for ISO TC 184/SC 4'
