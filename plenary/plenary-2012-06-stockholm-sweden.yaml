- identifier: '836'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: L iaiso n to ISO/T C 26 1 “Ad d itive Man ufa ctu ring”
  dates:
  - start: '2012-06-15'
    kind: decision
