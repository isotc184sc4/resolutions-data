    title: Establish liaison to ISO/TC 261 for additive manufacturing
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2012-06-15'
        type: effective
      message: |
        Noting that the proposed work programme of ISO/TC 261 includes elements
        related to industrial data which already fall within the scope of ISO/TC
        184/SC 4 such as product and manufacturing information.
    actions:
    - type: requests
      date_effective:
        date: '2012-06-15'
        type: effective
      message: 'SC 4 requests its secretariat to establish a liaison to TC 261.

        '
