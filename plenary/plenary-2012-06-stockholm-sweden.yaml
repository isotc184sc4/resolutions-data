- identifier: '839'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Result of ISO/DIS 14306 ballot -- development of second edition
  dates:
  - start: '2012-06-15'
    kind: decision
  actions:
  - type: resolves
    message: Result of ISO/DIS 14306 ballot -- development of second edition
    dates:
    - start: '2012-06-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests WG 12 to develop a New Work Item Proposal

      for a new edition of ISO 14306 including but not limited to replacing XT Brep and JT

      Brep with STEP curve, surface and Brep entity definitions and extending the scope to

      include external references to support semantic PMI for assemblies and other

      requirements from AP 242.

      ACKNOWLEDGEMENTS and APPRECIATIONS

      ACCLAMATION

      We offer thanks to those external projects who presented their material at the Open

      Technical Forum.

      •

      PLCS -- Tor Arne Irgens

      •

      AP 242 Business Object Model -- Max Ungerer

      •

      “Business Object Models for Industrial Data Standards” paper -- Keith Hunten

      •

      Business Objects Model & WEB Services IDEF0 -- Jean Brange

      ACCLAMATION

