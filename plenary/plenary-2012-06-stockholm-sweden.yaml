    dates:
    - start: '2012-06-15'
      kind: effective
- identifier: '837'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Scope of ISO/TC 2 6 1 “Ad d itive Man ufa ctu rin g”
  dates:
  - start: '2012-06-15'
    kind: decision
  actions:
  - type: resolves
    message: Scope of ISO/TC 2 6 1 “Ad d itive Man ufa ctu rin g”
    dates:
    - start: '2012-06-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes that the proposed work programme of ISO/TC 261 includes elements

      related to manufacturing information which already fall within the scope of ISO/TC

      184 such as product modeling, NC programing and Robotic programming'
    dates:
    - start: '2012-06-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2012-06-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests the TC 184 to take all necessary steps to avoid any duplication or

      inconsistency of deliverables.'
    dates:
    - start: '2012-06-15'
      kind: effective
- identifier: '838'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Result of ISO/DIS 14306 ballot -- development of first edition
  dates:
  - start: '2012-06-15'
    kind: decision
  actions:
  - type: resolves
    message: Result of ISO/DIS 14306 ballot -- development of first edition
    dates:
    - start: '2012-06-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests WG 12 to develop  a revised version of the

      specification incorporating the agreed changes from SC4N2780'
    dates:
    - start: '2012-06-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2012-06-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to submit the revised version of the specification to ISO

      CS for FDIS ballot.'
    dates:
    - start: '2012-06-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting the result of the ISO/DIS 14306 ballot, and the results of the ballot resolution


