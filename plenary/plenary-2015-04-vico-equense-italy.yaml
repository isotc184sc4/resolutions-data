- identifier: '905'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Proposed Integrated Model for Digital Manufacturing
  dates:
  - start: '2015-04-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Proposed Integrated Model for Digital Manufacturing

      A proposal is being developed for a new edition of AP238 which will include a series of

      bug fixes, incorporate new GD&T capabilities, improve integration with ISO 13399 for

      cutting tools, and ISO 14649 for NC machines, and support for additive manufacture.

      Other capabilities such as robotic machining may also need to be addressed. The

      responsibility for these standards is currently spread across TC 29/TC 39/TC 261/TC

      184   There is therefore an opportunity to address this project through the coordination

      meeting proposed by ISO/TC 184 in its recent plenary meeting, as an example of the

      necessity for coordination'
    dates:
    - start: '2015-04-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2015-04-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to inform ISO CS about the proposed Integrated Model for

      Digital Manufacturing project as an example of the work that should be addressed by

      the meeting suggested by ISO/TC 184 in its resolution 573.'
    dates:
    - start: '2015-04-15'
      kind: effective
