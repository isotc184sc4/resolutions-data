- identifier: '899'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approve new work item to create ISO 10303-235 Edition 2
  dates:
  - start: '2015-04-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC4 approves a NP to create a new edition of 10303-235 with the same scope as
      10303-235 ed1 "Engineering properties for product design and verification", using the
      accelerated timescale, with Norman Swindells as the project leader.
    dates:
    - start: '2015-04-15'
      kind: effective
  - type: decides
    message: |
      SC4 decides that the project should proceed direct to DIS ballot.
    dates:
    - start: '2015-04-15'
      kind: effective
