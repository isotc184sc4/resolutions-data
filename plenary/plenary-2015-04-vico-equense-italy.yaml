    message: |
      Noting that ISO/DPAS 18828 "Reference process for seamless production planning" has been
      accepted for publication under the harvesting process, and it has been decided that
      further parts are necessary.
    dates:
    - start: '2015-04-15'
      kind: effective
  actions:
  - type: assigns
    message: |
      SC4 assigns the Reference process for seamless production planning project ISO 18828 to JWG 8.
