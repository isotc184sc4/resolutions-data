decisions:
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '44'
  urn: urn:iso:tc184:sc4:resolution:44
  kind: resolution
  status: decided
  dates:
  - date: '1990-01-15'
    type: adoption
  title:
  - spelling: eng
    value: Invite and solicit proposals from IEC organisations for cooperative development
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        ISO/TC 184/SC 4 invites and solicits proposals from IEC organisations and others for
        cooperative development and participative approval of the appropriate parts of STEP.
        In particular, we invite the representatives of EIA, VHDL, IPC D350, and EDIF to take
        part in this work through the exchange of reference models. This will follow the
        example of inter-committee cooperation set by the ISO and the IEC in the MMS
        project and companion standards.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '45'
  urn: urn:iso:tc184:sc4:resolution:45
  kind: resolution
  status: decided
  dates:
  - date: '1990-01-15'
    type: adoption
  title:
  - spelling: eng
    value: Recommend changing SC 4 title to include Global Manufacturing Programming
      Languages
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: recommends
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 respectfully recommends to the ISO/TC 184 chair that the title of the SC 4
        Committee be changed to "Industrial Data and Global Manufacturing Programming
        Languages."
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '46'
  urn: urn:iso:tc184:sc4:resolution:46
  kind: resolution
  status: decided
  dates:
  - date: '1990-01-15'
    type: adoption
  title:
  - spelling: eng
    value: Establish new Working Group for Standard Parts
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: establishes
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        Following the assignment of the accepted new work item on a standard parts library,
        ISO/TC 184/SC 4 establishes a new working group with the following title and task:

        TITLE:
        Standard for the Neutral Representation of Standard Parts

        SCOPE:
        The development of an international standard for the implementation of
        standard parts which is independent of any computer-aided design
        system. This should take into account the mapping of the external
        standard representations into the internal representations of a CAD
        system.
  - type: accepts
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 accepts the offer of the member body of Germany, F.R. to undertake the
        convenership of this working group. Each "P" member of SC 4 is asked to nominate
        one expert and one alternate for the Working Group. Names shall be forwarded to the SC 4 chair by 1 April 1990.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '47'
  urn: urn:iso:tc184:sc4:resolution:47
  kind: resolution
  status: decided
  dates:
  - date: '1990-01-15'
    type: adoption
  title:
  - spelling: eng
    value: Affirm formation of Library Structures project in WG 1
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: confirms
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 affirms the formation of a new project within WG 1 to study the requirements and
        structure of libraries within STEP. The title of the project will be "Library Structures."
        Mr. P. Harrow (UK) and Mr. P. Dienst (FRG) are appointed as joint project leaders to
        ensure coordination of the results between this project and the Standard Parts effort.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '48'
  urn: urn:iso:tc184:sc4:resolution:48
  kind: resolution
  status: decided
  dates:
  - date: '1990-01-15'
    type: adoption
  title:
  - spelling: eng
    value: Create Strategic Planning Advisory Group and accept France as convenor
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: creates
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        An advisory group called "Strategic Planning" is to be created to advise the SC 4 chair
        on matters concerning strategic planning and coordination of SC 4 activities.
  - type: accepts
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 accepts the offer of the member body of France to undertake the convenorship of this
        advisory group.

        Terms of reference for the Strategic Planning Advisory Group are:

        a) Recommending goals and objectives for future work.
        b) Coordinating activities across the different areas of scope of SC 4.
        c) Recommending the general methodologies required to undertake SC 4 work.
        d) Acting as a liaison with other relevant bodies.

        Each "P" member of SC 4 is asked to nominate one expert and one alternate for the
        Strategic Planning Advisory Group. Names shall be forwarded to the SC 4 chair by 1
        April 1990.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '49'
  urn: urn:iso:tc184:sc4:resolution:49
  kind: resolution
  status: decided
  dates:
  - date: '1990-01-15'
    type: adoption
  title:
  - spelling: eng
    value: Establish SC 4 Project Management Advisory Group
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: establishes
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        An SC 4 Project Management Advisory Group shall be established to provide project
        management and technical strategy for product data work items.

        Terms of reference of the Project Management Advisory Group are:

        a) Set functional goals for the Product Data Definition Working Groups.
        b) Set project planning, work breakdown structure, and scheduling.
        c) Coordinate activities between Product Data Definition Working Groups.
        d) Set criteria for success.
        e) Evaluate quality.

        Each "P" member of SC 4 is asked to nominate one expert and one alternate for the
        Advisory Group. Names shall be forwarded to the SC 4 chair by 1 April 1990.
  - type: directs
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        The SC 4 Secretariat shall ask each "P" member body for their interest in the
        convenorship.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '50'
  urn: urn:iso:tc184:sc4:resolution:50
  kind: resolution
  status: decided
  dates:
  - date: '1990-01-15'
    type: adoption
  title:
  - spelling: eng
    value: Produce Technical Reports documenting present state of STEP technology
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 resolves to produce a series of Technical Reports which document the present
        state of STEP technology. The contents of the report are subject to change. In
        particular, this effort requires:

        a) Identification by WG 1 subgroups of all Parts which are technically stable.
        b) Editorial work on Parts to ensure conformance to ISO style and incorporation of all ballot comments agreed to by Part owners.
        c) Balloting by SC 4 to register each Part as a Committee Draft (CD).
        d) Balloting by SC 4 P-members on each CD.
        e) SC 4 decision upon review of ballot results to publish as a Technical Report.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '51'
  urn: urn:iso:tc184:sc4:resolution:51
  kind: resolution
  status: decided
  dates:
  - date: '1990-01-15'
    type: adoption
  title:
  - spelling: eng
    value: Recommend creating ad hoc working group to select application protocol
      topics
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: recommends
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 recommends the creation of a small ad hoc working group of SC 4 to select topics
        on which to develop application protocols. These topics should be circulated to national
        bodies for comment and prioritisation by 31 March 1990.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '52'
  urn: urn:iso:tc184:sc4:resolution:52
  kind: resolution
  status: decided
  dates:
  - date: '1990-01-15'
    type: adoption
  title:
  - spelling: eng
    value: Propose reorganising STEP work into new Working Groups
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: recommends
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        In response to the request from ISO/TC 184, and in order to comply with the new
        ISO/IEC rules, SC 4 proposes to reorganise its work on STEP into the following
        Working Groups:

        * Resource Models (ex WG 1 SG1)
        * Application Reference Models (ex WG 1 SG2)
        * Implementation Methods (ex WG 1 SG3)
        * Conformance & Testing (ex WG 1 SG4)
        * Framework & Methodology (ex WG 1 SG5/7)
        * Information Integration (ex WG 1 SG6)

        Under each Working Group, any required subdivision of the work shall be achieved
        by the definition of specific projects, with project leaders appointed by SC 4.

        Member bodies are requested to review and comment on the proposal to the
        Secretariat by 31 March 1990 and provide proposals for the convenerships of the
        WGs.

        An ad hoc group of SC 4 shall meet at the next WG 1 meeting to resolve any
        comments and prepare a formal proposal for balloting at the June meeting of SC 4.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '53'
  urn: urn:iso:tc184:sc4:resolution:53
  kind: resolution
  status: decided
  dates:
  - date: '1990-01-15'
    type: adoption
  title:
  - spelling: eng
    value: Welcome new work items following change of scope
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: welcomes
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        In response to the changing of scope, SC 4 is ready to welcome new work items,
        namely:

        a) Industrial manufacturing management data
        b) Quality data
        c) Maintenance data

        Members of SC 4 are solicited to send to the secretariat proposals for new work item
        definitions.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '54'
  urn: urn:iso:tc184:sc4:resolution:54
  kind: resolution
  status: decided
  dates:
  - date: '1990-01-15'
    type: adoption
  title:
  - spelling: eng
    value: Replace term Application Profile with Application Protocol
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        The term "Application Profile" identified in SC 4 Resolution 34 (Tokyo #6) is to be
        replaced by the term "Application Protocol."
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '55'
  urn: urn:iso:tc184:sc4:resolution:55
  kind: resolution
  status: decided
  dates:
  - date: '1990-01-15'
    type: adoption
  title:
  - spelling: eng
    value: Adopt strategy to divide DP 10303 into smaller volumes
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: adopts
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 adopts the general strategy for breaking the DP 10303 (SC 4 N38) into a number
        of smaller volumes, each to be processed separately through approval of a Committee
        Draft and then to be balloted upon as a set of qualified and integrated documents
        representing a Draft International Standard.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '56'
  urn: urn:iso:tc184:sc4:resolution:56
  kind: resolution
  status: decided
  dates:
  - date: '1990-01-15'
    type: adoption
  title:
  - spelling: eng
    value: Define new versions of STEP as dated collections of Committee Draft parts
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        It is resolved that SC 4 shall create new versions of STEP where a version is defined
        as a specific, dated collection of Committee Draft parts that are advanced
        simultaneously to DIS.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '57'
  urn: urn:iso:tc184:sc4:resolution:57
  kind: resolution
  status: decided
  dates:
  - date: '1990-01-15'
    type: adoption
  title:
  - spelling: eng
    value: Consider current ISO/STEP parts division and numbering scheme tentative
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: considers
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        The current ISO/STEP parts division and numbering scheme shall be considered
        tentative until a final recommendation is received from WG 1. For timely distribution
        to SC 4, this document must be received by the SC 4 chair by 1 March 1990.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '58'
  urn: urn:iso:tc184:sc4:resolution:58
  kind: resolution
  status: decided
  dates:
  - date: '1990-01-15'
    type: adoption
  title:
  - spelling: eng
    value: Encourage member bodies to increase participation in draughting models
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: encourages
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 encourages member bodies to consider increasing their participation in this
        work to match the stated needs of their industries.
  considerations:
  - type: noting
    date_effective:
      date: '1990-01-15'
      type: effective
    message:
    - spelling: eng
      value: |
        The development and integration of information models for draughting is a critical
        item in the STEP development schedule.
