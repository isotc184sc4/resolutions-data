- identifier: '818'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Rationalization of SC 4 Liaisons
  dates:
  - start: '2011-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Rationalization of SC 4 Liaisons
    dates:
    - start: '2011-05-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes that a number of its liaisons are inactive, due to evolving requirements and

      changes in other organizations, and resolves to terminate its direct liaisons with the

      following organizations:

      Marine e-Business Standards Association (EMSA)

      European Process Industries Step Technical Liaison Executive (EPISTLE)'
    dates:
    - start: '2011-05-15'
      kind: effective
