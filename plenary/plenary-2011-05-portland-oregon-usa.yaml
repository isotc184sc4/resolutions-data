- identifier: '825'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ACKNOWLEDGEMENTS and APPRECIATIONS
  dates:
  - start: '2011-05-15'
    kind: decision
  actions:
  - type: resolves
    message: 'ACKNOWLEDGEMENTS and APPRECIATIONS

      ACCLAMATION

      We offer thanks to those external projects who presented their material at the Open


      Technical Forum.

      “Open Simulation Data Management” – Jochen Haenisch – Jotne/EPM

      “Use of AP 210 ed2 as an engineering data integration standard for design

      verification, based on industrial experience at Rockwell Collins”  –  Lothar Klein

      (reading Tom Thurman’s slides)

      ACCLAMATION

      Appreciation to our SC 4 Liaisons and those projects who presented at the Liaison

      Plenary

      Energistics – Jana Schey

      UPDM – Len Levine

      ProSTEP – JT – Steven Vettermann

      BuildingSMART – Øivind Rooth

      Natural Real Property Identifier (NRPI) – Gerry

      Radack MoU/MG and other liaisons – Howard Mason

      We appreciate your representation to and for ISO TC 184/SC 4.

      ACCLAMATION'
    dates:
    - start: '2011-05-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to Linda Kresl for her organization of the Industry Day,

      and to the speakers for attending and presenting on matters of interest to the SC 4

      community.

      ACCLAMATION'
    dates:
    - start: '2011-05-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to Melissa Scheib, and Kristen Wolf for their hosting

      and support of the 61st ISO TC 184/SC 4 Plenary meetings at the Crowne Plaza Hotel

      in Portland, Oregon.

      Special acknowledgement is extended to the Portland Crowne Plaza Hotel and its staff

      for their seamless and attentive support.'
    dates:
    - start: '2011-05-15'
      kind: effective
