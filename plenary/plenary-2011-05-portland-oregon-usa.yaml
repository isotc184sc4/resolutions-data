- identifier: '821'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Transposing ISO 8000-150 to the general data quality series
  dates:
  - start: '2011-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Transposing ISO 8000-150 to the general data quality series
    dates:
    - start: '2011-05-15'
      kind: effective
  - type: decides
    message: 'SC 4 decides to change the title of ISO 8000-150 to “Data Quality - Part 50: Quality

      management framework”, change the part number to 50, and no longer restrict the

      applicability of the standard to only master data'
    dates:
    - start: '2011-05-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs the project team to

      implement this change to the document following completion of the CD ballot.'
    dates:
    - start: '2011-05-15'
      kind: effective
- identifier: '822'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: New ISO Directives
  dates:
  - start: '2011-05-15'
    kind: decision
  actions:
  - type: resolves
    message: New ISO Directives
    dates:
    - start: '2011-05-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes the new ISO Supplement and requests its Secretariat to update the

      Standing Documents to refer to Annex SK at the next revision.  Meanwhile they will

      continue to reference the Annex ST available at the time they were approved.'
    dates:
    - start: '2011-05-15'
      kind: effective
- identifier: '823'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approval of New Work Item Proposals
  dates:
  - start: '2011-05-15'
    kind: decision
  actions:
  - type: resolves
    message: Approval of New Work Item Proposals
    dates:
    - start: '2011-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to ensure that any Change Request resulting in the

      creation of a new Application Protocol or AP module, or a new edition of an existing

      Application Protocol or AP module containing significant change is submitted for an

      NP ballot, even if the component modules and resources in the Change Request are

      approved under the normal Annex ST procedure.'
    dates:
    - start: '2011-05-15'
      kind: effective
