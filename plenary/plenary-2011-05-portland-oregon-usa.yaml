- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '823'
  kind: resolution
  status: decided
  dates:
  - date: '2011-05-15'
    type: adoption
  title:
  - spelling: eng
    value: Require NP ballot for Change Requests creating or significantly changing
      APs
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2011-05-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests its Secretariat to ensure that any Change Request resulting
        in the creation of a new Application Protocol or AP module, or a new
        edition of an existing Application Protocol or AP module containing
        significant change is submitted for an NP ballot, even if the component
        modules and resources in the Change Request are approved under the normal
        Annex ST procedure.
