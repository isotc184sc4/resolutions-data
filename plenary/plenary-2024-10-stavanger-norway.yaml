- identifier: '1144'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Reconfirm Deputy Convenor special responsibilities for WG 13/23
  dates:
  - start: '2024-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Reconfirm Deputy Convenor special responsibilities for WG 13/23
    dates:
    - start: '2024-10-15'
      kind: effective
  - type: resolves
    message: 'Noting that continuity of operations and management of work is an important

      consideration to the successful operation of working groups, ISO/TC 184/SC 4

      recognizes the role of a Deputy Convenor to support the Convenor in the completion of


      his/her tasks when the Convenor is temporarily unavailable to do so. Though not

      necessary to have a resolution from a procedural perspective to enact this function of

      the Deputy Convenor, ISO/TC 184/SC 4 nonetheless reconfirms this Deputy Convenor

      role and approves the following Deputy Convenors to serve in this capacity until further

      notice.

      Working Group

      Role

      Name

      ISO/TC 184/SC 4/WG 13

      Deputy Convenor

      Mougeolle, Anne-Marie

      ISO/TC 184/SC 4/WG 23

      Deputy Convenor

      Thompson, Hayley'
    dates:
    - start: '2024-10-15'
      kind: effective
- identifier: '1145'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Establish a liaison from ISO/TC 184/SC 4 to ISO/TC 258
  dates:
  - start: '2024-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Establish a liaison from ISO/TC 184/SC 4 to ISO/TC 258
    dates:
    - start: '2024-10-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Committee Manager establish a liaison from SC4 to ISO/TC 258 and

      appoints Lillian Hella to serve as liaison representative for a three-year term [2024 –

      2027], with appreciation for her offer to serve in that capacity.'
    dates:
    - start: '2024-10-15'
      kind: effective
  considerations:
  - type: recognizing
    message: 'Recognizing that the development of ontology standards is best served by access to

      domain experts for the terminology and vocabulary of the subject domain and the

      proposal to develop schedule data ontology is before SC4, and necessary domain

      expertise exists within ISO/TC 258: Project, program and portfolio management'
    dates:
    - start: '2024-10-15'
      kind: effective
- identifier: '1146'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Update liaison from ISO/TC 184/SC 4 to ISO/TC 10 and IEC/TC3
