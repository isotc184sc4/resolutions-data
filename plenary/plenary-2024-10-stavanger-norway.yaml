  considerations:
  - type: noting
    message: Noting the need to collaborate with ISO/TC 10, and with IEC/TC 3
    dates:
    - start: '2024-10-15'
      kind: effective
- identifier: '1147'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Launch NP for ISO/TS 15926-4 ed4 by resolution
  dates:
  - start: '2024-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Launch NP for ISO/TS 15926-4 ed4 by resolution
    dates:
    - start: '2024-10-15'
      kind: effective
  - type: requests
    message: 'SC4 requests its Committee Manager to coordinate with ISO/CS and

      launch edition 4 using the SDT 18 track, names Onno Paap as Project Leader, and


      allocates the work to WG 3 with the following terms of reference:

       Update ISO/TS 15926-4 to ed.4 as presented to the Change Board during the 88th

      Plenary of SC4 on 22 Oct 2024 with the following schedule milestones:

      o Proposed date for first meeting:

      2024-11-21

      o Circulation of 1st Working Draft (if any) to experts:

      2024-11-07

      o Committee Draft ballot (if any):

      2025-05-07

      o DIS submission:

      2025-11-07

      o Publication:

      2026-05-07

       Update the electronic inserts to ISO/TS 15926-4 ed.4 per SC4N2591, SC4N2984,

      and SC4N2986 standing documents,

       Request national bodies to nominate their representatives and deputies to the

      Validation Team (VT) as noted in SC4N2541, and

       To keep a register of the VT members for the practice of sending out notifications to

      vote and other administrative items.'
    dates:
    - start: '2024-10-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting that a new update to ISO/TS 15926-4 is needed and there is no change in scope

      to the standard'
    dates:
    - start: '2024-10-15'
      kind: effective
- identifier: '1148'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Launch PWI for ISO 10303-242 ed5 and nominate experts
  dates:
  - start: '2024-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Launch PWI for ISO 10303-242 ed5 and nominate experts
    dates:
    - start: '2024-10-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Committee

      Manager to coordinate with ISO/CS and initiate the revision of ISO 10303–242 ed4 as

      a Preliminary Work Item with an expected submission of NP ballot on or before 2025-

      10-15'
    dates:
    - start: '2024-10-15'
      kind: effective
  - type: allocates
    message: 'SC4 allocates the project to WG 12 and appoints Jean Brangé as project leader

      with nominations of the following experts to participate:

       AFNOR: Frédéric Darré, Véronique Dubillot, Pierre Duchier, Jacques Heinisch,

       ANSI: Rosemary Astheimer, Allison Barnard Feeney, Keith Hunten, Ben Urick,

      Stuart Galt, Melissa Harvey, Michelle Drummond, Brian Bentrim, Benjamin

      Standfield, John Van Horn, Pat Walsh, Tom Thurman,

       BSI: Robert Swindells,

       DIN: Bernd Feldvoss, Guillaume Hirel, Lothar Klein, Max Ungerer,

       JISC: Hiroyuki Hiraoka, Fumiki Tanaka, Atsuto Soma,

       SAC: Hyman Duan,

       SIS: Mikael Hedlind, Bengt Olsson, Magnus Lundgren, Torbjörn Holm,

       SN: Nils Sandsmark,

      Further, due to the special nature of ISO 10303–242 SC 4 requests ISO to grant a

      waiver on the mandatory use of the ISO Online Standards Development platform for this

      project.'
    dates:
    - start: '2024-10-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting the proposal from WG 12 for creating edition 5 of ISO 10303–242 to

      incorporate

      additional capabilities from industry requirements'
    dates:
    - start: '2024-10-15'
      kind: effective
- identifier: '1149'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Launch a PWI for ISO 23726-1
  dates:
  - start: '2024-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Launch a PWI for ISO 23726-1
    dates:
    - start: '2024-10-15'
      kind: effective
  - type: resolves
    message: 'Noting the proposal from WG 26, ISO/TC 184/SC 4 decides to initiate a project which

      will develop a New Work Item Proposal (NP) by October 2025 with the following terms

      of reference:

       Register a Preliminary Work Item ISO/PWI 23726-1 Overview and fundamental

      principles,

       Allocate the work to ISO/TC 184/SC 4/WG 26,

       Nominate Melinda Hodkiewicz as the project leader, and

       Invites member bodies to nominate additional experts to the project.'
    dates:
    - start: '2024-10-15'
      kind: effective
