resolutions:
- identifier: '1142'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Establish ballot duration of new work item proposals
  dates:
  - start: '2024-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Establish ballot duration of new work item proposals
    dates:
    - start: '2024-10-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Committee Manager to apply the 8-week ballot duration to the

      following NP ballots and coordinate with the appropriate committees in joint work:

      Project

      Approval

      ISO/NP 23726-2

      Industrial automation systems and integration – Ontology based

      interoperability – Part 2: Vocabulary

      ☒

      ISO/NP 23726-100

      Industrial automation systems and integration – Ontology based

      interoperability - Part 100: Schedule data ontology

      ☒

      ISO/NP 8000-200

      Data quality — Part 200: Transaction data: Quality of transaction data

      ☒'
    dates:
    - start: '2024-10-15'
      kind: effective
- identifier: '1143'
  subject: ISO/TC 184/SC 4 "Industrial data"
