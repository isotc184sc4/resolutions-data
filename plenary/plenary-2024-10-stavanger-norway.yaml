- identifier: '1151'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Revise schedule for ISO/CD 10303–238 ed4
  dates:
  - start: '2024-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Revise schedule for ISO/CD 10303–238 ed4
    dates:
    - start: '2024-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves to modify the target dates for the project as follows:

      

      Enquiry stage (DIS): 2025-12-30,

      

      Publication stage: 2026-12-30.'
    dates:
    - start: '2024-10-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting the action taken at the 87th Plenary meeting of ISO/TC 184 SC/4 to place

      ISO/CD 10303–238 ed4 on hold to execute round robin testing of capabilities prior to

      incorporation'
    dates:
    - start: '2024-10-15'
      kind: effective
