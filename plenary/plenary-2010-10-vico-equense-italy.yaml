metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Vico Equense, Italy,
    October 2010
  date: '2010-10-15'
  source: ISO/TC 184/SC 4 Secretariat
decisions:
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '813'
  kind: resolution
  status: decided
  dates:
  - date: '2010-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Manage ISO 29002 vocabulary as a database via Annex ST procedures
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: resolves
      date_effective:
        date: '2010-10-15'
        type: effective
      message: |
        SC 4 resolves to manage the ISO 29002 vocabulary using the ISO Annex ST
        procedures for the management of standards as databases, as customized in
        the SC 4 standing document "Procedure for the maintenance of ISO/TC 184/SC
        4 vocabulary".
    - type: requests
      date_effective:
        date: '2010-10-15'
        type: effective
      message: |
        SC 4 requests the ISO 29002 project to nominate a member to the
        maintenance team.
    - type: requests
      date_effective:
        date: '2010-10-15'
        type: effective
      message: |
        SC 4 requests its Secretariat to invite P-members, Category A liaisons,
        internal liaisons, and the WG 13 convener to nominate additional experts,
        as needed under the agreed procedure.
    - type: requests
      date_effective:
        date: '2010-10-15'
        type: effective
      message: |
        SC 4 requests its Secretariat to invite all P-members, Category A
        liaisons and internal liaisons to appoint one member each to the
        validation team.
    - type: requests
      date_effective:
        date: '2010-10-15'
        type: effective
      message: |
        SC 4 requests its Secretariat to establish a Configuration Management
        Repository for the ISO 29002 vocabulary.
