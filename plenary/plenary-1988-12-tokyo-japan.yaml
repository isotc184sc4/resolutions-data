    title: Thank Japan as host nation for the meeting
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: thanks
      date_effective:
        date: '1988-12-15'
        type: effective
      message: |
        SC 4 and WG 1 would like to record a vote of thanks to Japan as host nation for the
        excellent facilities and support for the November 1988 meeting.
