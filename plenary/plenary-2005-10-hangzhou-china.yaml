    title: Approve project leader and editor for ISO 10303-0059
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: approves
      date_effective:
        date: '2005-10-15'
        type: effective
      message: |
        SC 4 approves the following new project leaders or project editors for the associated SC 4 projects:

        |===
        |Project |Leader |Editor

        |ISO 10303-0059 |Hiroyuki Hiraoka |Akihiko Otaka
        |===
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '655'
  kind: resolution
  status: decided
  dates:
  - date: '2005-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Terminate liaison with PLCS, Inc.
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: recognizing
      date_effective:
        date: '2005-10-15'
        type: effective
      message: |
        Recognizing the successful completion of the development of AP239, and the closure
        of the PLCS, Inc consortium.
    actions:
    - type: resolves
      date_effective:
        date: '2005-10-15'
        type: effective
      message: |
        SC 4 terminates its liaison with PLCS, Inc.

        The liaison with OASIS established under resolutions 580 and 629 remains in place, in
        order to address any SC 4 standardisation requirements arising from activities under
        the OASIS PLCS Technical Committee.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '656'
  kind: resolution
  status: decided
  dates:
  - date: '2005-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Establish liaison with ISO/TC 37/SC 2, 3 and 4
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2005-10-15'
        type: effective
      message: |
        SC 4 requests an active two-way liaison with ISO/TC 37/SC 2, 3 and 4, and
        requests the SC 4 Secretary to confirm these liaisons with the ISO Central
        Secretariat.
    - type: appoints
      date_effective:
        date: '2005-10-15'
        type: effective
      message: |
        SC 4 appoints Gerald Radack, Peter Benson, Magne Valen-Sendstad and Guy Pierra as
        liaison officers from SC 4 to ISO/TC 37/SC 2, 3 and 4, and requests them to report back
        on any relevant implications for SC 4 standards and projects, after each ISO/TC 37
        and subcommittee meeting.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '657'
  kind: resolution
  status: decided
  dates:
  - date: '2005-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Nominate Jean-Jacques MICHEL as liaison to ISO/TC 184/SC 5/WG 7
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: recommends
      date_effective:
        date: '2005-10-15'
        type: effective
      message: |
        In addition to the appointments and nominations stated in SC 4 Resolution # 646, SC 4
        proposes that the ISO/TC 184/SC 4/JWG 8 Convener, Jean-Jacques MICHEL, be
        nominated as expert to SC 5/WG 7 by its National Body.
    - type: appoints
      date_effective:
        date: '2005-10-15'
        type: effective
      message: |
        SC 4 appoints him as liaison officer to ISO/TC 184/SC 5 and invites him to participate
        in the joint SC 1, SC 4 and SC 5 review on "Diagnostics and maintenance
        applications integration".
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '658'
  kind: resolution
  status: decided
  dates:
  - date: '2005-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Recommend national bodies review ISO/IEC JWG 1 guide ballots
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2005-10-15'
        type: effective
      message: |
        SC 4 notes the potential impact on many ISO Technical Committees of the proposed
        content of the JWG 1 "Guide for the Specification of Product Properties and Classes".
    actions:
    - type: recommends
      date_effective:
        date: '2005-10-15'
        type: effective
      message: |
        SC 4 recommends that National Bodies ensure that any ballot on these documents
        is reviewed by their representatives to SC 4 and other affected Technical Committees.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '659'
  kind: resolution
  status: decided
  dates:
  - date: '2005-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Disband Task Force on Dictionaries, Part Libraries and Reference Data Libraries
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: acknowledging
      date_effective:
        date: '2005-10-15'
        type: effective
      message: |
        SC 4 appreciates the content of the report of the Task Force on Dictionaries, Part
        Libraries and Reference Data Libraries (SC 4 N2016), since it supports the
        acceptance and knowledge about the SC 4 standards and their relations in industrial use.
    actions:
    - type: disbands
      date_effective:
        date: '2005-10-15'
        type: effective
      message: 'SC 4 disbands the Task Force.

        '
    - type: thanks
      date_effective:
        date: '2005-10-15'
        type: effective
      message: 'SC 4 thanks the Task Force for its efforts.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '660'
  kind: resolution
  status: decided
  dates:
  - date: '2005-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Assign ISO 22745 Open Technical Dictionary project to WG 12
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: assigns
      date_effective:
        date: '2005-10-15'
        type: effective
