- identifier: '655'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Termination of the Liaison between SC 4 and PLCS, Inc
  dates:
  - start: '2005-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Termination of the Liaison between SC 4 and PLCS, Inc
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: nominates
    message: 'SC 4 terminates its liaison with PLCS, Inc.

      The liaison with OASIS established under resolutions 580 and 629 remains in place, in

      order to address any SC 4 standardisation requirements arising from activities under

      the OASIS PLCS Technical Committee.'
    dates:
    - start: '2005-10-15'
      kind: effective
  considerations:
  - type: recognizing
    message: 'Recognizing the successful completion of the development of AP239, and the closure


      of the PLCS, Inc consortium'
    dates:
    - start: '2005-10-15'
      kind: effective
- identifier: '656'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Liaisons
  dates:
  - start: '2005-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Liaisons
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests an active two-way liaison with ISO/TC 37/SC 2, 3 and 4, and

      requests the SC 4 Secretary to confirm these liaisons with the ISO Central

      Secretariat'
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: appoints
    message: 'SC 4 appoints Gerald Radack, Peter Benson, Magne Valen-Sendstad

      and Guy Pierra as

      liaison officers from SC 4 to ISO/TC 37/SC 2, 3 and 4, and requests them to report back

      on any relevant implications for SC 4 standards and projects, after each ISO/TC 37

      and subcommittee meeting.'
    dates:
    - start: '2005-10-15'
      kind: effective
- identifier: '657'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Nomination of Experts to ISO/TC 184/SC 5/WG 7 "Diagnostic and maintenance
  dates:
  - start: '2005-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Nomination of Experts to ISO/TC 184/SC 5/WG 7 "Diagnostic and maintenance

      a p p lica tion s in te gratio n”

      In addition to the appointments and nominations stated in SC 4 Resolution # 646, SC

      4 proposes that the ISO/TC 184/SC 4/JWG 8 Convener, Jean-Jacques MICHEL, be

      nominated as expert to SC 5/WG 7 by its National Body'
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: appoints
    message: 'SC 4 appoints him as liaison officer to ISO/TC 184/SC 5 and invites him to participate

      in the joint SC 1, SC 4 and SC 5 review on “Diagnostics and maintenance

      applications integration”.'
    dates:
    - start: '2005-10-15'
      kind: effective
- identifier: '658'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: JWG 1
  dates:
  - start: '2005-10-15'
    kind: decision
  actions:
  - type: resolves
    message: JWG 1
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes the potential impact on many ISO Technical Committees of the proposed

      content of the JWG 1” Guide for the Specification of Product Properties and

      Classes”'
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: recommends
    message: 'SC 4 recommends that National Bodies ensure that any ballot on these documents

      is reviewed by their representatives to SC 4 and other affected Technical

