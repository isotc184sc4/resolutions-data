- identifier: '661'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: L iaiso n to ISO/T C 60 "Ge a rs”
  dates:
  - start: '2005-10-15'
    kind: decision
  actions:
  - type: resolves
    message: L iaiso n to ISO/T C 60 "Ge a rs”
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: establishes
    message: 'SC 4 establishes a liaison to ISO/TC 60 Gears to enable a close cooperation on data

      exchange for gears. To avoid inconsistencies and incompatibilities with existing SC 4

      standards, SC 4 nominates Alan Crawford and Len Slovensky as liaison officers.'
    dates:
    - start: '2005-10-15'
      kind: effective
- identifier: '662'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Nomination of representative to TMB ad hoc meeting on "Publication of Standar...
  dates:
  - start: '2005-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Nomination of representative to TMB ad hoc meeting on "Publication of Standards as

      databases" - Geneva 10/11 November'
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: nominates
    message: 'SC 4 nominates its chairman Howard Mason to attend the ISO/TMB ad hoc meeting

      on 2005-11-10/11 in Geneva. The objective of this nomination is to reflect the interest

      of SC 4 projects and users of SC 4 publications to make these publicly available and

      free of charge, in order to facilitate their use.

      The position of SC 4 should be compiled and circulated to SC 4 for review prior to the

      meeting.'
    dates:
    - start: '2005-10-15'
      kind: effective
- identifier: '663'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Acknowledgements and Appreciations
  dates:
  - start: '2005-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Acknowledgements and Appreciations

      Acclamation:

      Appreciation to our SC 4 Liaisons. We appreciate your representation to and for

      ISO/TC 184/SC 4.

      A special thank you to the SC 4 Liaison Plenary presenters for their insightful and

      comprehensive presentations:


      IAI

      Thomas Liebich

      ISO/TC 207

      Anna Moreno

      ECCMA / NATO AC 135

      Peter Benson & Gerry

      Radack ISO/TC 37

      Christian Galinski

      Appreciation:'
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 wishes to give its unanimous thanks to CNIS, its Members and the staff of the

      HangZhou Huagang HNA Resort Hotel for their efforts in organizing this meeting,

      arranging the facilities, excellent food, and excellent social events.

      Appreciation:'
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses its thanks to Mr. Bisong Liu and his staff,  Mr. Guangli Qin, Mr.

      Junfeng Zhan, Mr. Wenfeng Sun, Mr. Hanjing Hu, Mr. Wenwu Li, Mr. Yan Hong, Ms.

      Xiaojing Zhang and Ms. Ping Xu for their superior administrative support, outstanding

      hospitality, both before and during the ISO/TC 184/SC 4 meeting.  Our Special thanks

      to Mr.

      Zhiqiang Wang, CNIS system administrator, and Ms. Jianghua Liao and Ms.

      Shanshan Sun for their excellent support with printing and copying requirements for'
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: resolves
    message: 'the SC 4 Delegation. Finally, SC 4 expresses its particular thanks to Mr. Ping Wang

      for providing the overall excellent coordination for the entire SC 4 Meeting in

      HangZhou.'
    dates:
    - start: '2005-10-15'
      kind: effective
