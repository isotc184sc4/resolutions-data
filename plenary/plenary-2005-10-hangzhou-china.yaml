- identifier: '659'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Task Force on Dictionaries, Part Libraries and Reference Data Libraries
  dates:
  - start: '2005-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Task Force on Dictionaries, Part Libraries and Reference Data Libraries
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: appreciates
    message: 'SC 4 appreciates the content of the report of the Task Force on Dictionaries, Part

      Libraries and Reference Data Libraries (SC 4 N2016), since it supports the

      acceptance and knowledge about the SC 4 standards and their relations in industrial

      use'
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: disbands
    message: SC 4 disbands the Task Force.
    dates:
    - start: '2005-10-15'
      kind: effective
  - type: thanks
    message: SC 4 thanks the Task Force for its efforts
    dates:
    - start: '2005-10-15'
      kind: effective
- identifier: '660'
  subject: ISO/TC 184/SC 4 "Industrial data"
