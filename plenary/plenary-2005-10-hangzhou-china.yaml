        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '661'
  kind: resolution
  status: decided
  dates:
  - date: '2005-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Establish liaison to ISO/TC 60 Gears
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: establishes
      date_effective:
        date: '2005-10-15'
        type: effective
      message: |
        SC 4 establishes a liaison to ISO/TC 60 Gears to enable a close cooperation on data
        exchange for gears. To avoid inconsistencies and incompatibilities with existing SC 4
        standards, SC 4 nominates Alan Crawford and Len Slovensky as liaison officers.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '662'
  kind: resolution
  status: decided
  dates:
  - date: '2005-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Nominate Howard Mason to TMB ad hoc meeting on Publication of Standards
      as databases
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: nominates
      date_effective:
        date: '2005-10-15'
        type: effective
      message: |
        SC 4 nominates its chairman Howard Mason to attend the ISO/TMB ad hoc meeting
        on 2005-11-10/11 in Geneva. The objective of this nomination is to reflect the interest
        of SC 4 projects and users of SC 4 publications to make these publicly available and
        free of charge, in order to facilitate their use.

        The position of SC 4 should be compiled and circulated to SC 4 for review prior to the meeting.
