    - spelling: eng
      value: |
        SC 4 expresses its appreciation to Laura Thommen Vidale, the English technical
        editor for ISO/TC 184/SC 4, for the support she provides to SC 4's project teams and
        the Quality Committee in facilitating the delivery of SC 4 standards.

        SC 4 expresses its deep appreciation to the Instituto Português da Qualidade (IPQ),
        Instituto de Desenvolvimento de Novas Tecnologias (UNINOVA), the Departmento de
        Engenharia Electrotécnica Faculdade de Ciências e Tecnologia Universidade Nova de
        Lisboa, and the staff of the Carlton Madeira for their efforts in organizing this meeting,
        arranging the facilities, excellent food, and numerous social events. SC 4 also
        expresses its appreciation for their hospitality and outstanding support both before,
        during, and after the meeting. SC 4 appreciates the attendance and support of Adolfo
        Steiger Garção, Presidente do UNINOVA and Carlos Ganopa, Presidente do IPQ.

        We address a special recognition to Valdemar Lopes (IPQ), Ermelinda Barros (IPQ),
        Rubina Mendonça (IPQ), Lízia Martins (IPQ), André Mora (UNINOVA), Pedro Maló
        (UNINOVA), and Rui Tavares (UNINOVA) for their hospitality and outstanding support
        both before and during the ISO/TC 184/SC 4 meeting.
