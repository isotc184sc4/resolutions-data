      value: |
        SC 4 resolves to adopt the procedures described in ISO/TC 184/SC 4 N_Funchal 16
        "Procedures For Transposing Externally Developed Specifications Into ISO
        Deliverables" as a standing document to enable SC 4 to process Externally Developed
