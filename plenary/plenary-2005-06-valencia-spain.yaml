- identifier: '648'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Format and Layout of SC 4 Standards
  dates:
  - start: '2005-06-15'
    kind: decision
  actions:
  - type: resolves
    message: Format and Layout of SC 4 Standards
    dates:
    - start: '2005-06-15'
      kind: effective
  - type: adopts
    message: 'SC 4 adopts the following policy with regard to format and layout of SC 4 standards:

       Parts delivered to ISO in HTML shall follow the format and layout as given in


      the HTML Guidelines.

       Parts delivered to ISO in PDF shall follow the appropriate format and layout

      as given in the current clause 5, Format and layout of SC 4 standards, of the

      Supplementary Directives.

       Parts delivered to ISO in Microsoft® Word shall be prepared with one of the

      ISO templates for drafting standards.

      This policy shall go into effect immediately'
    dates:
    - start: '2005-06-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs the Quality Committee to

      make the appropriate changes to the Supplementary Directives to implement the

      above policy.'
    dates:
    - start: '2005-06-15'
      kind: effective
- identifier: '649'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Progress of ISO/IEC/JWG 1
  dates:
  - start: '2005-06-15'
    kind: decision
  actions:
  - type: resolves
    message: Progress of ISO/IEC/JWG 1
    dates:
    - start: '2005-06-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses its concerns at the apparent lack of progress in the work of JWG 1

      on providing Guidance on broader exploitation of ISO 13584 and IEC 61360'
    dates:
    - start: '2005-06-15'
      kind: effective
  - type: directs
    message: 'SC 4

      directs its nominated liaison officers and experts as shown in Resolution 611 & 627

      to endeavor to expedite the completion of the JWG 1 tasks and report progress to

      SC 4. The Chairman of SC 4 is asked to write to the convener of JWG 1 expressing

      the urgency of the SC 4 requirement for completion of the JWG 1 work.'
    dates:
    - start: '2005-06-15'
      kind: effective
- identifier: '650'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Assignment of a URN to an object within an ISO standard
  dates:
  - start: '2005-06-15'
    kind: decision
  actions:
  - type: resolves
    message: Assignment of a URN to an object within an ISO standard
    dates:
    - start: '2005-06-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests ISOCS to complete the ‘tcdefined’ section of SC 4/N1916, including

      guidance on the use of this section for the identification of an object within an ISO

      standard, and circulate the resulting document to the relevant ISO/TCs for review'
    dates:
    - start: '2005-06-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2005-06-15'
      kind: effective
  - type: resolves
    message: 'SC 4 further requests ISO Central Secretariat to agree to host the equivalent URL,

      which document SC 4/N1916 says ‘should be possible’, and to publish documents

      where the following criteria are satisfied:

       it has been agreed that the standard, or the object defined within the

      standard, shall be freely available on the Web;

       the Technical Committee provides the document that has the URL or

      contains the URL as an object within it.'
    dates:
    - start: '2005-06-15'
      kind: effective
- identifier: '651'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Installation of a Registration Authority according to ISO 13584 Part 501
  dates:
  - start: '2005-06-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Installation of a Registration Authority according to ISO 13584 Part 501

      In the absence of any specific recommendation from JWG 1, SC 4 requests its

      secretariat to take the necessary steps with ISO to request the establishment of a


      Registration Authority as defined in 13584 Part 501'
    dates:
    - start: '2005-06-15'
      kind: effective
  - type: nominates
    message: 'SC 4 nominates the Japan

      Electric Measuring Instruments Manufacturers Association to act as the Registration

      Authority. After 3 years, the way of maintaining the dictionary shall be reviewed

      taking into account advice from JWG 1 and new rules and regulations coming from

      ISO or IEC.'
    dates:
    - start: '2005-06-15'
      kind: effective
- identifier: '652'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: NWI on Product properties and reference hierarchies, proposed by ISO/TC 10/SC
  dates:
  - start: '2005-06-15'
    kind: decision
  actions:
  - type: resolves
    message: 'NWI on Product properties and reference hierarchies, proposed by ISO/TC 10/SC

      10/WG 11'
    dates:
    - start: '2005-06-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes the ISO/TC 10 proposal to create a multi-part standard for defining

      dictionaries of properties with class reference hierarchies. This work appears to have a

      large overlap with the published ISO 13584, ISO 15926 and IEC 61360 standard

      series'
    dates:
    - start: '2005-06-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2005-06-15'
      kind: effective
  - type: resolves
    message: 'SC 4 also notes that the proposed scope of part 101 of this ISO/TC 10 multi-part

      standard appears to have a large overlap with its ongoing and published work

      on component libraries and reference hierarchies for the oil and gas industry.

      In order to achieve synergy and to avoid duplicate and conflicting standards SC 4

      invites ISO/TC 10 and ISO/IEC JWG 1 to participate in an open discussion with SC 4

      on the technical content of the proposed standard in order to agree the necessary

      scope of work to be undertaken in the respective committees.'
    dates:
    - start: '2005-06-15'
      kind: effective
