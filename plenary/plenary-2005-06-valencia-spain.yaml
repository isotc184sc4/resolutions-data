- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '650'
  kind: resolution
  status: decided
  dates:
  - date: '2005-06-15'
    type: adoption
  title:
  - spelling: eng
    value: Request ISO CS complete URN guidance and host equivalent URLs
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2005-06-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests ISOCS to complete the 'tcdefined' section of SC 4/N1916, including
        guidance on the use of this section for the identification of an object within an ISO
        standard, and circulate the resulting document to the relevant ISO/TCs for review.
  - type: requests
    date_effective:
      date: '2005-06-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 further requests ISO Central Secretariat to agree to host the equivalent URL,
        which document SC 4/N1916 says 'should be possible', and to publish documents
        where the following criteria are satisfied:

        * it has been agreed that the standard, or the object defined within the
        standard, shall be freely available on the Web;
        * the Technical Committee provides the document that has the URL or
        contains the URL as an object within it.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '651'
  kind: resolution
  status: decided
  dates:
  - date: '2005-06-15'
    type: adoption
  title:
  - spelling: eng
    value: Nominate JEMIMA as Registration Authority for ISO 13584-501
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2005-06-15'
      type: effective
    message:
    - spelling: eng
      value: |
        In the absence of any specific recommendation from JWG 1, SC 4 requests its
        secretariat to take the necessary steps with ISO to request the establishment of a
        Registration Authority as defined in 13584 Part 501.
  - type: nominates
    date_effective:
      date: '2005-06-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 nominates the Japan Electric Measuring Instruments Manufacturers Association
        (JEMIMA) to act as the Registration Authority. After 3 years, the way of maintaining
        the dictionary shall be reviewed taking into account advice from JWG 1 and new
        rules and regulations coming from ISO or IEC.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '652'
  kind: resolution
  status: decided
  dates:
  - date: '2005-06-15'
    type: adoption
  title:
  - spelling: eng
    value: Invite ISO/TC 10 to discuss proposed NWI to avoid overlap
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2005-06-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 also notes that the proposed scope of part 101 of this ISO/TC 10 multi-part
        standard appears to have a large overlap with its ongoing and published work
        on component libraries and reference hierarchies for the oil and gas industry.
        In order to achieve synergy and to avoid duplicate and conflicting standards SC 4
        invites ISO/TC 10 and ISO/IEC JWG 1 to participate in an open discussion with SC 4
        on the technical content of the proposed standard in order to agree the necessary
        scope of work to be undertaken in the respective committees.
  considerations:
  - type: noting
    date_effective:
      date: '2005-06-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 notes the ISO/TC 10 proposal to create a multi-part standard for defining
        dictionaries of properties with class reference hierarchies. This work appears to have a
        large overlap with the published ISO 13584, ISO 15926 and IEC 61360 standard
        series.
