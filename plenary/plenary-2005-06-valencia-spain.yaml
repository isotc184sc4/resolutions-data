  - spelling: eng
    value: Direct liaison officers to expedite ISO/IEC JWG 1 tasks
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: directs
    date_effective:
      date: '2005-06-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 directs its nominated liaison officers and experts as shown in Resolution 611 & 627
