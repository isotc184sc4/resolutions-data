- identifier: '646'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Nomination of Experts to ISO/TC 184/SC 5/WG 7 "Diagnostic and maintenance
  dates:
  - start: '2005-06-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Nomination of Experts to ISO/TC 184/SC 5/WG 7 "Diagnostic and maintenance

      applications integration"'
    dates:
    - start: '2005-06-15'
      kind: effective
  - type: secures
    message: 'SC 4 sees a potential need of cooperation with its projects ISO 10303-239 "Product

      Life Cycle Support" (PLCS), ISO 15926 and the ASAM ODS PAS 22720. To avoid

      any overlap or gaps in the development of these projects SC 4 proposes that Tim

      King, Leif Gyllström, Magne Valen-Sendstad and Nigel Shaw be nominated as

      experts to SC 5/WG 7 by their respective National Bodies'
    dates:
    - start: '2005-06-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2005-06-15'
      kind: effective
  - type: appoints
    message: 'SC 4 appoints them as liaison officers to ISO/TC 184/SC 5 and invites them to

      participate in the joint SC 1, SC 4 and SC 5 review on “Diagnostics and maintenance

      applications integration”.'
    dates:
    - start: '2005-06-15'
      kind: effective
