- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1171'
  urn: urn:iso:tc184:sc4:resolution:1171
  kind: resolution
  status: decided
  dates:
  - date: '2025-10-15'
    type: adoption
  title:
  - spelling: eng
    value: Launch ISO 10303-59 revision using SDT 24
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2025-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC4 requests its Committee Manager to coordinate with ISO/CS and launch the new edition using the SDT 24 track, nominating Atsuto Soma as Project Leader, and allocating the work to WG 12 with the following terms of reference:

        Update ISO 10303-59:2022 as presented to the Change Board during the 90th Plenary of SC4 on 28 Oct 2025 with the following schedule milestones:

        * CD consultation: 2026-03-31
        * DIS submission: 2026-07-31
        * Publication: 2027-01-31

        Nominate the following experts to participate in the project:

        * Fumiki Tanaka (JISC)
        * Akihiko Ohtaka (JISC)
        * Hiroyuki Hiraoka (JISC)
        * Yoshihito Kikuchi (JISC)
        * Kazuya Kobayashi (JISC)

        Further, the SC 4 Committee Manager is requested to launch a call for experts from National Bodies and Liaisons to participate in the project's work.

        Finally, due to the special nature of ISO 10303-59 SC 4 requests ISO to grant a waiver on the mandatory use of the ISO Online Standards Development platform for this project.
  considerations:
  - type: noting
    date_effective:
      date: '2025-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'Noting that a new update to ISO 10303-59:2022 is needed and there is
        no change in scope to the standard

        '
