- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1178'
  urn: urn:iso:tc184:sc4:resolution:1178
  kind: resolution
  status: decided
  dates:
  - date: '2025-10-15'
    type: adoption
  title:
  - spelling: eng
    value: Establish a liaison with ISO/IEC JTC 1/WG 12 on 3D printing
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '2025-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'In light of the shared interest in 3D printing, scanning addressed by
        ISO/IEC JTC 1/WG 12, and industrial data, particularly in terms of formats
        for visualization and other forms of product data addressed by JWG 16, SC
        4 requests its Committee Manager establish a liaison from SC4 to ISO/IEC/JTC
        1/WG 12 and appoints JWG 16 co-convenors, Soonhung Han and Christophe Mouton,
        to serve as liaison representatives for a three-year term [2025-2028], with
        appreciation for their offer to serve in that capacity.

        '
