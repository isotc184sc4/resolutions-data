  - date: '2025-10-15'
    type: adoption
  title:
  - spelling: eng
    value: Set 8-week ballot duration for new work item proposals
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2025-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests its Committee Manager to apply the 8-week ballot duration to the
        following NP ballots and coordinate with the appropriate committees in joint work:

        |===
        |Project |Approval

        |ISO/PWI 23726-1 Industrial automation systems and integration -- Ontology based interoperability -- Part 1: Overview and fundamental principles
        |☒

        |ISO/NP 8000-260: Data quality -- Part 260: Sensor data life cycle management: Concept and framework
        |☒

        |ISO/NP XXXX: Industrial automation systems and integration -- Framework for visualization of product data using AI models
        |☒

        |ISO/NP XXXX: Industrial automation systems and integration -- 3D shape descriptors for fidelity metrics of digital twin shapes
        |☒

        |ISO/NP 15926-200: Industrial automation systems and integration -- Integration of life-cycle data for process plants including oil and gas production facilities -- Part 200: RDFS Implementation of the data model
        |☒
        |===
