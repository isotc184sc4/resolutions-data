- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1173'
  urn: urn:iso:tc184:sc4:resolution:1173
  kind: resolution
  status: decided
  dates:
  - date: '2025-10-15'
    type: adoption
  title:
  - spelling: eng
    value: Initiate revision for ISO 10303-242 ed5
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2025-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests its Committee Manager to coordinate with ISO/CS and initiate the revision of ISO 10303-242 as a new project using the SDT 36 track with the following dates:

        Proposed date for first meeting: 2025-11-20

        Dates for key milestones:

        * Circulation of 1st Working Draft (if any) to experts: 2025-11-15
        * Committee Draft Consultation (if any): 2025-12-15
        * DIS submission: 2026-12-15
        * Publication: 2027-09-15
  - type: allocates
    date_effective:
      date: '2025-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC4 allocates the project to WG 12 and appoints Jean Brangé as project leader and nominates the following experts to participate in the project:

        * AFNOR: Frédéric Darré, Véronique Dubillot, Pierre Duchier, Jacques Heinisch, Erwan Livolant
        * ANSI: Brian Bentrim, Allison Barnard, Michelle Drummond, Stuart Galt, Melissa Harvey, John Van Horn, Benjamin Standfield, Tom Thurman, Asa Trainer, Ben Urick, Pat Walsh
        * BSI: Robert Swindells
        * DIN: Bernd Feldvoss, Guillaume Hirel, Lothar Klein, Max Ungerer
        * JISC: Hiroyuki Hiraoka, Fumiki Tanaka, Atsuto Soma
        * SAC: Hyman Duan
        * SIS: Mikael Hedlind, Magnus Lundgren, Torbjörn Holm
        * SN: Nils Sandsmark, Pal Rylandsholm

        Further, the SC 4 Committee Manager is requested to launch a call for experts from National Bodies and Liaisons to participate in the project's work.

        Finally, due to the special nature of ISO 10303-242 SC 4 requests ISO to grant a waiver on the mandatory use of the ISO Online Standards Development platform for this project.
  considerations:
  - type: noting
    date_effective:
      date: '2025-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'Noting the proposal from WG 12 for creating edition 5 of ISO 10303-242
        to incorporate additional capabilities from industry requirements

        '
