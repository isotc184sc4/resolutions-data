- identifier: '614'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Esta b lishm en t of Catego r y “A” L iaiso n with UNSP SC
  dates:
  - start: '2004-07-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Esta b lishm en t of Catego r y “A” L iaiso n with UNSP SC

      ISO/TC 184/SC 4 welcomes the approach from UNSPSC (United Nations Standard

      Products and Services Codes), and agrees to establish a Category A liaison with

      UNSPSC, and nominates John McInerney as liaison officer.  Further, SC 4 directs its

      Secretary to confirm this liaison with the ISO CS.'
    dates:
    - start: '2004-07-15'
      kind: effective
- identifier: '615'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Esta b lishm en t of Catego r y “A” L iaiso n with USP I -NL
  dates:
  - start: '2004-07-15'
    kind: decision
  actions:
  - type: resolves
    message: Esta b lishm en t of Catego r y “A” L iaiso n with USP I -NL
    dates:
    - start: '2004-07-15'
      kind: effective
  - type: accepts
    message: 'SC 4 accepts the request from the Uitgebreid Samenwerkingsverband Proces

      Industrie Nederland (USPI-NL) to form a two-way Category A liaison, requests the

      Secretariat to confirm their eligibility with ISO CS, and appoints Paul van Exel as

      liaison officer from SC 4 to USPI-NL.'
    dates:
