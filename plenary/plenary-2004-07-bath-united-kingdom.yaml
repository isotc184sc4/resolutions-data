    title: Nominate SC 4 delegates to ISO/IEC JWG 1
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: nominates
      date_effective:
        date: '2004-07-15'
        type: effective
      message: 'SC 4 nominates Hiroshi Murayama, Dr. Wolfgang Wilkes, Professor Guy
        Pierra, Dr Gerry Radack, Dr Tim King, Dr Norman Swindells, Dr Nils Sandsmark
        and Mr. Ping Wang as delegates to the first meeting of ISO/IEC JWG 1 on 8
        September 2004 in Berlin, and requests its Secretariat to notify DIN of the
        participation.

        '
    - type: requests
      date_effective:
        date: '2004-07-15'
        type: effective
      message: 'SC 4 requests its P-members to ensure that their delegations to the
        meeting are fully briefed on the SC 4 priorities.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
