- identifier: '611'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Nomination of SC 4 delegates to ISO/IEC JWG 1
  dates:
  - start: '2004-07-15'
    kind: decision
  actions:
  - type: resolves
    message: Nomination of SC 4 delegates to ISO/IEC JWG 1
    dates:
    - start: '2004-07-15'
      kind: effective
  - type: nominates
    message: 'SC 4 nominates Hiroshi Murayama, Dr. Wolfgang Wilkes, Professor Guy Pierra, Dr

      Gerry Radack, Dr Tim King, Dr Norman Swindells, Dr Nils Sandsmark and Mr. Ping

      Wang as delegates to the first meeting of ISO/IEC JWG 1 on 8 September 2004 in

      Berlin, and requests its Secretariat to notify DIN of the participation'
    dates:
    - start: '2004-07-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2004-07-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its P-members to ensure that their delegations to the meeting are fully

      briefed on the SC 4 priorities.'
    dates:
    - start: '2004-07-15'
      kind: effective
- identifier: '612'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Enhancement of Expertise for ISO/IEC JWG 1 work
  dates:
  - start: '2004-07-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Enhancement of Expertise for ISO/IEC JWG 1 work

      ISO/TC 184/SC 4 respectfully request ISO/TMB to encourage the venue of future

      ISO/IEC JWG 1 (Product properties and families) meetings to be planned in

      conjunction with ISO/TC 184/SC 4/WG 2 and IEC SC 3 D meetings.


      The major expected benefit from such a request is to enhance technical participation

      in ISO/IEC JWG 1 work.'
    dates:
    - start: '2004-07-15'
      kind: effective
