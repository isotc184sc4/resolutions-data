- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '619'
  kind: resolution
  status: decided
  dates:
  - date: '2004-07-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Narrow scope of ISO 13584-501 and coordinate on industrial process control
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2004-07-15'
        type: effective
      message: 'SC 4 requests WG 2 to narrow the scope of ISO 13584-501 to deal only
        with environment measuring instruments and laboratory measuring instruments.

        '
    - type: requests
      date_effective:
        date: '2004-07-15'
        type: effective
      message: 'SC 4 kindly requests that its Chair and secretariat establish the
        appropriate contacts in order to create a joint activity to develop a consistent
        dictionary for industrial process control measuring instruments.

        '
