    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Request ISO/TMB to co-locate JWG 1 meetings with SC 4/WG 2 and IEC SC 3
      D
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2004-07-15'
        type: effective
      message: |
        ISO/TC 184/SC 4 respectfully request ISO/TMB to encourage the venue of future ISO/IEC JWG 1 (Product properties and families) meetings to be planned in conjunction with ISO/TC 184/SC 4/WG 2 and IEC SC 3 D meetings.

        The major expected benefit from such a request is to enhance technical participation in ISO/IEC JWG 1 work.
