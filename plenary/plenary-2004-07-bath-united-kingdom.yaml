- identifier: '619'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Requirements for Dictionaries on Measuring Instruments
  dates:
  - start: '2004-07-15'
    kind: decision
  actions:
  - type: resolves
    message: Requirements for Dictionaries on Measuring Instruments
    dates:
    - start: '2004-07-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests WG 2 to narrow the scope of ISO 13584-501 to deal only with

      environment measuring instruments and laboratory measuring instruments'
    dates:
    - start: '2004-07-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2004-07-15'
      kind: effective
  - type: resolves
    message: 'SC 4 kindly requests that its Chair and secretariat establish the appropriate contacts

      in order to create a joint activity to develop a consistent dictionary for industrial

      process control measuring instruments'
    dates:
    - start: '2004-07-15'
      kind: effective
- identifier: '620'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Acknowledgements and Appreciations
  dates:
  - start: '2004-07-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Acknowledgements and Appreciations

      APPRECIATION:'
    dates:
    - start: '2004-07-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its deep appreciation to EMSA, its Members and the support staff for

      their outstanding efforts in organizing this meeting, arranging the facilities, excellent

      food, and excellent social events'
    dates:
    - start: '2004-07-15'
      kind: effective
  - type: resolves
    message: 'SC 4 also expresses its appreciation to the

      University of Bath for their hospitality and support during the SC 4 meetings.

      APPRECIATION:

      Appreciation to our SC 4 Liaisons. We appreciate your representation to and for

      ISO/TC 184/SC 4.

      A special thank you to the SC 4 Liaison Plenary presenters for their insightful and

      comprehensive presentations:


      IAI

      Jeffrey Wix

      ISO/TC 29/WG 34

      Jonas Nordstrom

      ASAM

      Gerald Sammer

      ISO/TC 172/SC 1/WG 4

      Prudence

      Wormwell ISO/TC 211

      Jerry Smith

      FSIG

      Ricardo

      Gonçalves VAMAS & ISO/TC 207

      Anna Moreno

      PDES, Inc

      Bob Kiggans

      NATO AC/135/ECCMA

      Steve Arnett & Peter

      Benson SASIG

      Sven Hjelm

      APPRECIATION:'
    dates:
    - start: '2004-07-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses its particular thanks to Mr. Tony Fry, Mr. John Kendall, Mrs. Louise

      Fry, Ms Marie Nesbitt and Mr. Mike Barter for their superior administrative support,

      outstanding hospitality, and patience both before and during the ISO/TC 184/SC 4

      meeting. Additionally, we would like to thank Bernard Smalley and Collin Williams for

      maintaining the computer systems for the conference'
    dates:
    - start: '2004-07-15'
      kind: effective
