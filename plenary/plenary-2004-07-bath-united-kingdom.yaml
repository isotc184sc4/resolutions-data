- identifier: '617'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Meeting Fees
  dates:
  - start: '2004-07-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Meeting Fees

      As part of the ongoing programme of action to reduce meeting costs, all hosts of future'
    dates:
    - start: '2004-07-15'
      kind: effective
  - type: resolves
    message: 'SC 4 meetings are required to provide a budget plan for the meeting to the secretariat


      of SC 4 as part of their request for the approval of hosting the particular meeting. The

      budget plan shall include estimates for meeting fees, local travel costs and hotel costs

      in accordance with the SC 4 reporting form, so that the Secretariat and PPC can

      ensure that the overall costs to delegates are reasonable and allowable under ISO

      rules.'
    dates:
    - start: '2004-07-15'
      kind: effective
- identifier: '618'
  subject: ISO/TC 184/SC 4 "Industrial data"
