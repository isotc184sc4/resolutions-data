- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '617'
  kind: resolution
  status: decided
  dates:
  - date: '2004-07-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Require future SC 4 meeting hosts to provide budget plans
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2004-07-15'
        type: effective
      message: 'As part of the ongoing programme of action to reduce meeting costs,
        all hosts of future SC 4 meetings are required to provide a budget plan for
        the meeting to the secretariat of SC 4 as part of their request for the approval
        of hosting the particular meeting. The budget plan shall include estimates
        for meeting fees, local travel costs and hotel costs in accordance with the
        SC 4 reporting form, so that the Secretariat and PPC can ensure that the overall
        costs to delegates are reasonable and allowable under ISO rules.

        '
