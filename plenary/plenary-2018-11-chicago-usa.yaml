- identifier: '999'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Development of Edition 2 of ISO 10303-242
  dates:
  - start: '2018-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Development of Edition 2 of ISO 10303-242
    dates:
    - start: '2018-11-15'
      kind: effective
  - type: agrees
    message: 'SC 4 agrees that the following points specified by WG 12 for the way forward with AP

      242ed2 DIS and the extended architecture specification shall be used as a basis for the

      second AP 242ed2 DIS ballot:

      1. Agreement to retain ISO/TS 10303-4442 in the standard

      2. Agreement to continue to provide an EXPRESS representation for the Integrated

      Resources, AIM, ARM and Domain Model

      3. Agreement to retain EXPRESS


      4. Agreement to use SysML as the modelling language for AP 242ed2 domain

      model in ISO/TS 10303-4442

      5. Agreement to re-ballot the standing documents N3210, N3211, and N3212 with a

      revision to focus the documents only on the specific materials required to support

      AP 242ed2 and ISO/TS 10303-4442. All materials that speak to the future state

      of the extended architecture will be moved to a technical report and addressed

      by an ad hoc group on the strategy for extended architecture with Allison Barnard

      Feeney as chief editor'
    dates:
    - start: '2018-11-15'
      kind: effective
  - type: investigates
    message: 'SC 4 invites members from each NSB to join and

      contribute to the refinement of the content.

      6. Agreement to create SMRL V8 with the required updates that support AP

      242ed2.

      7. Agreement to create one or more NPs that address the implementation of SysML

      as a modelling solution into the internal procedures of SC 4. This work will

      primarily impact WG 11 and coordination has taken place at the Chicago meeting

      to define the work required by WG 11.

      8. Acknowledgement that the strategy for extended architecture contained in the

      technical report will require further action by the ad hoc group as there exists a

      strong dependency between the strategy and the implementation of follow on

      capabilities for AP 239ed3 and AP 243.

      9. Acknowledgement that future releases of extended architecture capabilities will

      require update and revision of the standing documents noted. These standing

      documents shall be balloted incrementally as changes are declared.

      10. Acknowledgement that the current priority is to resolve documented comments

      against the ballot content for AP 242ed2. Any discovery or comments not formally

      declared will be noted as a bug in the bug tracking system against a future edition.'
    dates:
    - start: '2018-11-15'
      kind: effective
