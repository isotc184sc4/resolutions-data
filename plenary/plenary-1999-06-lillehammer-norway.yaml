- identifier: '406'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: SC 4 A-Liaison with PIEBASE SC 4 approves a Category A active two-way liaison...
  dates:
  - start: '1999-06-15'
    kind: decision
  actions:
  - type: resolves
    message: SC 4 A-Liaison with PIEBASE
    dates:
    - start: '1999-06-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves a Category A active two-way liaison with the PIEBASE, approves

      Mr. Alan Doniger as the person to actively liaise to PIEBASE on SC 4’s behalf, and

      requests that the SC 4 Secretary confirm this liaison with the ISO Central

      Secretariat.'
    dates:
    - start: '1999-06-15'
      kind: effective
- identifier: '407'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: FDIS Ballot Cycle
  dates:
  - start: '1999-06-15'
    kind: decision
  actions:
  - type: resolves
    message: FDIS Ballot Cycle
    dates:
    - start: '1999-06-15'
      kind: effective
  - type: request
    message: 'SC 4 request its Secretariat to ask ISO-Central Secretariat for a waiver of the FDIS

      vote for SC 4 standards subject to the following conditions:


      After completion of the DIS balloting, the SC 4 Chairman, WG Convener, and Project

      Leader shall meet to decide if an FDIS ballot is required (the SC 4 Secretariat also

      attends this meeting but does not participate in the decision process).  Currently the

      exemption from the formal YES/NO vote in an FDIS is established as 100% approval

      of member bodies. If that is not the case, an FDIS ballot will not be required if there

      are no technical issues submitted against the DIS document. If there are technical

      issues

      submitted, the decision as to whether to proceed to the FDIS ballot stage shall be at the

      discretion of the SC 4 Chairman, WG Convener, and Project Leader. The decision

      from these three parties must be unanimous for a document to bypass the FDIS

      ballot.'
    dates:
    - start: '1999-06-15'
      kind: effective
