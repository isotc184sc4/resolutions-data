      kind: effective
- identifier: '419'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: PDML
  dates:
  - start: '1999-06-15'
    kind: decision
  actions:
  - type: resolves
    message: PDML
    dates:
    - start: '1999-06-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs WG 11 to take into account the technical aspects of PDML within its work

      for the XML representation of EXPRESS-driven data, specifically in the development

      of a specification for an early bound form.

      Furthermore, SC 4 recognizes and accepts the proposal and resolution of SC 34 to

      collaborate in the NWI being considered by WG 11: XML representation for

      EXPRESS- driven data.'
    dates:
    - start: '1999-06-15'
      kind: effective
