- identifier: '416'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: the Integration of Enterprise Information
  dates:
  - start: '1999-06-15'
    kind: decision
  actions:
  - type: resolves
    message: SC 4 Contribution to the Integration of Enterprise Information
    dates:
    - start: '1999-06-15'
      kind: effective
  - type: investigates
    message: 'SC 4 invites its WG 12 to lead an ad hoc group to deliver the SC 4 information

      requirements into the BSR activity and the proposed MoU/MG summit, and

      participate

      in the construction of a global synthesis of enterprise information.  National bodies are

      invited to nominate representatives to the ad hoc group by 31 July 1999.'
    dates:
    - start: '1999-06-15'
      kind: effective
- identifier: '417'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Creation of Product Structure Team
  dates:
  - start: '1999-06-15'
    kind: decision
  actions:
  - type: resolves
    message: Creation of Product Structure Team
    dates:
    - start: '1999-06-15'
      kind: effective
  - type: investigates
    message: 'SC 4 invites interested parties in the collection and synthesis of the requirements for

      product structure to participate in the WG 10 workshop on STEP Modularization in


      September 1999.

      Participants are specifically invited from projects including, but not restricted to,

      PLCS, the proposed Revision to AP 203, the PDM Schema, Ship Common Model

      and individual national initiatives such as PDML.'
    dates:
    - start: '1999-06-15'
      kind: effective
