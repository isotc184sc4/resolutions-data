  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '1999-06-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC4 invites interested parties in the collection and synthesis of the requirements for
        product structure to participate in the WG 10 workshop on STEP Modularization in
        September 1999.

        Participants are specifically invited from projects including, but not restricted to,
        PLCS, the proposed Revision to AP 203, the PDM Schema, Ship Common Model
        and individual national initiatives such as PDML.
