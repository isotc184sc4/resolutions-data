  kind: resolution
  status: decided
  dates:
  - date: '1994-05-15'
    type: adoption
  title:
  - spelling: eng
    value: Prohibit unauthorized methods for Initial Release development
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '1994-05-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 does not authorise the use or development of methods and procedures other
        than those used to develop the STEP Initial Release, until the methods and
        procedures for the Initial Release are documented and accepted by PMAG and SC 4.
