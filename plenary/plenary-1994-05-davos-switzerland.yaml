    number: '198'
  kind: resolution
  status: decided
  dates:
  - date: '1994-05-15'
    type: adoption
  title:
  - spelling: eng
    value: Perform feasibility study on data modelling in EDI domain
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: directs
    date_effective:
      date: '1994-05-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 directs the WG 8 Convener and the WG 8 P1 Project Leader, to perform a
        feasibility study to demonstrate how a data modelling methodology can be used in
        the EDI domain. This study will use STEP and MANDATE approaches as far as
        possible. A final report is expected to be delivered during the next ISO/TC 184/SC 4
        plenary meeting.
- identifier:
