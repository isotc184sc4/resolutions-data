- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '205'
  kind: resolution
  status: decided
  dates:
  - date: '1994-05-15'
    type: adoption
  title:
  - spelling: eng
    value: Affirm EXPRESS language flexibility for data models
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '1994-05-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 affirms that the EXPRESS language (ISO 10303-11) should be flexible enough
        to support the specification of data models regardless of the application area.
        Requirements for the extension of EXPRESS resulting from this objective can be
        brought forward from other International Standardization bodies, National Standards
        bodies, and other such public agencies that develop and promulgate standards such
        as industry associations.

        While inputs from private organizations are welcome, no special priority is given to
        their requirements.

        It is recognized that requirements for the EXPRESS language that go beyond those
        supporting SC 4 projects may require additional resources before resolution is
        possible.
