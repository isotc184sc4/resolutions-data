  - spelling: eng
    value: Encourage WG 8 research on EDIFACT message models
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: encourages
    date_effective:
      date: '1994-05-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 encourages the WG 8 Convener to research with the bodies developing
        EDIFACT message models, the suitable material for manufacturing management
        requirements. If it is not possible to find such material, ISO/TC 184/SC 4/WG 8
        should propose a new work item for developing a standard, refining the needed
        messages, preferably in accordance with the EDIFACT organisation.
