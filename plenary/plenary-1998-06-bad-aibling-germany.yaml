- identifier: '358'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: add the following language to the SC 4 Handbook, Section 2
  dates:
  - start: '1998-06-15'
    kind: decision
  actions:
  - type: resolves
    message: 'SC 4 resolves to add the following language to the SC 4 Handbook, Section 2.3 The

      Proposal Stage. The language shall be added as a new paragraph after paragraph 3.

      For any normative references, their status at the time the new work item is expected to

      be registered for circulation as a Draft International Standard shall be provided.  For

      normative references whose status is not at least Draft International Standard (4.00),

      Final Draft International Standard (5.00) or International Standard (6.00) at the time of


      the proposal, the expected date for registration as a Draft International Standard shall

      be provided. If the normative reference has not been circulated as a Committee Draft

      at the time of the proposal, the expected date for circulation of the Committee Draft

      shall be also be provided. The source of dates shall be the Project Master Schedule

      Data Base maintained by the Secretariat.'
    dates:
    - start: '1998-06-15'
      kind: effective
