- identifier: '361'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO 10303 Release 2
  dates:
  - start: '1998-06-15'
    kind: decision
  actions:
  - type: resolves
    message: 'SC 4 resolves that ISO 10303 Release 2.0 comprises the following parts and instructs

      the project leaders to complete the work necessary to make them international

      standards by April, 2000.

       Part 1E2 Overview and Fundamental Principles

       Part 11* Description Methods: The EXPRESS Language Reference Manual

       Part 21* Implementation methods: Clear text encoding of the exchange structure

       Part 22  Implementation methods: Standard data access interface specification

       Part 23  Implementation methods: C++ language binding to the standard

      data access interface

       Part 24  Implementation methods: C language binding to the standard data

      access interface

       Part 26  Implementation methods: Interface definition language binding to the

      standard data access interface

       Part 31* Conformance testing methodology and framework:  General concepts

       Part 32  Conformance testing methodology and framework:  Requirements

      on testing laboratories and clients

       Part 34  Conformance testing methodology and framework: Abstract test methods

       Part 41E2 Integrated generic resource:  Fundamentals of product description and

      support

       Part 42E2 Integrated generic resource: Geometrical and topological representation


       Part 43E2 Integrated generic resource:  Representation structures

       Part 44E2 Integrated generic resource: Product structure configuration

       Part 45  Integrated generic resource: Materials

       Part 46 * Integrated generic resource:  Visual presentation

       Part 47 * Integrated generic resource:  Shape variation tolerances

       Part 49  Integrated generic resource: Process structure and properties

       Part 101* Integrated application resource:  Draughting

       Part 104 Integrated application resource: Finite element analysis

       Part 105* Integrated application resource: Kinematics

       Part 106 Integrated application resource: Building construction core model

       Part 201* Application protocol: Explicit draughting;

       Part 202* Application protocol: Associative draughting;

       Part 203* Application protocol:  Configuration controlled design

       Part 204 Application protocol: Mechanical design using boundary representation;

       Part 205 Application protocol: Mechanical design using surface representation;

       Part 207 Application protocol: Sheet metal die planning and design;

       Part 208 Application protocol: Life cycle management - Change process;

       Part 209 Application protocol: Composite and metallic structural analysis

      and related design;

       Part 210 Application protocol: Electronic assembly, interconnect, and

      packaging design;

       Part 212 Application protocol: Electotechnical design and installation;

       Part 213 Application protocol: Numerical control process plans for machined parts

       Part 214 Application protocol: Core data for automotive mechanical

      design processes;

       Part 221 Application protocol: Functional data and their schematic

      representation for process plant;

       Part 222 Application protocol: Exchange of product data for composite structures

       Part 223 Application protocol: Exchange of design and manufacturing

      product information for casting parts;

       Part 224 Application protocol: Mechanical product definition for process plans

      using machining features;

       Part 225 Application protocol: Building elements using explicit shape

      representation;

       Part 227 Application protocol: Plant spatial configuration;

       Part 501 Application interpreted construct: Edge based wireframe

       Part 502 Application interpreted construct: Shell-based wireframe

       Part 503 Application interpreted construct: Geometrically bounded 2D wireframe


       Part 504 Application interpreted construct: Draughting annotation

       Part 505 Application interpreted construct: Drawing structure and administration

       Part 506 Application interpreted construct: Draughting elements

       Part 507 Application interpreted construct: Geometrically bounded surface

       Part 508 Application interpreted construct: Non-manifold surface;

       Part 509 Application interpreted construct: Manifold surface

       Part 510 Application interpreted construct:  Geometrically bounded wireframe

       Part 511 Application interpreted construct: Topologically bounded surface

       Part 512 Application interpreted construct: Faceted boundary representation

       Part 513 Application interpreted construct: Elementary boundary representation

       Part 514 Application interpreted construct: Advanced boundary representation

       Part 515 Application interpreted construct: Constructive solid geometry

       Part 517 Application interpreted construct: Mechanical design

      geometric presentation

       Part 518 Application interpreted construct: Mechanical design

      shaded representation

       Part 519 Application interpreted construct: Geometric tolerances

       Part 520 Application interpreted construct: Associative draughting elements

      Also included are the technical report 10303-12 Description Methods: The EXPRESS-

      I language reference manual and the technical reports 10303-302 to -305, -307 to -

      310, - 312 to -314, -321 to -325, and -327 which are the abstract test suites for the

      corresponding application protocols. An asterisk (*) denotes parts that are already

      international standards. The E2 notation after a part number denotes a second

      edition.

      Additional parts may be considered for Release 2, however, no additional part will be

      included if its inclusion will result in a schedule slippage.

      Moreover, if there is slippage in the adopted schedule of any part in the above list,

      then SC 4 may vote to defer that part to a future release'
    dates:
    - start: '1998-06-15'
      kind: effective
