- identifier: '373'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: its Change management team to check all Proposals for New Work
  dates:
  - start: '1998-06-15'
    kind: decision
  actions:
  - type: instructs
    message: 'SC 4 instructs its Change management team to check all Proposals for New Work

      Items against timescale and resources.


      The following questions for check have to be considered before a proposal goes out

      for ballot to P-members for vote:

       General scope of the standard/part

       What other standards/parts are affected?

       What other standards/parts have to change for this work to be successful?

       What other standards/parts can be improved by this work?

       What other PWI/NWI will need to be developed?

       What is the estimated schedule?

       What resources are committed

       What schedules need to be coordinated

       Is there an overlap with the existing projects?

       Should scopes be modified?

       What other projects should be consulted?

      A report based on these question shall be added to the New Work Item Proposal to

      inform P-members.'
    dates:
    - start: '1998-06-15'
      kind: effective
