- identifier: '376'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: In order to provide a firm foundation for the next release of SC 4 standards ...
  dates:
  - start: '1998-06-15'
    kind: decision
  actions:
  - type: resolves
    message: 'In order to provide a firm foundation for the next release of SC 4 standards tentatively

      scheduled for 2003, SC 4 requests:

       P-members to supply statements of user requirements for this timescale, taking

      into account the strategic plan for SC 4 and the requirements document WG 10 N

      173, in writing to the Secretariat by 15 September 1998;

       Working groups and the Quality Committee, as well as the leaders of any PWI

      work, to supply statements of any input and key milestones for technology and

      development processes, in writing to the QC Change Management Team leader

      by 15 September 1998.

      The PPC and Change Management Team are requested to make a progress report

      for consideration by the SC 4 meeting in Beijing.'
    dates:
    - start: '1998-06-15'
      kind: effective
