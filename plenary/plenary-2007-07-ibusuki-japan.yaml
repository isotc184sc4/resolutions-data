- identifier: '722'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Demonstration of planning, machining and measurement
  dates:
  - start: '2007-07-15'
    kind: decision
  actions:
  - type: resolves
    message: Demonstration of planning, machining and measurement
    dates:
    - start: '2007-07-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to invite additional countries to join France,

      Japan, Sweden, UK and USA in the planning, machining and measurement

      demonstration to be given in Dallas, with a deadline for response of 2007-09-15.'
    dates:
    - start: '2007-07-15'
      kind: effective
  considerations:
  - type: recognizing
    message: 'Recognizing the success of the demonstrations at the Toulouse and Ibusuki

      meetings'
    dates:
    - start: '2007-07-15'
      kind: effective
- identifier: '723'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Ad Hoc Group on Visualization
  dates:
  - start: '2007-07-15'
    kind: decision
  actions:
  - type: resolves
    message: Ad Hoc Group on Visualization
    dates:
    - start: '2007-07-15'
      kind: effective
  - type: recognizes
    message: 'SC 4 recognizes the progress made by the ad hoc group on visualization and

      encourages completion of the requirements by the end of July'
    dates:
    - start: '2007-07-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its

      Secretariat to circulate the completed requirements statement for a two month ballot

      as soon as it is available, and to initiate in parallel a call for experts to participate in a

      new ad hoc group to undertake an independent evaluation of candidate 3D

      visualization formats against the agreed requirements. Oscar Rocha is appointed to

      chair the new group.'
    dates:
    - start: '2007-07-15'
      kind: effective
