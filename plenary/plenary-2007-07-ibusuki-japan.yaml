- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '723'
  kind: resolution
  status: decided
  dates:
  - date: '2007-07-15'
    type: adoption
  title:
  - spelling: eng
    value: Circulate visualization requirements and evaluate candidate formats
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2007-07-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC4 requests its Secretariat to circulate the completed requirements
        statement for a two month ballot as soon as it is available, and to initiate
        in parallel a call for experts to participate in a new ad hoc group to undertake
        an independent evaluation of candidate 3D visualization formats against the
        agreed requirements. Oscar Rocha is appointed to chair the new group.

        '
  considerations:
  - type: recognizing
    date_effective:
      date: '2007-07-15'
      type: effective
    message:
    - spelling: eng
      value: 'Recognizing the progress made by the ad hoc group on visualization and
        encourages completion of the requirements by the end of July

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
