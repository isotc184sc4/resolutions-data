      buildingSMART

      Thomas Liebich

      INCOSE

      Phil Spiby

      We also offer thanks to those external projects who presented their material at the

      Open Technical Forum.

      Light-SC 4 and Industry Data Readiness Paul van Exel


      Agile STEP Implementation

      David

      Price Semantic Interoperability for ezSTEP

      Soonhung Han

      Simple Implementation of Part

      21 in the Japanese Construction Industry

      Minoru Akiyama

      Building and Interchanging Product

      Akira

      Hosokawa Catalogue Information via

      Spreadsheets and Web-Service

      A Report on CEO Activity

      Anna Moreno'
    dates:
    - start: '2007-07-15'
      kind: effective
- identifier: 724-acclamation-1
  subject: ISO/TC 184/SC 4 "Industrial data"
  dates:
  - start: '2007-07-15'
    kind: decision
  actions:
  - type: thanks
    message: 'SC 4 expresses thanks to all the organizers, presenters and session chairs at the

      three Open Seminars held during the course of the week.  The seminars provided

      technical insight through a combined total of 27 presentations across the three

      separate themes of "Data Quality", "Dictionary/Ontology Register & Maintenance"

      and "Planning, Machining & Measurement using STEP & STEP-NC".  SC 4

      appreciates the significant contribution that such events make to identifying a solid

      foundation on which SC 4 can develop standards embodying international

      consensus and industrial best practice.'
    dates:
    - start: '2007-07-15'
      kind: decision
- identifier: 724-acclamation-2
  subject: ISO/TC 184/SC 4 "Industrial data"
  dates:
  - start: '2007-07-15'
    kind: decision
  actions:
  - type: thanks
    message: 'SC 4 expresses its deep appreciation to the Japan Information Processing

      Development Corporation (JIPDEC) and the staff of the Hakusuikan Hotel for their

      efforts in organizing this meeting, arranging the facilities, excellent food, and social

      events.  SC 4 also expresses its appreciation to Mr. Tadataka Simotakehara

      (Executive Vice President), Mr. Hiroo Nagata (General Manager of Hakusuikan), and

      Mr. Kichinori Takata (Manager in charge of the ISO conference), for their hospitality

      and outstanding support. Their quality of service has set a new standard of

      excellence for SC 4 meetings.

      SC 4 addresses a special recognition to Mr. Hiroshi Murayama, Organizer, Mr. Masaru

      Suzuki, Chief of Staff and staff members Mr. Shinichi Nakagawa, Ms Chie Kouchi and,


      Mr. Akira Hosokawa for their superior administrative support, and outstanding

      hospitality both before and during the ISO/TC 184/SC 4 meeting.'
    dates:
    - start: '2007-07-15'
      kind: decision
