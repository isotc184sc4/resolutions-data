- identifier: '700'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ACKNOWLEDGEMENTS and APPRECIATIONS
  dates:
  - start: '2006-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'ACKNOWLEDGEMENTS and APPRECIATIONS

      ACCLAMATION:

      Appreciation to our SC 4 Liaisons. We appreciate your representation to and for

      ISO/TC 184/SC 4.

      A special thank you to the SC 4 Liaison Plenary presenters for their insightful and

      comprehensive presentations:

      PDES, Inc

      Bob Kiggans

      PDES, Inc

      Jack Harris

      NIST

      Steve Ray

      Naval Surface Warfare Center

      Jim Mays

      Renault

      Oscar Rocha

      OLF

      Thore Langeland

      Sandvik Coromant

      Jonas Nordström

      DLIS

      Steve Arnett

      ACCLAMATION:'
    dates:
    - start: '2006-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses its particular thanks to Peter Benson and his staff, Yvette Thomas,

      Dan King, Amber Davis and Melissa Schieb for their superior administrative support,

      outstanding hospitality, both before and during the ISO/TC 184/SC 4 meeting. Well

      done.

      ACCLAMATION:'
    dates:
    - start: '2006-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses its thanks to ECCMA and PiLog for its sponsorship and the

      memorable social event, particularly for the efforts of Mr. Ed Seguine, Vice President

      of Research and Development and Quality Assurance for the Guittard Chocolate

      Company.  His presentation, overview and instruction of the correct etiquette while

      tasting chocolate will long be remembered.

      ACCLAMATION:'
    dates:
    - start: '2006-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 wishes to give its unanimous thanks to Mr. Ted Maloy, The Hotel Hershey

      Conference Planning Manager and staff for their efforts in organizing this meeting,


      arranging the facilities and excellent food. Their considerable efforts created a very

      memorable event.'
    dates:
    - start: '2006-10-15'
      kind: effective
