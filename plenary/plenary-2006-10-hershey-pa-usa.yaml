- identifier: '692'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appointment of Quality Committee deputy coordinator
  dates:
  - start: '2006-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Appointment of Quality Committee deputy coordinator
    dates:
    - start: '2006-10-15'
      kind: effective
  - type: appreciates
    message: 'SC 4 appreciates and accepts the offer of Dr. Junfeng Zhan to serve as Quality

      Committee deputy coordinator'
    dates:
    - start: '2006-10-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves the nomination of Dr. Junfeng Zhan to

      serve for a three year term.'
    dates:
    - start: '2006-10-15'
      kind: effective
- identifier: '693'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Co-Leaders for the ad hoc Group Industrial Data on the Web (IDW)
  dates:
  - start: '2006-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Co-Leaders for the ad hoc Group Industrial Data on the Web (IDW)
    dates:
    - start: '2006-10-15'
      kind: effective
  - type: appreciates
    message: 'SC 4 appreciates and accepts the offer of David Leal and David Price to serve as co-

      leaders of the ad hoc group for Industrial Data on the Web (IDW)'
    dates:
    - start: '2006-10-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves the

      nomination of David Leal and David Price to serve as co-leaders of the ad hoc group

      for Industrial Data on the Web, and requests them to produce an updated workplan by

      the next meeting'
    dates:
    - start: '2006-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2006-10-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its utmost appreciation to Jim U’Ren for his enthusiastic work in

      leading the SC 4 ad hoc Group for Industrial Data on the Web and wishes him well in

      his new endeavours.'
    dates:
    - start: '2006-10-15'
      kind: effective
