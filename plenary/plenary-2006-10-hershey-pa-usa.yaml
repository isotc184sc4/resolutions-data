    title: Appointment of Quality Committee deputy coordinator
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2006-10-15'
        type: effective
      message: 'SC 4 appreciates and accepts the offer of Dr. Junfeng Zhan to serve
        as Quality Committee deputy coordinator.

        '
    actions:
