  - language_code: eng
    script: Latn
    title: Propose Category A liaison with the American Society for Quality
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: recommends
      date_effective:
        date: '2006-10-15'
        type: effective
      message: 'SC 4 proposes a Category A liaison with the American Society for Quality
        (ASQ).

        '
    - type: requests
      date_effective:
        date: '2006-10-15'
        type: effective
      message: 'SC 4 requests that the SC 4 secretary confirm this liaison with the
        ISO Central Secretariat.

        '
    - type: asks
      date_effective:
        date: '2006-10-15'
        type: effective
      message: 'SC 4 invites the American Society for Quality (ASQ) to make a reciprocal
        nomination, and to invite any of its constituent bodies with activities within
        the scope of SC 4 to establish liaison arrangements.

        '
    - type: requests
      date_effective:
        date: '2006-10-15'
        type: effective
      message: 'The SC 4 Secretary is also requested to solicit liaison officer nominations
        from the ISO/TC 184/SC 4 P-members.

        '
