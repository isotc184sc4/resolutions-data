    title: Appoint co-leaders for ad hoc Group Industrial Data on the Web
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2006-10-15'
        type: effective
      message: 'SC 4 appreciates and accepts the offer of David Leal and David Price
        to serve as co-leaders of the ad hoc group for Industrial Data on the Web
        (IDW).

        '
    actions:
    - type: approves
      date_effective:
        date: '2006-10-15'
        type: effective
      message: 'SC 4 approves the nomination of David Leal and David Price to serve
        as co-leaders of the ad hoc group for Industrial Data on the Web, and requests
        them to produce an updated workplan by the next meeting.

        '
    - type: acknowledges
      date_effective:
        date: '2006-10-15'
        type: effective
      message: 'SC 4 expresses its utmost appreciation to Jim U’Ren for his enthusiastic
        work in leading the SC 4 ad hoc Group for Industrial Data on the Web and wishes
        him well in his new endeavours.

        '
