    script: Latn
    title: Create Ad hoc team for Nuclear Digital Ecosystem Specification
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2019-11-15'
        type: effective
      message: |
        Noting the interest in developing a TR assessing the nuclear industry needs
        for information standards
    actions:
    - type: requests
      date_effective:
        date: '2019-11-15'
        type: effective
      message: |
        SC 4 requests its Committee Manager launch an Ad hoc team with following
        participants:

        * Christophe Mouton, EDF, France
        * Yves Keraron, Isadeus, France
        * Hiroshi Seki, Hitachi, Japan
        * Yoshiaki Sonoda, Mitsubishi Heavy Industries, Japan
        * Soonhung Han, KAIST, South Korea
        * Youngsoo Jung, Myongji University, South Korea
        * Kevin Zhang, Plant Resource Technology, China
        * Resources from other TC's as required
    - type: appoints
      date_effective:
        date: '2019-11-15'
        type: effective
      message: |
        SC 4 appoints Christophe Mouton as project leader with appreciation to serve
        in that capacity, and requests that Christophe coordinate with ISO/TC 85
        with the opportunity to contribute to that report. The Ad hoc team will have
        regular teleconferences and report bi-monthly to the IF Convenor and at the
        TC 184/SC 4 meeting in Bergen, Norway in May 2020.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1035'
  kind: resolution
  status: decided
  dates:
  - date: '2019-11-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Call for requirements on data visualization for industrial artefacts
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: resolves
      date_effective:
        date: '2019-11-15'
        type: effective
      message: |
        SC 4 calls SC 4 WG conveners and liaison organizations to deliver to JWG 16,
        their use cases, examples, and requirements about data visualization in the
        context of industrial artefacts before end January 2020. JWG 16 will
        consolidate them for end of February into a DTR that will be submitted
        through a ballot so that the comments will be discussed at the next SC 4
        plenary in Bergen and be published in 2020.
