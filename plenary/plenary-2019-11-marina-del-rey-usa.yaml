    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2019-11-15'
        type: effective
      message: |
        SC 4 requests its Committee Manager to ask member National Bodies and SC 4
        Working Group Convenors to identify experts to contact Peter Eales, project
        leader of ISO 29002 Edition 2, and Tim King, Convenor of WG 13, to volunteer
        their availability to participate in review of the draft of ISO/DIS 29002
        from 2020-03-02 to 2020-05-01.
- identifier:
