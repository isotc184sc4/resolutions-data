      date_effective:
        date: '2019-11-15'
        type: effective
      message: |
        SC 4 establishes a PWI to create a Technical Report on Ontology for geometry
        and topology. The report is to be delivered in May 2020 for review at the
        next SC 4 meeting.
    - type: nominates
      date_effective:
        date: '2019-11-15'
        type: effective
      message: |
        SC 4 nominates Ben Urick (US) as project leader with appreciation to serve in
        this capacity and requests member bodies and liaisons to nominate experts to
        this preliminary work.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1027'
  kind: resolution
  status: decided
  dates:
  - date: '2019-11-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Cancel ISO 8000-64 and launch NP Ballot
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2019-11-15'
        type: effective
      message: |
        Noting that the existing 48-month project may no longer receive a 9-month
        extension from ISO TMB
    actions:
    - type: requests
      date_effective:
        date: '2019-11-15'
        type: effective
      message: |
        SC 4 requests its Committee Manager to cancel ISO 8000-64 and, after
        receiving the appropriate documentation from WG 13, launch an NP Ballot of
        ISO 8000-64 with the document attached to the ISO Form 4 to be registered as
        a Committee Draft (stage 30.00) and to apply the 8-week ballot duration to
        that ballot. In addition, SC 4 requests WG 13 to deliver the NP/CD
        ballot to the committee manager by 2020-01-15.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1028'
  kind: resolution
  status: decided
  dates:
  - date: '2019-11-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Prepare report to combine ISO 8000 master data standards
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2019-11-15'
        type: effective
      message: |
        SC 4 requests WG 13 to prepare a technical report outlining the steps
        necessary to combine existing (and any future) standards in the ISO 8000
        series of parts relating to master data and names Peter Benson as project
        leader. This technical report will allow the national bodies to prepare
        their own publication strategies for future editions of these parts.
    - type: requests
      date_effective:
        date: '2019-11-15'
        type: effective
      message: 'SC 4 requests member bodies and liaisons to nominate experts to this
        work.

        '
