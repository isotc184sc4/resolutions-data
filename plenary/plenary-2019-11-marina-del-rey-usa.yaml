    script: Latn
    title: Document mapping between ISO 10303 STEP and ISO 23952 QIF
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2019-11-15'
        type: effective
      message: |
        Noting the formal documentation of the mapping between STEP and QIF to
        harmonize terms and definitions
    actions:
    - type: requests
      date_effective:
        date: '2019-11-15'
        type: effective
      message: |
        SC 4 requests its Committee Manager launch a PWI/TR to develop a Technical
        Report formally documenting the correspondence between the entities in ISO
        10303 and ISO 23952 using a mapping language. The following persons did
        volunteer as members of the project team:

        |===
        |Role |Name

        |Mapping expert |David Loffredo
        |Mapping expert |Kevin Le Tutour
        |Geometry Expert |Ben Urick
        |Geometry Expert |Victor Mikushin
        |QIF expert |Curtis Brown
        |QIF expert |Mark Nielsen
        |STEP expert |Pierre Duchier
        |STEP expert |Allison Barnard Feeney
        |End user expert |Atsuto Soma
        |End user expert |Martin Hardwick
        |===
    - type: nominates
      date_effective:
        date: '2019-11-15'
        type: effective
      message: |
        SC 4 nominates Dr. Martin Hardwick as project leader and Mr. Atsuto Soma as
        editor with appreciation to support in this capacity and requests member
        bodies and liaisons to nominate experts to this preliminary work.
