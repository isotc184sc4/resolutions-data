- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1025'
  kind: resolution
  status: decided
  dates:
  - date: '2019-11-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Create Task Force for ISO 10303 SMRL Architecture innovation
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2019-11-15'
        type: effective
      message: |
        Noting the workshop held 29–30 October, 2019 between ISO CS and SC 4, a
        significant opportunity to enhance efficiency and improve quality has
        emerged regarding the publication of the ISO 10303 STEP Modular Reference
        Library
    actions:
    - type: creates
      date_effective:
        date: '2019-11-15'
        type: effective
      message: |
        SC 4 creates a Task Force titled "ISO 10303 SMRL Architecture innovation"
        with the following term of reference:

        1. Taking into account the workshop report out and phasing plan proposal,
        develop a detailed plan with recommendations for implementation;

        2. Coordinate with other affected groups in SC4 on plan elements;

        3. Provide periodic status reports to SC 4/PPC;

        4. Deliver a final report to SC 4 on a schedule agreeable between the Task
        Force and SC4
    - type: nominates
      date_effective:
        date: '2019-11-15'
        type: effective
      message: |
        SC 4 nominates Brandon Sapp to lead the Task Force and requests nominations
        from member bodies and relevant liaisons to participate in the Task Force.
