metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Sapporo, Japan, May
    22, 2016 -- May 27, 2016
  date: '2016-05-22'
  source: ISO/TC 184/SC 4 Secretariat
decisions:
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '922'
  kind: resolution
  status: decided
  dates:
  - date: '2016-05-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Appoint Hiroshi Murayama as SC 4 Liaison to IEC SC 3D
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2016-05-15'
        type: effective
      message: 'Noting that IEC/TC 3 has terminated its liaison.

        '
    actions:
    - type: appoints
      date_effective:
        date: '2016-05-15'
        type: effective
      message: |
        SC4 appoints Hiroshi Murayama for a three-year term as the SC 4 Liaison to IEC SC 3D,
        with appreciation for his offer to serve in that capacity.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '923'
  kind: resolution
  status: decided
  dates:
  - date: '2016-05-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Move ISO 8000-62 and ISO 8000-63 to Enlarged Timeframe
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2016-05-15'
        type: effective
      message: |
        SC4 requests its Secretariat to apply the enlarged timeframe to the ISO 8000-62 and
        ISO 8000-63 projects, with a DIS limit date of 2017-02-21.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '924'
  kind: resolution
  status: decided
  dates:
  - date: '2016-05-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Approve PWI for Modelling and Simulation Information in Collaborative Systems
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: approves
      date_effective:
        date: '2016-05-15'
        type: effective
      message: |
        SC4 approves a PWI to create standards for modeling and simulation information in a
        collaborative systems engineering context as defined in SC4 N3086.
    - type: asks
      date_effective:
        date: '2016-05-15'
        type: effective
      message: 'SC4 asks member bodies to nominate experts to the project.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '925'
  kind: resolution
  status: decided
  dates:
  - date: '2016-05-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Approve PWI for Manufacturing Change Management
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: approves
      date_effective:
        date: '2016-05-15'
        type: effective
      message: |
        SC4 approves a PWI to create a standard for manufacturing change management as
        defined in SC4 N3087.
    - type: asks
      date_effective:
        date: '2016-05-15'
        type: effective
      message: 'SC4 asks member bodies to nominate experts to the project.

        '
    - type: requests
      date_effective:
        date: '2016-05-15'
        type: effective
      message: 'SC4 requests its Secretariat to invite SC 5 to seek input from its
        P-members.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '926'
  kind: resolution
  status: decided
  dates:
  - date: '2016-05-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Establish 8-week ballot duration for ISO 10303-238ed2 NP
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2016-05-15'
        type: effective
      message: |
        SC4 requests its Secretariat to apply the 8 week ballot duration to the proposed NP for
        ISO 10303-238ed2.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '927'
  kind: resolution
  status: decided
  dates:
  - date: '2016-05-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Create Ad Hoc Group to support ISO/IEC DPPC Task Force
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: creates
      date_effective:
        date: '2016-05-15'
        type: effective
      message: |
        SC4 creates an Ad Hoc group to shadow and support the ISO/IEC DPPC Task Force
        and appoints the following experts to the group:

        * Hiroshi Murayama, Leader and ISO 13584 and IEC 61360 expert
        * Wolfgang Wilkes, ISO 13584 expert and user in other standards
        * Norman Swindells, User of ISO 13584 in other standards
        * Nils Sandsmark, ISO 15926 expert and user in oil and gas facility environments
        * Nigel Shaw, ISO 10303-239 and reference data expert and user
        * Nicolas Figay, ISO 10303-242 expert
        * Peter Benson, ISO 22745 expert and user
        * Nikolaus Ondracek, ISO 13584 expert and user
        * David Leal, ISO 15926 and RDL expert
        * Paul van Exel, ISO 15926 expert
        * Hong Yan, ISO 13584-511 expert
    - type: requests
      date_effective:
        date: '2016-05-15'
        type: effective
      message: |
        SC4 requests its Secretariat to invite member bodies to nominate other experts to
        participate in the group.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '928'
  kind: resolution
  status: decided
  dates:
  - date: '2016-05-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Establish liaison with International Association of Oil and Gas Producers
      (IOGP)
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: recognizing
      date_effective:
        date: '2016-05-15'
        type: effective
      message: |
        Recognizing the request of the International Association of Oil and Gas Producers
        (IOGP) to become a liaison.
    actions:
    - type: asks
      date_effective:
        date: '2016-05-15'
        type: effective
      message: |
        SC4 asks its secretariat to initiate a liaison to this
        association as soon as possible.
    - type: nominates
      date_effective:
        date: '2016-05-15'
        type: effective
      message: |
        SC4 nominates Nils Sandsmark and Paul van Exel as the liaison officers from SC 4 to
        the IOGP.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '929'
  kind: resolution
  status: decided
  dates:
  - date: '2016-05-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Approve new work item to create ISO 10303-210 Edition 4
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: approves
      date_effective:
        date: '2016-05-15'
        type: effective
      message: |
        SC4 approves a NP to create a new edition 4 of 10303-210 with the same scope as
        10303-210 edition 3 "Electronic assembly, interconnection, and packaging design",
        using the enlarged timescale, with Tom Thurman as the project leader.
