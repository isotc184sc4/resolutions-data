- identifier: '590'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Timescales for ISO standard development stages
  dates:
  - start: '2003-10-15'
    kind: decision
  actions:
  - type: resolves
    message: Timescales for ISO standard development stages
    dates:
    - start: '2003-10-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes the objectives of the new timeframes and accepts the overall timescales

      proposed, although it must be recognised that reduced timescales are often

      incompatible with adequate quality, consensus and market relevance.  However, SC

      4 notes that the intermediate milestones proposed in the new timeframe do not take

      sufficient account of the need for technical discussion and consensus building, while

      allowing extended periods for publication and administration. The use of publication

      tools to accelerate the administrative tasks means that SC 4 does not need to exploit

      the full time allowed for administration, but requires the maximum time possible for

      technical work'
    dates:
    - start: '2003-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2003-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 therefore requests ISO/CS to confirm that the intermediate milestones of the new

      timeframes can be adjusted to allow appropriate work planning, within the overall time

      limits given'
    dates:
    - start: '2003-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2003-10-15'
      kind: effective
  - type: resolves
    message: SC 4 also seeks confirmation that ISO/CS can achieve its timescales for processing,
    dates:
    - start: '2003-10-15'
      kind: effective
  - type: resolves
    message: noting that there are examples of FDIS processing exceeding three months.
    dates:
    - start: '2003-10-15'
      kind: effective
- identifier: '591'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO/PAS 12006-3 Building construction — Organization of information about
  dates:
  - start: '2003-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'ISO/PAS 12006-3 Building construction — Organization of information about

      construction works — Part 3: Framework for object-oriented information exchange

      —  revised version 2'
    dates:
    - start: '2003-10-15'
      kind: effective
  - type: asks
    message: 'SC 4 asks its secretariat to submit a liaison statement to ISO/TC 59 “Building

      construction" explaining the area of work of SC 4, especially to point out the activities

      of its WG 2 and WG 3 work on modelling within the area of building construction'
    dates:
    - start: '2003-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2003-10-15'
      kind: effective
  - type: resolves
    message: 'SC 4 also requests ISO/TC 59, especially ISO/TC 59/SC 13/WG 6, to identify areas of

      need for harmonization with SC 4 standards such as ISO 10303-225 and ISO 15926

      in its work programme, in order to foster cooperation and collaboration in the future'
    dates:
    - start: '2003-10-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2003-10-15'
      kind: effective
  - type: appoints
    message: 'SC 4 appoints Tatsuo Terai as a physical liaison to ISO/TC 59/SC 13/WG 6 in order to

      support the required cooperation and requests its Secretariat to establish the liaison.

      Action:  National Bodies of SC 4 should examine this initiative to promote ISO

      12006 as a DIS and assess it against the existing procurement regulations in their

      countries.'
    dates:
    - start: '2003-10-15'
      kind: effective
- identifier: '592'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO/DIS 16792 Technical product documentation - digital product definition data
  dates:
  - start: '2003-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'ISO/DIS 16792 Technical product documentation - digital product definition data

      practices'
    dates:
    - start: '2003-10-15'
      kind: effective
  - type: asks
    message: 'SC 4 asks its secretariat to inform ISO/TC 10 that the planned publication of ISO

      16792 will lead to significant changes in already existing and published standards by

      SC 4'
    dates:
    - start: '2003-10-15'
      kind: effective
  - type: encourages
    message: 'SC 4 encourages ISO/TC 10 and ISO/TC 213 to reach a clear consensus on

      unambiguous and consistent representations of 2D and 3D annotation that can be

      referenced by the SC 4 standards for digital representation of product information

      when they are revised, since it will not be viable to support conflicting forms of

      annotation.

      Further, SC 4 asks ISO/TC 10 to provide a clear strategic statement on their future

      development plans; especially because SC 4 has referenced several ISO/TC 10

      standards on annotation and drafting.

      Action: The teams of AP 202, 203, 210, 212, 214 and are requested to check the

      potential impact of the content of ISO16792 against their projects, with a view to

      directly referencing the standard in future'
    dates:
    - start: '2003-10-15'
      kind: effective
- identifier: '593'
  subject: ISO/TC 184/SC 4 "Industrial data"
