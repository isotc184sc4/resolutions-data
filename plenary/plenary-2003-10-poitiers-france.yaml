- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '590'
  urn: urn:iso:tc184:sc4:resolution:590
  kind: resolution
  status: decided
  dates:
  - date: '2003-10-15'
    type: adoption
  title:
  - spelling: eng
    value: Request ISO/CS to confirm adjustability of development milestones
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 therefore requests ISO/CS to confirm that the intermediate milestones
        of the new timeframes can be adjusted to allow appropriate work planning,
        within the overall time limits given.

        '
  - type: requests
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 also seeks confirmation that ISO/CS can achieve its timescales
        for processing, noting that there are examples of FDIS processing exceeding
        three months.

        '
  considerations:
  - type: noting
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 notes the objectives of the new timeframes and accepts the overall
        timescales proposed, although it must be recognised that reduced timescales
        are often incompatible with adequate quality, consensus and market relevance.
        However, SC 4 notes that the intermediate milestones proposed in the new timeframe
        do not take sufficient account of the need for technical discussion and consensus
        building, while allowing extended periods for publication and administration.
        The use of publication tools to accelerate the administrative tasks means
        that SC 4 does not need to exploit the full time allowed for administration,
        but requires the maximum time possible for technical work.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '591'
  urn: urn:iso:tc184:sc4:resolution:591
  kind: resolution
  status: decided
  dates:
  - date: '2003-10-15'
    type: adoption
  title:
  - spelling: eng
    value: Submit liaison statement to ISO/TC 59 regarding building construction modeling
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 requests its secretariat to submit a liaison statement to ISO/TC
        59 "Building construction" explaining the area of work of SC 4, especially
        to point out the activities of its WG 2 and WG 3 work on modelling within
        the area of building construction.

        '
  - type: requests
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 also requests ISO/TC 59, especially ISO/TC 59/SC 13/WG 6, to identify
        areas of need for harmonization with SC 4 standards such as ISO 10303-225
        and ISO 15926 in its work programme, in order to foster cooperation and collaboration
        in the future.

        '
  - type: appoints
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 appoints Tatsuo Terai as a physical liaison to ISO/TC 59/SC 13/WG
        6 in order to support the required cooperation and requests its Secretariat
        to establish the liaison.

        '
  - type: encourages
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'Action: National Bodies of SC 4 should examine this initiative to promote
        ISO 12006 as a DIS and assess it against the existing procurement regulations
        in their countries.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '592'
  urn: urn:iso:tc184:sc4:resolution:592
  kind: resolution
  status: decided
  dates:
  - date: '2003-10-15'
    type: adoption
  title:
  - spelling: eng
    value: Inform ISO/TC 10 of impact of ISO 16792 and encourage consensus
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 requests its secretariat to inform ISO/TC 10 that the planned publication
        of ISO 16792 will lead to significant changes in already existing and published
        standards by SC 4.

        '
  - type: encourages
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 encourages ISO/TC 10 and ISO/TC 213 to reach a clear consensus
        on unambiguous and consistent representations of 2D and 3D annotation that
        can be referenced by the SC 4 standards for digital representation of product
        information when they are revised, since it will not be viable to support
        conflicting forms of annotation.

        '
  - type: requests
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'Further, SC 4 asks ISO/TC 10 to provide a clear strategic statement
        on their future development plans; especially because SC 4 has referenced
        several ISO/TC 10 standards on annotation and drafting.

        '
  - type: requests
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'Action: The teams of AP 202, 203, 210, 212, 214 and are requested to
        check the potential impact of the content of ISO16792 against their projects,
        with a view to directly referencing the standard in future.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '593'
  urn: urn:iso:tc184:sc4:resolution:593
  kind: resolution
  status: decided
  dates:
  - date: '2003-10-15'
    type: adoption
  title:
  - spelling: eng
    value: Review proposal to update Industrial Data Framework as Technical Report
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 requests member bodies to review the proposal to update the Industrial
        Data Framework as an ISO Technical Report and to indicate to the Secretariat
        by the end of December 2003 whether there will be sufficient industry interest
        to justify the creation of a NWI, and whether they would be willing to provide
        the necessary resources.

        '
