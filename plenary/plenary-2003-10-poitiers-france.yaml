  - type: resolves
    message: Industrial Data Framework
    dates:
    - start: '2003-10-15'
      kind: effective
  - type: investigates
    message: 'SC 4 invites member bodies to review the proposal to update the Industrial Data

      Framework as an ISO Technical Report and to indicate to the Secretariat by the end

      of December 2003 whether there will be sufficient industry interest to justify the

      creation of a NWI, and whether they would be willing to provide the necessary

      resources.'
    dates:
    - start: '2003-10-15'
      kind: effective
