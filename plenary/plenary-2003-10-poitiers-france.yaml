- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '596'
  urn: urn:iso:tc184:sc4:resolution:596
  kind: resolution
  status: decided
  dates:
  - date: '2003-10-15'
    type: adoption
  title:
  - spelling: eng
    value: Endorse response regarding public availability of SC 4 standards
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: appreciates
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 appreciates the freedom to permit distribution of these standards
        to other ISO and IEC groups for further standards development.

        '
  - type: endorses
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 endorses the response of its Chair (Document SC 4 N1606) which
        notes that the ISO Council has not addressed several of the issues raised
        in the previous SC 4 Resolution.

        '
  - type: requests
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 further urges its member national bodies to approach their ISO Council and TMB members and impress upon them the urgency and importance of this issue.

        Attached documents: SC 4 N1606, SC 4 N1456
  considerations:
  - type: noting
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 notes with disappointment the ISO Council''s rejection of the request
        to make some SC 4 Standards freely available on the Web.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '597'
  urn: urn:iso:tc184:sc4:resolution:597
  kind: resolution
  status: decided
  dates:
  - date: '2003-10-15'
    type: adoption
  title:
  - spelling: eng
    value: Establish task force for dictionaries and libraries white paper
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: establishes
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 establishes a task force to produce a white paper on the scope, relationship between ISO 10303, ISO 13584 and ISO 15926 and their industrial usage to meet business requirements for the definition of dictionaries, part libraries and reference data libraries. The white paper will be issued by the 15th of February 2004 and the team will report to SC 4 at the next ISO/TC 184 SC 4 meeting in Ft Lauderdale, spring 2004.

        The results shall be clearly understandable by SC 4 experts and stakeholders, in order to promote consistent presentation of SC 4 products to the market place.
  - type: appoints
    date_effective:
      date: '2003-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        ISO/TC 184/SC 4 appoints the following task force team members:

        * Gerry Radack (Task force team leader)
        * Guy Pierra
        * Wolfgang Wilkes
        * Karlheinz Rosan
        * Hiroshi Murayama
        * Margaret Christison
        * Ricardo Gonçalves
        * Nils Sandsmark
        * Magne Valen-Sendstad
        * Andries van Renssen
        * Paul van Exel
        * Norman Swindells
        * Yamine AIT-AMEUR
        * Junfeng Zhan
