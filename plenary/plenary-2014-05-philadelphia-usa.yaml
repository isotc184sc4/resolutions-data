metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Philadelphia, United States, May 4, 2014 -- May 9, 2014
  dates:
  - start: '2014-05-04'
    end: '2014-05-09'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Philadelphia, United States
resolutions:
- identifier: '866'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Issue call for nominations for Quality Committee Convener
  dates:
  - start: '2014-05-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC 4 requests its Secretariat to circulate a call for nominations for the
      post of Quality Committee Convener for a three-year term.
    dates:
    - start: '2014-05-15'
      kind: effective
- identifier: '867'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Reappoint David Loffredo as WG 11 Convener
  dates:
  - start: '2014-05-15'
    kind: decision
  actions:
  - type: appoints
    message: |
      SC 4 appoints David Loffredo as Convener for WG 11 for a further three-year
      term, with appreciation for his offer to serve in that capacity.
    dates:
    - start: '2014-05-15'
      kind: effective
- identifier: '868'
  subject: ISO/TC 184/SC 4 "Industrial data"
