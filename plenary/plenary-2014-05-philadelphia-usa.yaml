      kind: effective
- identifier: '877'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Decision and Support to ISO 14306ed2 "JT" development
  dates:
  - start: '2014-05-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Decision and Support to ISO 14306ed2 "JT" development

      Resolution: SC 4 directs the project group on ISO 14306ed2 "JT" to continue its

      work under the following conditions:

       The platform for document storage and providing information in written

      electronic form is the SC 4 space for eCommittees on the ISO internet

      platform.

       An updated timeframe with milestones shall be prepared with the strong

      request to meet the defined milestones'
    dates:
    - start: '2014-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to cancel the current CD ballot and to launch a new CD

      ballot withISO/CD 14306 ed2 and the latest AP243 document, including a specific

      request for NBs to consider any proposed variations in scope.'
    dates:
    - start: '2014-05-15'
      kind: effective
- identifier: '878'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Requirements for consistent approach to Product properties Creation of ad hoc...
  dates:
  - start: '2014-05-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Requirements for consistent approach to Product properties Creation of ad hoc group

      with IEC TC 65 representation

      Resolution: Noting the successful collaboration between SC 4 and IEC TC 3 on the

      deployment of PLIB, SC 4 requests its WG 2 to participate in the proposed TC

      184/TC 65 ad hoc group by showing and describing the practical uses of the

      standards ISO 13584 and ISO 22745 which shows the benefit in a productive

      environment, taking into account ISO/IEC Guide 77 and previous SC 4 work on this

      topic'
    dates:
    - start: '2014-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2014-05-15'
      kind: effective
  - type: supports
    message: 'SC 4 supports the need for a common face of the standards program to potential users

      within industry. Therefore SC 4 invites WG2 to nominate members to participate in this

      ad hoc group by the end of May 2014'
    dates:
    - start: '2014-05-15'
      kind: effective
- identifier: '879'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Liaison to IEC SC 65E
  dates:
  - start: '2014-05-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Liaison to IEC SC 65E

      Resolution: SC 4 has noted possible overlaps of work to IEC SC 65E by reviewing


      the scope of IEC 62714 AutomationML'
    dates:
    - start: '2014-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its liaison officers Messrs

      Murayama and Ondracek to contact IEC SC 65E and investigate possible areas of

      overlaps, which could be the subject of future cooperation between SC 4 and IEC SC

      65E.'
    dates:
    - start: '2014-05-15'
      kind: effective
