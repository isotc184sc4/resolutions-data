- identifier: '873'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Cancel PAS 26183
  dates:
  - start: '2014-05-15'
    kind: decision
  actions:
  - type: decides
    message: |
      SC 4 agrees to cancel Publicly Available Specification 26183 "Product
      Data Quality Guidelines for the Global Automotive Industry".
    dates:
    - start: '2014-05-15'
      kind: effective
  - type: requests
    message: |
      SC 4 requests its Secretariat to inform ISO CS, and to retain all relevant
      documentation for future use.
    dates:
    - start: '2014-05-15'
      kind: effective
- identifier: '874'
  subject: ISO/TC 184/SC 4 "Industrial data"
