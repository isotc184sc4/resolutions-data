- identifier: '881'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appreciation for Service of Dr. Gerry Radack
  dates:
  - start: '2014-05-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Appreciation for Service of Dr. Gerry Radack

      Resolution:  SC 4 expresses its special recognition and thanks to Dr. Gerry Radack

      for his exceptional dedication and outstanding service for many years in the

      international standardization community'
    dates:
    - start: '2014-05-15'
      kind: effective
  - type: resolves
    message: 'SC 4 especially thanks Dr. Radack for his

      service as the

      U.S. Head of Delegation

      ACKNOWLEDGEMENTS and APPRECIATIONS

      ACCLAMATION

      Appreciation to our SC 4 Liaisons and those projects who presented at the Opening

      Technical Plenary:

       Jochen Haenisch, JOTNE – “Open Data Exchange Standards for

      Infrastructure Opens the Door for Enterprise Resource Planning Systems”

       Thomas Liebich, Chair, ISO/TC 59/SC 13/JWG 12

      ACCLAMATION'
    dates:
    - start: '2014-05-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to the US national TAG for their organization of the


      Industry Day, and to the speakers and panel members for attending and presenting

      on matters of interest to the SC 4 community.

      ACCLAMATION'
    dates:
    - start: '2014-05-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to ECCMA for their hosting and support of the 67th

      ISO TC 184/SC 4 Plenary meetings at ACE Conference Center, Philadelphia, PA.

      We especially commend them for an excellent venue and outstanding service to the'
    dates:
    - start: '2014-05-15'
      kind: effective
  - type: communicating
    message: 'SC 4 community. A special acknowledgement is extended to Ms. Melissa Hildebrand

      and Ms. Vicky Falcone for their outstanding support during the week.  Special

      acknowledgement is extended to the ACE Conference Center and its staff for their

      seamless and attentive support.'
    dates:
    - start: '2014-05-15'
      kind: effective
