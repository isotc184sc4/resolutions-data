- identifier: '462'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Proposal to create a STEP Modules Harmonization Team in WG 10
  dates:
  - start: '2000-06-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Proposal to create a STEP Modules Harmonization Team in WG 10

      A new team is proposed under WG 10 (with the expectation that it will move to the

      appropriate WG as STEP Modularization is adopted as a mainstream practice) called

      the "STEP Modules Harmonization Team" with the following responsibilities:

      ꞏ identify commonality across existing and proposed STEP APs, based


      on industry requirements

      ꞏ facilitate the exploitation of commonality through the development and use

      of modules

      ꞏ support the development and standardization of modularized or

      extended application protocols, application modules and extensions and

      common resources by teams working in WG 3, JWG 9, and WG 12

      The STEP Modules Harmonization team will perform the following tasks:

      ꞏ facilitate harmonization workshops (typically 2-4 per year);

      ꞏ build and maintain knowledge of the full scope of AP development within SC

      4 (i.e., "keep the big picture")

      ꞏ create and maintain tools such as a catalogue of modules (covering those in

      development as well as published modules), usage by APs and other

      modules, UoF repository, module repository, etc.

      ꞏ maintain an issues log for development and use of modules, and work

      with other

      teams to resolve issues

      ꞏ report to SC 4 on the level of harmonization achieved within and between

      specific

      module suites

      ꞏ as requested by module/AP development teams, to act as a neutral third

      party, or

      arbitrator, in making technical decisions when disputes arise between and

      within

      the development teams'
    dates:
    - start: '2000-06-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests nominations to this team from P-members and A-liaisons, to fulfil the

      following roles:

      ꞏ Team leader

      ꞏ Industry/application/domain expert

      ꞏ Information requirements analysis expert

      ꞏ Interpretation/interoperability expert

      ꞏ Harmonization infrastructure developer'
    dates:
    - start: '2000-06-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves to establish this team prior to the next meeting in Charleston, and

      directs them to commence work upon completion of the necessary guidelines by the

      PWI Project (see resolution 374)'
    dates:
    - start: '2000-06-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs the PWI to complete the guidelines

      and submit them for standing document ballot no later than 2000-10-30.'
    dates:
    - start: '2000-06-15'
      kind: effective
