- identifier: '457'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO 8601-conformance
  dates:
  - start: '2000-06-15'
    kind: decision
  actions:
  - type: resolves
    message: ISO 8601-conformance
    dates:
    - start: '2000-06-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves that all SC 4-related documents, standards, and announcements shall

      conform to ISO 8601 (Data elements and interchange formats – Information

      interchange

      – Representation of dates and times). In particular, all calendar dates shall be in the

      form yyyy-mm-dd, utilizing the four-digit date, as prescribed in clause 5.2.1.1 of ISO

      8601. Thus, the date February 29, 2000 would be represented as 2000-02-29'
    dates:
    - start: '2000-06-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2000-06-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs the Quality Committee to add ISO 8601 conformance to the appropriate

      standing documents (including the “Supplementary Directives for the Drafting and

      Presentation of ISO 10303") and to the checklists for approval of SC 4 documents SC

      4 directs the Quality Committee to revise the Supplementary Directives, wherever


      applicable, to reflect this date policy.

      This requirement shall be effective immediately, and shall be binding on all SC 4-

      related standards, documents, and announcements, regardless of whether it is

      documented in an approved standing document or checklist.

      It is the responsibility of each person within SC 4 who produces a document to comply

      with this resolution. Project leaders, conveners, the SC 4 secretariat, and SC 4

      management are directed to withhold signoff and publication of any documents that do

      not conform to the requirements stated in this resolution. The Quality Committee shall

      incorporate checks of compliance into its audit program.'
    dates:
    - start: '2000-06-15'
      kind: effective
