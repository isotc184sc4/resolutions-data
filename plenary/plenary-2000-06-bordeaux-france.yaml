- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '460'
  kind: resolution
  status: decided
  dates:
  - date: '2000-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Create Joint Working Group with ISO/TC 184/SC 5
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2000-06-15'
        type: adoption
      message: |
        According to its previous resolution #412 at the Lillehammer meeting, and taking into
        account SC 5 KYOTO meeting resolution #346.
    actions:
    - type: endorses
      date_effective:
        date: '2000-06-15'
        type: effective
      message: |
        SC4 endorses the proposal itemized below concerning the creation of a Joint working
        group with SC 5.

        * The SC4/WG 8 shall be transformed into a new Joint working group (JWG 8 -
          Manufacturing Process and Management Information) between SC4 and SC 5 with
          an enlarged scope to take into account the standardization work on PSL, as well as
          its existing work program.
        * The JWG 8 shall be placed under SC4 for administrative purposes.
        * The convenor of SC4/WG 8, Jean-Jacques Michel, shall be the convenor of the JWG 8.
        * The JWG 8 shall ideally meet four times a year in conjunction with meetings of SC4 and
          SC 5 or their WGs.
        * The scope for the JWG 8 shall be as follows: To enable the interchange of
          information needed to specify a manufacturing process in terms of a standardized
          representation of data, to exclude products and parts data, that express the
          information exchanged, shared or archived within, or between, industrial plants.
        * Process Specification Language (PSL) standardization work, currently existing as a
          PWI (project 18629) of the SC4 program of work, shall be one of the projects of the
          JWG 8 and is envisioned to lead to a new standard or multi-part standard. The scope
          of the PSL standardization work is the semantic based interchange of a
          manufacturing process description between different applications.
        * PSL work in this JWG 8 shall be conducted by a project team. Michael Gruninger
          (SC 5/WG 1 and SC4/WG 8 expert, University of Toronto and NIST) shall be the project
          leader, David Shorter (SC 5/WG 1 expert, IT-FOCUS) shall be deputy project leader, and
          Anne-Françoise Cutting-Decelle (SC4/WG 8 expert, University of Savoie) shall be
          the project editor.
