        date: '2022-05-15'
        type: effective
      message: |
        Recalling the liaison relationship between ISO/TC 184/SC 4 and ISO/TC 10 and the
        request from ISO/TC 10 for support in the development of ISO 16792 ed4 with expertise
        from SC 4
    actions:
    - type: nominates
      date_effective:
        date: '2022-05-15'
        type: effective
      message: |
        SC 4 nominates Atsuto Soma, Tom Thurman, Keith Hunten, Leo van Ruijven, Mikael Hedlind,
        Pierre Duchier and Allison Barnard Feeney as experts from ISO/TC 184/SC 4.
    - type: requests
      date_effective:
        date: '2022-05-15'
        type: effective
      message: |
        SC 4 requests its Committee Manager coordinate with ISO/CS to add
        the experts noted to the project in the ISO systems as required for access to necessary
        documents and participation in the project's development.
