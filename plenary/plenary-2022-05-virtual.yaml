- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1095'
  urn: urn:iso:tc184:sc4:resolution:1095
  kind: resolution
  status: decided
  dates:
  - date: '2022-05-15'
    type: adoption
  title:
  - spelling: eng
    value: Incorporate ISO/TS 10303-4000 into the SMRL database
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2022-05-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests that ISO/CS incorporate ISO 10303-4000 into the SMRL
        covered by the procedures for managing standards in database format and the standing
        document SC4N2591 and launch edition 2 noting no change in scope and supporting
        SDG 9.
  - type: appoints
    date_effective:
      date: '2022-05-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 appoints Jean Brange as project leader and notes the following schedule:

        * Change Request ballot: 2022-05-30
        * SMRL integration: 2022-07-30
        * Submitted for publication as part of SMRLv10: 2022-09
  considerations:
  - type: noting
    date_effective:
      date: '2022-05-15'
      type: effective
    message:
    - spelling: eng
      value: |
        Noting that ISO 10303-4000 ed1 is a technical specification approved by ballot in 2021
        and released in early 2022 and requires update to the STEP Extended Architecture and
        modular architecture APs consistent with the procedures of SC4N2591 and the SC 4
        Handbook
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1096'
  urn: urn:iso:tc184:sc4:resolution:1096
  kind: resolution
  status: decided
  dates:
  - date: '2022-05-15'
    type: adoption
  title:
  - spelling: eng
    value: Modify ISO 10303-1819 designation from IS to TS
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2022-05-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests its Committee Manager coordinate with ISO/CS and modify ISO 10303-1819
        from IS to TS in the ISO Project Portal and continue with its incorporation into
        SMRL V9.
  considerations:
  - type: noting
    date_effective:
      date: '2022-05-15'
      type: effective
    message:
    - spelling: eng
      value: |
        Noting that ISO 10303 SMRL is a body of work collectively managed as a set of Technical
        Specification and subject to the procedures noted in SC4N2591 for managing
        standards in database format, ISO 10303-1819 is managed in SC 4 as a required
        element of the SMRL and has been since its inception, ISO/CS has found that ISO
        10303-1819 is currently listed as an IS in the publication process for SMRL V9, and
        having found no root cause for the discrepancy
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1097'
  urn: urn:iso:tc184:sc4:resolution:1097
  kind: resolution
  status: decided
  dates:
  - date: '2022-05-15'
    type: adoption
  title:
  - spelling: eng
    value: Change target dates for ISO/CD 10303-239 ed3 to SDT 36
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2022-05-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests its Committee Manager coordinate with ISO/CS to move ISO 10303-239 ed3
        (project id = 78832) from SDT 24 to SDT 36 with the following target dates:

        * Stage 40 -- DIS Registered: 2022-10-15 (Original Target: 2022-04-14)
        * Stage 50 -- FDIS Registered: 2023-06-15 (Original Target: not set)
        * Stage 60 -- IS Published: 2023-11-28 (Original Target: 2023-04-14)
  considerations:
  - type: noting
    date_effective:
      date: '2022-05-15'
      type: effective
    message:
    - spelling: eng
      value: |
        Noting the progress of the project team to complete a DIS quality ISO 10303-239 ed3
        and the actions taken to address the resources and technical mapping issues
