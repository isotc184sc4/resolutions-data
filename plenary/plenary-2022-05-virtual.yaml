  - language_code: eng
    script: Latn
    title: Establish liaison to ISO/TC 85 and appoint representative
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2022-05-15'
        type: effective
      message: |
        Noting that AHG 2 is currently reviewing and managing the comments received from
        ISO/TC 85 and that a comments resolution meeting will be organized with ISO/TC 85
    actions:
    - type: recommends
      date_effective:
        date: '2022-05-15'
        type: effective
      message: |
        SC 4 welcomes this fruitful discussion and proposes to ISO/TC 85 to prepare a future
        coordination on development and implementation of standards in establishing a liaison
        from ISO/TC 184/SC 4 to ISO/TC 85.
    - type: appoints
      date_effective:
        date: '2022-05-15'
        type: effective
      message: |
        SC 4 welcomes the proposal to establish a liaison from ISO/TC 184/SC 4 to ISO/TC 85
        and appoints Christophe MOUTON for a three-year term, with appreciation for his offer
        to serve in that capacity.
- identifier:
  - prefix: ISO/TC 184/SC 4
