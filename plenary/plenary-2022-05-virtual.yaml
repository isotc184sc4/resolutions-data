    date_effective:
      date: '2022-05-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 welcomes this fruitful discussion and proposes to ISO/TC 85 to prepare a future
        coordination on development and implementation of standards in establishing a liaison
