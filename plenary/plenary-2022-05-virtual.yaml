  kind: resolution
  status: decided
  dates:
  - date: '2022-05-15'
    type: adoption
  title:
  - spelling: eng
    value: Approve Project Leaders and Project Editors for SC 4 Projects
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: approves
    date_effective:
      date: '2022-05-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 approves the following Project Leaders and Project Editors for the listed Projects
        noted:

        |===
        |Project |Working Group |Project Leader/Editor

        |ISO 10303-2 (ID 81196) |WG 12 |Stuart Galt (Leader)
        |ISO/PAS 8329 (ID 83119) |WG 12 |Matthias Weinert (Leader)
        |===
  - type: encourages
    date_effective:
      date: '2022-05-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 encourages the above-named individuals to approach their respective National
        Body to request they are nominated as a participating expert in ISO/TC 184/SC 4/QC
        (Quality Committee) giving them access to the latest advice on ensuring SC 4 projects
        deliver products that satisfy ISO and SC 4 expectations for quality.
