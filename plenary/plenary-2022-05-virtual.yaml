    script: Latn
    title: Call for experts to join AG 2 Implementation Forum
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2022-05-15'
        type: effective
      message: |
        Noting the extensive work underway in industry, ISO, and IEC to formalize digital twin
        capabilities and the opportunity to share more broadly the value of SC 4 standards to
        the maturity of digital twin activities
    actions:
    - type: recognizes
      date_effective:
        date: '2022-05-15'
        type: effective
      message: |
        SC 4 recognizes the value of the Implementation Forum and the rich discussion
        regarding digital twins.
    - type: requests
      date_effective:
        date: '2022-05-15'
        type: effective
      message: |
        SC 4 requests all interested experts to coordinate with their respective organizational
        representative and join the AG02 Implementation Forum.
