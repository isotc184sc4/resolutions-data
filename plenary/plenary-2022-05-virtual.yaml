    message:
    - spelling: eng
      value: |
        ISO/TC 184/SC 4 nominates the following liaison representatives for a three-year term with
        appreciation to serve in that capacity:

        * Soonhung Han
        * Martin Hardwick
        * Sangkeun Yoo
        * Duan Haibo
  considerations:
  - type: recalling
    date_effective:
      date: '2022-05-15'
      type: effective
    message:
    - spelling: eng
      value: |
        Recalling the decision by ISO/JTC 1 to revise the scope of ISO/IEC JTC 1/SC 41 and
