      date_effective:
        date: '2022-05-15'
        type: effective
      message: 'ISO/TC 184/SC 4 establishes a liaison to ISO/IEC JTC 1/SC 41.

        '
    - type: nominates
      date_effective:
        date: '2022-05-15'
        type: effective
      message: |
        ISO/TC 184/SC 4 nominates the following liaison representatives for a three-year term with
        appreciation to serve in that capacity:

        * Soonhung Han
        * Martin Hardwick
        * Sangkeun Yoo
        * Duan Haibo
