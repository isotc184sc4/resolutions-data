- identifier: '757'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Registration Number for Work Item on Gears
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Registration Number for Work Item on Gears

      ISO/TC 184/SC 4 decides to register the project “Usage Guide for ISO 10303-214 for

      gear units” as a separate ISO project, to be published as a TS. The project team is

      requested to work with WG3, WG12, and the Quality Committee on the development

      of a common format for usage guidance'
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: requests
    message: 'SC4 requests its Secretariat to circulate the

      amended document for a confirmatory ballot.

      This resolution cancelled by Resolution 781.'
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '758'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO/TS 10303-1000
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: resolves
    message: ISO/TS 10303-1000
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves to manage the ISO 10303 application modules in the 400 and 1000

      series using the ISO Procedures for the Management of standards as databases'
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to submit the operating procedures described in SC 4

      N2401 for a one-month committee internal Yes/No ballot. Any negative votes must

      be accompanied by comments'
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to:

       Forward to ISO for publication an initial version of ISO/TS 10303-1000

      consisting of all ISO 10303 application modules that have already been

      published or are ready for publication, with references to resource parts and

      AICs.

       Invite ISO to withdraw ISO 10303 parts 401 to 4xx and 1001 through

      1xxx, marking each as having been replaced by part 1000, once Part

      1000 is published.

       Propose that ISO modify its catalogue search function so that a search for any

      ISO 10303 part in the range 401 to 499 or 1001 to 1999 will return a message

      referring the user to part 1000.

       Propose to ISO that the publication strategy for ISO 10303 should offer a

      range of products, including:

      o part 1000 as defined;

      o individual APs and either the 1000 part or just the referenced

      application modules;

      o CD with all ISO 10303 parts'
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: decides
    message: 'SC 4 decides that no new ISO 10303 application modules or new editions of existing

      ISO 10303 application modules will be submitted for publication as separate parts,

      once Part 1000 is published'
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: adopts
    message: SC 4 adopts the plan of action in SC 4 N2402.
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '759'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Cancellation of ISO 10303-229
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Cancellation of ISO 10303-229

      Having received no offer of resources to complete remaining work on ISO 10303-229,'
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: requests
    message: SC 4 requests its Secretary to inform ISO CS of the cancellation of the project.
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '760'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Progress of Visualization ad hoc Group
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Progress of Visualization ad hoc Group
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes that the 3D Visualization ad hoc group has made significant progress at

      this meeting in moving forward the harvesting process for visualization formats. In

      acknowledgement of this effort SC 4 directs the 3D Visualization ad hoc group to

      complete the assessment of the candidates and provide the summary report no later

      than 2009-03-31'
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs the Chair and secretariat to initiate the PAS ballots for

      any candidates which pass the SC 4 Harvesting qualification process immediately

      after the delivery of the committee report.'
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '761'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appointment of TC 184/SC 4 delegation to the ISO 22274 project
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Appointment of TC 184/SC 4 delegation to the ISO 22274 project

      For the improvement of communication and active participation in the project ISO

      22274, ”Systems to Manage Terminology, Knowledge and Content –

      Internationalization and Concepts – Related Aspects of Classification Systems” SC

      4 appoints the following experts as delegates to the ISO 22274 project: Gerry

      Radack, Wolfgang Wilkes, Junfeng Zhan, and Guy Pierra.  [ISO/TC 37 has

      circulated ISO 22274 as an NWIP within ISO TC37/SC3 for ballot.]'
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '762'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Extension of DIS Date for Parts 10303-52, -53, and -110
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Extension of DIS Date for Parts 10303-52, -53, and -110
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to inform ISO that the target dates for the submission of

      10303 parts -52, -53 and -110 for DIS ballot are extended to 2009-01-30, and that

      these parts should not be automatically cancelled as a recovery plan is in place.'
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '763'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Minor Revision of Part 10303-47
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Minor Revision of Part 10303-47
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs WG12 to prepare FDIS documents for ISO 10303-47, 503, 504, 506,

      517, 518, 519, 521, and 523 and submit them to ISO for processing as minor

      revisions.

      This amendment has been superseded by Resolution 779.'
