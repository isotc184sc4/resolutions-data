- identifier: '764'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: PWI for Gellish-RDF
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: resolves
    message: PWI for Gellish-RDF
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: creates
    message: 'SC 4 creates an Ad Hoc Group for Gellish-RDF with project leader Paul van Exel and

      editor Leo van Ruijven. The group is requested to clarify the position of the proposed

      standard with respect to SC 4 and W3C standards, and seek alignment where

      appropriate'
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs the group to develop any necessary NWI proposals for

      review by the Change Management Team at the next SC 4 meeting, in May 2009.'
    dates:
    - start: '2008-11-15'
      kind: effective
- identifier: '765'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO 8000 Scope
  dates:
  - start: '2008-11-15'
    kind: decision
  actions:
  - type: resolves
    message: ISO 8000 Scope
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs WG 13 to deliver a brief (1-3 page) draft scope statement and phased

      delivery plan for ISO 8000 as a whole, and a definition of other standardization

      requirements both inside and outside SC 4 for consideration by SC 4 at its next

      meeting (2009-05)'
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2008-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to circulate the original content of this resolution,

      resolution #676 and #733, and SC4 N 2271, WG 13 N 0107, and SC4 N 2292 to

      member bodies with a request for comments by year end in order to provide further

      guidance to WG 13.'
    dates:
    - start: '2008-11-15'
      kind: effective
