- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '342'
  urn: urn:iso:tc184:sc4:resolution:342
  kind: resolution
  status: decided
  dates:
  - date: '1997-10-15'
    type: adoption
  title:
  - spelling: eng
    value: Define normative reference registration requirements for DIS and FDIS
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '1997-10-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC4 requires that by the time a part is being registered as a Draft International Standard (DIS) its associated normative references shall also be registered at least as Draft International Standards.

        By the time a part is being registered as a Final Draft International Standard (FDIS) its normative references shall be at least registered as Draft International Standards (DIS).
