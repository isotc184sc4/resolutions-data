- identifier: '340'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank Neal Laurance and endorse Meinolf Groepper as liaison to SC5
  dates:
  - start: '1997-10-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC4 wishes to thank Mr. Neal Laurance for his liaison role with ISO/TC 184/SC 5.
    dates:
    - start: '1997-10-15'
      kind: effective
  - type: endorses
    message: |
      SC4 endorses SC5's liaison representative, Mr. Meinolf Groepper, as a joint active liaison between SC5 and SC4.
    dates:
    - start: '1997-10-15'
      kind: effective
- identifier: '341'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Cancel Resolution 319 due to lack of leadership and activity
  dates:
  - start: '1997-10-15'
    kind: decision
  actions:
  - type: resolves
    message: |
      SC4 cancels Resolution 319 due to lack of leadership and activity on these preliminary work items.
    dates:
    - start: '1997-10-15'
      kind: effective
- identifier: '342'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Define normative reference registration requirements for DIS and FDIS
  dates:
  - start: '1997-10-15'
    kind: decision
  actions:
  - type: resolves
    message: |
      SC4 requires that by the time a part is being registered as a Draft International Standard (DIS) its associated normative references shall also be registered at least as Draft International Standards.

      By the time a part is being registered as a Final Draft International Standard (FDIS) its normative references shall be at least registered as Draft International Standards (DIS).
    dates:
    - start: '1997-10-15'
      kind: effective
