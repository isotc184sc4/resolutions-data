resolutions:
- identifier: '339'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approve new project leaders and project editors
  dates:
  - start: '1997-10-15'
    kind: decision
  actions:
  - type: approves
    message: |
      SC4 approves the following new project leaders or project editors for the associated SC4 projects:

      |===
      |ISO Project |Project Lead |Document Editor

      |PWI 10303-220/320 |John DeLoof |
      |10303-24 |David Price |David Price
      |10303-207 |Prajakta Ketkar |Prajakta Ketkar
      |10303-221 |Theo Arntz |
      |10303-223/323 |Somendra Singh |
      |10303-229/329 |Somendra Singh |
      |10303-317 |Burt Gischner |Burt Gischner
