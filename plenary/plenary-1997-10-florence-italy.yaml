    kind: decision
  actions:
  - type: resolves
    message: 'SC 4 wishes to thank Mr. Neal Laurance for his liaison role with ISO/TC 184/SC 5,

      and endorses SC 5’s liaison representative, Mr. Meinolf Groepper, as a joint active

      liaison between SC 5 and SC 4.'
