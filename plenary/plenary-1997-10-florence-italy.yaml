      kind: effective
- identifier: '342'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: by the time a part is being registered as a Draft International
  dates:
  - start: '1997-10-15'
    kind: decision
  actions:
  - type: request
    message: 'SC 4 requires that by the time a part is being registered as a Draft International

      Standard (DIS) its associated normative references shall also be registered at least

      as Draft International Standards.

      By the time a part is being registered as a Final Draft International Standard (FDIS) its

      normative references shall be at least registered as Draft International Standards

      (DIS).'
    dates:
    - start: '1997-10-15'
      kind: effective
