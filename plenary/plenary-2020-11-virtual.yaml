      kind: effective
- identifier: '1055'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Extend term of the Ad Hoc Group 2 on Nuclear Digital Ecosystem
  dates:
  - start: '2020-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Extend term of the Ad Hoc Group 2 on Nuclear Digital Ecosystem
    dates:
    - start: '2020-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 extends the term for AHG 2 to the 81st plenary

      where a final report will be provided'
    dates:
    - start: '2020-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2020-11-15'
      kind: effective
  - type: encourages
    message: 'SC 4 encourages its members to join Ad Hoc Group 2 and take part to the ongoing

      national survey to collect national needs and interoperability requirements in terms of

      specifications for a digital ecosystem for the nuclear industry.'
    dates:
    - start: '2020-11-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting the progress made by AHG 2 “Nuclear Digital Ecosystem Specification”, the

      ongoing national survey and the additional work needed to develop recommendations

      for inclusion in their final report'
