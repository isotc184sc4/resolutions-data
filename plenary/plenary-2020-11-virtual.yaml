- identifier: '1061'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approval to use Jira/Git procedure for select projects
  dates:
  - start: '2020-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Approval to use Jira/Git procedure for select projects
    dates:
    - start: '2020-11-15'
      kind: effective
  - type: resolves
    message: 'Noting the successful conclusion of the Committee Innovation Project (Living Lab) for

      the use of Jira/Git in conjunction with Agile development methods and the desire of SC

      4 to continuously improve internal operations while balancing risk of adoption resolve to:

      Approve the Jira/Git procedure as an interim process for the purpose of managing

      change using the Jira/Git platform,

      Grant an exception to select projects in SC 4 from using Bugzilla as the change

      management solution noted in the SC 4 Handbook,

      Concur with the recommendation of the PPC to allow ISO/AWI TS 15926-4, ISO/AWI

      TS 23301, ISO/PWI TR 4758 and TF 02 work products to use the process,

      Request the SC 4 Committee Manager to maintain a record of projects that use the

      process,

      Direct the PPC to periodically review the performance of the pilot activity and report


      status at the next Plenary meeting of SC 4.'
    dates:
    - start: '2020-11-15'
      kind: effective
- identifier: '1062'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Approve draft for CIB ballot of JWG 24 procedure
  dates:
  - start: '2020-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Approve draft for CIB ballot of JWG 24 procedure
    dates:
    - start: '2020-11-15'
      kind: effective
  - type: resolves
    message: 'Noting the mandate from the ISO/TMB through Resolution 81/2017 and development by

      experts from ISO and IEC in ISO/TC 184/SC 4/JWG 24 (IEC SC 3D/JWG 1), a draft

      procedure has been drafted for committee use in managing standards in database form'
    dates:
    - start: '2020-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2020-11-15'
      kind: effective
  - type: acknowledges
    message: 'SC 4 acknowledges the contribution of the draft procedure and requests its Committee

      Manager distribute a six-week Committee Internal Ballot for comments in preparation of

      submitting a Committee Specific Procedure to ISO/TMB.

      ACCLAMATION'
    dates:
    - start: '2020-11-15'
      kind: effective
  - type: appreciation
    message: 'SC4 expresses its appreciation to our SC 4 Liaisons and reports provided to the 80th

      Plenary

       ISO/TC 171/SC 2 (Written)

       IEC/SC 3D

       ISO/IEC/JTC 1/SC 24 and Web 3D Consortium

      ACCLAMATION'
    dates:
    - start: '2020-11-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its sincere appreciation to all the experts, delegates, and leaders for

      executing a completely virtual plenary meeting successfully while undergoing numerous

      challenges during this extraordinary time for stakeholders worldwide.'
    dates:
    - start: '2020-11-15'
      kind: effective
