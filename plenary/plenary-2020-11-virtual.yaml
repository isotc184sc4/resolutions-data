  urn: urn:iso:tc184:sc4:resolution:1055
  kind: resolution
  status: decided
  dates:
  - date: '2020-11-15'
    type: adoption
  title:
  - spelling: eng
    value: Extend term of AHG 2 on Nuclear Digital Ecosystem Specification
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: decides
    date_effective:
      date: '2020-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 extends the term for AHG 2 to the 81st plenary where a final report
        will be provided.
  - type: encourages
    date_effective:
      date: '2020-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 encourages its members to join Ad Hoc Group 2 and take part to the
        ongoing national survey to collect national needs and interoperability
        requirements in terms of specifications for a digital ecosystem for the
        nuclear industry.
  considerations:
  - type: noting
    date_effective:
      date: '2020-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        Noting the progress made by AHG 2 "Nuclear Digital Ecosystem Specification",
        the ongoing national survey and the additional work needed to develop
        recommendations for inclusion in their final report
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1057'
  urn: urn:iso:tc184:sc4:resolution:1057
  kind: resolution
  status: decided
  dates:
  - date: '2020-11-15'
    type: adoption
  title:
  - spelling: eng
    value: Initiate review of Liaison appointments through SC 4 Newsletter
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '2020-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 regularly publishes the current Liaisons through the SC 4 Newsletter
        twice yearly.
  - type: requests
    date_effective:
      date: '2020-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests the Committee Manager initiate a review of the Liaisons and
        validate Liaisons through interrogation of the ISO Global Directory for
        membership and/or correspondence with each identified Liaison
        representative. Further, if no response is received within four weeks of
        initiation, the liaison assignment will be considered inactive.
  considerations:
  - type: recognizing
    date_effective:
      date: '2020-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        Recognizing that Liaisons are an important component to a healthy technical
        competency for SC 4 and that Liaison representative play a critical role
        in establishing and maintaining effective lines of communication between
        organizations
  - type: noting
    date_effective:
      date: '2020-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        Noting the cursory review of SC 4's published liaisons through the
        SC 4 Newsletter and the significant number of errors
