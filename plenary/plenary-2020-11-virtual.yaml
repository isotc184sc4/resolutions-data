    - start: '2020-11-15'
      kind: effective
- identifier: '1057'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Liaison appointment review
  dates:
  - start: '2020-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Liaison appointment review
    dates:
    - start: '2020-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 regularly

      publishes the current Liaisons through the SC 4 Newsletter twice yearly'
    dates:
    - start: '2020-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests the Committee Manager initiate a review of

      the Liaisons and validate Liaisons through interrogation of the ISO Global Directory for

      membership and/or correspondence with each identified Liaison representative.

      Further, if no response is received within four weeks of initiation, the liaison assignment

      will be considered inactive.'
    dates:
    - start: '2020-11-15'
      kind: effective
  considerations:
  - type: recognizing
    message: 'Recognizing that Liaisons are an important component to a healthy technical

      competency for SC 4 and that Liaison representative play a critical role in establishing

      and maintaining effective lines of communication between organizations'
    dates:
    - start: '2020-11-15'
      kind: effective
  - type: noting
    message: 'Noting the

      cursory review of SC 4’s published liaisons through the SC 4 Newsletter and the

      significant number of errors'
    dates:
    - start: '2020-11-15'
      kind: effective
