- identifier: '1054'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Extend term of Ad Hoc Group 1 on Core Industrial Data Set of Terms
  dates:
  - start: '2020-11-15'
    kind: decision
  actions:
  - type: resolves
    message: Extend term of Ad Hoc Group 1 on Core Industrial Data Set of Terms
    dates:
    - start: '2020-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 extends the term of the AHG 1 and requests its final report at the

      81st Plenary meeting of SC 4. AHG 01 is requested to provide a plan for the further work

      itemized in the introduction to this resolution. Further, France nominates Yves Keraron

      and Yves Baudier as experts to this group.'
