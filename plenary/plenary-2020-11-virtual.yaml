- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1060'
  urn: urn:iso:tc184:sc4:resolution:1060
  kind: resolution
  status: decided
  dates:
  - date: '2020-11-15'
    type: adoption
  title:
  - spelling: eng
    value: Request 9-month extension for ISO 10303-209 ed3 from ISO TMB
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2020-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 requests the ISO TMB to grant a nine months extension to ISO 10303-209
        edition 3 allowing the project team additional time to complete CD by
        15 January 2021, and DIS by 15 July 2021 through necessary coordination
        using virtual working arrangements dictated by restrictions in meeting due
        to COVID-19.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '1062'
  urn: urn:iso:tc184:sc4:resolution:1062
  kind: resolution
  status: decided
  dates:
  - date: '2020-11-15'
    type: adoption
  title:
  - spelling: eng
    value: Circulate CIB for draft JWG 24 procedure for managing standards
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: acknowledges
    date_effective:
      date: '2020-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 acknowledges the contribution of the draft procedure and requests its
        Committee Manager distribute a six-week Committee Internal Ballot for
        comments in preparation of submitting a Committee Specific Procedure to
        ISO/TMB.
  considerations:
  - type: noting
    date_effective:
      date: '2020-11-15'
      type: effective
    message:
    - spelling: eng
      value: |
        Noting the mandate from the ISO/TMB through Resolution 81/2017 and
        development by experts from ISO and IEC in ISO/TC 184/SC 4/JWG 24
        (IEC SC 3D/JWG 1), a draft procedure has been drafted for committee use in
        managing standards in database form
