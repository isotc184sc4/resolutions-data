    title: Seek nominations for Product Data Quality Strategy Task Force
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: resolves
      date_effective:
        date: '2005-03-15'
        type: effective
      message: |
        SC 4 has identified the need to create a Task Force to develop a Strategy for the
        PDQ Requirements of SC 4 concerns. The title of the Task Force will be: Product
        Data Quality (PDQ) Strategy for Industrial Data.
    - type: asks
      date_effective:
        date: '2005-03-15'
        type: effective
