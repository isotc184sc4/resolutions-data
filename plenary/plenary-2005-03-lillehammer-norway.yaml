      EPISTLE

      Per Christian Malmin,

      Statoil Integrated Operations in Oil & Gas

      Thore

      Langeland ECCMA

      Peter Benson

      ACCLAMATION:'
    dates:
    - start: '2005-03-15'
      kind: effective
  - type: resolves
