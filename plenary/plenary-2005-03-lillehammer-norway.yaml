    title: Request liaison with ISO/TC 37/SC 1 and appoint officers
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2005-03-15'
        type: effective
      message: |
        SC 4 requests an active two-way liaison with ISO/TC 37/SC 1 and requests the SC 4
        Secretary to confirm this liaison with the ISO Central Secretariat. SC 4 appoints
        Gerald Radack and Eric Sardet as the liaison officers from SC 4 to ISO/TC 37/SC 1,
        and requests them to provide feedback to WG 2, WG 3 and relevant teams on the
        specific activities of ISO/TC 37/SC 1 that are of relevance to SC 4 work.
    - type: requests
      date_effective:
        date: '2005-03-15'
        type: effective
      message: |
        SC 4 requests its secretariat to provide appropriate accreditation to alternate liaison
        officers when nominated by the appointed officers.
