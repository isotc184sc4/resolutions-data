- identifier: '728'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ', TX USA - November 2007)'
  dates:
  - start: '2007-11-15'
    kind: decision
  actions:
  - type: resolves
    message: ', TX USA - November 2007)

      Cre a tio n of a “Big P ictu re” to sh o w t h e relation of Stan d a rd s t o b e use d with in a nd

      between Enterprises'
    dates:
    - start: '2007-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests the PPC to continue and extend its existing work to generate a “Big

      Picture” illustrating the relationship and interaction of standards created by ISO/TC

      184 in an operational environment, and seeks participation from other ISO/TC 184

      Subcommittees in this work. The PPC may also invite additional SC 4 experts to

      participate in this work.

      The target groups for the results will be:

       SC 4 experts - to reach a common understanding

       Standardizers of other committees - to show how ISO/TC 184 standards can

      be used within their standards activities

       Industry - to understand which standards might be used to solve their problems


      in areas such as collaboration, interoperability, data exchange'
    dates:
    - start: '2007-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Chair and Secretariat to encourage the other SCs of ISO/TC 184 to

      participate in this work'
    dates:
    - start: '2007-11-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2007-11-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests the group to take full account of the results of previous initiatives in this

      area.

      A presentation of results is expected for the meeting of ISO/TC 184 in Oct. 2008.

      Action item: A SharePoint service will be installed by the SC 4 Secretariat to facilitate

      cooperation on this topic.'
    dates:
    - start: '2007-11-15'
      kind: effective
- identifier: '729'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ', TX USA - November 2007)'
  dates:
  - start: '2007-11-15'
    kind: decision
  actions:
  - type: resolves
    message: ', TX USA - November 2007)

      Common development of data standards for manufacturing applications'
    dates:
    - start: '2007-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses its extreme concern at the violation of the common ITU-R/ITU-T/

      ISO/IEC patent policy by the issuance of patents on the implementation of ISO 14649,

      and the resulting proposal for further similar patents being registered to protect

      implementation of SC 4 standards. All committees within ISO, IEC and ITU may be

      placed into a similar situation by granting of patents that restrict implementation of ISO

      standards. Therefore SC 4 requests ISO/CS to undertake the necessary actions to

      avoid this problem in the future, and invites its P-members to pursue the matter

      through their national bodies.'
    dates:
    - start: '2007-11-15'
      kind: effective
- identifier: '730'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ', TX USA - November 2007)'
  dates:
  - start: '2007-11-15'
    kind: decision
  actions:
  - type: resolves
    message: ', TX USA - November 2007)

      Common development of data standards for manufacturing applications'
    dates:
    - start: '2007-11-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes that its manufacturing team wishes to continue its successful collaboration

      with SC 1 on the further development of ISO 10303-238 and ISO 14649'
    dates:
    - start: '2007-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 also

      notes that SC 1 is working to resolve the issue of the 14649 related patent by the end

      of 2007'
    dates:
    - start: '2007-11-15'
      kind: effective
  - type: resolves
    message: 'SC 4 therefore requests its Secretariat to invite SC 1 to collaborate on the

      harmonization, subject to successful resolution of the current patent issue. In

      recognition of the substantial damage that the patent issue has caused, and to

      mitigate

      further damage, and in the event that the patent issue is not resolved, SC 4 requests

      WG 3/T24 to remove any elements of AP238 which are affected by the patent.'
    dates:
    - start: '2007-11-15'
      kind: effective
