    title: Change title, clarify scope, and reassign ISO 8000 master data item
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: resolves
      date_effective:
        date: '2007-11-15'
        type: effective
      message: 'SC4 resolves to change the title of the ISO work item 42919 from "Catalogue
        management systems -- Requirements" to "Data quality -- Master data". SC4
        clarifies that the scope of the work item is master data, notes the revised
        scope of ISO 8000-110 as defined in WG 13 N44, and requests WG 13 to develop
        a title for ISO 8000-110 that correctly reflects the restrictions in its scope.
        Upon approval of the new NWI for ISO 8000, Data Quality, SC4 assigns the work
        item 42919 to the ISO 8000-100 series of parts.

        '
