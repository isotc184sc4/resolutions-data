    message: ', TX USA - November 2007)

      Change of Title, Clarification of Scope, and Designation of Series for ISO 8000,

      Catalogue Management Systems – Requirements

      Resolution: SC 4 resolves to change the title of the ISO work item 42919 from

      Catalogue management systems – Requirements to Data quality – Master data SC

      4 clarifies that the scope of the work item is master data, notes the revised scope of

      ISO 8000-110 as defined in WG 13 N44, and requests WG 13 to develop a title for

      ISO 8000-110 that correctly reflects the restrictions in its scope. Upon approval of

      the new

      NWI for ISO 8000, Data Quality, SC 4 assigns the work item 42919 to the ISO 8000-

      100 series of parts.'
    dates:
    - start: '2007-11-15'
      kind: effective
