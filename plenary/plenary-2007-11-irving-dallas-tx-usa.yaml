metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Dallas, United States, October 28, 2007 -- November 2, 2007
  dates:
  - start: '2007-10-28'
    end: '2007-11-02'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Dallas, United States
resolutions:
- identifier: '725'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appoint Dr. Peter Langer as liaison officer to ISO/TC 118
  dates:
  - start: '2007-11-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC4 requests the Secretariat to establish a liaison with ISO/TC 118 "Compressors, pneumatic tools and pneumatic machines" and invites ISO/TC 118 to nominate Dr. Peter Langer as liaison officer to ISO/TC 184/SC 4.
    dates:
    - start: '2007-11-15'
      kind: effective
