- identifier: '728'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Create a Big Picture showing relationship of standards
  dates:
  - start: '2007-11-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC4 requests the PPC to continue and extend its existing work to generate a "Big Picture" illustrating the relationship and interaction of standards created by ISO/TC 184 in an operational environment, and seeks participation from other ISO/TC 184 Subcommittees in this work. The PPC may also invite additional SC4 experts to participate in this work.

      The target groups for the results will be:
      * SC4 experts - to reach a common understanding
      * Standardizers of other committees - to show how ISO/TC 184 standards can be used within their standards activities
      * Industry - to understand which standards might be used to solve their problems in areas such as collaboration, interoperability, data exchange
    dates:
    - start: '2007-11-15'
      kind: effective
  - type: requests
    message: |
      SC4 requests its Chair and Secretariat to encourage the other SCs of ISO/TC 184 to participate in this work.
    dates:
    - start: '2007-11-15'
      kind: effective
  - type: requests
    message: |
      SC4 requests the group to take full account of the results of previous initiatives in this area. A presentation of results is expected for the meeting of ISO/TC 184 in Oct. 2008.

      Action item: A SharePoint service will be installed by the SC4 Secretariat to facilitate cooperation on this topic.
    dates:
    - start: '2007-11-15'
      kind: effective
- identifier: '729'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Address ISO 14649 patent issues to avoid restricting standards
  dates:
  - start: '2007-11-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC4 expresses its extreme concern at the violation of the common ITU-R/ITU-T/ISO/IEC patent policy by the issuance of patents on the implementation of ISO 14649, and the resulting proposal for further similar patents being registered to protect implementation of SC4 standards. All committees within ISO, IEC and ITU may be placed into a similar situation by granting of patents that restrict implementation of ISO standards. Therefore SC4 requests ISO/CS to undertake the necessary actions to avoid this problem in the future, and invites its P-members to pursue the matter through their national bodies.
    dates:
    - start: '2007-11-15'
      kind: effective
- identifier: '730'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Collaborate with SC 1 on ISO 10303-238 and ISO 14649 harmonization
  dates:
  - start: '2007-11-15'
    kind: decision
  actions:
  - type: requests
    message: |
      SC4 requests its Secretariat to invite SC 1 to collaborate on the harmonization, subject to successful resolution of the current patent issue. In recognition of the substantial damage that the patent issue has caused, and to mitigate further damage, and in the event that the patent issue is not resolved, SC4 requests WG 3/T24 to remove any elements of AP238 which are affected by the patent.
    dates:
    - start: '2007-11-15'
      kind: effective
  considerations:
  - type: noting
    message: |
      Noting that its manufacturing team wishes to continue its successful collaboration with SC 1 on the further development of ISO 10303-238 and ISO 14649, and also noting that SC 1 is working to resolve the issue of the 14649 related patent by the end of 2007.
    dates:
    - start: '2007-11-15'
      kind: effective
