- identifier: 200711-acclaim-03
  subject: ISO/TC 184/SC 4 "Industrial data"
  dates:
  - start: '2007-11-15'
    kind: decision
  actions:
  - type: thanks
    message: 'SC 4 expresses its deepest appreciation to SOLE – The International Society of

      Logistics (SOLE) for its hosting of the 53rd ISO/TC 184/SC 4 Plenary Meeting at the

      Omni Mandalay Hotel at Las Colinas, Irving, Texas.  Ms. Sarah R. James, Executive

      Director and Past President; Mr. Jeffrey L. Schafer, President; and Mr. Anthony E.


      Trovato, CPL, Past President and those logisticians jointly interacting with the SC 4

      community are recognized for not only their initiative to bring a standards user

      perspective to the open technical session and those joint activities, but also in SOLE’s

      engagement of members of the SC 4 community – particularly Peter Benson, Gerry

      Radack and Nigel Shaw – as instructors in SOLE’s Logistics Standards professional

      development workshops.

      Special acknowledgement is extended to the Omni Mandalay Hotel at Las Colinas

      and its staff: particular thanks go to Mr. Cameron McDonald, Director of Catering and

      Conference Planning; and Ms. Deborah Nsi, Set Up Supervisor for their seamless

      support. AV One, the meeting’s audio-visual provider, is recognized for their

      outstanding support. A final thanks goes to the Irving Convention and Visitors’

      Bureau and their staff – especially Mrs. Mary Hammett – for providing registration

      support and gracious hospitality.'
    dates:
    - start: '2007-07-15'
      kind: decision
