      kind: effective
- identifier: 200711-acclaim-01
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank SC4 short report and Open Technical Forum presenters
  dates:
  - start: '2007-11-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC4 expresses its thanks to our SC4 short report presenters at the opening plenary for their representation to and for ISO/TC 184/SC 4:

      * ECCMA (Peter Benson)
      * NATO AC/135 (Steve Arnett)
      * PDES, inc. (Jack Harris)

      SC4 also offers thanks to those external projects who presented their material at the Open Technical Forum:

      * SLSS (Anthony E. Trovato)
      * Getting Quality Master Data from Suppliers (Peter Benson & Gerry Radack)
      * "ALOES", a Logistic Support Analysis System (Lothar Klein)
      * Army's PLCS implementation of FALCON (Raj Iyer)
      * Linking Logistics to Design Data using PLCS (Nigel Shaw)
      * Building support solutions using PLCS (Jochen Haenisch)
      * Early implementations of PLCS (Tim King)
    dates:
    - start: '2007-11-15'
      kind: decision
- identifier: 200711-acclaim-02
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank SC4 Liaisons and Liaison Plenary presenters
  dates:
  - start: '2007-11-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC4 expresses its appreciation to our SC4 Liaisons and those projects who presented at the Liaison Plenary:

      * IEC Liaisons -- ISO/TC 3, SC 3D, SC 65E (Hiroshi Murayama)
      * ISO/TC 37, ISO/IEC JTC 1/SC 32 (Gerry Radack)
      * Future extension of ISO15926-4 dictionary content in cooperation with discipline ISO/TC's and SC's (Dalip Sud)
      * Current activities of eClass (Reinhard Nerke)
      * IS 16739 under ISO/TC 184/SC 4 (Francois Grobler)
      * DEPUIS results on the eco-management perspective in relation with the activity of ISO/TC 207 (Anna Moreno)
      * Ecma/TC 43 (Tom-Michael Thamm)
    dates:
    - start: '2007-11-15'
      kind: decision
- identifier: 200711-acclaim-03
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Thank SOLE, Omni Mandalay Hotel, and organizers for hosting
  dates:
  - start: '2007-11-15'
    kind: decision
  actions:
  - type: thanks
    message: |
      SC4 expresses its deepest appreciation to SOLE -- The International Society of Logistics for its hosting of the 53rd ISO/TC 184/SC 4 Plenary Meeting at the Omni Mandalay Hotel at Las Colinas, Irving, Texas. Ms. Sarah R. James, Executive Director and Past President; Mr. Jeffrey L. Schafer, President; and Mr. Anthony E. Trovato, CPL, Past President and those logisticians jointly interacting with the SC4 community are recognized for not only their initiative to bring a standards user perspective to the open technical session and those joint activities, but also in SOLE's engagement of members of the SC4 community -- particularly Peter Benson, Gerry Radack and Nigel Shaw -- as instructors in SOLE's Logistics Standards professional development workshops.

      Special acknowledgement is extended to the Omni Mandalay Hotel at Las Colinas and its staff: particular thanks go to Mr. Cameron McDonald, Director of Catering and Conference Planning; and Ms. Deborah Nsi, Set Up Supervisor for their seamless support. AV One, the meeting's audio-visual provider, is recognized for their outstanding support. A final thanks goes to the Irving Convention and Visitors' Bureau and their staff -- especially Mrs. Mary Hammett -- for providing registration support and gracious hospitality.
    dates:
    - start: '2007-11-15'
      kind: decision
