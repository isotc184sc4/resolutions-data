- identifier: '669'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Launch of AP 203 ed 2 ballot
  dates:
  - start: '2006-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Launch of AP 203 ed 2 ballot
    dates:
    - start: '2006-03-15'
      kind: effective
  - type: accepts
    message: 'SC 4 accepts the proposal of the AP 203 ed2 project team to launch a DIS ballot on

      the revised Technical Specification ISO/TS 10303-203, and requests its Secretariat to

      register the necessary New Work Item with ISO.

      Referenced documents: See WG 2N1591 – issues log for AP203 and WG 12N3277

      issues log for GD&T modules for additional information.

      Action item: Secretariat to request the AP203 ed2 team to confirm that they will use the

      current part 10303-55 and the revised 10303-111, currently under DIS ballot, to support

      construction history, prior to submitting the DIS ballot for AP203 ed2'
    dates:
    - start: '2006-03-15'
      kind: effective
