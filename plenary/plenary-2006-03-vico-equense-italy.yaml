      kind: effective
  - type: resolves
    message: 'SC 4 expresses its particular thanks to Dr. Anna Moreno for providing the overall

      excellent coordination for the entire SC 4 Meeting in Vico Equense'
    dates:
    - start: '2006-03-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2006-03-15'
      kind: effective
  - type: resolves
    message: 'SC 4 also wishes to recognize the members of her staff for their superior

