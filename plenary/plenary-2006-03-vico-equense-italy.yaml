- identifier: '676'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Creation of new WG 13 on Industrial Data Quality
  dates:
  - start: '2006-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Creation of new WG 13 on Industrial Data Quality
    dates:
    - start: '2006-03-15'
      kind: effective
  - type: resolves
    message: 'SC 4 resolves to establish a new Working Group 13, Industrial Data Quality.

      The task of this working group will be to:

       Establish a coherent definition of the structure of Quality Standards to be

      produced by SC 4, based on the results of the Product Data Quality

      Strategy meeting held on 2006-03-07 (SC 4 N2078)

       Identify NWI and develop the necessary standards for accreditation of

      organizations and processes, and the quality criteria for information complying

      with each of the SC 4 standards, all to be published under the ISO 8000

      series.

       The current ISO 8000 work item will become part of the ISO 8000 series'
    dates:
    - start: '2006-03-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2006-03-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Secretariat to invite National Member Bodies to nominate experts


      and candidates for Convenorship for the group.'
    dates:
    - start: '2006-03-15'
      kind: effective
