      Appreciation to our SC 4 Liaisons. We appreciate your representation to and for

      ISO/TC 184/SC 4.

      A special thank you to the SC 4 Liaison Plenary presenters for their insightful and

      comprehensive presentations:

      ISO/TC 184

      Jean-Marc Chatelard


      JWG 1

      Wolfgang Wilkes

      OASIS

      Mats Nilsson

      ECCMA

      Peter Benson

      USPI-NL

      Leo van Ruijven

      ISO/TC 67

      Nils Sandsmark

      ENEA

      Anna Moreno

      APPRECIATION:'
    dates:
    - start: '2006-03-15'
      kind: effective
  - type: resolves
    message: 'SC 4 wishes to give its unanimous thanks to ENEA, its Members and the staff of the

      Oriente Hotel for their efforts in organizing this meeting, arranging the facilities,

      excellent food, and excellent social events.

      APPRECIATION:'
    dates:
