    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '1996-06-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4:
        - welcomes the efforts by the Advisory Committee on Electronics and Telecommunications (ACET) to coordinate relevant activities across IEC
        - recognises the strong industrial demand for integration between standards relating to mechanical and electrotechnical product model data
        - emphasises the need for a joint ISO/IEC approach to this issue, drawing attention to the previous SC 4 resolutions on the topic (Resolutions 138, 140 - October 1992)
        - expresses its willingness to contribute to the proposed Harmonisation Group, and nominates Shaun Devlin (Convener of JWG 9) as the principal point of contact for SC 4
        - encourages the ISO TMB to recognise the Design Automation Harmonisation Group (DAHG) activity as a joint ISO/IEC activity.
