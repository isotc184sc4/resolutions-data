    number: '286'
  urn: urn:iso:tc184:sc4:resolution:286
  kind: resolution
  status: decided
  dates:
  - date: '1996-06-15'
    type: adoption
  title:
  - spelling: eng
    value: Define publication rules for Application Interpreted Constructs
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '1996-06-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 resolves that
        - an AIC shall be published as a separate part (500-series document)
        - APs shall reference AICs only as a normative reference
        - AICs shall be at the same or advanced voting status as an AP in which it is being
          used at the time of the AP's DIS or FDIS ballot
  - type: resolves
    date_effective:
      date: '1996-06-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 authorises exemption for 10303-202 and 10303-207, recognising the current
        ballot status of these documents.
