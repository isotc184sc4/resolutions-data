  kind: resolution
  status: decided
  dates:
  - date: '1996-06-15'
    type: adoption
  title:
  - spelling: eng
    value: Reconfirm resolution 168 and exempt specific projects from ATS requirements
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: confirms
    date_effective:
      date: '1996-06-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 reconfirms resolution #168 but approves exempting 10303-210, 10303-224,
        and 10303-225 from the associated abstract test suite requirements of SC 4
        Resolution #168 for these APs’ initial DIS registration and ballot cycle
        if before 31 July 1996:

        (a) the CD ballot comments are resolved;

        (b) the DIS draft is approved by integration, qualification, and editing; and

        (c) the issues resolution log and draft AP for DIS registration are successfully
        loaded on SOLIS, with a production-ready hard copy of both documents to the SC 4
        Secretary.

        Compliance to SC 4 Resolution #168 is expected if an AP project team is unable to
        meet (a) through (c) by 31 July 1996. The requirements of abstract test suites will
        be enforced before FDIS.
