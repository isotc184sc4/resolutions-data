metadata:
  title: Resolutions of the plenary meeting of ISO/TC 184/SC 4, Dallas, TX, USA, October 1992
  dates:
  - start: '1992-10-15'
    kind: meeting
  source: ISO/TC 184/SC 4 Secretariat
  venue: Dallas, TX, USA
resolutions:
- identifier: '124'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: the consensus position reached by PMAG and WG experts on the issues
  dates:
  - start: '1992-10-15'
    kind: decision
  actions:
  - type: notes
    message: 'SC 4 notes the consensus position reached by PMAG and WG experts on the issues

      relating to Initial Release implementation. This represents a solution to a number of

      potential ballot comments which may arise during the current CD ballot. The following

      represent the proposed solution:

      Part 21:

      ANDOR Supertype/Subtype Structures

      - Instances based on AND will use external mapping.

      - Other instances will use internal mapping.


      Entity names within the external mapping structure will be ordered

      alphabetically.

      Part 41:

      The Measures Schema recommended by WG 4 will be adopted.

      Parts 42 and 46:

      Other Parts will conform with the new Measures Schema.

      Part 203:

      Annex D of the current CD release will be removed

      A new informative annex will be added (Annex J)

      consensus:


      Text for the new informative annex should express the following

      "This annex provides an example instantiation data structure that may

      help implementors understand how the Application Interpreted Model of

      Annex A might be restructured for internal implementation purposes."

      “The data structure contained in this annex is not intended to be used as

      the required schema for the clear text encoding as defined in ISO 10303-

      21."

      AP Guidelines and Supplementary Directives:

      The informative annex (Annex J) as previously defined will be

      described as an optional annex for all APs.'
    dates:
    - start: '1992-10-15'
      kind: effective
- identifier: '125'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: the CD ballot target dates for existing STEP documents
  dates:
  - start: '1992-10-15'
    kind: decision
  actions:
  - type: confirms
    message: 'SC 4 confirms the CD ballot target dates for existing STEP documents. The resulting

      comments, will be addressed at the workshop scheduled for 14 - 18 December 1992

      at NIST'
    dates:
    - start: '1992-10-15'
      kind: effective
  - type: instructs
    message: 'SC 4 instructs its secretariat to circulate the integrated set of consistent

      documents to P-members by 15 January 1993. The final decision to register the

      documents as DIS will be taken by SC 4 at the Torino meeting.'
    dates:
    - start: '1992-10-15'
      kind: effective
- identifier: '126'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: The Initial Release of ISO 10303 shall allow referencing mechanisms to a part...
  dates:
  - start: '1992-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'The Initial Release of ISO 10303 shall allow referencing mechanisms to a part in a

      standard part library using names and attributes.  Such mechanisms shall allow the

      exchange through a STEP file of that information which is necessary to generate the

      same part in the receiving system when both sending and receiving systems contain

      the same part library. (SPAG 9)'
    dates:
    - start: '1992-10-15'
      kind: effective
- identifier: '127'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Because of the likelihood of changes required to maintain overall consistency...
  dates:
  - start: '1992-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Because of the likelihood of changes required to maintain overall consistency, ISO

      10303-21 will be circulated to P-members on or before 15 January 1993, so that it

      can be included in the final decision on the registration of the Initial Release of

      STEP.'
    dates:
    - start: '1992-10-15'
      kind: effective
