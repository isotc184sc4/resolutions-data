    number: '133'
  kind: resolution
  status: decided
  dates:
  - date: '1992-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Request specific document formats for each STEP Part on NIST SOLIS
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '1992-10-15'
        type: effective
      message: |
        For each STEP Part on the NIST SOLIS, ISO/TC 184/SC 4 asks that the following
        forms be available, consistent and up to date:

        * Master copy in LaTeX or WordPerfect.
        * One derived copy containing a complete ASCII text of the STEP Part,
          containing as much text as possible.
        * One derived copy containing a POSTSCRIPT copy of the STEP Part, including
          the cover sheet.
