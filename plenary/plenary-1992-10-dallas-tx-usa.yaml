- identifier: '130'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: member bodies to identify and provide qualified people with
  dates:
  - start: '1992-10-15'
    kind: decision
  actions:
  - type: requests
    message: 'SC 4 requests member bodies to identify and provide qualified people with

      adequate long-term commitment and funding to support the critical central functions

      of qualification, integration, editing, training material development, training and

      configuration management. In addition, SC 4 requests PMAG to identify to member

      bodies the requirements for support for these functions.'
    dates:
    - start: '1992-10-15'
      kind: effective
