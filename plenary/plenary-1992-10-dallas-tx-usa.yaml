- identifier: '132'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO/TC 184/SC 4 asks the ISO/TC 184/SC 4 Secretariat to make sure that an ASCII
  dates:
  - start: '1992-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'ISO/TC 184/SC 4 asks the ISO/TC 184/SC 4 Secretariat to make sure that an ASCII

      source listing will be available, containing an explicit representation of all characters of

      the CD text to be balloted represented as ASCII characters, without any formatting

      information or figures.

      A 3.5" MS-DOS disk formatted at 720 K containing a complete 7 bit ASCII text must

      then be an integral part of any package for which a CD ballot is requested.'
    dates:
    - start: '1992-10-15'
      kind: effective
- identifier: '133'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: For each STEP Part on the NIST SOLIS, ISO/TC 184/SC 4 asks that the following
  dates:
  - start: '1992-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'For each STEP Part on the NIST SOLIS, ISO/TC 184/SC 4 asks that the following

      forms be available, consistent and up to date:

      Master copy in LaTeX or WordPerfect.

      One derived copy containing a complete ASCII text of the STEP Part,

      containing as much text as possible.

      One derived copy containing a POSTSCRIPT copy of the STEP Part, including


      the cover sheet.'
    dates:
    - start: '1992-10-15'
      kind: effective
