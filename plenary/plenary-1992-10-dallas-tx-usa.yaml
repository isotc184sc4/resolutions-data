    kind: decision
  actions:
  - type: requests
    message: 'SC 4 requests the P35 project leader, Mr. Mark Palmer, along with the participation of

      WG 4, WG 5, Editing Committee, interested members of PMAG, and experts within

      SC 4, to present their point of view and to make a proposal to SPAG and PMAG at

      their

      February 1993 meeting in Torino, Italy.  The point of view and proposal will address the

      topics of a reference model of SC 4 standards, concepts of "interoperability" and

      "companion standards," and requirements for coordinating and qualifying APs

      developed outside SC 4.'
