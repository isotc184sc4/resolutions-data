- identifier: '137'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: WG 3/T8 (Product Life Cycle Support) and WG 8 (Industrial
  dates:
  - start: '1992-10-15'
    kind: decision
  actions:
  - type: encourages
    message: 'SC 4 encourages WG 3/T8 (Product Life Cycle Support) and WG 8 (Industrial

      Manufacturing Management) to cover the domain of maintenance data. WG 3/T8 will

      particularly address maintenance support data. WG 8 will particularly address

      maintenance management data. The specific case related to diagnostics and

      resource status has to be solved in common. (WG 3)'
    dates:
    - start: '1992-10-15'
      kind: effective
