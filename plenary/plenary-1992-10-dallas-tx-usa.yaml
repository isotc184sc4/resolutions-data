    number: '126'
  kind: resolution
  status: decided
  dates:
  - date: '1992-10-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Allow referencing mechanisms to a part in a standard part library
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: resolves
      date_effective:
        date: '1992-10-15'
        type: effective
      message: |
        The Initial Release of ISO 10303 shall allow referencing mechanisms to a part in a
        standard part library using names and attributes. Such mechanisms shall allow the
        exchange through a STEP file of that information which is necessary to generate the
        same part in the receiving system when both sending and receiving systems contain
        the same part library. (SPAG 9)
