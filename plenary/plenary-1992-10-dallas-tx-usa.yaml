- identifier: '147'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: To fulfil objective c1 of the SC 4 strategic policy (SC 4 N128), SC 4 request...
  dates:
  - start: '1992-10-15'
    kind: decision
  actions:
  - type: resolves
    message: 'To fulfil objective c1 of the SC 4 strategic policy (SC 4 N128), SC 4 requests that the

      P02 (EXPRESS Language) project leader:

      present to SPAG in Torino, Italy (February 1993 meeting) the status and the

      content of its requirement analysis for EXPRESS.

      elaborate a strategy for future EXPRESS development, and to present it to

      SPAG for validation by July 1993. This strategy should include the context, the

      background, the main objectives on a mid-term and long-term basis,

      assessment of any alternative options, and the analysis of major risks. (SPAG

      4)'
    dates:
    - start: '1992-10-15'
      kind: effective
- identifier: '148'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: the P35 project leader, Mr
  dates:
