- identifier: '8'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: The agenda SC 4 N 13 for the March 85 meeting is adopted as amended by SC 4 N
  dates:
  - start: '1985-03-15'
    kind: decision
  actions:
  - type: resolves
    message: 'The agenda SC 4 N 13 for the March 85 meeting is adopted as amended by SC 4 N

      15.'
    dates:
