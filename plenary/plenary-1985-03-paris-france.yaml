- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '9'
  kind: resolution
  status: decided
  dates:
  - date: '1985-03-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Reconfirm the STEP goal and target first version for 1990 industrial use
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: confirms
      date_effective:
        date: '1985-03-15'
        type: effective
      message: |
        SC 4 reconfirms its goal as expressed in Resolution #2: to develop as
        soon as possible a single international standard for the exchange of
        product definition data to be called the standard for the exchange of
        product model data (STEP).
    - type: resolves
      date_effective:
        date: '1985-03-15'
        type: effective
      message: |
        SC 4 will not concern itself with an interim solution based on any
        existing national standards, although it recognizes that these standards
        will continue in parallel use until STEP becomes fully operational.

        All efforts will be concentrated to achieve a first version of STEP so
        that its effective industrial use can start in 1990.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '10'
  kind: resolution
  status: decided
  dates:
  - date: '1985-03-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Align national standards development with STEP to ensure convergence
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: agrees
      date_effective:
        date: '1985-03-15'
        type: effective
      message: |
        SC 4 agrees that, whenever existing national standards are enhanced,
        development should be undertaken in parallel with the corresponding STEP
        effort, using the same reference model to ensure that compatible concepts
        are used. This will cause the standards to converge towards STEP and will
        simplify the eventual migration from the current standards to STEP.
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '11'
  kind: resolution
  status: decided
  dates:
  - date: '1985-03-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Direct WG 1 to develop documentation and functional requirements for STEP
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '1985-03-15'
        type: effective
      message: 'SC 4 thanks WG 1 for its accomplishments at its first meeting.

        '
    actions:
    - type: directs
      date_effective:
        date: '1985-03-15'
        type: effective
      message: |
        SC 4 directs WG 1 to:

        * Develop documentation requirements for future work
        * Develop a specific list of documents needed for a first version of STEP
        * Develop precise functional requirements for Version 1 of STEP
        * Develop summary functional requirements for Version 2 of STEP
        * Develop a work program and time schedule at its Paris meeting which will aim at the completion of the technical specification of STEP Version 1.0 by the end of 1986.
