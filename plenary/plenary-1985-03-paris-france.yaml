- identifier: '9'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: 'its goal as expressed in Resolution #2'
  dates:
  - start: '1985-03-15'
    kind: decision
  actions:
  - type: confirms
    message: 'SC 4 reconfirms its goal as expressed in Resolution #2.

      To develop as soon as possible a single international standard for the

      exchange of product definition data to be called the standard for the exchange

      of product model data (STEP)'
    dates:
    - start: '1985-03-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '1985-03-15'
      kind: effective
  - type: resolves
    message: 'SC 4 will not concern itself with an interim solution based on any existing national

      standards, although it recognizes that these standards will continue in parallel use

      until STEP becomes fully operational.

      All efforts will be concentrated to achieve a first version of STEP so that its effective

      industrial use can start in 1990.'
    dates:
    - start: '1985-03-15'
      kind: effective
- identifier: '10'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ', whenever existing national standards are enhanced, development'
  dates:
  - start: '1985-03-15'
    kind: decision
  actions:
  - type: agrees
    message: 'SC 4 agrees that, whenever existing national standards are enhanced, development

      should be undertaken in parallel with the corresponding STEP effort, using the same

      reference model to ensure that compatible concepts are used. This will cause the

      standards to converge towards STEP and will simplify the eventual migration from the

      current standards to STEP.'
    dates:
    - start: '1985-03-15'
      kind: effective
- identifier: '11'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: SC 4/WG 1 is thanked for its accomplishments at its first meeting and is dire...
  dates:
  - start: '1985-03-15'
    kind: decision
  actions:
  - type: resolves
    message: 'SC 4/WG 1 is thanked for its accomplishments at its first meeting and is directed to:

      - Develop documentation requirements for future work

      - Develop a specific list of documents needed for a first version of STEP

      - Develop precise functional requirements for Version 1 of STEP

      - Develop summary functional requirements for Version 2 of STEP

      - Develop a work program and time schedule at its Paris meeting which will aim at the completion of the technical specification of STEP Version 1.0 by the end of 1986.'
    dates:
    - start: '1985-03-15'
      kind: effective
- identifier: '12'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: the excellent work of Mesdames LEBADEZET and CHAUMONT,
