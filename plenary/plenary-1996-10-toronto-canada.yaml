  - language_code: eng
    script: Latn
    title: Merge Parametrics project activities into ISO 14959 under WG 12
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: notes
      date_effective:
        date: '1996-10-15'
        type: effective
      message: |
        SC 4 notes that work under the Parametrics project (allocated the ISO number
        14959) has identified areas which may require modifications to existing IRs, the
        preparation of a new IR or IRs, and the development of a document or documents
        under ISO 14959 covering the emerging area of General Case Parametrics.
    - type: resolves
      date_effective:
        date: '1996-10-15'
        type: effective
      message: |
        SC 4 resolves that these activities will for the present be combined within the project
        14959 which will be allocated to WG 12 with Mike Pratt as project leader. These
        arrangements will be subject to ongoing review as the structure of project deliverables
        is clarified.
