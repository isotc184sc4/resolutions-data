    title: Recognize cooperation between WG 2 and WG 10 on interoperability
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: recognises
      date_effective:
        date: '1996-10-15'
        type: effective
      message: |
        SC 4 recognises this first successful step between WG 2 and WG 10 on a solution for
        the problem of interoperability between STEP (ISO 10303) and P-LIB (ISO 13584)
        within ISO/TC 184/SC 4 and encourages WG 2 and WG 10 to complete this work.
        SC 4 encourages all STEP AP developers to study the feasibility of describing their library
        and dictionary data using the P-LIB standards.
