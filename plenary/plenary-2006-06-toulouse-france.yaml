    title: Reappointment of SC 4 Chair
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: endorses
      date_effective:
        date: '2006-06-15'
        type: effective
      message: 'SC 4 endorses the nomination by the United States of Howard Mason
        for an additional three year term (January 2007-December 2009) as the Chair
        of ISO/TC 184 / SC 4 and instructs the Secretary to forward his nomination
        to ISO/TC 184 within 30 days.

        '
