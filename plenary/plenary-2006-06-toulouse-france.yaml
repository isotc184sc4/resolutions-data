    title: Request liaison statement to ISO/IEC JTC 1/SC 7 on Systems Engineering
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2006-06-15'
        type: effective
      message: 'SC 4 notes the NWI on Systems Engineering from ISO/IEC JTC 1/SC 7.
        (N3513, N3521, N3529)

        '
    actions:
    - type: requests
      date_effective:
        date: '2006-06-15'
        type: effective
      message: 'SC 4 requests its WG 3/T8 to prepare a liaison statement to SC 7 drawing
        their attention to the scope of the current work on Systems Engineering with
        a view to avoiding duplicated or inconsistent effort. If a liaison is required,
        SC 4 authorizes its Secretariat to initiate the liaison.

        '
