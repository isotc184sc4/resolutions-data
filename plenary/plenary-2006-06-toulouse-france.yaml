    message: 'ACKNOWLEDGEMENTS and APPRECIATIONS

      ACCLAMATION:

      Appreciation to our SC 4 Liaisons. We appreciate your representation to and for

      ISO/TC 184/SC 4.

      A special thank you to the SC 4 Liaison Plenary presenters for their insightful and

      comprehensive presentations:

      OMG

      David Price

      ISO/TC 29/WG 34

      Norman

      Swindells ECCMA/NATO AC/135

      Steve Arnett

      IAI

      Thomas Liebich

      ISO/TC 29 WG 34

      Jonas Nordstrom

      ISO/IEC JTC 1/SC 32

      Gerry

      Radack ISO/TC 37

      Gerry Radack

      ASD (LOTAR)

      Jean-Yves Delaunay

      We also offer thanks to those external projects who presented their material at the

      meeting.

      eCl@ss – PFI- ORCHID Raymond Betz

      PROMISE

      Dimitris Kiritsis

      ACCLAMATION:'
    dates:
    - start: '2006-06-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses it’s thanks to Alain Brail for organizing a most productive industry day

      on the future of STEP for manufacturing, and to all the speakers who contributed to

      the event, which has produced a wide range of information and guidance on future

      standards development activities.

      ACCLAMATION:'
    dates:
    - start: '2006-06-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses its thanks to Airbus for its sponsorship and the memorable social

      event, particularly for the efforts of Antoine Scotto d’Appollonia, Francesco Sperandio,

      Jean- Bernard Hentz and Jean-Yves Delaunay and Alain Brail.


      ACCLAMATION:'
    dates:
    - start: '2006-06-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses its thanks to Paul Sabatier University, Pierre Lagarrigue and Michele

      Grimal for preparing and hosting the machining demonstration,

      ACCLAMATION:'
    dates:
    - start: '2006-06-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses its particular thanks to Christine Hermetet-Filez and her staff,

      Delphine Michel and Marie-France (CTA Events), Isabelle Issanchou and Jerome

      (Mercure Atria), Benoit and Cyrile (LCD Vision) and Martine Dégardin (AFNOR) for

      their superior administrative support, outstanding hospitality, both before and during

      the ISO/TC 184/SC 4 meeting.'
    dates:
    - start: '2006-06-15'
      kind: effective
