  dates:
  - date: '2006-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Withdraw and revise NP Ballot on AP 241
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: withdraws
      date_effective:
        date: '2006-06-15'
        type: effective
      message: 'SC 4 withdraws the existing NWI on AP 241 (SC 4 N 2038).

        '
    - type: requests
      date_effective:
        date: '2006-06-15'
        type: effective
      message: 'SC 4 requests the SC 4/WG 3/T22 and the IAI to prepare a revised NWI
        for a new NWI ballot. The revision of the document and the revised change
        management form shall be sent to the SC 4 secretariat for circulation no later
        than 2006-08-31. The NWI should include details of the work partition between
        IAI and SC 4.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '686'
  kind: resolution
  status: decided
  dates:
  - date: '2006-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Reappointment of WG 2 Deputy Convener and module ballot requirement
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2006-06-15'
        type: effective
      message: 'SC 4 appreciates and accepts the offer of Prof. Guy Pierra to serve
        as Deputy Convener of WG 2.

        '
    actions:
    - type: approves
      date_effective:
        date: '2006-06-15'
        type: effective
      message: 'SC 4 approves the nomination of Prof. Guy Pierra to serve for an additional
        three year term.

        '
    - type: requests
      date_effective:
        date: '2006-06-15'
        type: effective
      message: 'SC 4 requires that SC 4 modules normatively referenced by modular
        STEP Application Protocols (APs) shall complete their Committee Draft Technical
        Specification (CD-TS) ballot prior to the AP completing its Draft International
        Standard (DIS) ballot. Modules need not be published by ISO to be normatively
        referenced. This Resolution clarifies and extends Resolutions 557 and 342.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '688'
  kind: resolution
  status: decided
  dates:
  - date: '2006-06-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Amends resolution 674 regarding cooperation with ISO/IEC JTC 1/SC 31 on
      AIDC
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: recognizing
      date_effective:
        date: '2006-06-15'
        type: effective
      message: 'SC 4 recognizes that formal liaison arrangements with SC 31 may need
        to be implemented at some future date.

        '
    actions:
    - type: replaces
      date_effective:
        date: '2006-06-15'
        type: effective
      message: |
        SC 4 replaces the first paragraph of resolution 674 with the following:

        "SC 4 expresses its interest in taking responsibility for Industrial Data application standards for all automatic identification data capture (AIDC) technologies (not limited to radio frequency identification [RFID]), in cooperation with ISO/IEC JTC 1/SC 31."
    - type: agrees
      date_effective:
        date: '2006-06-15'
        type: effective
      message: 'SC 4 agrees to extend the ad hoc group until SC 31 and ISO/TC 184
        and its SC 4 define and agree the scope of the work required within their
        respective committees, and jointly prepare and agree any necessary New Work
        Item Proposals for consideration by national bodies.

        '
    - type: requests
      date_effective:
        date: '2006-06-15'
        type: effective
      message: |
        SC 4 requests its delegation to provide a written report within two weeks of each physical meeting, and an oral report at each SC 4 meeting.

        Note: Resolution amends RESOLUTION 674 (Vico Equense, Italy - March 2006).
- identifier:
  - prefix: ISO/TC 184/SC 4
