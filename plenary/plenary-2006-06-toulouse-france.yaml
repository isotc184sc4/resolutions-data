- identifier: '685'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Revision of NP Ballot on AP 241
  dates:
  - start: '2006-06-15'
    kind: decision
  actions:
  - type: resolves
    message: Revision of NP Ballot on AP 241
    dates:
    - start: '2006-06-15'
      kind: effective
  - type: withdraws
    message: SC 4 withdraws the existing NWI on AP 241 (SC 4 N 2038)
    dates:
    - start: '2006-06-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests the SC

      4/WG 3/T22 and the IAI to prepare a revised NWI for a new NWI ballot. The revision of

      the document and the revised change management form shall be sent to the SC 4

      secretariat for circulation no later than 2006-08-31. The NWI should include details of

      the work partition between IAI and SC 4.'
    dates:
    - start: '2006-06-15'
      kind: effective
- identifier: '686'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Reappointment of WG 2 Deputy
  dates:
  - start: '2006-06-15'
    kind: decision
  actions:
  - type: resolves
    message: Reappointment of WG 2 Deputy
    dates:
    - start: '2006-06-15'
      kind: effective
  - type: appreciates
    message: 'SC 4 appreciates and accepts the offer of Prof. Guy Pierra to serve as Deputy

      Convener of WG 2'
    dates:
    - start: '2006-06-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves the nomination of Prof. Guy Pierra to serve for an

      additional three year term.

      Parallel processing of AP DIS and module TS ballots'
    dates:
    - start: '2006-06-15'
      kind: effective
  - type: request
    message: 'SC 4 requires that SC 4 modules normatively referenced by modular STEP

      Application Protocols (APs) shall complete their Committee Draft Technical


      Specification (CD-TS) ballot prior to the AP completing its Draft International

      Standard (DIS) ballot. Modules need not be published by ISO to be normatively

      referenced. This Resolution clarifies and extends Resolutions 557 and 342.'
    dates:
    - start: '2006-06-15'
      kind: effective
- identifier: '688'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Cooperation with ISO/IEC JTC 1/SC 31 on AIDC
  dates:
  - start: '2006-06-15'
    kind: decision
  actions:
  - type: resolves
    message: Cooperation with ISO/IEC JTC 1/SC 31 on AIDC
    dates:
    - start: '2006-06-15'
      kind: effective
  - type: replaces
    message: 'SC 4 replaces the first paragraph of resolution 674 with the following:

      "SC 4 expresses its interest in taking responsibility for Industrial Data application

      standards for all automatic identification data capture (AIDC) technologies (not limited

      to radio frequency identification [RFID]), in cooperation with ISO/IEC JTC 1/SC 31."'
    dates:
    - start: '2006-06-15'
      kind: effective
  - type: agrees
    message: 'SC 4 agrees to extend the ad hoc group until SC 31 and ISO/TC 184 and its SC 4

      define and agree the scope of the work required within their respective committees,

      and jointly prepare and agree any necessary New Work Item Proposals for

      consideration by national bodies'
    dates:
    - start: '2006-06-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2006-06-15'
      kind: effective
  - type: recognizes
    message: 'SC 4 recognizes that formal liaison arrangements with SC 31 may need to be

      implemented at some future date'
    dates:
    - start: '2006-06-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2006-06-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its delegation to provide a written report within two weeks of each

      physical meeting, and an oral report at each SC 4 meeting.

      Note: Resolution amends RESOLUTION 674 (Vico Equense, Italy - March 2006)'
    dates:
    - start: '2006-06-15'
      kind: effective
- identifier: '689'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO/IEC JTC 1/SC 7 NWI on Systems Engineering
  dates:
  - start: '2006-06-15'
    kind: decision
  actions:
  - type: resolves
    message: ISO/IEC JTC 1/SC 7 NWI on Systems Engineering
    dates:
    - start: '2006-06-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes the NWI on Systems Engineering from ISO/IEC JTC 1/SC 7.  (N3513,

      N3521, N3529) SC 4 requests its WG 3/T8 to prepare a liaison statement to SC 7

      drawing their attention to the scope of the current work on Systems Engineering with

      a view to avoiding duplicated or inconsistent effort.  If a liaison is required, SC 4

      authorizes its Secretariat to initiate the liaison.'
    dates:
    - start: '2006-06-15'
      kind: effective
