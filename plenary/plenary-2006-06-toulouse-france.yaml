    title: Request first meeting of WG 13
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2006-06-15'
        type: effective
      message: 'SC 4 requests WG 13 to hold its first meeting no later than the next
        meeting of SC 4 (October 2006) in Hershey, PA, USA and asks the convener to
        give at this meeting a status report to SC 4 on its work programme based on
        Resolution 676.

        '
- identifier:
