- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '751'
  kind: resolution
  status: decided
  dates:
  - date: '2008-06-15'
    type: adoption
  title:
  - spelling: eng
    value: Propose new scope for ISO/TC 184/SC 4
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2008-06-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC4 requests its secretariat by 2008-06-30 to provide ISO/TC 184 with the following proposed new scope for SC4:

        Standardization of the definition, integration and quality management of information which is shared, exchanged and archived in the context of:

        * the definition, description and classification of products and facilities throughout their lifecycle,
        * industrial management and operations,
        * other information requirements supporting automation systems.
