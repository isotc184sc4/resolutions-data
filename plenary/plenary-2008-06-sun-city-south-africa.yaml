- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '749'
  kind: resolution
  status: decided
  dates:
  - date: '2008-06-15'
    type: adoption
  title:
  - spelling: eng
    value: Express concerns regarding ISO/TC 37/SC 3 NWI 22274
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: resolves
    date_effective:
      date: '2008-06-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC4 expresses the following concerns regarding NWI 22274 from ISO/TC 37/SC 3:

        * This proposal appears to violate the agreements made at the ISO/TC 37 Beijing 2006 and Provo 2007 meetings.
        * SC4's request that ISO/TC 37/SC 3 delay circulating a NWI proposal for 22274 until a harmonised position between ISO/TC 184/SC 4 and ISO/TC 37 could be agreed and until a draft could be produced that could be circulated as a combined NWI/CD was not followed.
        * This proposal seems to have expanded to cover product classification schemes, which are within scope of SC4 and not of ISO/TC 37.
  - type: directs
    date_effective:
      date: '2008-06-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC4 directs the Chair, Secretariat, and liaison officers to ISO/TC 37/SC
        3 to jointly develop a liaison statement expressing SC4''s concerns about
        this project, for submission to ISO/TC 37/SC 3.

        '
  - type: requests
    date_effective:
      date: '2008-06-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC4 requests the liaison officers to coordinate an SC4 review of the
        NWI and prepare a set of ballot comments, noting the ballot closing date of
        2008-07-31.

        '
  - type: encourages
    date_effective:
      date: '2008-06-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC4 encourages its member countries to submit corresponding ballot comments
        through their national bodies.

        '
