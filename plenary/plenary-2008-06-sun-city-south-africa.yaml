- identifier: '751'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Proposed new ISO/TC 184/SC 4 Scope
  dates:
  - start: '2008-06-15'
    kind: decision
  actions:
  - type: resolves
    message: Proposed new ISO/TC 184/SC 4 Scope
    dates:
    - start: '2008-06-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its secretariat by 2008-06-30 to provide ISO/TC 184 with the following

      proposed new scope for SC 4:

      Standardization of the definition, integration and quality management of information

      which is shared, exchanged and archived in the context of

      * the definition, description and classification of products and facilities

      throughout their lifecycle,

      * industrial management and operations,

      * other information requirements supporting automation systems.'
    dates:
    - start: '2008-06-15'
      kind: effective
- identifier: '752'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Alignment of OMG activity on data quality with the work of WG 13
  dates:
  - start: '2008-06-15'
    kind: decision
  actions:
  - type: resolves
    message: Alignment of OMG activity on data quality with the work of WG 13
    dates:
    - start: '2008-06-15'
      kind: effective
  - type: investigates
    message: 'SC 4 invites the Object Management Group (OMG) to take account of the scope and

      deliverables of the approved ISO 8000 work programme on data quality (ISO/TC

      184/SC 4 N2271) in moving forward with activities around data quality'
    dates:
    - start: '2008-06-15'
      kind: effective
  - type: appoints
    message: 'SC 4 appoints

      Peter Benson as its delegate to attend the MIT Information Quality Industry

      Symposium (2008-07) and subsequent OMG Proposed Data Quality Standard

      Preparatory Meeting'
    dates:
    - start: '2008-06-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests Mr Benson to promote the full scope of the ISO

      8000 work programme at these meetings, to identify individuals with whom to

      establish working relationships and to report his findings back to SC 4.'
    dates:
    - start: '2008-06-15'
      kind: effective
- identifier: '753'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO 15926-7
  dates:
  - start: '2008-06-15'
    kind: decision
  actions:
  - type: resolves
    message: ISO 15926-7
    dates:
    - start: '2008-06-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes the successful second CD-TS ballot on ISO 15926-7 and resolves that

      the current content may be published as the following ISO 15926 parts:

      Part 7: Templates and methodology

      Part 8: OWL representation

      Part 9: Interfaces through facades

      Part 10: Test methods'
    dates:
    - start: '2008-06-15'
      kind: effective
  - type: requests
    message: SC 4 requests its Secretariat to inform ISO of this subdivision.
    dates:
    - start: '2008-06-15'
      kind: effective
- identifier: '754'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ACKNOWLEDGEMENTS and APPRECIATIONS
  dates:
  - start: '2008-06-15'
    kind: decision
  actions:
  - type: resolves
    message: 'ACKNOWLEDGEMENTS and APPRECIATIONS

      By Acclamation:

      We offer thanks to those external projects who presented their material at the Open

      Technical Forum.

      “Combining Gellish and RDF” -- Leo van

      Ruijven “RDF Pilot for Materials” -- David

      Leal

      By Acclamation:

      Appreciation to our SC 4 Liaisons and those projects who presented at the Liaison

      Plenary.

      Thomas Liebich

      -- IAI

      Anna Moreno

      -- ISO/TC 207 and VAMAS

      Oscar Rocha

      -- SASIG

      Gerry Radack

      -- ISO/TC 37

      Gerry Radack

      -- ISO/IEC JTC 1/SC 32

      Tom Thurman

      -- PDES, Inc

      By Acclamation:'
    dates:
    - start: '2008-06-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes with regret the resignation of Len Slovensky from the positions of WG 3

      Deputy Convenor and AP229 project leader and editor, and wishes him well in his

      future endeavours.

      By Acclamation:'
    dates:
    - start: '2008-06-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its appreciation to SABS, PiLog, SASOL, Transnet and Traces of

      Africa for their hosting and support of the 55th ISO/TC 184/SC 4 Plenary Meeting at

      the Sun City Hotel, Sun City, South Africa. We especially commend Dr Salomon de

      Jager -- PiLog; Dr Hanneke du Preez, Mrs Charlotte du Plessis, and Ms Barrie-Anne

      Basson -- Traces of Africa for an excellent venue and outstanding service to the SC 4

      community.

      A special acknowledgement is extended to Ms Erna Stadtlander -- Sun City

      Conference Coordinator and her Support Team.'
    dates:
    - start: '2008-06-15'
      kind: effective
