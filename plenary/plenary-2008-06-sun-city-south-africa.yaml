- identifier: '749'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: ISO Project 22274
  dates:
  - start: '2008-06-15'
    kind: decision
  actions:
  - type: resolves
    message: ISO Project 22274
    dates:
    - start: '2008-06-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses the following concerns regarding NWI 22274 from ISO/TC 37/SC 3:

      •

      This proposal appears to violate the agreements made at the ISO/TC 37 Beijing

      2006 and Provo 2007 meetings.

      •

      SC 4’s request that ISO/TC 37/SC 3 delay circulating a NWI proposal for 22274 until

      a harmonised position between ISO/TC 184/SC 4 and ISO/TC 37 could be agreed

      and until a draft could be produced that could be circulated as a combined NWI/CD

      was not followed.

      •

      This proposal seems to have expanded to cover product classification schemes,

      which are within scope of SC 4 and not of ISO/TC 37'
    dates:
    - start: '2008-06-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2008-06-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs the Chair, Secretariat, and liaison officers to ISO/TC 37/SC 3 to jointly

      develop a liaison statement expressing SC 4’s concerns about this project, for

      submission to ISO/TC 37/SC 3'
    dates:
    - start: '2008-06-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests the liaison officers to coordinate an SC 4 review of the NWI and prepare a set of ballot comments, noting the ballot

      closing date of 2008-07-31'
  - type: encourages
    message: 'SC 4 encourages its member countries to submit

      corresponding ballot comments through their national bodies.'
    dates:
    - start: '2008-06-15'
      kind: effective
