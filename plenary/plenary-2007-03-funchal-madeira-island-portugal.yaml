  kind: resolution
  status: decided
  dates:
  - date: '2007-03-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Create Ad Hoc Group on Visualization
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: creates
      date_effective:
        date: '2007-03-15'
        type: effective
      message: 'SC 4 creates an ad hoc group to define requirements for 3D visualization
        specifications. Oscar Rocha is appointed as chair. Members of this group shall
        include King Yee, Martin Hardwick and David Leal. National bodies shall be
        invited to nominate additional representatives. The Group shall report back
        to the Chairman and PPC not later than 2007-06-12.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '712'
  kind: resolution
  status: decided
  dates:
  - date: '2007-03-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Request exemption from ISO Standards limit dates
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2007-03-15'
        type: effective
      message: 'SC 4 requests its chair and Secretariat to negotiate a waiver from
        the TMB to restore the use of planned target dates rather than limit dates
        in the ISO work programme for SC 4 standards.

        '
    - type: requests
      date_effective:
        date: '2007-03-15'
        type: effective
      message: 'SC 4 requests its P-members to support the proposal with their TMB
        representatives.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '713'
  kind: resolution
  status: decided
  dates:
  - date: '2007-03-15'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Clarify copyright statement for executable electronic inserts
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: requests
      date_effective:
        date: '2007-03-15'
        type: effective
      message: 'SC 4 requests its chair and Secretariat to agree with ISO CS a form
        of words which can be used where necessary in SC 4 deliverables to ensure
        that electronic inserts containing processable content, such as XML, EXPRESS,
        PSL, STEP part 21 files, OWL, RDF, Common Logic, UML models and reference
        data in digital form may be used without restriction from the standard ISO
        copyright statement.

        '
    - type: requests
      date_effective:
        date: '2007-03-15'
        type: effective
      message: 'SC 4 requests its QC to ensure that the necessary changes are made
        to the Supplementary Directives.

        '
