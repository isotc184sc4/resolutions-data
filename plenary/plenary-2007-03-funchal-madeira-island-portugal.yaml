  localizations:
  - language_code: eng
    script: Latn
    title: Thank Norman Swindells for his support and wish well in retirement
    subject: ISO/TC 184/SC 4 "Industrial data"
    actions:
    - type: thanks
      date_effective:
        date: '2007-03-15'
        type: effective
      message: |
        Norman Swindells has played a pivotal role in the many successes of ISO/TC 184/SC 4.

        SC 4 expresses its sincere appreciation and gratitude to Norman Swindells for all his support of the work of SC 4 over the last two decades, and wishes him the very best in his retirement.
