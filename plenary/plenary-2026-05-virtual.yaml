    title: Assignment of liaison representatives to ISO/TC 12
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2026-05-15'
        type: effective
      message: |
        Noting the utilization of quantities and units in industrial data and the
        increasing involvement of SC4 in developing standards for industrial data
        with recognition that ISO/TC 12 -- Quantities and units has expertise in
        this domain
    actions:
    - type: appoints
      date_effective:
        date: '2026-05-15'
        type: effective
      message: |
        SC4 appoints Mr. Robert Swindells, Mr. Yoshiaki Sonoda, and Mr. Ronald Tse
        as liaison representatives from ISO/TC 184/SC 4 to ISO/TC 12 for a
        three-year term (2026-2029), with appreciation for their willingness to
        serve in this capacity.
