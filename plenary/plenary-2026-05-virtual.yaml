      date_effective:
        date: '2026-05-15'
        type: effective
      message: |
        SC4 resolves to skip the CD ballot (stage 30.0) and move directly to a DIS
        ballot (stage 40.0), with the DIS ballot to be initiated no later than
        2026-07-31.
    - type: instructs
      date_effective:
        date: '2026-05-15'
        type: effective
      message: |
        SC4 instructs WG 12 to prepare the necessary documents for submission and
        requests its Committee Manager to make the submission through the normal
        procedures.
