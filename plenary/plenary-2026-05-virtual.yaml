    script: Latn
    title: Launch ISO/NP 26379 as a new project despite less than five experts nominated
      in the NP ballot
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2026-05-15'
        type: adoption
      message: |
        Noting results of the NP ballot for ISO/NP 26379 taken on 2026-01-29 where
        a 2/3 majority of voting P-members approved the proposal with no
        disapprove votes and two P-members nominated experts combined with the
        subsequent Committee Internal Ballot taken on 2026-03-24 that garnished an
        additional two P-members to nominate experts,
    actions:
    - type: recognizes
      date_effective:
        date: '2026-05-15'
        type: effective
      message: |
        recognizes that the mandatory requirement of five expert nominations has
        not been satisfied; and
    - type: notes
      date_effective:
        date: '2026-05-15'
        type: effective
      message: |
        notes the reconsideration by DIN to nominate an expert and confirm the
        inclusion of the NP into their work program.
    - type: resolves
      date_effective:
        date: '2026-05-15'
        type: effective
      message: |
        Resolves to launch ISO/NP 26379, 3D Shape Descriptor for Digital Twin with
        the following terms of reference:

        * Prof. Soonhung Han as Project Leader; and
        * Mr. Tarique Hasan Khan as Project Editor,

        with appreciation for their willingness to serve in these capacities.
    - type: resolves
      date_effective:
        date: '2026-05-15'
        type: effective
      message: |
        SC4 further recognizes the following experts who have volunteered to
        participate in the project:

        * Mr. Trevor Coulson
        * Mr. Jayendra Ganguli
        * Dr. Matthias Grau
        * Mr. Christophe Mouton
        * Mr. Astuto Soma
        * Mr. Hyman Duan
        * Mr. Chiho Noh
        * Mr. Tahir Abbas Jauhar
        * Mr. Jaein Lee
    - type: asks
      date_effective:
        date: '2026-05-15'
        type: effective
      message: SC4 invites additional member bodies to nominate experts to participate
        in the projects.
