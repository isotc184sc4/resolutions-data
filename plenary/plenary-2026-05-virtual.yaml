- identifier: '1184'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: 'Recognizing:'
  dates:
  - start: '2026-05-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Recognizing:

       that ISO/TC 154 is developing ISO/NP 26087 Processes and data in carbon

      market monitoring reporting verification (MRV) — Data quality assessment,

      which introduces structured methods for evaluating completeness, timeliness,

      traceability, accuracy, and comparability of MRV data, as described in ISO/TC

      154 N 1641 and N 1642;

       that these concepts align closely with the data quality principles, vocabularies,

      and industrial data frameworks maintained by ISO/TC 184/SC 4;

       that WG 13 has expressed strong interest in contributing expertise to ensure

      consistency and interoperability between SC 4 data quality standards and the

      MRV data quality methodologies under development;'
    dates:
    - start: '2026-05-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests its Committee Manager to extend the liaison from ISO/TC 184/SC 4 to

      ISO/TC 154, and appoints Mr. Christophe Mouton, Mr. Peter Benson, Ms Hayley

      Thompso, Mr. Yoshiaki Sonoda, Mr. Yves Keraron, and Mr. Zhang Wei Qun, (Kevin) as

      new liaison representatives for a three-year term [2026–2029], with appreciation for

      their willingness to serve in this capacity.'
    dates:
    - start: '2026-05-15'
      kind: effective
