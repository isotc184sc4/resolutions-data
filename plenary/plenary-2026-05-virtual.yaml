- identifier: '1193'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: its Committee Manager to coordinate with ISO/CS and
  dates:
  - start: '2026-05-15'
    kind: decision
  actions:
  - type: requests
    message: 'SC4 requests its Committee Manager to coordinate with ISO/CS and

      initiate the revision of ISO 10303–15, as a New Project on SDT 18 track with the following

      terms of reference:

      Proposed date for first meeting: 2026-05-21

      Dates for key milestones:

      Circulation of 1st Working Draft (if any) to experts: 2026-05-07

      Committee Draft Consultation (if any):

      2026-06-15

      DTS submission:

      2026-09-15

      Publication:

      2027-01-15

      Identifies SDG Goal 9 with the following rationale:

       The ISO 10303 standard in total is identified against Goal 9 and this part in included

      in that series, and

       To enable the interoperability between industry and IT architectures in industrial

      data applications'
    dates:
    - start: '2026-05-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2026-05-15'
      kind: effective
  - type: allocates
    message: 'SC4 allocates the project to WG 11 and appoints Mr. Kevin Le Tutour as Project Leader

      with nominations of the following experts to participate and welcome additional experts

      to participate in the project:

       AFNOR: Mr. Frédéric Darré, Mr. Pierre Duchier, Mr. Erwan Livolant, Mr. Kevin Le

      Tutour

       DIN: Mr. Guillaume Hirel, Mr. Max Ungerer

       BSI: Mr. Phil Spiby, Mr. Robert Swindells

       ANSI: Mr. Patrick Walsh, Mr. Stuart Galt, Mr. Tom Thurman


       SIS: Mr. Mikael Hedlind

      Utilize the ISO OSD with a document provided by WG 11 that will replace the edition

      currently in publication.'
    dates:
    - start: '2026-05-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting the proposal from WG 11 for creating edition 3 of ISO 10303–15 to incorporate

      capability enhancements from industry requirements identified in ISO JIRA

      TCSC410303-2756'
    dates:
    - start: '2026-05-15'
      kind: effective
- identifier: '1194'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: its Committee
  dates:
  - start: '2026-05-15'
    kind: decision
  actions:
  - type: requests
    message: 'SC4 requests its Committee

      Manager to Register with ISO/CS ISO/AWI TS 8000-60 edition 2 with the following

      terms of reference:

       Incorporate the new scope to include parts 65 and 66 from the ISO 8000 series,

       Development stage 20 with a standard development track (SDT) of 36 months,

       Target dates:

      o Circulation of 1st Working Draft: 2026-12-14

      o Committee Draft consultation: 2027-03-01

      o DIS submission: 2027-12-13

      o Publication: 2029-05-31

       Allocates the work to WG 13 with Christophe Mouton as Project Leader, Prof.

      Changsoo Lee as Project Co-Leader, and Ms Hayley Thompson as Project Editor

       ISO/TS 8000-60 supports the UN Sustainable Development Goal 9 (Industry,

      Innovation and Infrastructure) by providing concepts for implementing, assessing

      and improving data quality management in various industrial sectors.

       Register the following list of NSBs with their nominated representatives as active

      participants in the revision:

      o USA: Mr. Peter Benson

      o Norway: Mr. Tor Arne Irgens,

      o Korea: Mr. Sungjoon LIM

      o South Africa: Dr. Salomon De Jager

       Provide OSD access to enable WG 13 to prepare the Working Draft using the

      previous edition as a basis.'
    dates:
    - start: '2026-05-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting the ballot results of the Systematic Review for ISO/SRR TS 8000–60 taken on

      2025–12–02 and the recommendation by WG 13'
    dates:
    - start: '2026-05-15'
      kind: effective
- identifier: '1195'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: advance ISO/PWI 13584–26 ed2 to stage 20 with the following
  dates:
  - start: '2026-05-15'
    kind: decision
  actions:
  - type: resolves
    message: 'SC4 resolves to advance ISO/PWI 13584–26 ed2 to stage 20 with the following

      terms of reference:

       Development Stage 20 (NP) with a standard development track (SDT) of 24

      months,

       Target dates:

      o Circulation of 1st Working Draft: 2026-10-09

      o Committee Draft consultation: 2026-12-12

      o DIS submission: 2027-05-31

      o Publication: 2027-12-11

       ISO 13584–26 supports the UN Sustainable Development Goal 9 (Industry,

      Innovation and Infrastructure) by ensuring efficient use of data in industrial settings

      in concert with the larger part of the ISO 13584 series.

       ISO 13584–26 supports the UN Sustainable Development Goal 12 (Responsible

      Consumption and Production) by properly identifying data, its meaning and

      ensuring the responsible use of that data in industrial settings.

       Allocates the work to JWG 24 with Mr. Hiroshi Murayama as Project Leader,

       Nominate the following experts:

      o AFNOR: Mr. Christophe Mouton, Mr. Yves Keraron,

      o ANSI: Mr. Ronald Tse,

      o DIN: Mr. Gernot Rossi,

      o JISC: Mr. Yoshiaki Sonoda

      o KATS: Prof. Soonhung Han

      o SABS: Dr. Salomon De Jager

       Provide OSD access using the existing document to enable JWG 24 to prepare

      the Working Draft, and

       Requests member bodies nominate experts to the project’s work.'
    dates:
    - start: '2026-05-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting the work of JWG 24 in the refinement of ISO/PWI 13584–26 ed2 by the project

      team'
    dates:
    - start: '2026-05-15'
      kind: effective
