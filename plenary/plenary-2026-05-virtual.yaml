    script: Latn
    title: Launch SC 4 standing document "ISO 15926/ISO 18136 maintenance of terms"
      as 8-week CIB
    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2026-05-15'
        type: effective
      message: |
        Noting the opportunity to manage vocabulary in a common way within the
        Working Group 3 body of experts for ISO 15926 and ISO 18136.
