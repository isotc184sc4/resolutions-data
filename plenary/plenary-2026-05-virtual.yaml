  - type: notes
    message: 'SC4 notes that the Systematic Review ballot for ISO/TS 10303-17:2022 indicated that a

      simple majority of the P-members of the committee propose confirmation.  Furthermore,

      the results of the ballot indicates adoption/use in Denmark, Japan, Finland and Norway,

      which together with ongoing ISO 10303-242 development activity in France and

      Germany demonstrate that the document is used internationally and has been adopted

      with or without change or is used in at least five countries'
