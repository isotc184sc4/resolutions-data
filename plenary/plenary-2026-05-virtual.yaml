      date_effective:
        date: '2026-05-15'
        type: effective
      message: |
        SC4 requests its Committee Manager circulate an 8-week Committee Internal
        Ballot (CIB) the draft SC4 standing document:

        * “Procedure for the alignment and maintenance of terms in the ISO 15926
        and ISO 18136 series” for comment.
    - type: resolves
      date_effective:
