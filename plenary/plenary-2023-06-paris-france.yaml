    subject: ISO/TC 184/SC 4 "Industrial data"
    considerations:
    - type: noting
      date_effective:
        date: '2023-06-15'
        type: effective
      message: |
        Noting that:

        * WG 25 embodies the ISO Validation Team for Change Requests that uses the CSP
          that is already installed
        * WG 25 already started processing of the first CR on ICS (International Classification
          for Standards) submitted by Japan National Committee for ISO TC 184/SC 4, on June 13, 2023
        * There is a strong request from ISO/CS to formally and substantial restore the lost
          content of the ISO 13584-501 RA
    actions:
    - type: supports
      date_effective:
        date: '2023-06-15'
        type: effective
      message: |
        ISO/TC 184/SC 4 supports the start of preliminary work item for publishing an amendment
        on ISO 13584-501 with an aim to replace the maintenance procedure described in the
        standard based on RA with the CSP for CDD.
