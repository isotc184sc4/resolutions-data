      kind: effective
- identifier: '1124'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Skip CD and proceed to DIS ballot for ISO 14306-1
  dates:
  - start: '2023-06-15'
    kind: decision
  actions:
  - type: resolves
    message: Skip CD and proceed to DIS ballot for ISO 14306-1
    dates:
    - start: '2023-06-15'
      kind: effective
  - type: resolves
    message: 'SC4 resolves to skip the CD ballot

      (stage 30.0) and move directly to a DIS ballot (Stage 40.0).'
    dates:
    - start: '2023-06-15'
      kind: effective
  considerations:
  - type: recalling
    message: 'Recalling Annex SS of the ISO/IEC Directives Part 1, and noting the consensus found in

      JWG 16 during the comments resolution process of ISO/WD 14306-1 and that the

      resulting draft is estimated to have a DIS maturity'
    dates:
    - start: '2023-06-15'
      kind: effective
