- identifier: '1120'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Launch ISO/NP Automation systems and integration – Ontology-based interoperab...
  dates:
  - start: '2023-06-15'
    kind: decision
  actions:
  - type: resolves
    message: Launch ISO/NP Automation systems and integration – Ontology-based interoperability
    dates:
    - start: '2023-06-15'
      kind: effective
  - type: resolves
    message: 'Noting the proposal from Standard Norge (SN) for a new multi part standard, ISO/TC


      184/SC 4:

       Requests its Committee Manager launch ISO/NP Automation systems and

      integration – Ontology-based interoperability with an eight-week ballot duration;

       Create a Work Group entitled WG 26 “Ontology-based interoperability” to:

      o Develop and maintain ISO xxxxx: “Automation systems and integration -

      Ontology-based interoperability,”

      o Develop and maintain guidance for the implementation and use of the

      standard series,

      o Develop and maintain detailed specifications for integration and re-use of

      existing reference data libraries and ontologies using the standard series,

       Requests WG 26 to work in close cooperation with WG 3, WG 12, WG 15, WG

      21, and WG 22 to align with, reuse and complement their existing standards, and

      avoid overlaps and conflicts with ISO 10303, ISO 15926, and ISO 23247 and other'
    dates:
    - start: '2023-06-15'
      kind: effective
  - type: resolves
    message: 'SC 4 standards,

       Nominates Pål Rylandsholm as convener of the work group, and

       Invites member bodies to nominate additional members to the work group.'
    dates:
    - start: '2023-06-15'
      kind: effective
