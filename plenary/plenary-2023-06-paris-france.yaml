- identifier: '1116'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Create a Task Force for the SC 4 Common Change Process
  dates:
  - start: '2023-06-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Create a Task Force for the SC 4 Common Change Process

      No ting the workshop held on 19 April 2023 by members of the PPC and the

      recommendations developed as a result of reviewing the procedures for managing

      standards in database format for WG 21, WG 22, WG 23, and JWG 24, SC 4 requests

      its Committee Manager establish a Task Force on the SC 4 Common Change Process

      with the following terms of reference:

       Create a Committee Specific Procedure for WG 21, WG 22, WG 23, and JWG 24

      that harmonizes the process for maintaining standards as a database and propose

      the procedure to SC 4 for consideration as a standing document,

       Revise the existing procedures for WG 21 (SC4N2617, SC4N2591), WG 22

      (SC4N2984), WG 23 (SC4N2612), and JWG 24 (SC4N3708) to incorporate the

      proposed Common Change Process and propose to SC 4 for consideration as a

      standing document,

       Draft/revise user level documents for implementing the Common Change Process

      at the technology application level for each WG, and

       Update SC4 at each meeting on progress until expected completion in Fall 2024'
    dates:
    - start: '2023-06-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2023-06-15'
      kind: effective
  - type: nominates
    message: 'SC 4 nominates the following to the Task Force with appreciation for serving on

      this important task:

       Nils Sandsmark

       Jochen Haenisch

       Paul van Exel

       Dr. Tim King (Convenor)

       Hiroshi Murayama

      And invite National Bodies to nominate members to the task force.'
    dates:
    - start: '2023-06-15'
      kind: effective
- identifier: '1117'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Continuation of ISO/TC 184/SC 4/TF 2 following up on ISO/TR 17999
  dates:
  - start: '2023-06-15'
    kind: decision
  actions:
  - type: resolves
    message: Continuation of ISO/TC 184/SC 4/TF 2 following up on ISO/TR 17999
    dates:
    - start: '2023-06-15'
      kind: effective
  - type: resolves
    message: 'SC 4 concurs with the recommendation of ISO/TC 184/SC 4/TF 2 to extend

      the mandate of TF 2 and add to its terms of reference the following:

       Build upon the ISO/TR 17999 SC 4 Reference Architecture;

       Share with other committees, subcommittees and industrial standardisation

      groups the opportunity proposed in ISO/TR 17999 to their standards;

       Develop a guide (technical report) on how ISO/TR 17999 could assist the

      implementation of computer processable ontologies, terminologies, and the

      activities necessary to manage them;

       And invite National Bodies to nominate members.'
    dates:
    - start: '2023-06-15'
      kind: effective
  considerations:
  - type: noting
    message: 'Noting the progress made on ISO/TR 17999 - SC 4 Reference Model for Industrial

      Data and the need to make available the acquired knowledge to the various potential

      users of it'
    dates:
    - start: '2023-06-15'
      kind: effective
