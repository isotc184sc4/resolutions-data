- identifier: '601'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Reappointment of WG 3 Convener
  dates:
  - start: '2004-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Reappointment of WG 3 Convener
    dates:
    - start: '2004-03-15'
      kind: effective
  - type: appreciates
    message: SC 4 appreciates and accepts the offer of Dr. Radack to serve as Convener of WG 3
    dates:
    - start: '2004-03-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2004-03-15'
      kind: effective
  - type: approves
    message: 'SC 4 approves the nomination of Dr. Radack to serve for an additional three year

      term'
    dates:
    - start: '2004-03-15'
      kind: effective
- identifier: '602'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Appointment of Liaison Officer to IEC SC 65B/WG 10
  dates:
  - start: '2004-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Appointment of Liaison Officer to IEC SC 65B/WG 10
    dates:
    - start: '2004-03-15'
      kind: effective
  - type: nominates
    message: 'SC 4 nominates Hiroshi Murayama as primary liaison officer, with Dr. Wolfgang Wilkes

      as alternate, to IEC SC 65B/WG 10 for a period of two years, and welcomes Dr. Jean-

      Philippe Herzog as liaison officer from SC 65B.'
    dates:
    - start: '2004-03-15'
      kind: effective
- identifier: '603'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Retention of ISO 10303-203 ed1 in the ISO Catalogue of Available International
  dates:
  - start: '2004-03-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Retention of ISO 10303-203 ed1 in the ISO Catalogue of Available International

      Standards'
    dates:
    - start: '2004-03-15'
      kind: effective
  - type: requests
    message: 'SC 4 requests the ISO Central Secretariat to retain the listing of ISO 10303-203

      edition 1 in the ISO catalogue of available International Standards, after the on

      publication of the ISO 10303-203 edition 2 as a Technical Specification.'
    dates:
    - start: '2004-03-15'
      kind: effective
- identifier: '604'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Liaison with NATO AC/135
  dates:
  - start: '2004-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Liaison with NATO AC/135
    dates:
    - start: '2004-03-15'
      kind: effective
  - type: resolves
    message: 'SC 4 proposes a Category A liaison with NATO AC/135, nominates Steven Arnett, US

      Defense Logistics Information Service, as the liaison officer, and requests that the SC

      4 secretary confirms this liaison with the ISO Central Secretariat'
    dates:
    - start: '2004-03-15'
      kind: effective
  - type: resolves
    message: .
    dates:
    - start: '2004-03-15'
      kind: effective
  - type: investigates
    message: 'SC 4 invites AC/135 to make a reciprocal nomination, and to invite any of its

      constituent bodies with activities in the scope of SC 4 to establish liaison

      arrangements.'
    dates:
    - start: '2004-03-15'
      kind: effective
- identifier: '605'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Investigation of Use of Languages in Coordination with EXPRESS
  dates:
  - start: '2004-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Investigation of Use of Languages in Coordination with EXPRESS
    dates:
    - start: '2004-03-15'
      kind: effective
  - type: supports
    message: 'SC 4 supports the proposed investigation by the Industrial Data on the Web Group

      (IDW) of the relationship between SC 4 standards and OASIS, W3C and OMG

      standards

      Use of languages such as UML and OWL in coordination with EXPRESS is to be

      included as part of this investigation'
    dates:
    - start: '2004-03-15'
      kind: effective
  - type: requests
    message: SC 4 requests the IDW team to present a report on this activity at the Bath meeting.
    dates:
    - start: '2004-03-15'
      kind: effective
- identifier: '606'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Extension of Task Force for Dictionaries, Part Libraries, and Reference Data ...
  dates:
  - start: '2004-03-15'
    kind: decision
  actions:
  - type: resolves
    message: Extension of Task Force for Dictionaries, Part Libraries, and Reference Data Libraries
    dates:
    - start: '2004-03-15'
      kind: effective
  - type: notes
    message: 'SC 4 notes the work done to date by the Task Force for Dictionaries, Part Libraries,

      and Reference Data Libraries and acknowledges the need for additional time to

      achieve consensus'
    dates:
    - start: '2004-03-15'
      kind: effective
  - type: directs
    message: 'SC 4 directs the Task Force to circulate a draft report to the SC

      4 community by 2004-06-18 and to report to SC 4 at the next ISO/TC 184/SC 4

      meeting in Bath, UK.'
    dates:
    - start: '2004-03-15'
      kind: effective
- identifier: '607'
  subject: ISO/TC 184/SC 4 "Industrial data"
  title: Acknowledgements and Appreciations
  dates:
  - start: '2004-03-15'
    kind: decision
  actions:
  - type: resolves
    message: 'Acknowledgements and Appreciations

      Acclamation:'
    dates:
    - start: '2004-03-15'
      kind: effective
  - type: appreciation
    message: 'SC 4 expresses its deep appreciation to US PRO, its Members and the staff of the

      Bonaventure Resort and Spa Hotel for their efforts in organizing this meeting,

      arranging the facilities, excellent food, and excellent social events'
    dates:
    - start: '2004-03-15'
      kind: effective
  - type: resolves
    message: 'SC 4 also

      expresses its appreciation for their hospitality and outstanding support before, during,

      and after the meeting

      Acclamation:

      Appreciation to our SC 4 Liaisons. We appreciate your representation to and for

      ISO/TC 184/SC 4.

      A special thank you to the SC 4 Liaison Plenary presenters for their insightful and

      comprehensive presentations:

      ECCMA eOTD

      Peter Benson & Steve

      Arnett SASIG

      Oscar Rocha

      EPISTLE

      Dalip Sud

      UCC

      John McInerney

      EMSA

      Tony Fry

      Acclamation:'
    dates:
    - start: '2004-03-15'
      kind: effective
  - type: resolves
    message: 'SC 4 expresses its particular thanks to Mr. Chuck Stark, Ms Sarah Hartline and Ms

      Tina Conlon for their superior administrative support, outstanding hospitality, and


      patience both before and during the ISO/TC 184/SC 4 meeting'
    dates:
    - start: '2004-03-15'
      kind: effective
