  - spelling: eng
    value: Request ISO/CS to retain ISO 10303-203 ed1 in the catalogue
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2004-03-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 requests the ISO Central Secretariat to retain the listing of ISO
        10303-203 edition 1 in the ISO catalogue of available International Standards,
        after the publication of the ISO 10303-203 edition 2 as a Technical Specification.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '604'
  kind: resolution
  status: decided
  dates:
  - date: '2004-03-15'
    type: adoption
  title:
  - spelling: eng
    value: Propose Category A liaison with NATO AC/135 and nominate Steven Arnett
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: requests
    date_effective:
      date: '2004-03-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 proposes a Category A liaison with NATO AC/135, nominates Steven
        Arnett, US Defense Logistics Information Service, as the liaison officer,
        and requests that the SC 4 secretary confirms this liaison with the ISO Central
        Secretariat.

        '
  - type: requests
    date_effective:
      date: '2004-03-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 invites AC/135 to make a reciprocal nomination, and to invite any
        of its constituent bodies with activities in the scope of SC 4 to establish
        liaison arrangements.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '605'
  kind: resolution
  status: decided
  dates:
  - date: '2004-03-15'
    type: adoption
  title:
  - spelling: eng
    value: Support IDW investigation of language usage with EXPRESS
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: supports
    date_effective:
      date: '2004-03-15'
      type: effective
    message:
    - spelling: eng
      value: |
        SC 4 supports the proposed investigation by the Industrial Data on the Web Group (IDW) of the relationship between SC 4 standards and OASIS, W3C and OMG standards.

        Use of languages such as UML and OWL in coordination with EXPRESS is to be included as part of this investigation.
  - type: requests
    date_effective:
      date: '2004-03-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 requests the IDW team to present a report on this activity at the
        Bath meeting.

        '
- identifier:
  - prefix: ISO/TC 184/SC 4
    number: '606'
  kind: resolution
  status: decided
  dates:
  - date: '2004-03-15'
    type: adoption
  title:
  - spelling: eng
    value: Extend timeline for Dictionaries Task Force draft report
  subject:
  - spelling: eng
    value: ISO/TC 184/SC 4 "Industrial data"
  actions:
  - type: directs
    date_effective:
      date: '2004-03-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 directs the Task Force to circulate a draft report to the SC 4
        community by 2004-06-18 and to report to SC 4 at the next ISO/TC 184/SC 4
        meeting in Bath, UK.

        '
  considerations:
  - type: noting
    date_effective:
      date: '2004-03-15'
      type: effective
    message:
    - spelling: eng
      value: 'SC 4 notes the work done to date by the Task Force for Dictionaries,
        Part Libraries, and Reference Data Libraries and acknowledges the need for
        additional time to achieve consensus.

        '
